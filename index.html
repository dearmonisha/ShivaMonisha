}

function toggleBudgetIncome() {
  _incomeCollapsed = !_incomeCollapsed;
  const body = id('binc-body'), chev = id('binc-chev');
  if (body) body.style.display = _incomeCollapsed ? 'none' : '';
  if (chev) chev.style.transform = _incomeCollapsed ? 'rotate(-90deg)' : '';
}

function bdntHover(pfx, idx, wrapId) {
  const wrap = id(wrapId || 'breakdownDonutWrap');
  if (!wrap) return;
  const segs = wrap['_bdnt_' + pfx];
  if (!segs) return;
  const seg = segs[idx];
  if (!seg) return;

  const svgSeg = id(pfx + '-' + idx);
  if (svgSeg) svgSeg.style.transform = `translate(${seg.ho.x.toFixed(1)}px,${seg.ho.y.toFixed(1)}px)`;

  segs.forEach((_, i) => {
    if (i === idx) return;
    const s = id(pfx + '-' + i);
    if (s) s.style.opacity = '0.32';
  });

  const lr = id(pfx + '-lr-' + idx);
  if (lr) lr.style.background = 'var(--surface2)';

  const hc = id(pfx + '-hovercard');
  if (hc) {
    id(pfx + '-hc-name').textContent = seg.name;
    id(pfx + '-hc-val').textContent  = seg.fmtVal + '  ·  ' + seg.pct + '% of total';
    hc.style.display = 'block';
    hc.style.borderLeftColor = seg.color;
  }
}

function bdntLeave(pfx, idx, wrapId) {
  const wrap = id(wrapId || 'breakdownDonutWrap');
  if (!wrap) return;
  const segs = wrap['_bdnt_' + pfx];
  if (!segs) return;

  segs.forEach((_, i) => {
    const s = id(pfx + '-' + i);
    if (s) { s.style.transform = ''; s.style.opacity = ''; }
    const lr = id(pfx + '-lr-' + i);
    if (lr) lr.style.background = '';
  });

  const hc = id(pfx + '-hovercard');
  if (hc) hc.style.display = 'none';
}

function renderBudgetKpis(month) {
  const row = id('budgetKpiRow');
  if (!row) return;

  // Transaction-based income: sum of approved __income__-tagged credits this month
  const txnIncome     = txnGetIncomeForMonth(month);
  // Budget-based income: scheduled + manual entries (used for "Planned" net)
  const budgetIncome  = budgetGetIncome(month);

  const totalBudgeted = (D.budget.plans || [])
    .filter(p => p.month===month)
    .reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
  const actualSpent   = budgetGetMonthTotal(month);
  const plannedNet    = budgetIncome - totalBudgeted;   // budget vs budget
  const actualNet     = txnIncome   - actualSpent;      // actual income vs actual spend

  // Income transaction count for sub-label
  const incomeTxnCount = (D.transactions || []).filter(t =>
    t.date && t.date.slice(0,7) === month &&
    !t.isTransfer && t.status !== 'pending' && t.status !== 'rejected' &&
    t.categoryId === '__income__'
  ).length;

  // Months that have any budget or transaction data (for cumulative)
  const txnMonths = [...new Set(
    (D.transactions || [])
      .filter(t => t.date && !t.isTransfer && t.status !== 'pending' && t.status !== 'rejected' && t.categoryId === '__income__')
      .map(t => t.date.slice(0,7))
  )];
  const monthSet = new Set([
    ...(D.budget.income || []).map(i => i.date ? i.date.slice(0,7) : i.month).filter(Boolean),
    ...(D.budget.actualTotals || []).map(a => a.month).filter(Boolean),
    ...(D.budget.plans || []).map(p => p.month).filter(Boolean),
    ...txnMonths,
  ]);
  const allMonths = [...monthSet].filter(m => m <= month).sort();
  const cumulPlanned = allMonths.reduce((sum, m) => {
    const inc = budgetGetIncome(m);
    const bud = (D.budget.plans || []).filter(p => p.month===m).reduce((s,p) => s+(parseFloat(p.amount)||0), 0);
    return sum + inc - bud;
  }, 0);
  const cumulActual = allMonths.reduce((sum, m) =>
    sum + txnGetIncomeForMonth(m) - budgetGetMonthTotal(m), 0);

  const usedPct = totalBudgeted > 0 ? Math.round(actualSpent/totalBudgeted*100) : null;
  const green = 'var(--ok)', red = 'var(--danger)', blue = 'var(--info)', amber = 'var(--warn)';

  const card = (icon, label, val, color, sub='') => `
    <div class="bkpi-card">
      <div class="bkpi-icon">${icon}</div>
      <div class="bkpi-label">${label}</div>
      <div class="bkpi-value" style="color:${color}">${val}</div>
      ${sub ? `<div class="bkpi-sub">${sub}</div>` : ''}
    </div>`;
  const splitCard = (icon, label, pv, pc, av, ac) => `
    <div class="bkpi-card bkpi-split">
      <div class="bkpi-icon">${icon}</div>
      <div class="bkpi-label">${label}</div>
      <div class="bkpi-split-row"><span class="bkpi-split-lbl">Planned</span><span class="bkpi-split-val" style="color:${pc}">${pv}</span></div>
      <div class="bkpi-split-row"><span class="bkpi-split-lbl">Actual</span><span class="bkpi-split-val" style="color:${ac}">${av}</span></div>
    </div>`;

  // ── Rollover Reserve KPI (Option 3: Uncommitted Balance) ─────
  const _rolloverCatIds = D.budget.rolloverCats || [];
  const _potLinks       = D.budget.rolloverPotLinks || {};
  let _totalRollReserve = 0, _totalBacked = 0;
  _rolloverCatIds.forEach(cid => {
    const _eff  = budgetGetEffectivePlan(cid, month);
    const _base = budgetGetPlan(cid, month);
    const _roll = Math.max(0, _eff - _base);
    if (!_roll) return;
    _totalRollReserve += _roll;
    const _pid  = _potLinks[cid];
    const _pacc = _pid ? (D.txnAccounts||[]).find(a => a.id === _pid) : null;
    if (_pacc) _totalBacked += Math.min(_roll, txnCurrentBalance(_pacc));
  });
  _totalRollReserve = Math.round(_totalRollReserve * 100) / 100;
  _totalBacked      = Math.round(_totalBacked      * 100) / 100;
  const _unbacked   = Math.round((_totalRollReserve - _totalBacked) * 100) / 100;
  // Bank balance = sum of Bank + Savings + Cash accounts (excludes CC & Investment)
  const _bankBal    = Math.round((D.txnAccounts||[])
    .filter(a => ['Bank','Savings','Cash'].includes(a.type))
    .reduce((s, a) => s + txnCurrentBalance(a), 0) * 100) / 100;
  const _freeBal    = Math.round((_bankBal - _totalRollReserve) * 100) / 100;

  const _rolloverKpi = _totalRollReserve > 0 ? (() => {
    const _backedPct  = _totalRollReserve > 0 ? Math.round(_totalBacked / _totalRollReserve * 100) : 100;
    const _kpiColor   = _unbacked > 0.005 ? red : green;
    const _subLine    = _unbacked > 0.005
      ? `${fmtC(_unbacked)} unlinked to a pot`
      : 'Fully backed by pots';
    return `
    <div class="bkpi-card" style="border-color:color-mix(in srgb,var(--primary) 25%,transparent)">
      <div class="bkpi-icon">🔒</div>
      <div class="bkpi-label">Rollover Reserve</div>
      <div class="bkpi-value" style="color:${_kpiColor}">${fmtC(_totalRollReserve)}</div>
      <div class="bkpi-sub">${_subLine}</div>
      <div style="margin-top:6px;font-size:.68rem;color:var(--text3);border-top:1px solid var(--border);padding-top:5px">
        <div style="display:flex;justify-content:space-between"><span>Bank balance</span><span style="font-weight:600;color:var(--text)">${fmtC(_bankBal)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Free balance</span><span style="font-weight:700;color:${_freeBal >= 0 ? green : red}">${fmtC(_freeBal)}</span></div>
      </div>
    </div>`;
  })() : '';

  row.innerHTML =
    card('💰','Monthly Income', fmtC(txnIncome), green,
         incomeTxnCount > 0 ? `${incomeTxnCount} income transaction${incomeTxnCount !== 1 ? 's' : ''}` : 'No income transactions') +
    card('📋','Total Budgeted', fmtC(totalBudgeted), blue,
         usedPct !== null ? `${usedPct}% spent` : 'No budget set') +
    card('🧾','Actual Spent', fmtC(actualSpent),
         actualSpent > totalBudgeted && totalBudgeted > 0 ? red : amber) +
    splitCard('📊','Net In Hand',
      fmtC(plannedNet), plannedNet >= 0 ? green : red,
      fmtC(actualNet),  actualNet  >= 0 ? green : red) +
    splitCard('📈','Cumulative',
      fmtC(cumulPlanned), cumulPlanned >= 0 ? green : red,
      fmtC(cumulActual),  cumulActual  >= 0 ? green : red) +
    _rolloverKpi;
  // KPI row height just changed — re-sync the right panel sticky offset
  requestAnimationFrame(_syncBudgetPanelSticky);
}

function renderBudgetPanel(month) {
  const wrap = id('budgetPanelWrap');
  if (!wrap) return;

  const cats   = D.budget.categories || [];
  const groups = D.budget.groups || [];
  const fmtS   = v => '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});

  // ── Budget Health Scorecard (always visible) ──────────────
  let over = 0, overAmt = 0, onTrack = 0, noBudget = 0;
  const totalBudgeted = cats.reduce((s, c) => s + budgetGetAdjustedPlan(c.id, month), 0);
  const totalSpent    = cats.reduce((s, c) => s + budgetGetCatActuals(c.id, month), 0);
  const usedPct       = totalBudgeted > 0 ? Math.round(totalSpent / totalBudgeted * 100) : 0;
  const usedColor     = usedPct >= 100 ? 'var(--danger)' : usedPct >= 85 ? 'var(--warn)' : 'var(--ok)';

  cats.forEach(c => {
    const b    = budgetGetAdjustedPlan(c.id, month);
    const a    = budgetGetCatActuals(c.id, month);
    if (b <= 0) { noBudget++; return; }
    const diff = Math.round((a - b) * 100) / 100;   // cent-rounded, kills float dust
    if (diff > 0.005) { over++; overAmt += diff; }  // half-cent epsilon — same as isOver everywhere
    else onTrack++;
  });

  const scorecard = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px">
      <div style="font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px">
        📊 Budget Health — ${bFmtMonth(month)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="text-align:center;padding:8px 6px;background:color-mix(in srgb,var(--ok) 8%,transparent);border:1px solid color-mix(in srgb,var(--ok) 20%,transparent);border-radius:8px">
          <div style="font-size:1.4rem;font-weight:800;color:var(--ok)">${onTrack}</div>
          <div style="font-size:.68rem;color:var(--text3);margin-top:2px">On Track</div>
        </div>
        <div style="text-align:center;padding:8px 6px;background:color-mix(in srgb,var(--danger) 8%,transparent);border:1px solid color-mix(in srgb,var(--danger) 20%,transparent);border-radius:8px">
          <div style="font-size:1.4rem;font-weight:800;color:var(--danger)">${over}</div>
          <div style="font-size:.68rem;color:var(--text3);margin-top:2px">Over Budget</div>
        </div>
      </div>
      ${overAmt > 0 ? `<div style="font-size:.74rem;color:var(--danger);margin-bottom:8px;padding:4px 8px;background:color-mix(in srgb,var(--danger) 6%,transparent);border-radius:5px">Total overrun: <strong>${fmtS(overAmt)}</strong></div>` : ''}
      <div style="font-size:.72rem;color:var(--text3);margin-bottom:4px">Overall budget used</div>
      <div style="background:var(--surface2);border-radius:99px;height:8px;overflow:hidden;margin-bottom:4px">
        <div style="height:100%;width:${Math.min(usedPct,100)}%;background:${usedColor};border-radius:99px;transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.72rem">
        <span style="color:${usedColor};font-weight:700">${usedPct}% spent</span>
        <span style="color:var(--text3)">${fmtS(totalSpent)} / ${fmtS(totalBudgeted)}</span>
      </div>
    </div>`;

  // ── Rollover Health section ───────────────────────────────
  const _rCatIds  = D.budget.rolloverCats   || [];
  const _rLinks   = D.budget.rolloverPotLinks || {};
  const _rCats    = cats.filter(c => _rCatIds.includes(c.id));
  let rolloverHealth = '';
  if (_rCats.length > 0) {
    const _rows = _rCats.map(c => {
      const _eff   = budgetGetEffectivePlan(c.id, month);
      const _base  = budgetGetPlan(c.id, month);
      const _roll  = Math.max(0, _eff - _base);
      if (!_roll) return '';           // no rollover this month — skip
      const _pid   = _rLinks[c.id];
      const _pacc  = _pid ? (D.txnAccounts||[]).find(a => a.id === _pid) : null;
      const _pbal  = _pacc ? txnCurrentBalance(_pacc) : null;
      const _gap   = _pbal !== null ? Math.max(0, Math.round((_roll - _pbal)*100)/100) : null;
      const _potLabel = _pacc
        ? `<span style="color:var(--text3);font-size:.65rem;display:block;margin-top:1px">${esc(_pacc.name)}: ${fmtS(_pbal)}</span>`
        : `<span style="font-size:.65rem;color:var(--warn);display:block;margin-top:1px" title="No pot linked — click 🏦 in the table to link">No pot linked</span>`;
      const _statusDot = !_pacc ? `<span style="color:var(--warn)">●</span>`
        : _gap > 0.005 ? `<span style="color:var(--danger)">●</span>`
        : `<span style="color:var(--ok)">●</span>`;
      const _gapLabel = _gap !== null && _gap > 0.005
        ? `<span style="font-size:.65rem;color:var(--danger);font-weight:600">⚠ −${fmtS(_gap)}</span>`
        : (_pacc ? `<span style="font-size:.65rem;color:var(--ok)">✓</span>` : '');
      return `
        <div style="display:grid;grid-template-columns:1fr auto;align-items:start;gap:4px;padding:5px 0;border-top:1px solid var(--border)">
          <div>
            <div style="font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:4px">${_statusDot} ${esc(c.name)}</div>
            ${_potLabel}
          </div>
          <div style="text-align:right">
            <div style="font-size:.78rem;font-weight:700;color:var(--primary)">↺ ${fmtS(_roll)}</div>
            ${_gapLabel}
          </div>
        </div>`;
    }).filter(Boolean).join('');

    if (_rows) {
      let _totReserve = 0, _totBacked = 0;
      _rCats.forEach(c => {
        const _r = Math.max(0, budgetGetEffectivePlan(c.id, month) - budgetGetPlan(c.id, month));
        _totReserve += _r;
        const _pa = _rLinks[c.id] ? (D.txnAccounts||[]).find(a => a.id === _rLinks[c.id]) : null;
        if (_pa) _totBacked += Math.min(_r, txnCurrentBalance(_pa));
      });
      _totReserve = Math.round(_totReserve * 100) / 100;
      _totBacked  = Math.round(_totBacked  * 100) / 100;
      const _totGap = Math.round((_totReserve - _totBacked) * 100) / 100;
      rolloverHealth = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px">
          <div style="font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
            <span>↺ Rollover Reserve</span>
            <span style="font-size:.7rem;font-weight:400;color:var(--text3)">${bFmtMonth(month)}</span>
          </div>
          ${_rows}
          <div style="margin-top:8px;padding-top:6px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:.72rem;color:var(--text3)">Total reserve needed</span>
            <span style="font-size:.8rem;font-weight:700;color:var(--primary)">${fmtS(_totReserve)}</span>
          </div>
          ${_totGap > 0.005 ? `
          <div style="margin-top:4px;font-size:.72rem;color:var(--danger);background:color-mix(in srgb,var(--danger) 6%,transparent);border-radius:5px;padding:4px 8px">
            ⚠ ${fmtS(_totGap)} not backed by a savings pot — link pots via the 🏦 button in the table.
          </div>` : `
          <div style="margin-top:4px;font-size:.72rem;color:var(--ok);background:color-mix(in srgb,var(--ok) 6%,transparent);border-radius:5px;padding:4px 8px">
            ✓ All rollovers backed by savings pots
          </div>`}
        </div>`;
    }
  }

  // ── Category Detail (when selected) ──────────────────────
  let detail = '';
  const selCatId = UI.budgetSelectedCat;
  const selCat   = selCatId ? cats.find(c => c.id === selCatId) : null;

  if (selCat) {
    const curBudget = budgetGetEffectivePlan(selCat.id, month);
    const curActual = budgetGetCatActuals(selCat.id, month);
    const priorMonth  = bShiftMonth(month, -1);
    const priorActual = budgetGetCatActuals(selCat.id, priorMonth);
    const momDelta    = curActual - priorActual;
    const momColor    = momDelta > 0 ? 'var(--danger)' : momDelta < 0 ? 'var(--ok)' : 'var(--text3)';
    const momIcon     = momDelta > 0 ? '↑' : momDelta < 0 ? '↓' : '→';

    // Projected spend: (actual / days elapsed) × days in month
    const [yr, mo] = month.split('-').map(Number);
    const daysInMonth  = new Date(yr, mo, 0).getDate();
    const todayStr     = centralToday();
    const [ty, tm, td] = todayStr.split('-').map(Number);
    const isCurrentMonth = (ty === yr && tm === mo);
    const daysElapsed  = isCurrentMonth ? Math.min(td, daysInMonth) : daysInMonth;
    const projected    = daysElapsed > 0 ? Math.round((curActual / daysElapsed) * daysInMonth) : 0;
    const projColor    = curBudget > 0 ? (projected > curBudget ? 'var(--danger)' : projected > curBudget * 0.85 ? 'var(--warn)' : 'var(--ok)') : 'var(--text2)';

    // 6-month spending trend data
    const trendMonths = [];
    for (let i = 5; i >= 0; i--) trendMonths.push(bShiftMonth(month, -i));
    const trendData = trendMonths.map(m => ({
      m, lbl: bFmtMonth(m).slice(0,3),
      budget: budgetGetEffectivePlan(selCat.id, m),
      actual: budgetGetCatActuals(selCat.id, m)
    }));
    const trendMax = Math.max(...trendData.map(d => Math.max(d.budget, d.actual)), 1);

    const trendBars = trendData.map(d => {
      const bPct = Math.round(d.budget / trendMax * 100);
      const aPct = Math.round(d.actual / trendMax * 100);
      const aColor = d.budget > 0 && d.actual > d.budget ? 'var(--danger)' : d.m === month ? 'var(--primary)' : 'var(--ok)';
      return `
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
          <div style="width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px;height:60px">
            ${d.budget > 0 ? `<div style="width:8px;height:${bPct}%;background:color-mix(in srgb,var(--primary) 25%,transparent);border:1px solid color-mix(in srgb,var(--primary) 40%,transparent);border-radius:2px 2px 0 0" title="Budget: ${fmtS(d.budget)}"></div>` : '<div style="width:8px"></div>'}
            <div style="width:8px;height:${Math.max(aPct,1)}%;background:${aColor};border-radius:2px 2px 0 0;opacity:${d.m===month?1:.75}" title="Actual: ${fmtS(d.actual)}"></div>
          </div>
          <div style="font-size:.6rem;color:${d.m===month?'var(--primary)':'var(--text3)'};font-weight:${d.m===month?700:400}">${d.lbl}</div>
        </div>`;
    }).join('');

    const groupName = groups.find(g => g.id === selCat.groupId)?.name || '';

    detail = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:.72rem;color:var(--text3)">${esc(groupName)}</div>
            <div style="font-size:.88rem;font-weight:700;color:var(--text)">${esc(selCat.name)}</div>
          </div>
          <button onclick="BA.budgetSelectCat('${selCat.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:.85rem;padding:2px 4px" title="Deselect">✕</button>
        </div>

        <!-- MoM Delta -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:7px;margin-bottom:8px">
          <span style="font-size:.75rem;color:var(--text3)">vs Last Month</span>
          <span style="font-size:.88rem;font-weight:700;color:${momColor}">
            ${momIcon} ${fmtS(Math.abs(momDelta))}
            <span style="font-size:.65rem;font-weight:400;color:var(--text3);margin-left:2px">(was ${fmtS(priorActual)})</span>
          </span>
        </div>

        <!-- Projected Spend -->
        ${isCurrentMonth ? `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border-radius:7px;margin-bottom:8px">
          <div>
            <div style="font-size:.75rem;color:var(--text3)">Projected (EOM)</div>
            <div style="font-size:.62rem;color:var(--text3);opacity:.7">Day ${daysElapsed} of ${daysInMonth}</div>
          </div>
          <span style="font-size:.88rem;font-weight:700;color:${projColor}">${fmtS(projected)}</span>
        </div>` : ''}

        <!-- Spending Trend -->
        <div style="margin-top:10px">
          <div style="font-size:.72rem;color:var(--text3);margin-bottom:6px">6-Month Trend
            <span style="margin-left:8px"><span style="display:inline-block;width:8px;height:8px;background:color-mix(in srgb,var(--primary) 25%,transparent);border:1px solid color-mix(in srgb,var(--primary) 40%,transparent);border-radius:1px"></span> Budget &nbsp;
            <span style="display:inline-block;width:8px;height:8px;background:var(--ok);border-radius:1px"></span> Actual</span>
          </div>
          <div style="display:flex;gap:4px;align-items:flex-end;padding:4px 0">${trendBars}</div>
        </div>
      </div>`;
  } else {
    detail = `
      <div style="padding:18px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);text-align:center;color:var(--text3);font-size:.78rem">
        <div style="font-size:1.4rem;margin-bottom:6px">☝</div>
        Click any expense type row to see trend, projections &amp; month-over-month detail
      </div>`;
  }

  wrap.innerHTML = scorecard + rolloverHealth + detail;
  // Sync sticky offset so panel travels below all sticky bars above
  requestAnimationFrame(_syncBudgetPanelSticky);
}

// Measure sticky bars above budgetPanelWrap and set its top accordingly.
// Called after every render and on window resize so the panel is never
// obscured by the sticky header / month bar / KPI row.
function _syncBudgetPanelSticky() {
  const wrap    = id('budgetPanelWrap');
  if (!wrap) return;
  const sBar    = id('budgetStickyBar');
  const kpiRow  = id('budgetKpiRow');
  const headerH = 50; // fixed app-header height
  const barH    = sBar   ? sBar.getBoundingClientRect().height   : 48;
  const kpiH    = kpiRow ? kpiRow.getBoundingClientRect().height : 0;
  const top     = Math.ceil(headerH + barH + kpiH) + 6; // +6 px breathing room
  wrap.style.top = top + 'px';
}

function renderBudgetIncomeSection(month) {
  const wrap = id('budgetIncomeWrap');
  if (!wrap) return;
  const rows = (D.budget.income || [])
    .filter(i => { const m = i.date ? i.date.slice(0,7) : i.month; return m===month; })
    .sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const paydates = allScheduledPaydatesForMonth(month);

  let scheduledRows = '', scheduledTotal = 0;
  if (paydates.length > 0) {
    scheduledRows = paydates.map(p => {
      const sc = p.schedule, amt = incomeScheduleAmountForPaydate(sc, p.date);
      scheduledTotal += amt;
      return `<tr class="btable-row isc-income-row">
        <td class="btable-name" style="min-width:120px;white-space:nowrap;">${fmtDate(p.date)}</td>
        <td class="btable-name" style="color:var(--ok);font-weight:500;">
          <span class="isc-dot" style="background:${sc.color||'#2E8B57'}"></span>
          ${esc(sc.name||'Pay')} <span class="isc-tag">biweekly</span>
        </td>
        <td class="btable-num" style="color:var(--ok)">${fmtC(amt)}</td>
        <td style="width:36px"></td>
      </tr>`;
    }).join('');
  }

  let manualRows = '';
  if (rows.length > 0) {
    manualRows = rows.map(r => `
      <tr class="btable-row">
        <td class="btable-name" style="min-width:120px;white-space:nowrap;">
          <span class="btable-edit" data-val="${r.date||''}" onclick="BA.startBudgetEdit(this,'incdate','${r.id}',null)">${fmtDate(r.date||(r.month+'-01'))}</span>
        </td>
        <td class="btable-name" style="color:var(--ok);font-weight:500;">
          💰 <span class="btable-edit" data-val="${esc(r.source||'')}" onclick="BA.startBudgetEdit(this,'incsource','${r.id}',null)">${esc(r.source||'Income')}</span>
        </td>
        <td class="btable-num">
          <span class="btable-edit" data-val="${r.amount||0}" onclick="BA.startBudgetEdit(this,'incamount','${r.id}',null)" style="color:var(--ok)">${fmtC(r.amount||0)}</span>
        </td>
        <td style="text-align:center;width:36px;">
          <button class="ibtn del" onclick="BA.deleteBudgetIncomeRow('${r.id}')" title="Delete">🗑</button>
        </td>
      </tr>`).join('');
  }

  const manualTotal = rows.reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  const grandTotal  = scheduledTotal + manualTotal;
  const [y, mIdx]   = month.split('-').map(Number);
  const bonusNms    = schedulesWithBonusPay(y, mIdx-1);
  const fridayBadge = bonusNms.length
    ? `<span class="isc-friday-badge">💚 ${bonusNms.join(' & ')}: 3 pays this month</span>` : '';
  const schedHeader = paydates.length > 0 ? `<tr class="isc-section-hdr"><td colspan="4">📅 Scheduled Pay</td></tr>` : '';
  const manualHeader = rows.length > 0 ? `<tr class="isc-section-hdr"><td colspan="4">💰 Other Income</td></tr>` : '';
  const emptyMsg = (paydates.length === 0 && rows.length === 0)
    ? `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3);">No income entries. Set up Pay Schedules or click <strong>＋ Add Income</strong>.</td></tr>` : '';
  const totalRow = grandTotal > 0 ? `
    <tr style="background:var(--ok-bg);font-weight:600;">
      <td class="btable-name" colspan="2" style="font-size:.82rem;color:var(--text2);">Total Income</td>
      <td class="btable-num" style="color:var(--ok)">${fmtC(grandTotal)}</td>
      <td></td>
    </tr>` : '';

  wrap.innerHTML = `
    <div class="budget-table-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;cursor:pointer;user-select:none"
         onclick="toggleBudgetIncome()">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span id="binc-chev" style="font-size:11px;color:var(--text3);transition:transform .2s;${_incomeCollapsed?'transform:rotate(-90deg)':''}">▼</span>
        <h3 style="margin:0;font-size:14px;font-weight:700;pointer-events:none">💰 Income — ${bFmtMonth(month)}</h3>
        ${fridayBadge}
      </div>
      <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();BA.openBudgetIncomeModal(null)">＋ Add Income</button>
    </div>
    <div id="binc-body" style="display:${_incomeCollapsed?'none':'block'}">
      <div class="btable-wrap">
        <table class="btable">
          <thead><tr>
            <th class="btable-name" style="width:120px">Date</th>
            <th class="btable-name">Source</th>
            <th class="btable-num">Amount</th>
            <th style="width:36px"></th>
          </tr></thead>
          <tbody>
            ${emptyMsg}${schedHeader}${scheduledRows}${manualHeader}${manualRows}${totalRow}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderBudgetTable(month) {
  const wrap = id('budgetTableWrap');
  if (!wrap) return;
  const groups = D.budget.groups || [];
  const cats   = D.budget.categories || [];

  if (groups.length === 0) {
    wrap.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3);">
      No budget groups yet.<br>
      <button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="BA.startInlineAddGroup()">＋ Add First Group</button>
    </div>`;
    return;
  }

  const _filterOver = (UI.budgetFilter || 'all') === 'over';

  let grandBudget = 0, grandSpent = 0, tbody = '';
  for (const group of groups) {
    const gcats = cats.filter(c => c.groupId===group.id);
    let gBudget = 0, gSpent = 0;
    const isCollapsed = !!_budgetCollapsed[group.id];

    // In "Over Budget" filter mode, skip this whole group if none of its cats are over
    if (_filterOver) {
      const hasOver = gcats.some(cat => {
        const b = budgetGetAdjustedPlan(cat.id, month);
        const s = budgetGetCatActuals(cat.id, month);
        return s - Math.max(0, b) > 0.005;
      });
      if (!hasOver) continue;
    }
    tbody += `
      <tr class="btable-group-row" id="btbody-${group.id}" draggable="true" data-drag-type="group" data-drag-id="${group.id}">
        <td style="padding:0"></td>
        <td class="btable-name" colspan="6">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="btable-drag-handle" title="Drag to reorder">⠿</span>
            <button class="btable-chevron" id="bchevron-${group.id}" onclick="BA.toggleBudgetGroup('${group.id}')">${isCollapsed?'▶':'▼'}</button>
            <span class="btable-edit" data-val="${esc(group.name)}" onclick="BA.startBudgetEdit(this,'groupname','${group.id}',null)" style="font-weight:700">${esc(group.name)}</span>
            <button class="ibtn del" onclick="BA.deleteBudgetGroup('${group.id}')" title="Delete group">🗑</button>
          </div>
        </td>
      </tr>`;

    for (const cat of gcats) {
      const basePlan     = budgetGetPlan(cat.id, month);
      const effPlan      = budgetGetEffectivePlan(cat.id, month); // includes rollover
      const budget       = budgetGetAdjustedPlan(cat.id, month);  // includes adjustments
      const rolloverCats = D.budget.rolloverCats || [];
      const hasRollover  = rolloverCats.includes(cat.id);
      const rolloverAmt  = effPlan - basePlan;   // surplus from prior month
      const adjIn        = budgetGetAdjIn(cat.id, month);
      const adjOut       = budgetGetAdjOut(cat.id, month);
      const hasAdj       = adjIn > 0 || adjOut > 0;
      const spent   = budgetGetCatActuals(cat.id, month);
      // Round to cents to eliminate floating-point noise (e.g. -2.22e-16 showing as -0.00)
      const remain  = Math.round((budget - spent) * 100) / 100;
      // rawPct: use Infinity sentinel when budget <= 0 but there IS spending
      const rawPct  = budget > 0 ? (spent / budget * 100) : (spent > 0 ? Infinity : 0);
      const pct     = Math.min(rawPct, 100);  // clamped for bar fill width
      // isOver: half-cent epsilon prevents -0.00 / Cover-button ghost after an exact Cover
      const isOver  = spent - Math.max(0, budget) > 0.005;
      const isFull  = !isOver && rawPct >= 99.5 && budget > 0;
      const bar     = isOver ? 'var(--danger)' : isFull ? 'var(--info)' : rawPct >= 80 ? 'var(--warn)' : 'var(--ok)';
      // Progress bar fill: striped pattern when over budget, solid otherwise
      const barFillStyle = isOver
        ? `width:100%;background:repeating-linear-gradient(45deg,var(--danger),var(--danger) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 10px)`
        : `width:${pct}%;background:${bar}`;
      // pctLabel: guard against Infinity when budget was fully reallocated away
      const pctLabel = isOver
        ? `<span style="color:var(--danger);font-weight:700;white-space:nowrap">⚠ ${isFinite(rawPct) ? Math.round(rawPct) + '%' : 'Over budget'}</span>`
        : isFull
        ? `<span style="color:var(--info);font-weight:700">✓ 100%</span>`
        : `${Math.round(rawPct)}%`;
      // In "Over Budget" filter mode, skip non-over categories entirely
      if (_filterOver && !isOver) continue;

      // Mirror the individual row rule: only count a category in the group total
      // when it has an actual budget (budget > 0). Categories with budget = 0
      // display '—' on the individual row; including their spending in gSpent
      // without a matching gBudget entry makes the group total go negative even
      // when every individual row shows 0 or '—'. Using Math.round to eliminate
      // sub-cent floating-point noise before accumulating.
      if (budget > 0) {
        gBudget += Math.round(budget * 100) / 100;
        gSpent  += Math.round(spent  * 100) / 100;
      }

      // ── Cover / Move action button ────────────────────────────
      const hasAvail   = budget > 0 && remain > 0;
      const actionBtn  = isOver
        ? `<button class="budget-realloc-btn cover" onclick="event.stopPropagation();BA.budgetReallocModal('${cat.id}','${month}','cover')" title="Cover overspend from another category">Cover ↑</button>`
        : hasAvail
        ? `<button class="budget-realloc-btn move"  onclick="event.stopPropagation();BA.budgetReallocModal('${cat.id}','${month}','move')"  title="Move available budget to another category">Move →</button>`
        : '';

      const isCatChecked = (UI.budgetCheckedCats||new Set()).has(cat.id);
      tbody += `
        <tr class="btable-row" draggable="true" data-drag-type="cat" data-drag-id="${cat.id}" data-drag-group="${group.id}" data-group-member="${group.id}" onclick="BA.budgetSelectCat('${cat.id}')" style="cursor:pointer;${isCollapsed?'display:none;':''}${UI.budgetSelectedCat===cat.id?'background:color-mix(in srgb,var(--primary) 7%,transparent);outline:2px solid color-mix(in srgb,var(--primary) 30%,transparent);outline-offset:-2px;':''}${isCatChecked?'background:color-mix(in srgb,var(--danger) 5%,transparent);':''}">
          <td style="padding:0 0 0 6px;text-align:center" onclick="event.stopPropagation()">
            <input type="checkbox" class="budget-cat-chk" data-cat-id="${cat.id}" ${isCatChecked?'checked':''} onchange="BA.budgetToggleCatCheck('${cat.id}',this.checked)" style="cursor:pointer">
          </td>
          <td class="btable-name" style="padding-left:18px">
            <div style="display:flex;align-items:center;gap:4px">
              <span class="btable-drag-handle" title="Drag to reorder" onclick="event.stopPropagation()">⠿</span>
              <span class="btable-edit" data-val="${esc(cat.name)}" onclick="event.stopPropagation();BA.startBudgetEdit(this,'catname','${cat.id}',null)">${esc(cat.name)}</span>
              <button title="${hasRollover?'Rollover ON — unspent budget carries forward':'Rollover OFF — click to carry forward unspent budget'}" onclick="event.stopPropagation();BA.toggleBudgetRollover('${cat.id}')" style="font-size:.7rem;padding:1px 5px;border-radius:4px;cursor:pointer;border:1px solid ${hasRollover?'var(--ok)':'var(--border)'};background:${hasRollover?'color-mix(in srgb,var(--ok) 12%,transparent)':'transparent'};color:${hasRollover?'var(--ok)':'var(--text3)'};line-height:1.4">↺</button>
              ${hasRollover ? `<button class="rlvr-pot-btn${(D.budget.rolloverPotLinks||{})[cat.id]?' linked':''}" onclick="event.stopPropagation();BA.budgetLinkRolloverPot('${cat.id}')" title="${(D.budget.rolloverPotLinks||{})[cat.id]?'Savings pot linked — click to change':'Link a savings pot to physically back this rollover'}">🏦</button>` : ''}
            </div>
          </td>
          <td class="btable-num">
            <span class="btable-edit" data-val="${basePlan}" onclick="event.stopPropagation();BA.startBudgetEdit(this,'budget','${cat.id}','${month}')" style="${basePlan===0?'color:var(--text3)':''}">${basePlan>0?fmtC(basePlan):'— click to set'}</span>
            ${rolloverAmt > 0 ? (() => {
              const _potAcctId = (D.budget.rolloverPotLinks||{})[cat.id];
              const _potAcct   = _potAcctId ? (D.txnAccounts||[]).find(a => a.id === _potAcctId) : null;
              const _potBal    = _potAcct ? txnCurrentBalance(_potAcct) : null;
              const _potGap    = _potBal !== null ? Math.round((rolloverAmt - Math.min(_potBal, rolloverAmt))*100)/100 : null;
              const _chipHtml  = _potAcct
                ? (_potGap > 0.005
                  ? `<span class="rlvr-pot-chip gap" title="Pot '${esc(_potAcct.name)}' bal: ${fmtC(_potBal)} — short by ${fmtC(_potGap)}">⚠ −${fmtC(_potGap)}</span>`
                  : `<span class="rlvr-pot-chip ok" title="Pot '${esc(_potAcct.name)}' bal: ${fmtC(_potBal)} — fully covered">✓ backed</span>`)
                : '';
              return `<span style="font-size:.65rem;color:var(--ok);display:block;margin-top:1px" title="Rollover surplus from prior month">↺ +${fmtC(rolloverAmt)}</span>${_chipHtml}`;
            })() : ''}
            ${adjIn  > 0 ? `<span style="font-size:.65rem;color:var(--ok);display:block;margin-top:1px"  title="Budget moved in from other categories">↕ +${fmtC(adjIn)}</span>`  : ''}
            ${adjOut > 0 ? `<span style="font-size:.65rem;color:var(--danger);display:block;margin-top:1px" title="Budget moved out to other categories">↕ −${fmtC(adjOut)}</span>` : ''}
          </td>
          <td class="btable-num ${spent-budget>0.005&&budget>0?'btable-over':''}">
            <span class="${spent>0?'btable-drilldown':'btable-edit'}" onclick="event.stopPropagation();${spent>0?`BA.showActualDrillDown('${cat.id}','${month}')`:`BA.startBudgetEdit(this,'actual','${cat.id}','${month}')`}" style="${spent===0?'color:var(--text3);cursor:text':'cursor:pointer'}" title="${budgetGetCatActualsHasTxn(cat.id,month)?'Click to see transactions':'Click to enter actual'}">
              ${budgetGetCatActualsHasTxn(cat.id,month)?'<span style="font-size:.65rem;vertical-align:middle;margin-right:3px" title="Sourced from Transactions">💳</span>':''}${spent>0?fmtC(spent):'— click to enter'}
            </span>
          </td>
          <td class="btable-num ${remain<0?'btable-over':''}">${budget>0?fmtC(remain):'—'}</td>
          <td class="btable-bar">${budget>0||spent>0?`
            <div class="btable-bar-inner">
              <div class="btable-progress"><div class="btable-progress-fill" style="${barFillStyle}"></div></div>
              <span class="btable-pct" style="color:${bar}">${pctLabel}</span>
            </div>`:''}</td>
          <td style="text-align:right;white-space:nowrap;overflow:visible">
            ${actionBtn}
          </td>
        </tr>`;

      // ── Adjustment trail sub-row ───────────────────────────────
      if (hasAdj) {
        const adjsForCat = (D.budget.adjustments||[]).filter(a => a.month===month && (a.toCatId===cat.id || a.fromCatId===cat.id));
        const adjItems   = adjsForCat.map(a => {
          const isMover    = a.fromCatId === cat.id;
          const otherCatId = isMover ? a.toCatId : a.fromCatId;
          const otherName  = (D.budget.categories||[]).find(c => c.id===otherCatId)?.name || 'Unknown';
          const color      = isMover ? 'var(--danger)' : 'var(--ok)';
          const arrow      = isMover ? `→ ${esc(otherName)}` : `← ${esc(otherName)}`;
          const lbl        = `${isMover?'−':'+'}${fmtC(parseFloat(a.amount)||0)} ${arrow}${a.note ? ` · <em style="color:var(--text3)">${esc(a.note)}</em>` : ''}`;
          return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:.7rem;color:${color};background:color-mix(in srgb,${color} 8%,transparent);border:1px solid color-mix(in srgb,${color} 25%,transparent);border-radius:4px;padding:1px 6px;margin-right:4px">${lbl} <button onclick="event.stopPropagation();BA.budgetDeleteRealloc('${a.id}')" title="Undo this adjustment" style="background:none;border:none;cursor:pointer;color:${color};font-size:.7rem;padding:0 1px;line-height:1;opacity:.7">×</button></span>`;
        }).join('');
        tbody += `
          <tr class="btable-adj-trail" data-group-member="${group.id}" style="${isCollapsed?'display:none;':''}">
            <td></td><td colspan="6" style="padding:2px 12px 5px 46px;border-top:none">
              <span style="font-size:.68rem;color:var(--text3);margin-right:6px;font-weight:600">↕ Adjustments:</span>
              ${adjItems}
            </td>
          </tr>`;
      }
    }

    if (!_filterOver) {
      tbody += `
        <tr id="btadd-${group.id}" class="btable-row" data-group-member="${group.id}"${isCollapsed?' style="display:none"':''}>
          <td></td><td class="btable-name" colspan="6" style="padding-left:28px">
            <button class="btn btn-ghost btn-xs" onclick="BA.startInlineAddType('${group.id}')" style="color:var(--text3);font-size:.75rem">＋ Add expense type</button>
          </td>
        </tr>`;
    }

    const gRemain    = Math.round((gBudget - gSpent) * 100) / 100;
    const gRawPct    = gBudget > 0 ? (gSpent / gBudget * 100) : (gSpent > 0 ? Infinity : 0);
    const gPct       = Math.min(gRawPct, 100);
    const gIsOver    = gSpent - Math.max(0, gBudget) > 0.005;
    const gBar       = gIsOver ? 'var(--danger)' : (gRawPct >= 99.5 && gBudget > 0) ? 'var(--info)' : gRawPct >= 80 ? 'var(--warn)' : 'var(--ok)';
    const gBarFill   = gIsOver
      ? `width:100%;background:repeating-linear-gradient(45deg,var(--danger),var(--danger) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 10px)`
      : `width:${gPct}%;background:${gBar}`;
    tbody += `
      <tr class="btable-subtotal-row">
        <td></td>
        <td class="btable-name">↳ ${esc(group.name)} Total</td>
        <td class="btable-num">${gBudget>0?fmtC(gBudget):'—'}</td>
        <td class="btable-num">${fmtC(gSpent)}</td>
        <td class="btable-num" style="color:${gRemain<0?'var(--danger)':'inherit'}">${gBudget>0?fmtC(gRemain):'—'}</td>
        <td class="btable-bar">${gBudget>0?`<div class="btable-bar-inner"><div class="btable-progress"><div class="btable-progress-fill" style="${gBarFill}"></div></div></div>`:''}</td>
        <td></td>
      </tr>`;
    grandBudget += gBudget; grandSpent += gSpent;
  }

  const grandRemain  = grandBudget - grandSpent;
  const grandRawPct  = grandBudget > 0 ? (grandSpent / grandBudget * 100) : (grandSpent > 0 ? Infinity : 0);
  const grandPct     = Math.min(grandRawPct, 100);
  const grandIsOver  = grandSpent > Math.max(0, grandBudget);
  const grandBar     = grandIsOver ? 'var(--danger)' : (grandRawPct >= 99.5 && grandBudget > 0) ? 'var(--info)' : grandRawPct >= 80 ? 'var(--warn)' : 'var(--ok)';
  const grandBarFill = grandIsOver
    ? `width:100%;background:repeating-linear-gradient(45deg,var(--danger),var(--danger) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 5px,color-mix(in srgb,var(--danger) 55%,transparent) 10px)`
    : `width:${grandPct}%;background:${grandBar}`;
  const grandPctLbl  = grandIsOver
    ? `<span style="color:var(--danger);font-weight:700">⚠ ${isFinite(grandRawPct) ? Math.round(grandRawPct) + '%' : 'Over budget'}</span>`
    : grandRawPct >= 99.5 && grandBudget > 0
    ? `<span style="color:var(--info);font-weight:700">✓ 100%</span>`
    : `${Math.round(grandRawPct)}%`;
  tbody += `
    <tr class="btable-grand-row">
      <td></td>
      <td class="btable-name">Grand Total</td>
      <td class="btable-num">${grandBudget>0?fmtC(grandBudget):'—'}</td>
      <td class="btable-num">${fmtC(grandSpent)}</td>
      <td class="btable-num" style="color:${grandRemain<0?'var(--danger)':'inherit'}">${grandBudget>0?fmtC(grandRemain):'—'}</td>
      <td class="btable-bar">${grandBudget>0?`
        <div class="btable-progress"><div class="btable-progress-fill" style="${grandBarFill}"></div></div>
        <span class="btable-pct" style="color:${grandBar}">${grandPctLbl}</span>`:''}</td>
      <td></td>
    </tr>
    ${!_filterOver ? `<tr id="btable-add-group-row" style="background:var(--surface2)">
      <td colspan="7" style="padding:7px 10px">
        <button class="btn btn-ghost btn-xs" onclick="BA.startInlineAddGroup()" style="color:var(--text3);font-size:.75rem">＋ Add group</button>
      </td>
    </tr>` : ''}`;

  // ── Count over-budget cats for the pill badge ──────────────────
  const _overCount = (D.budget.categories||[]).filter(cat => {
    const b = budgetGetAdjustedPlan(cat.id, month);
    const s = budgetGetCatActuals(cat.id, month);
    return s - Math.max(0, b) > 0.005;
  }).length;
  const _curFilter = UI.budgetFilter || 'all';

  wrap.innerHTML = `
    <div class="budget-table-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0;font-size:14px;font-weight:700">📋 Budget vs Actuals — ${bFmtMonth(month)}</h3>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="display:flex;gap:4px;padding:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px">
          <button onclick="UI.budgetFilter='all';renderBudgetTable('${month}')"
            style="padding:3px 12px;font-size:.72rem;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .15s;
                   background:${_curFilter==='all'?'var(--surface)':'transparent'};
                   color:${_curFilter==='all'?'var(--text)':'var(--text3)'};
                   box-shadow:${_curFilter==='all'?'0 1px 3px color-mix(in srgb,var(--text) 12%,transparent)':'none'}">
            All
          </button>
          <button onclick="UI.budgetFilter='over';renderBudgetTable('${month}')"
            style="padding:3px 12px;font-size:.72rem;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .15s;
                   background:${_curFilter==='over'?'color-mix(in srgb,var(--danger) 15%,var(--surface))':'transparent'};
                   color:${_curFilter==='over'?'var(--danger)':'var(--text3)'};
                   box-shadow:${_curFilter==='over'?'0 1px 3px color-mix(in srgb,var(--danger) 18%,transparent)':'none'}">

// ── CC Repayment Planner ──────────────────────────────────────────────────
function computeCCChargesForMonth(cardAccountId, month) {
  // Only count transactions that have an expense type assigned (not transfers, not income, not unclassified)
  return (D.transactions || []).filter(t => {
    if (t.accountId !== cardAccountId) return false;
    if (!t.date || t.date.slice(0, 7) !== month) return false;
    if (t.status === 'pending' || t.status === 'rejected') return false;
    if (t.isTransfer) return false;
    // Split: count if at least one split line has a categoryId
    if (t.splits && t.splits.length > 0) {
      return t.splits.some(s => s.categoryId && s.categoryId !== '__income__');
    }
    return t.categoryId && t.categoryId !== '__income__';
  }).reduce((sum, t) => {
    if (t.splits && t.splits.length > 0) {
      // Only sum split lines that have expense types
      return sum + t.splits.filter(s => s.categoryId && s.categoryId !== '__income__')
                           .reduce((ss, s) => ss + (parseFloat(s.amount) || 0), 0);
    }
    return sum + (parseFloat(t.debit) || 0) - (parseFloat(t.credit) || 0);
  }, 0);
}

function renderCCRepaySection(month) {
  const wrap = id('ccRepayWrap');
  if (!wrap) return;

  const ccAccounts  = (D.txnAccounts || []).filter(a => a.type === 'Credit Card');
  if (!ccAccounts.length) { wrap.innerHTML = ''; return; }

  const bankAccounts = (D.txnAccounts || []).filter(a => ['Bank', 'Savings', 'Cash'].includes(a.type));
  const repayments   = D.budget.ccRepayments || [];
  const monthLabel   = bFmtMonth(month);
  const selCardId    = UI.ccrSelectedCard || null;
  const selCard      = selCardId ? ccAccounts.find(c => c.id === selCardId) : null;

  // Per-card totals + TBD transaction detection
  const cardRows = ccAccounts.map(card => {
    const charged      = computeCCChargesForMonth(card.id, month);
    const cardPayments = repayments.filter(r => r.month === month && r.cardAccountId === card.id);
    const totalPaid    = cardPayments.reduce((s, p) => s + (parseFloat(p.amountPaid)||0), 0);
    const remaining    = Math.max(0, charged - totalPaid);
    // Flag 1: transactions whose Note contains "TBD" — not yet categorized
    const tbdTxns = (D.transactions || []).filter(t =>
      t.accountId === card.id &&
      t.date && t.date.slice(0, 7) === month &&
      t.status !== 'pending' && t.status !== 'rejected' &&
      !t.isTransfer &&
      (t.notes || '').toUpperCase().includes('TBD')
    );

    // Flag 2: budget categories used by this card's transactions that are over budget.
    // Collect every categoryId touched by this card this month, then check each one.
    const cardTxns = (D.transactions || []).filter(t =>
      t.accountId === card.id &&
      t.date && t.date.slice(0, 7) === month &&
      t.status !== 'pending' && t.status !== 'rejected' &&
      !t.isTransfer
    );
    const touchedCatIds = new Set();
    cardTxns.forEach(t => {
      if (t.splits && t.splits.length > 0) {
        t.splits.forEach(s => { if (s.categoryId && s.categoryId !== '__income__') touchedCatIds.add(s.categoryId); });
      } else if (t.categoryId && t.categoryId !== '__income__') {
        touchedCatIds.add(t.categoryId);
      }
    });
    const overBudgetCats = [...touchedCatIds]
      .map(catId => {
        const plan   = budgetGetAdjustedPlan(catId, month);
        const actual = budgetGetCatActuals(catId, month);
        const over   = actual - plan;
        const name   = (D.budget.categories || []).find(c => c.id === catId)?.name || catId;
        return { catId, name, plan, actual, over };
      })
      .filter(c => c.over > 0.005); // half-cent epsilon; plan=0 categories included — any spend against $0 plan is over budget

    return { card, charged, cardPayments, totalPaid, remaining, tbdCount: tbdTxns.length, overBudgetCats };
  });

  const thStyle   = 'padding:6px 10px;text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap';
  const thStyleR  = thStyle + ';text-align:right';

  // ── LEFT PANEL — card summary rows ──
  const leftBodyRows = cardRows.map(({ card, charged, totalPaid, remaining, tbdCount, overBudgetCats }) => {
    const isSel    = card.id === selCardId;
    const remColor = remaining > 0 ? 'var(--danger)' : 'var(--ok)';
    const rowBg    = isSel ? 'background:color-mix(in srgb,var(--primary) 8%,transparent)' : '';

    const tbdBadge = tbdCount > 0
      ? `<span title="${tbdCount} transaction${tbdCount !== 1 ? 's' : ''} with note 'TBD' — budget allocation may be incorrect"
           style="display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:700;background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 35%,transparent);white-space:nowrap;cursor:help">
           ⚠ ${tbdCount} TBD
         </span>`
      : '';

    const overBadge = overBudgetCats.length > 0
      ? (() => {
          const tipLines = overBudgetCats.map(c => `${c.name} (+${fmtCurrency(c.over)} over)`).join('\n');
          const label    = overBudgetCats.length === 1
            ? `${overBudgetCats[0].name} over budget`
            : `${overBudgetCats.length} categories over budget`;
          return `<span title="Categories over budget this month:\n${tipLines}"
               style="display:inline-flex;align-items:center;gap:3px;margin-left:6px;padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:700;background:color-mix(in srgb,var(--danger) 12%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 30%,transparent);white-space:nowrap;cursor:help">
               🔴 ${label}
             </span>`;
        })()
      : '';
    return `<tr style="cursor:pointer;${rowBg}" onclick="UI.ccrSelectedCard=${isSel?'null':`'${card.id}'`};renderCCRepaySection('${month}')">
      <td style="padding:7px 10px;font-size:.82rem;font-weight:${isSel?'600':'400'};color:var(--text)">
        <span style="display:inline-flex;align-items:center;flex-wrap:wrap;gap:2px">
          ${isSel ? '<span style="color:var(--primary);margin-right:4px">▶</span>' : ''}${esc(card.name)}${tbdBadge}${overBadge}
        </span>
      </td>
      <td style="padding:7px 10px;text-align:right;font-size:.82rem">
        ${charged > 0
          ? `<span onclick="event.stopPropagation();BA.showCCChargeDrillDown('${card.id}','${month}')"
                   style="color:var(--primary);text-decoration:underline;text-decoration-style:dotted;cursor:pointer"
                   title="Click to see transactions">${fmtCurrency(charged)}</span>`
          : `<span style="color:var(--text3)">—</span>`}
      </td>
      <td style="padding:7px 10px;text-align:right;font-size:.82rem;color:var(--ok);font-weight:500">${totalPaid > 0 ? fmtCurrency(totalPaid) : '<span style="color:var(--text3)">—</span>'}</td>
      <td style="padding:7px 10px;text-align:right;font-size:.82rem;font-weight:600;color:${remColor}">${remaining > 0 ? fmtCurrency(remaining) : '<span style="color:var(--ok)">✓ Paid</span>'}</td>
    </tr>`;
  }).join('');

  const grandCharged  = cardRows.reduce((s, r) => s + r.charged, 0);
  const grandPaid     = cardRows.reduce((s, r) => s + r.totalPaid, 0);
  const grandRem      = cardRows.reduce((s, r) => s + r.remaining, 0);
  const leftTotalRow  = `<tr style="background:var(--surface2);border-top:2px solid var(--border)">
    <td style="padding:7px 10px;font-size:.8rem;font-weight:700;color:var(--text)">Total</td>
    <td style="padding:7px 10px;text-align:right;font-size:.8rem;font-weight:700;color:var(--text)">${fmtCurrency(grandCharged)}</td>
    <td style="padding:7px 10px;text-align:right;font-size:.8rem;font-weight:700;color:var(--ok)">${fmtCurrency(grandPaid)}</td>
    <td style="padding:7px 10px;text-align:right;font-size:.8rem;font-weight:700;color:${grandRem>0?'var(--danger)':'var(--ok)'}">${grandRem > 0 ? fmtCurrency(grandRem) : '✓ All paid'}</td>
  </tr>`;

  const flaggedAccounts = (D.txnAccounts || []).filter(a => a.showInCCRepay);
  const availRows = flaggedAccounts.map(acct => {
    const bal = txnCurrentBalance(acct);
    return `<tr style="background:color-mix(in srgb,var(--ok) 5%,var(--surface))">
      <td colspan="3" style="padding:6px 10px;font-size:.78rem;color:var(--text2)">🏦 ${esc(acct.name)}</td>
      <td style="padding:6px 10px;text-align:right;font-size:.82rem;font-weight:600;color:${bal>=0?'var(--ok)':'var(--danger)'}">${fmtCurrency(bal)}</td>
    </tr>`;
  }).join('');

  // ── RIGHT PANEL — payment history ──
  const rightPayments = selCard
    ? repayments.filter(r => r.month === month && r.cardAccountId === selCardId)
    : repayments.filter(r => r.month === month && ccAccounts.some(c => c.id === r.cardAccountId));

  const rightTitle = selCard
    ? `${esc(selCard.name)} — ${monthLabel}`
    : `All payments — ${monthLabel}`;

  const rightBodyRows = rightPayments.map(p => {
    const bank  = (D.txnAccounts||[]).find(a => a.id === p.bankAccountId);
    const ccard = ccAccounts.find(c => c.id === p.cardAccountId);
    const txn   = p.txnId ? (D.transactions||[]).find(t => t.id === p.txnId) : null;
    return `<tr>
      ${!selCard ? `<td style="padding:6px 10px;font-size:.78rem;color:var(--text2)">${esc(ccard?.name||'')}</td>` : ''}
      <td style="padding:6px 10px;font-size:.78rem;color:var(--text3)">${fmtDate(txn?.date || p.month)}</td>
      <td style="padding:6px 10px;font-size:.82rem;font-weight:600;color:var(--ok)">${fmtCurrency(p.amountPaid)}</td>
      <td style="padding:6px 10px;font-size:.78rem;color:var(--text3)">${esc(bank?.name||'—')}</td>
      <td style="padding:6px 10px;text-align:right">
        <button class="btn btn-xs btn-ghost" style="font-size:.7rem;color:var(--danger)" onclick="event.stopPropagation();BA.ccrDeletePayment('${p.id}')">✕ Undo</button>
      </td>
    </tr>`;
  }).join('');

  const noPayRow = !rightPayments.length
    ? `<tr><td colspan="5" style="padding:18px 10px;text-align:center;font-size:.78rem;color:var(--text3)">No payments recorded ${selCard ? 'for this card' : 'this month'}</td></tr>`
    : '';

  // ── ADD PAYMENT form row (pinned at bottom of right panel) ──
  const bankOpts   = bankAccounts.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');
  const cardOpts   = cardRows.map(r => `<option value="${r.card.id}"${r.card.id===selCardId?' selected':''}>${esc(r.card.name)}</option>`).join('');
  const frmRemain  = selCard ? (cardRows.find(r => r.card.id === selCardId)?.remaining || 0)
                             : (cardRows.find(r => r.remaining > 0)?.remaining || 0);
  const addPayRow  = `<tr style="background:color-mix(in srgb,var(--primary) 5%,var(--surface2));border-top:2px solid var(--border)">
    <td colspan="${selCard ? '4' : '5'}" style="padding:8px 10px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${!selCard ? `<select id="ccr-form-card" class="finput" style="font-size:.76rem;padding:3px 6px;min-width:130px">
          <option value="">— Card —</option>${cardOpts}

        <select id="ccr-bank-form" class="finput" style="font-size:.76rem;padding:3px 6px;min-width:120px">
          <option value="">— Pay from —</option>${bankOpts}

        <input type="text" id="ccr-amt-form" class="finput"

        <button class="btn btn-primary btn-sm" style="font-size:.76rem;padding:3px 10px;white-space:nowrap"
          onclick="BA.ccrRecordPaymentForm('${month}')">💸 Record Payment</button>

  const noDataMsg = cardRows.every(r => r.charged === 0)
    ? `<div style="padding:20px 16px;color:var(--text3);font-size:.82rem">No CC transactions with assigned expense types found for ${monthLabel}.</div>`
    : null;

  wrap.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface2)">
        <div style="font-size:.85rem;font-weight:700;color:var(--text)">💳 CC Repayment Planner — ${monthLabel}</div>
        <div style="font-size:.74rem;color:var(--text3)">Expense-typed transactions only</div>
      </div>
      ${noDataMsg || `
      <div style="display:flex;align-items:stretch">

          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:var(--surface2)">
              <th style="${thStyle}">Card</th>

          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--border)">

// ── Annual Budget Grid ───────────────────────────────────────
function renderAnnual() {
  recomputeTxnActuals(); // keep actuals in sync with transactions
  const wrap = id('annualTableWrap');
  if (!wrap) return;
  const year  = UI.annualYear;
  const lbl   = id('annualYearLabel');
  if (lbl) lbl.textContent = year;

  const groups = D.budget.groups     || [];
  const cats   = D.budget.categories || [];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curM = new Date().getMonth(), curY = new Date().getFullYear();
  const ym       = i  => `${year}-${String(i+1).padStart(2,'0')}`;
  const isFuture = i  => year > curY || (year===curY && i > curM);
  const isToday  = i  => year===curY && i===curM;

  const getIncome = m => budgetGetIncome(m);
  const getBudget = (catId, m) => {
    const p = (D.budget.plans||[]).find(p => p.categoryId===catId && p.month===m);
    return p ? parseFloat(p.amount)||0 : 0;
  };
  const getActual = (catId, m) => budgetGetCatActuals(catId, m);

  const TOTAL_COLS = 1 + 12*2 + 2;
  const z    = () => `<span class="ann-zero">—</span>`;
  const fBud = v  => v > 0 ? `<span class="ann-bud-val">${fmtC(v).replace('$','').replace(/\.00$/,'')}</span>` : z();
  const fAct = v  => v > 0 ? fmtC(v).replace('$','').replace(/\.00$/,'') : z();
  const fNet = v  => {
    const s = fmtC(Math.abs(v)).replace('$','').replace(/\.00$/,'');
    return `<span class="${v>=0?'ann-positive':'ann-negative'}">${v<0?'-':''}${s}</span>`;
  };

  const hRow1 = MONTHS.map((mo, i) => {
    const cls = ['ann-head ann-month-head', isToday(i)?'ann-today':'', isFuture(i)?'ann-future-head':''].filter(Boolean).join(' ');
    return `<th class="${cls}" colspan="2">${mo}</th>`;
  }).join('') + `<th class="ann-head ann-month-head ann-total-head" colspan="2" style="border-left:2px solid rgba(255,255,255,.15)">Year Total</th>`;

  const hRow2 = MONTHS.map((_, i) => {
    const base = `ann-head ann-subhead${isToday(i)?' ann-today-sub':''}${isFuture(i)?' ann-future-head':''}`;
    return `<th class="${base} ann-bud-col">Bud</th><th class="${base} ann-act-col">Act</th>`;
  }).join('') + `<th class="ann-head ann-subhead ann-total-head ann-bud-col">Bud</th><th class="ann-head ann-subhead ann-total-head ann-act-col">Act</th>`;

  const thead = `<thead>
    <tr>
      <th class="ann-label ann-head" rowspan="2" style="min-width:175px;vertical-align:bottom;border-right:2px solid rgba(255,255,255,.12)">Category</th>
      ${hRow1}
    </tr>
    <tr>${hRow2}</tr>
  </thead>`;

  let incActTotal = 0;
  const incomeCells = MONTHS.map((_,i) => {
    const v = getIncome(ym(i));
    incActTotal += v;
    const f = isFuture(i);
    return `<td class="ann-num ann-bud-col${f?' ann-future':''}">${z()}</td>`
         + `<td class="ann-num ann-act-col${f?' ann-future':''}">${f&&v===0?z():fAct(v)}</td>`;
  }).join('');

  const mBudTotals = new Array(12).fill(0);
  const mActTotals = new Array(12).fill(0);
  let grandBudTotal = 0, grandActTotal = 0, expenseRows = '';

  for (const group of groups) {
    const gcats = cats.filter(c => c.groupId===group.id);
    const gBudM = new Array(12).fill(0), gActM = new Array(12).fill(0);
    let gBudTot = 0, gActTot = 0, catRowsHtml = '';

    for (const cat of gcats) {
      let cBud = 0, cAct = 0;
      const cells = MONTHS.map((_,i) => {
        const bud = getBudget(cat.id, ym(i));
        const act = getActual(cat.id, ym(i));
        cBud += bud; cAct += act;
        gBudM[i] += bud; gActM[i] += act;
        const f = isFuture(i);
        return `<td class="ann-num ann-bud-col${f?' ann-future':''}">${fBud(bud)}</td>`
             + `<td class="ann-num ann-act-col${f?' ann-future':''}">${fAct(act)}</td>`;
      }).join('');
      gBudTot += cBud; gActTot += cAct;
      catRowsHtml += `
        <tr class="ann-row-cat">
          <td class="ann-label ann-indent">${esc(cat.name)}</td>
          ${cells}
          <td class="ann-num ann-total-col ann-bud-col">${fBud(cBud)}</td>
          <td class="ann-num ann-total-col ann-act-col">${fAct(cAct)}</td>
        </tr>`;
    }

    gBudM.forEach((v,i) => { mBudTotals[i] += v; });
    gActM.forEach((v,i) => { mActTotals[i] += v; });
    grandBudTotal += gBudTot; grandActTotal += gActTot;

    const grpCells = MONTHS.map((_,i) => {
      const f = isFuture(i);
      return `<td class="ann-num ann-bud-col${f?' ann-future':''}">${fBud(gBudM[i])}</td>`
           + `<td class="ann-num ann-act-col${f?' ann-future':''}">${fAct(gActM[i])}</td>`;
    }).join('');

    expenseRows += `
      <tr class="ann-row-group" data-ann-group="${group.id}">
        <td class="ann-label">
          <button class="btable-chevron ann-chevron" id="annchev-${group.id}" onclick="BA.toggleAnnualGroup('${group.id}')" title="Expand/collapse">▼</button>
          ${esc(group.name)}
        </td>
        ${grpCells}

// ── Drag-and-drop ────────────────────────────────────────────
let _dnd = { active:false };
// ── Budget table column resize ────────────────────────────────────────
(function initBudgetColResize() {
  const COL_IDS = { name:'bcol-name', budget:'bcol-budget', actual:'bcol-actual', remaining:'bcol-remaining', progress:'bcol-progress' };
  let _drag = null;

  document.addEventListener('mousedown', e => {
    const handle = e.target.closest('.bcol-resize');
    if (!handle) return;
    const colKey = handle.dataset.col;
    const colEl  = id(COL_IDS[colKey]);
    if (!colEl) return;
    e.preventDefault();
    handle.classList.add('dragging');
    _drag = { handle, colKey, colEl, startX: e.clientX, startW: colEl.offsetWidth || parseInt(colEl.style.width)||120 };
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!_drag) return;
    const newW = Math.max(60, _drag.startW + (e.clientX - _drag.startX));
    _drag.colEl.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', e => {
    if (!_drag) return;
    const { handle, colKey, colEl } = _drag;
    handle.classList.remove('dragging');
    const finalW = Math.max(60, parseInt(colEl.style.width)||120);
    if (!D.uiPrefs)                 D.uiPrefs = {};
    if (!D.uiPrefs.budgetColWidths) D.uiPrefs.budgetColWidths = {};
    D.uiPrefs.budgetColWidths[colKey] = finalW;
    dirty();
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    _drag = null;
  });
})();

function initBudgetDragDrop(wrap) {
  let _overEl = null;
  const clearOver = () => { if (_overEl) { _overEl.classList.remove('btable-drop-over'); _overEl = null; } };
  wrap.addEventListener('dragstart', e => {
    const row = e.target.closest('tr[draggable="true"]');
    if (!row) return;
    _dnd = { active:true, type:row.dataset.dragType, id:row.dataset.dragId, groupId:row.dataset.dragGroup||null };
    setTimeout(() => row.classList.add('btable-dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', row.dataset.dragId);
  });
  wrap.addEventListener('dragover', e => {
    if (!_dnd.active) return;
    const row = e.target.closest('tr[data-drag-type]');
    if (!row || row.dataset.dragType !== _dnd.type) { clearOver(); return; }
    if (_dnd.type==='cat' && row.dataset.dragGroup !== _dnd.groupId) { clearOver(); return; }
    if (row.dataset.dragId === _dnd.id) { clearOver(); return; }
    e.preventDefault();
    if (_overEl !== row) { clearOver(); _overEl = row; row.classList.add('btable-drop-over'); }
    e.dataTransfer.dropEffect = 'move';
  });
  wrap.addEventListener('dragleave', e => {
    const row = e.target.closest('tr[data-drag-type]');
    if (row && !row.contains(e.relatedTarget)) row.classList.remove('btable-drop-over');
  });
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    const targetRow = e.target.closest('tr[data-drag-type]');
    clearOver();
    if (!targetRow || !_dnd.active || targetRow.dataset.dragType !== _dnd.type) return;
    if (_dnd.type==='cat' && targetRow.dataset.dragGroup !== _dnd.groupId) return;
    const targetId = targetRow.dataset.dragId;
    if (!targetId || targetId === _dnd.id) return;
    if (_dnd.type==='group') {
      const arr = D.budget.groups;
      const fi = arr.findIndex(g=>g.id===_dnd.id), ti = arr.findIndex(g=>g.id===targetId);
      if (fi<0||ti<0) return;
      const [item] = arr.splice(fi,1); arr.splice(ti,0,item);
    } else {
      const arr = D.budget.categories;
      const fi = arr.findIndex(c=>c.id===_dnd.id), ti = arr.findIndex(c=>c.id===targetId);
      if (fi<0||ti<0) return;
      const [item] = arr.splice(fi,1); arr.splice(ti,0,item);
    }
    _dnd = { active:false }; dirty(); renderBudget();
  });
  wrap.addEventListener('dragend', e => {
    clearOver();
    const row = e.target.closest('tr[draggable="true"]');
    if (row) row.classList.remove('btable-dragging');
    _dnd = { active:false };
  });
}

// ── Shared sort helper ────────────────────────────────────────
function oblSortArr(arr, type) {
  const { col, dir } = UI.oblSort[type] || { col: 'name', dir: 'asc' };
  const mul = dir === 'asc' ? 1 : -1;
  return [...arr].sort((a, b) => {
    let av, bv;
    if (type === 'sub') {
      if (col === 'name')     { av = (a.name||'').toLowerCase();          bv = (b.name||'').toLowerCase(); }
      else if (col === 'cost'){ av = +a.cost||0;                          bv = +b.cost||0; }
      else if (col === 'cycle'){ av = a.billingCycle||'';                 bv = b.billingCycle||''; }
      else if (col === 'monthly'){ av = oblToMonthly(+a.cost,a.billingCycle); bv = oblToMonthly(+b.cost,b.billingCycle); }
      else if (col === 'renewal'){ av = oblNextRenewal(a.startDate,a.billingCycle); bv = oblNextRenewal(b.startDate,b.billingCycle); }
      else if (col === 'payment'){ av = (a.paymentMethod||'').toLowerCase(); bv = (b.paymentMethod||'').toLowerCase(); }
      else if (col === 'assigned'){ av = (a.assignedTo||'').toLowerCase(); bv = (b.assignedTo||'').toLowerCase(); }
      else if (col === 'status'){ av = a.status||'';                      bv = b.status||''; }
    } else if (type === 'emi') {
      if (col === 'name')       { av = (a.itemName||a.name||'').toLowerCase(); bv = (b.itemName||b.name||'').toLowerCase(); }
      else if (col === 'emi')   { av = +a.emiAmount||0;                        bv = +b.emiAmount||0; }
      else if (col === 'loanAmt'){ av = +a.loanAmount||0;                      bv = +b.loanAmount||0; }
      else if (col === 'balance'){ av = a.remainingBalance||0;                 bv = b.remainingBalance||0; }
      else if (col === 'pct')   { const ta=a.totalInstallments||1, tb=b.totalInstallments||1;
                                  av = (a.installmentsPaid||0)/ta;             bv = (b.installmentsPaid||0)/tb; }
    } else if (type === 'split') {
      if (col === 'name')     { av = (a.name||'').toLowerCase();          bv = (b.name||'').toLowerCase(); }
      else if (col === 'inst'){ av = +a.installmentAmount||0;             bv = +b.installmentAmount||0; }
      else if (col === 'total'){ av = +a.totalAmount||0;                  bv = +b.totalAmount||0; }
      else if (col === 'remaining'){ av = (a.totalInstallments-(a.installmentsPaid||0))*(+a.installmentAmount||0);
                                     bv = (b.totalInstallments-(b.installmentsPaid||0))*(+b.installmentAmount||0); }
      else if (col === 'pct') { const ta=a.totalInstallments||1, tb=b.totalInstallments||1;
                                av = (a.installmentsPaid||0)/ta;          bv = (b.installmentsPaid||0)/tb; }
      else if (col === 'due') { const [y,m]=ymNow().split('-').map(Number);
        av = a.status==='Completed'?'9999': `${y}-${String(m).padStart(2,'0')}-${String(Math.min(+a.dueDateEachMonth||1,new Date(y,m,0).getDate())).padStart(2,'0')}`;
        bv = b.status==='Completed'?'9999': `${y}-${String(m).padStart(2,'0')}-${String(Math.min(+b.dueDateEachMonth||1,new Date(y,m,0).getDate())).padStart(2,'0')}`;
      }
    }
    if (av === undefined) return 0;
    if (typeof av === 'string') return mul * av.localeCompare(bv);
    return mul * (av - bv);
  });
}

// Build a sortable <th> for obl tables
function oblTh(label, col, type, extraClass = '') {
  const { col: c, dir } = UI.oblSort[type] || {};
  const active = c === col;
  const arrow  = active ? (dir === 'asc' ? ' ▲' : ' ▼') : '';
  return `<th class="${extraClass}" style="cursor:pointer;user-select:none;white-space:nowrap${active?';color:var(--primary)':''}" onclick="BA.oblSort('${type}','${col}')">${label}${arrow}</th>`;
}

function oblPayAcctMismatch(paymentMethod) {
  if (!paymentMethod) return false;
  const nm = paymentMethod.trim().toLowerCase();
  return !(D.txnAccounts||[]).some(a => (a.name||'').toLowerCase() === nm);

}

function oblSaveSub(editId) {
  const name = id('osub-name').value.trim();
  const cost = parseFloat(id('osub-cost').value);
  if (!name) { toast('Name is required','err'); return; }
  if (isNaN(cost) || cost < 0) { toast('Enter a valid cost','err'); return; }
  const obj = {
    id: editId || uid(), name,
    category: id('osub-cat').value,
    cost, billingCycle: id('osub-cycle').value,
    startDate: id('osub-start').value || ymNow() + '-01',
    nextRenewalDate: id('osub-renewal').value || '',
    paymentMethod: id('osub-pay').value.trim(),
    assignedTo: id('osub-assign').value.trim(),
    status: id('osub-status').value,
    expenseTypeId: id('osub-exptype')?.value || null,
    notes: id('osub-notes').value.trim(),
    dateAdded: editId ? undefined : ymNow() + '-01'
  };
  if (!obj.nextRenewalDate) obj.nextRenewalDate = oblNextRenewal(obj.startDate, obj.billingCycle);
  if (editId) {
    const idx = D.obligations.subscriptions.findIndex(s => s.id === editId);
    if (idx >= 0) D.obligations.subscriptions[idx] = { ...D.obligations.subscriptions[idx], ...obj };
  } else {
    D.obligations.subscriptions.push(obj);
  }
  dirty(); closeModal(); renderOblSubscriptions();
  toast(`Subscription ${editId?'updated':'added'} ✓`, 'ok');
}

function oblEditSub(subId) { oblAddSubModal(subId); }

function oblDeleteSub(subId) {

}

function oblSaveEmi(editId) {
  const name = id('oemi-name').value.trim();
  const loanAmt = parseFloat(id('oemi-amt').value);
  const emiAmt  = parseFloat(id('oemi-emi').value);
  const start   = id('oemi-start').value;
  const end     = id('oemi-end').value;
  if (!name)               { toast('Name is required','err'); return; }
  if (isNaN(loanAmt))      { toast('Enter a valid loan amount','err'); return; }
  if (isNaN(emiAmt))       { toast('Enter a valid payment amount','err'); return; }
  if (!start || !end)      { toast('Start and maturity dates are required','err'); return; }
  const obj = {
    id: editId || uid(), itemName: name,
    category: id('oemi-cat').value,
    loanAmount: loanAmt, emiAmount: emiAmt,
    frequency: id('oemi-freq').value,
    dueDateEachMonth: parseInt(id('oemi-day').value) || 1,
    startDate: start, maturityDate: end,
    interestRate: parseFloat(id('oemi-rate').value) || 0,
    lender: id('oemi-lender').value.trim(),
    paymentMethod: id('oemi-pay').value.trim(),
    status: id('oemi-status').value,
    expenseTypeId: id('oemi-exptype')?.value || null,
    notes: id('oemi-notes').value.trim(),
    generateMonthly: !!id('oemi-gen-monthly')?.checked,
  };
  if (editId) {
    const idx = D.obligations.emis.findIndex(x => x.id === editId);
    if (idx >= 0) D.obligations.emis[idx] = { ...D.obligations.emis[idx], ...obj };
  } else {
    D.obligations.emis.push(obj);
  }
  dirty(); closeModal(); renderOblEmis();
  toast(`Loan ${editId?'updated':'added'} ✓`, 'ok');
}

function renderOblSplits() {
  const splits = D.obligations.splits || [];
  const active = splits.filter(s => s.status !== 'Completed');
  const pane   = id('obl-pane-splits');
  const totalOutstanding = active.reduce((s,sp) => s + ((sp.totalInstallments - (sp.installmentsPaid||0)) * (+sp.installmentAmount||0)), 0);
  const dueThisMonth = active.filter(sp => oblSplitDueInMonth(sp, ymNow())).length;

  const sorted = oblSortArr(splits, 'split');
  const rows = sorted.length ? sorted.map(sp => {
    const paid     = sp.installmentsPaid || 0;
    const total    = sp.totalInstallments || 1;
    const pct      = Math.round((paid / total) * 100);
    const remaining = (total - paid) * (+sp.installmentAmount||0);
    const isComplete = paid >= total || sp.status === 'Completed';
    const nextDue  = isComplete ? '—' : (() => {
      const [y,m] = ymNow().split('-').map(Number);
      const day = Math.min(+sp.dueDateEachMonth||1, new Date(y,m,0).getDate());
      return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    })();
    return `<tr style="${isComplete?'opacity:.55':''}">
      <td><span class="obl-pill blue" style="margin-right:5px">${esc(sp.category||'Other')}</span>${esc(sp.name)}</td>
      <td class="r">${fmtCurrency(sp.installmentAmount)}</td>
      <td>${paid} / ${total}</td>
      <td class="r">${fmtCurrency(sp.totalAmount)}</td>
      <td class="r" style="color:${isComplete?'var(--ok)':'var(--warn)'}">${isComplete?'$0':fmtCurrency(remaining)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px">
            <div style="height:100%;width:${pct}%;background:${isComplete?'var(--ok)':'var(--info)'};border-radius:3px"></div>
          </div>
          <span style="font-size:.7rem;color:var(--text3);white-space:nowrap">${pct}%</span>
        </div>
      </td>
      <td>${isComplete?'<span class="obl-pill green">Done</span>':fmtDate(nextDue)}</td>
      <td style="font-size:.78rem">${(() => {
        const pm = sp.paymentMethod||'';
        const warn = pm && oblPayAcctMismatch(pm) ? ' <span title="Account not found in Transactions" style="color:var(--warn);cursor:default">⚠️</span>' : '';
        return esc(pm||'—') + warn;
      })()}</td>
      <td>
        <button class="btn btn-sm btn-ghost btn-xs" onclick="oblMarkSplitPaid('${sp.id}')" ${isComplete?'disabled':''} title="Mark one installment paid">✓</button>
        <button class="btn btn-sm btn-ghost btn-xs" onclick="oblEditSplit('${sp.id}')">✎</button>
        <button class="btn btn-sm btn-ghost btn-xs" style="color:var(--danger)" onclick="oblDeleteSplit('${sp.id}')">✕</button>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">No split payments yet — add one above</td></tr>`;

  pane.innerHTML = `
    <div class="sum-row kpi-sticky-obl">
      <div class="sum-card"><div class="sum-lbl">Active Splits</div><div class="sum-val">${active.length}</div><div class="sum-sub">${splits.length-active.length} completed</div></div>
      <div class="sum-card c-warn"><div class="sum-lbl">Total Outstanding</div><div class="sum-val">${fmtCurrency(totalOutstanding)}</div><div class="sum-sub">remaining to pay</div></div>
      <div class="sum-card"><div class="sum-lbl">Due This Month</div><div class="sum-val">${dueThisMonth}</div><div class="sum-sub">installment due</div></div>
    </div>
    <div class="obl-section-hdr">
      <h3 style="font-size:.95rem;font-weight:700;color:var(--text)">Split Payments</h3>
      <button class="btn btn-primary btn-sm" onclick="oblAddSplitModal()">＋ Add Split Payment</button>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;overflow-x:auto">
      <table class="obl-tbl">
        <thead><tr>
          ${oblTh('Name','name','split')}${oblTh('Per Install.','inst','split','r')}${oblTh('Progress','pct','split')}
          ${oblTh('Total','total','split','r')}${oblTh('Remaining','remaining','split','r')}${oblTh('Paid %','pct','split')}${oblTh('Next Due','due','split')}<th>Pay Account</th><th></th>
        </tr></thead>

  const total = parseFloat(id('ospl-total')?.value);

  const instEl = id('ospl-inst');
