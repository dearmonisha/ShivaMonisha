function renderMonthly() {
  const ym = UI.month;
  const cycle = D.cycles[ym];
  const payments = cycle ? (cycle.payments || []) : [];

  // Month status badge
  const mStatus = getMonthStatus(ym, payments);
  let mBadge = '';
  if (mStatus === 'complete' && payments.length > 0) {
    mBadge = '<span class="m-badge done">&#10003; Complete</span>';
  } else if (mStatus === 'overdue') {
    const odCt = payments.filter(p => !p.isPaid && p.dueDate && daysLeft(p.dueDate) < 0).length;
    mBadge = `<span class="m-badge overdue">&#9888; ${odCt} overdue</span>`;
  } else if (mStatus === 'pending' && payments.length > 0) {
    const pendCt = payments.filter(p => !p.isPaid).length;
    mBadge = `<span class="m-badge pending">${pendCt} pending</span>`;
  }

  // Previous month warning banner
  const prevYM = shiftYM(ym, -1);
  const prevPayments = (D.cycles[prevYM]?.payments || []);
  const prevPending = prevPayments.filter(p => !p.isPaid).length;
  const prevWarnHTML = prevPending > 0
    ? `<div class="prev-warn">&#9888;&nbsp;<strong>${ymLabel(prevYM)}</strong> has ${prevPending} unpaid payment${prevPending>1?'s':''} &mdash; <a href="#" onclick="changeMonth(-1);return false;">View</a></div>`
    : '';

  id('view-monthly').innerHTML = `
    <div class="tab-sticky-top">
      <div class="mnav" style="margin-bottom:0">
        <button class="arrow-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span class="mdisp">${ymLabel(ym)}${mBadge ? ' ' + mBadge : ''}</span>
        <button class="arrow-btn" onclick="changeMonth(1)">&#8250;</button>
        <div class="mnav-right">
          <button class="btn" onclick="addPaymentModal()">&#65291; Add Payment</button>
          <button class="btn btn-primary" onclick="generateCycle()">&#9654; Generate from Templates</button>
        </div>
      </div>
      ${prevWarnHTML}
      <div id="sum-row" class="sum-row" style="margin-bottom:0;padding-top:8px"></div>
    </div>
    <div id="monthly-body"></div>
  `;

  renderSummaryCards(payments);
  renderMonthlyBody(payments);
}

function getMonthStatus(ym, payments) {
  if (!payments) {
    const cycle = D.cycles[ym];
    payments = cycle ? (cycle.payments || []) : [];
  }
  if (!payments.length) return 'empty';
  if (payments.every(p => p.isPaid)) return 'complete';
  if (payments.some(p => !p.isPaid && p.dueDate && daysLeft(p.dueDate) < 0)) return 'overdue';
  return 'pending';
}

function changeMonth(n) {
  UI.month = shiftYM(UI.month, n);
  UI.catFilter = 'All';
  UI.selectedPids = new Set();
  renderMonthly();
}

function renderSummaryCards(payments) {
  const total      = payments.reduce((s,p) => s+(+p.amountDue||0), 0);
  const cashOut    = payments.reduce((s,p) => s+(+p.amountPaid||0), 0);
  const stillDue   = payments.filter(p => !p.isPaid).reduce((s,p) => s+(+p.amountDue||0), 0);
  const paidCt     = payments.filter(p => p.isPaid).length;
  const pendingCt  = payments.length - paidCt;
  const overdueCt  = payments.filter(p => !p.isPaid && p.dueDate && daysLeft(p.dueDate)<0).length;
  const soonCt     = payments.filter(p => !p.isPaid && p.dueDate && daysLeft(p.dueDate)>=0 && daysLeft(p.dueDate)<=7).length;
  const pct        = payments.length > 0 ? Math.round((paidCt / payments.length) * 100) : 0;
  const pctColor   = pct >= 80 ? 'var(--ok)' : pct >= 40 ? 'var(--warn)' : 'var(--danger)';

  id('sum-row').innerHTML = `
    <div class="sum-card">
      <div class="sum-lbl">Bills</div>
      <div class="sum-val">${payments.length}</div>
      <div class="sum-sub">${paidCt} paid &nbsp;·&nbsp; ${pendingCt} pending</div>
    </div>
    <div class="sum-card ${overdueCt>0?'c-danger':''}">
      <div class="sum-lbl">Past Due</div>
      <div class="sum-val">${overdueCt}</div>
      <div class="sum-sub">${overdueCt>0?'need attention':'all clear'}</div>
    </div>
    <div class="sum-card ${soonCt>0?'c-warn':''}">
      <div class="sum-lbl">Due Soon</div>
      <div class="sum-val">${soonCt}</div>
      <div class="sum-sub">within 7 days</div>
    </div>
    <div class="sum-card">
      <div class="sum-lbl">Month Total</div>
      <div class="sum-val">${fmtCurrency(total)||'$0.00'}</div>
      <div class="sum-sub">total obligations</div>
    </div>
    <div class="sum-card ${cashOut>0?'c-ok':''}">
      <div class="sum-lbl">Cash Out</div>
      <div class="sum-val">${fmtCurrency(cashOut)||'$0.00'}</div>
      <div class="sum-sub">${paidCt} bill${paidCt!==1?'s':''} cleared</div>
    </div>
    <div class="sum-card ${stillDue>0?'c-warn':'c-ok'}">
      <div class="sum-lbl">Still Due</div>
      <div class="sum-val">${fmtCurrency(stillDue)||'$0.00'}</div>
      <div class="sum-sub">${pendingCt} bill${pendingCt!==1?'s':''} remaining</div>
    </div>
    <div class="sum-card" style="min-width:150px">
      <div class="sum-lbl">Month Progress</div>
      <div class="sum-val" style="color:${pctColor}">${pct}%</div>
      <div style="margin-top:5px;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:3px;transition:width .4s"></div>
      </div>
      <div class="sum-sub" style="margin-top:4px">${paidCt} of ${payments.length} paid</div>
    </div>
  `;
}

function renderMonthlyBody(payments) {
  const body = id('monthly-body');
  if (!payments.length) {
    body.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No payments for ${ymLabel(UI.month)}</div>
        <div class="empty-sub">Generate from templates or add a payment manually</div>
        <button class="btn btn-primary" onclick="generateCycle()">&#9654; Generate from Templates</button>
      </div>`;
    return;
  }

  // Build slicer — categories present in this month's payments
  const catOrder = D.categories;
  const allCats = [...new Set(payments.map(p => p.category || 'Other'))].sort((a,b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    if (ai<0&&bi<0) return a.localeCompare(b);
    if (ai<0) return 1; if (bi<0) return -1;
    return ai-bi;
  });

  const slicerHTML = `
    <div class="slicer">
      <span class="slicer-lbl">Category:</span>
      <button class="sl-btn ${UI.catFilter==='All'?'active':''}" onclick="setCatFilter('All')">All (${payments.length})</button>
      ${allCats.map(c => {
        const cnt = payments.filter(p=>(p.category||'Other')===c).length;
        const hasOd = payments.some(p=>(p.category||'Other')===c && !p.isPaid && p.dueDate && daysLeft(p.dueDate)<0);
        return `<button class="sl-btn ${UI.catFilter===c?'active':''}" onclick="setCatFilter('${esc(c)}')">${esc(c)} (${cnt})${hasOd?' ⚠':''}</button>`;
      }).join('')}
    </div>`;

  // Filter + sort
  const displayed = sortAndFilter(payments);

  if (!displayed.length) {
    body.innerHTML = slicerHTML + `<div class="empty" style="padding:28px"><div class="empty-title">No payments in this category</div></div>`;
    return;
  }

  // Selection state for header checkbox
  const selCount = displayed.filter(p => UI.selectedPids.has(p.id)).length;
  const allSel = selCount === displayed.length;
  const someSel = selCount > 0 && !allSel;

  // Selection toolbar (shown only when items are selected)
  const selToolbar = selCount > 0 ? `
    <div class="sel-toolbar">
      <span class="sel-count">${selCount} selected</span>
      <button class="btn btn-danger btn-sm" onclick="deleteSelectedPayments()">🗑 Delete Selected (${selCount})</button>
      <button class="btn btn-sm" onclick="clearSelection()">✕ Clear</button>
    </div>` : '';

  // Sortable header helper
  const thS = (col, label, style='') => {
    const active = UI.sortCol === col;
    const arrow = active ? (UI.sortDir === 'asc' ? '▲' : '▼') : '⇅';
    return `<th class="sortable${active?' sorted':''}" onclick="setSort('${col}')" style="cursor:pointer;${style}">${label}<span class="sort-ind">${arrow}</span></th>`;
  };

  body.innerHTML = slicerHTML + selToolbar + `
    <div class="grid-wrap">
      <table class="pgrid">
        <thead><tr>
          <th style="width:34px;text-align:center;padding:0 6px">
            <input type="checkbox" class="sel-all-cb" title="Select all"
              ${allSel ? 'checked' : ''}
              style="cursor:pointer;accent-color:var(--primary);width:14px;height:14px"
              onchange="selectAllPayments(this.checked)"
              ref="selAll">
          </th>
          <th class="num" style="width:28px">#</th>
          ${thS('name','Name','min-width:150px')}
          ${thS('category','Category','min-width:110px')}
          ${thS('statementDate','Statement Date','min-width:118px')}
          ${thS('dueDate','Due Date','min-width:100px')}
          <th style="min-width:100px">Days Left</th>
          ${thS('amountDue','Amount Due','min-width:110px')}
          ${thS('outstandingBalance','Card Balance','min-width:110px')}
          ${thS('amountPaid','Amount Paid','min-width:110px')}
          ${thS('paidFrom','Paid From','min-width:140px')}
          ${thS('paidDate','Paid Date','min-width:100px')}
          <th style="width:44px;text-align:center">Auto</th>
          <th style="width:46px;text-align:center">Paid</th>
          <th style="width:56px">Actions</th>
        </tr></thead>
        <tbody>
          ${displayed.map((p,i) => rowHTML(p, i+1)).join('')}
        </tbody>
      </table>
    </div>`;

  // Set indeterminate state on select-all checkbox
  const saCb = body.querySelector('.sel-all-cb');
  if (saCb) saCb.indeterminate = someSel;
}

// ─── SLICER / SORT ACTIONS ───
function setCatFilter(cat) {
  UI.catFilter = cat;
  const payments = (D.cycles[UI.month]?.payments || []);
  renderMonthlyBody(payments);
}

function setSort(col) {
  if (UI.sortCol === col) {
    UI.sortDir = UI.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    UI.sortCol = col;
    UI.sortDir = 'asc';
  }
  const payments = (D.cycles[UI.month]?.payments || []);
  renderMonthlyBody(payments);
}

function sortAndFilter(payments) {
  let list = UI.catFilter === 'All'
    ? [...payments]
    : payments.filter(p => (p.category || 'Other') === UI.catFilter);

  const col = UI.sortCol;
  const dir = UI.sortDir === 'asc' ? 1 : -1;

  list.sort((a, b) => {
    // ── Paid rows always sink to the bottom ──────────────────
    if (a.isPaid !== b.isPaid) return a.isPaid ? 1 : -1;

    // ── Within paid group: sort by paidDate ascending ────────
    if (a.isPaid && b.isPaid) {
      const pa = a.paidDate || '', pb = b.paidDate || '';
      return pa < pb ? -1 : pa > pb ? 1 : 0;
    }

    // ── Within unpaid group: honour the active column sort ───
    let va = a[col] ?? '', vb = b[col] ?? '';
    const aNul = va === null || va === undefined || va === '';
    const bNul = vb === null || vb === undefined || vb === '';
    if (aNul && bNul) return 0;
    if (aNul) return 1;
    if (bNul) return -1;

    if (col === 'amountDue' || col === 'outstandingBalance' || col === 'amountPaid') {
      return ((+va || 0) - (+vb || 0)) * dir;
    }
    if (col === 'isPaid') {
      return ((va ? 1 : 0) - (vb ? 1 : 0)) * dir;
    }
    // Dates and strings both sort lexicographically correctly
    return (String(va) < String(vb) ? -1 : String(va) > String(vb) ? 1 : 0) * dir;
  });

  return list;
}

function rowHTML(p, idx) {
  const dl = p.isPaid ? null : (p.dueDate ? daysLeft(p.dueDate) : null);
  const rowCls = p.isPaid ? 'paid' : (dl!==null&&dl<0 ? 'overdue' : '');

  let dotCls = 'pending';
  if (p.isPaid) dotCls = 'paid';
  else if (dl!==null&&dl<0) dotCls = 'overdue';
  else if (dl!==null&&dl<=7) dotCls = 'soon';

  const amtFmt  = fmtCurrency(p.amountDue);
  const balFmt  = fmtCurrency(p.outstandingBalance);
  const paidFmt = fmtCurrency(p.amountPaid);
  const pfrom   = p.paidFrom || '';

  // Paid From: editable only for non-automatic payments
  const paidFromCell = p.isAutomatic
    ? `<div class="cell"><span class="truncate" style="color:var(--text2)">${esc(pfrom) || '<span style="color:var(--text3)">—</span>'}</span></div>`
    : `<div class="cell ed" onclick="editPaidFrom(this,'${p.id}')"><span class="truncate">${esc(pfrom) || '<span style="color:var(--text3)">—</span>'}</span></div>`;

  // Auto: simple checkmark or blank
  const autoCell = p.isAutomatic
    ? '<span style="color:var(--ok);font-size:15px;font-weight:700">&#10003;</span>'
    : '';

  const isSel = UI.selectedPids.has(p.id);

  return `<tr class="${rowCls}${isSel?' sel':''}" data-pid="${p.id}">
    <td style="text-align:center;padding:0 6px">
      <input type="checkbox" ${isSel?'checked':''} style="cursor:pointer;accent-color:var(--primary);width:14px;height:14px"
        onchange="toggleSelectPayment('${p.id}',this.checked)">
    </td>
    <td><div class="cell rnum">${idx}</div></td>
    <td><div class="cell ed" onclick="editCell(this,'name','${p.id}','text')">
      <span class="sdot ${dotCls}"></span><span class="truncate">${esc(p.name||'—')}</span>
    </div></td>
    <td><div class="cell"><span style="color:var(--text2)">${esc(p.category||'Other')}</span></div></td>
    <td><div class="cell ed" onclick="editCell(this,'statementDate','${p.id}','date')">
      ${fmtDate(p.statementDate)}
    </div></td>
    <td><div class="cell ed" onclick="editCell(this,'dueDate','${p.id}','date')">
      ${fmtDate(p.dueDate)}
    </div></td>
    <td><div class="cell">${dayBadge(p.isPaid, dl)}</div></td>
    <td><div class="cell ed mono" onclick="editCell(this,'amountDue','${p.id}','num')">
      ${amtFmt ? `<span style="color:#1C1410;font-weight:700">${amtFmt}</span>` : '<span class="amt-zero">—</span>'}
    </div></td>
    <td><div class="cell ed mono" onclick="editCell(this,'outstandingBalance','${p.id}','num')">
      ${balFmt ? `<span class="${+p.outstandingBalance>0?'amt-warn':''}">${balFmt}</span>` : '<span class="amt-zero">—</span>'}
    </div></td>
    <td><div class="cell ed mono" onclick="editCell(this,'amountPaid','${p.id}','num')">
      ${paidFmt ? `<span class="amt-pos">${paidFmt}</span>` : '<span class="amt-zero">—</span>'}
    </div></td>
    <td>${paidFromCell}</td>
    <td>${p.isPaid
      ? `<div class="cell ed" onclick="editCell(this,'paidDate','${p.id}','date')">${fmtDate(p.paidDate)}</div>`
      : `<div class="cell"><span style="color:var(--text3)">—</span></div>`
    }</td>
    <td><div class="cell" style="justify-content:center">${autoCell}</div></td>
    <td><div class="cell" style="justify-content:center">
      <input type="checkbox" ${p.isPaid?'checked':''} onchange="togglePaid('${p.id}',this.checked)" style="cursor:pointer;width:15px;height:15px;accent-color:var(--primary)">
    </div></td>
    <td><div class="ract">
      <button class="ibtn del" title="Delete" onclick="deletePayment('${p.id}')">🗑</button>
    </div></td>
  </tr>`;
}

function dayBadge(isPaid, dl) {
  if (isPaid) return '<span class="dbadge paid">✓ Paid</span>';
  if (dl === null) return '<span class="dbadge na">—</span>';
  if (dl < 0)  return `<span class="dbadge overdue">⚠ ${Math.abs(dl)}d overdue</span>`;
  if (dl === 0) return '<span class="dbadge urgent">Due Today!</span>';
  if (dl <= 3) return `<span class="dbadge urgent">${dl}d left</span>`;
  if (dl <= 7) return `<span class="dbadge soon">${dl}d left</span>`;
  return `<span class="dbadge far">${dl}d left</span>`;
}

// ════════════════════════════════════════════════════════════
// INLINE EDITING
// ════════════════════════════════════════════════════════════
function editCell(cellEl, field, pid, type) {
  if (cellEl.dataset.editing) return;
  cellEl.dataset.editing = '1';
  editCtx = { pid, field, type };

  const p = findPayment(pid);
  const cur = p ? (p[field] ?? '') : '';

  let input;
  if (type === 'date') {
    input = Object.assign(document.createElement('input'), { type:'date', value: cur });
  } else if (type === 'num') {
    input = Object.assign(document.createElement('input'), { type:'number', step:'0.01', value: cur !== null && cur !== '' ? cur : '' });
    input.style.cssText = 'width:90px';
  } else {
    input = Object.assign(document.createElement('input'), { type:'text', value: cur });
  }

  input.addEventListener('blur', () => commitCell(input.value, pid, field, type));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { editCtx = null; reRenderRow(pid); }
  });

  while (cellEl.firstChild) cellEl.removeChild(cellEl.firstChild);
  cellEl.appendChild(input);
  input.focus();
  try { input.select(); } catch(e) {}
}

function editPaidFrom(cellEl, pid) {
  editCellSel(cellEl, 'paidFrom', pid, D.accounts);
}

function editCellSel(cellEl, field, pid, options) {
  if (cellEl.dataset.editing) return;
  cellEl.dataset.editing = '1';
  editCtx = { pid, field };

  const p = findPayment(pid);
  const cur = p ? (p[field] || '') : '';

  const sel = document.createElement('select');
  [['','— None —'], ...options.map(o=>[o,o])].forEach(([v,l]) => {
    const opt = Object.assign(document.createElement('option'), { value:v, textContent:l, selected: v===cur });
    sel.appendChild(opt);
  });

  const commit = () => { if(editCtx) commitCell(sel.value, pid, field, 'text'); };
  sel.addEventListener('change', commit);
  sel.addEventListener('blur', commit);
  sel.addEventListener('keydown', e => {
    if (e.key === 'Escape') { editCtx = null; reRenderRow(pid); }
  });

  while (cellEl.firstChild) cellEl.removeChild(cellEl.firstChild);
  cellEl.appendChild(sel);
  sel.focus();
}

function commitCell(value, pid, field, type) {
  if (!editCtx || editCtx.committed) return;
  editCtx.committed = true;
  editCtx = null;

  const p = findPayment(pid);
  if (!p) return;

  let v = value;
  if (type === 'num') { v = value === '' ? null : parseFloat(value); if (isNaN(v)) v = null; }
  p[field] = v;
  dirty();
  reRenderRow(pid);
}

function reRenderRow(pid) {
  const tr = document.querySelector(`tr[data-pid="${pid}"]`);
  if (!tr) return;
  const p = findPayment(pid);
  if (!p) return;
  const idx = [...tr.parentElement.children].indexOf(tr) + 1;
  const tmp = document.createElement('tbody');
  tmp.innerHTML = rowHTML(p, idx);
  tr.parentNode.replaceChild(tmp.firstElementChild, tr);
}

function togglePaid(pid, checked) {
  const p = findPayment(pid);
  if (!p) return;
  p.isPaid = checked;
  if (checked) {
    if (!p.paidDate) p.paidDate = new Date().toISOString().split('T')[0];
    // Auto-fill amountPaid = amountDue for non-Credit Card payments
    // (CC users typically pay a different amount than minimum due)
    if (p.amountPaid === null || p.amountPaid === undefined) {
      const isCC = (p.category || '').toLowerCase().includes('credit');
      if (!isCC && p.amountDue !== null && p.amountDue !== undefined) {
        p.amountPaid = p.amountDue;
      }
    }
  } else {
    p.paidDate = null;
    p.amountPaid = null;
  }
  dirty();
  // Full re-render so status badge, summary cards, and slicer all update
  renderMonthly();
}

function deletePayment(pid) {
  if (!confirm('Delete this payment?')) return;
  const ym = UI.month;
  if (!D.cycles[ym]) return;
  D.cycles[ym].payments = D.cycles[ym].payments.filter(p => p.id !== pid);
  dirty();
  renderMonthly();
  toast('Payment deleted');
}

function toggleSelectPayment(pid, checked) {
  if (checked) UI.selectedPids.add(pid);
  else UI.selectedPids.delete(pid);
  const payments = (D.cycles[UI.month]?.payments || []);
  renderMonthlyBody(payments);
}

function selectAllPayments(checked) {
  const payments = sortAndFilter(D.cycles[UI.month]?.payments || []);
  if (checked) payments.forEach(p => UI.selectedPids.add(p.id));
  else UI.selectedPids.clear();
  renderMonthlyBody(D.cycles[UI.month]?.payments || []);
}

function clearSelection() {
  UI.selectedPids.clear();
  renderMonthlyBody(D.cycles[UI.month]?.payments || []);
}

function deleteSelectedPayments() {
  const n = UI.selectedPids.size;
  if (!n) return;
  if (!confirm(`Delete ${n} selected payment${n>1?'s':''}? This cannot be undone.`)) return;
  const ym = UI.month;
  if (!D.cycles[ym]) return;
  D.cycles[ym].payments = D.cycles[ym].payments.filter(p => !UI.selectedPids.has(p.id));
  UI.selectedPids.clear();
  dirty();
  renderMonthly();
  toast(`Deleted ${n} payment${n>1?'s':''}`, 'ok');
}

function findPayment(pid) {
  for (const ym of Object.keys(D.cycles)) {
    const p = (D.cycles[ym].payments||[]).find(x => x.id === pid);
    if (p) return p;
  }
  return null;
}

// ════════════════════════════════════════════════════════════
// GENERATE CYCLE
// ════════════════════════════════════════════════════════════
function generateCycle() {
  const ym = UI.month;
  const existing = D.cycles[ym]?.payments || [];
  const firing = D.templates.filter(t => t.isActive && templateFires(t, ym));
  const expTotals = getExpenseScheduleTotals(ym).filter(r => r.count > 0 && r.total > 0);
  // Obligations are tracked separately in the Obligations tab and auto-populate
  // into the Transactions module — they are intentionally excluded here.

  if (!firing.length && !expTotals.length) {
    toast('No active templates or recurring expenses match this month. Check Setup.', 'err');
    return;
  }

  if (existing.length) {
    if (!confirm(`${ymLabel(ym)} already has ${existing.length} payment(s).\n\nAdd missing entries? (existing won't be duplicated)`)) return;
  }

  if (!D.cycles[ym]) D.cycles[ym] = { payments: [] };

  // For regular templates: track by templateId to avoid duplicates
  const existTids = new Set(
    existing.filter(p => p.templateId && !p.biweeklyDate).map(p => p.templateId)
  );
  // For bi-weekly: track by templateId+specificDate to avoid duplicates
  const existBwKeys = new Set(
    existing.filter(p => p.biweeklyDate).map(p => `${p.templateId}-${p.biweeklyDate}`)
  );
  // For recurring expense schedules: track by expenseScheduleId to avoid duplicates
  const existEscIds = new Set(
    existing.filter(p => p.expenseScheduleId).map(p => p.expenseScheduleId)
  );
  let added = 0;
  firing.forEach(t => {
    if ((t.frequency || 'Monthly') === 'Bi-Weekly') {
      // Generate one payment row per bi-weekly date that falls in this month
      const dates = getBiweeklyDatesForMonth(t, ym);
      const total = dates.length;
      const { stmtDate } = buildDates(t, ym); // statement date from template day
      dates.forEach((dueDate, i) => {
        const bwKey = `${t.id}-${dueDate}`;
        if (existBwKeys.has(bwKey)) return;
        D.cycles[ym].payments.push({
          id: uid(), templateId: t.id, biweeklyDate: dueDate,
          name: total > 1 ? `${t.name} (${i+1}/${total})` : t.name,
          category: t.category, type: t.type || '',
          statementDate: stmtDate, dueDate,
          amountDue: t.isFixed ? t.fixedAmount : null,
          outstandingBalance: null,
          amountPaid: null,
          isPaid: false, paidDate: null,
          paidFrom: t.paymentAccount || null,
          isAutomatic: t.isAutomatic || false,
          notes: ''
        });
        added++;
      });
    } else {
      if (existTids.has(t.id)) return;
      const billYM = findBillYM(t, ym);
      const { stmtDate, dueDate } = buildDates(t, billYM);
      D.cycles[ym].payments.push({
        id: uid(), templateId: t.id,
        name: t.name, category: t.category, type: t.type || '',
        statementDate: stmtDate, dueDate,
        amountDue: t.isFixed ? t.fixedAmount : null,
        outstandingBalance: null,
        amountPaid: null,
        isPaid: false, paidDate: null,
        paidFrom: t.paymentAccount || null,
        isAutomatic: t.isAutomatic || false,
        notes: ''
      });
      added++;
    }
  });

  // Recurring expense schedules
  const [ymY, ymM] = ym.split('-').map(Number);
  const nextMon = ymM === 12 ? `${ymY + 1}-01` : `${ymY}-${String(ymM + 1).padStart(2, '0')}`;
  const due1st  = `${nextMon}-01`;
  expTotals.forEach(({ sc, count, total }) => {
    if (existEscIds.has(sc.id)) return;
    D.cycles[ym].payments.push({
      id: uid(), expenseScheduleId: sc.id,
      name: sc.name || 'Recurring Expense',
      category: 'Recurring', type: '',
      statementDate: null, dueDate: due1st,
      amountDue: total, outstandingBalance: null,
      amountPaid: null, isPaid: false, paidDate: null,
      paidFrom: null, isAutomatic: false,
      notes: `${count} occurrence${count !== 1 ? 's' : ''} @ ${fmtCurrency(sc.amountPerOccurrence)}`
    });
    added++;
  });



  dirty();
  renderMonthly();
  toast(`Generated ${added} payment(s) for ${ymLabel(ym)}`, 'ok');
}

// ════════════════════════════════════════════════════════════
// ADD PAYMENT MODAL
// ════════════════════════════════════════════════════════════
function addPaymentModal() {
  const catOpts = D.categories.map(c=>`<option>${esc(c)}</option>`).join('');

      <div class="fg"><label class="flbl">Statement Date</label>
        <input class="finput" id="np-stmt" type="date"></div>
      <div class="fg"><label class="flbl">Due Date</label>
        <input class="finput" id="np-due" type="date"></div>
      <div class="fg"><label class="flbl">Card Balance ($)</label>
        <input class="finput" id="np-bal" type="number" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label class="flbl">Paid From</label>

      <div class="fg"><div class="fcheck" style="margin-top:18px">
        <input type="checkbox" id="np-auto"><label for="np-auto" class="flbl">Auto Pay</label>
      </div></div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddPayment()">Add Payment</button>
    </div>
  `);
}

function submitAddPayment() {
  const name = id('np-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const ym = UI.month;
  if (!D.cycles[ym]) D.cycles[ym] = { payments: [] };

  const amt = id('np-amt').value, bal = id('np-bal').value;
  D.cycles[ym].payments.push({
    id: uid(), templateId: null,
    name, category: id('np-cat').value || 'Other', type: '',
    statementDate: id('np-stmt').value || null,
    dueDate: id('np-due').value || null,
    amountDue: amt ? parseFloat(amt) : null,
    outstandingBalance: bal ? parseFloat(bal) : null,
    amountPaid: null,
    isPaid: false, paidDate: null,
    paidFrom: id('np-acct').value || null,
    isAutomatic: id('np-auto').checked,
    notes: ''
  });

  dirty(); closeModal(); renderMonthly();
  toast('Payment added', 'ok');
}

function renderSetup() {
  id('view-setup').innerHTML = `
    <div class="stabs">
      <button class="stab ${UI.setupTab==='templates'?'active':''}" id="stab-templates" onclick="switchSetupTab('templates')">Payment Templates</button>
      <button class="stab ${UI.setupTab==='accounts'?'active':''}" id="stab-accounts" onclick="switchSetupTab('accounts')">Payment Accounts</button>

    </div>
    <div id="setup-content"></div>
  `;
  renderSetupContent();
}

function renderSetupContent() {
  const sc = id('setup-content');
  if (!sc) return;
  if (UI.setupTab === 'templates')  renderTemplates(sc);
  else if (UI.setupTab === 'accounts')  renderAccounts(sc);
  else if (UI.setupTab === 'recurring') renderRecurringExpenses(sc);
  else renderCategories(sc);
}

// ── RECURRING EXPENSES ──
function renderRecurringExpenses(c) {
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const COLORS = ['#D97757','#2E86AB','#3DA35D','#A23B72','#F18F01','#7B5EA7','#44BBA4','#CB4335'];
  const schedules = D.budget.expenseSchedules || [];

  const rows = schedules.length ? schedules.map((sc, idx) => {
    const color = sc.color || COLORS[idx % COLORS.length];
    const dayPills = DOW.map((lbl, d) => {
      const on = (sc.days||[]).includes(d);
      return `<span class="dow-pill${on?' on':''}" onclick="BA._toggleExpDay('${sc.id}',${d})">${lbl}</span>`;
    }).join('');
    return `
      <div class="isc-row" id="exp-row-${sc.id}">
        <div class="isc-color" style="background:${color};width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
        <div class="isc-fields" style="flex-wrap:wrap;gap:10px">
          <input class="isc-inp finput" placeholder="Name (e.g. Music Lessons)"
            value="${esc(sc.name||'')}" style="min-width:160px"
            onchange="BA._updateExpField('${sc.id}','name',this.value)">
          <div style="display:flex;flex-direction:column;gap:3px">
            <span style="font-size:.68rem;color:var(--text3);font-weight:600">Days of week</span>
            <div class="dow-pills">${dayPills}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span style="font-size:.68rem;color:var(--text3);font-weight:600">$ per occurrence</span>
            <input class="isc-inp finput" type="number" min="0" placeholder="0.00"
              value="${sc.amountPerOccurrence||''}" style="width:90px"
              onchange="BA._updateExpField('${sc.id}','amountPerOccurrence',parseFloat(this.value)||0)">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span style="font-size:.68rem;color:var(--text3);font-weight:600">Color</span>
            <input type="color" value="${color}" style="width:36px;height:28px;border:1px solid var(--border);border-radius:4px;padding:1px;cursor:pointer"
              onchange="BA._updateExpField('${sc.id}','color',this.value)">
          </div>
          <label class="isc-toggle" title="Enable/disable">
            <input type="checkbox" ${sc.enabled!==false?'checked':''}
              onchange="BA._updateExpField('${sc.id}','enabled',this.checked)">
            <span class="isc-toggle-slider"></span>
          </label>
          <button class="ibtn del" onclick="BA._deleteExpSchedule('${sc.id}')">🗑</button>
        </div>
      </div>`;
  }).join('') : `<p style="color:var(--text3);font-size:.83rem;text-align:center;padding:16px 0">No recurring expenses yet. Click ＋ Add below.</p>`;

  c.innerHTML = `
    <div style="max-width:800px">
      <p style="color:var(--text3);font-size:.83rem;margin-bottom:14px">
        Define expenses that recur on specific days of the week (e.g. music lessons every Monday &amp; Saturday at $30).
        They'll appear as tiles in the Monthly tab summary.
      </p>
      <div id="exp-schedule-list">${rows}</div>
      <div style="margin-top:12px">
        <button class="btn btn-sm" onclick="BA.addExpScheduleRow()">＋ Add Recurring Expense</button>
      </div>
    </div>`;
}

// ── TEMPLATES ──
function renderTemplates(c) {
  const q = UI.setupSearch.toLowerCase().trim();
  const sf = UI.setupStatusFilter;

  const filtered = D.templates.filter(t => {
    // Status pill filter
    if (sf === 'active'    && !t.isActive) return false;
    if (sf === 'suspended' &&  t.isActive) return false;
    // Text search across name, category, frequency
    if (q) {
      const hay = [t.name, t.category, t.frequency, t.paymentAccount].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const rows = filtered.map(t => {
    const fc = freqClass(t.frequency||'Monthly');
    const dueInfo = t.dueDay ? `Day ${t.dueDay}${t.dueNextMonth?' (next mo.)':''}` : '—';
    const stmtInfo = t.statementDay ? `Day ${t.statementDay}` : '—';
    const amtInfo = t.isFixed ? (fmtCurrency(t.fixedAmount)||'—') : '<span style="color:var(--text3)">Variable</span>';
    return `
    <tr class="${t.isActive?'':'suspended'}" data-tid="${t.id}">
      <td><div class="cell"><span class="truncate">${esc(t.name)}</span></div></td>
      <td><div class="cell">${esc(t.category||'—')}</div></td>
      <td><div class="cell"><span class="fbadge ${fc}">${t.frequency||'Monthly'}</span></div></td>
      <td><div class="cell mono">${amtInfo}</div></td>
      <td><div class="cell">${stmtInfo}</div></td>
      <td><div class="cell">${dueInfo}</div></td>
      <td><div class="cell">${t.isAutomatic?`<span class="abadge">AUTO</span> <span style="font-size:11px;color:var(--text3)">${esc(t.paymentAccount||'')}</span>`:'<span style="color:var(--text3);font-size:11px">Manual</span>'}</div></td>
      <td><div class="cell">${t.isActive?'<span style="color:var(--ok);font-size:11px;font-weight:700">Active</span>':'<span class="sus-badge">Suspended</span>'}</div></td>
      <td><div class="ract">
        <button class="ibtn" title="Edit" onclick="editTplModal('${t.id}')">✏️</button>
        <button class="ibtn sus" title="${t.isActive?'Suspend':'Activate'}" onclick="toggleTplActive('${t.id}')">${t.isActive?'⏸':'▶'}</button>
        <button class="ibtn del" title="Delete" onclick="deleteTpl('${t.id}')">🗑</button>
      </div></td>
    </tr>`;
  }).join('');

  const emptyMsg = D.templates.length === 0
    ? `<tr><td colspan="9"><div class="empty" style="padding:24px"><div class="empty-title">No templates yet</div><div class="empty-sub">Click "+ Add Template" to create one</div></div></td></tr>`
    : `<tr><td colspan="9"><div class="empty" style="padding:20px"><div class="empty-title">No matches</div><div class="empty-sub">Try a different search or filter</div></div></td></tr>`;

  const statusPills = ['all','active','suspended'].map(s =>
    `<button class="sl-btn ${sf===s?'active':''}" onclick="setSetupStatusFilter('${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}${s==='all'?' ('+D.templates.length+')':s==='active'?' ('+D.templates.filter(t=>t.isActive).length+')':' ('+D.templates.filter(t=>!t.isActive).length+')'}</button>`
  ).join('');

  c.innerHTML = `
    <div class="setup-toolbar">
      <span class="stitle">Payment Templates</span>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="editTplModal(null)">&#65291; Add Template</button>
    </div>
    <div class="setup-search-bar">
      <div class="setup-search-wrap">
        <svg class="setup-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        <input id="setup-search" class="setup-search-input" placeholder="Search by name, category, frequency…"
          value="${esc(UI.setupSearch)}"
          oninput="onSetupSearch(this.value)">
        ${UI.setupSearch ? `<button class="setup-search-clear" onclick="onSetupSearch('')" title="Clear">✕</button>` : ''}
      </div>
      <div class="slicer" style="margin:0">${statusPills}</div>
    </div>
    <div class="setup-grid">
      <table>
        <thead><tr>
          <th style="min-width:150px">Name</th>
          <th>Category</th>
          <th>Frequency</th>
          <th>Amount</th>
          <th>Statement Day</th>
          <th>Due Day</th>
          <th>Auto Pay</th>
          <th>Status</th>
          <th style="width:90px">Actions</th>
        </tr></thead>
        <tbody>${rows || emptyMsg}</tbody>
      </table>
    </div>`;

  // Restore focus + cursor position after re-render
  const si = id('setup-search');
  if (si && document.activeElement !== si) {
    const len = si.value.length;
    si.focus();
    si.setSelectionRange(len, len);
  }
}

function editTplModal(tid) {
  const t = tid ? D.templates.find(x=>x.id===tid) : null;
  const ev = v => esc(v||'');
  const catOpts = D.categories.map(c=>`<option ${(t?.category||'')==c?'selected':''}>${ev(c)}</option>`).join('');
  const acctOpts = D.accounts.map(a=>`<option ${(t?.paymentAccount||'')==a?'selected':''}>${ev(a)}</option>`).join('');
  const freqs = ['Monthly','Bi-Weekly','Quarterly','Semi-Annual','Annual'];
  const fOpts = freqs.map(f=>`<option ${(t?.frequency||'Monthly')===f?'selected':''}>${f}</option>`).join('');
  const isFixed = t?.isFixed||false;
  const isFixed_s = isFixed ? '' : 'display:none';

  showModal(`
    <div class="modal-title">${t?'Edit':'Add'} Payment Template</div>
    <div class="form-grid">
      <div class="fg full"><label class="flbl">Name *</label>
        <input class="finput" id="t-name" value="${ev(t?.name)}" placeholder="e.g. Electric Bill, Visa Card"></div>
      <div class="fg"><label class="flbl">Category</label>
        <select class="finput" id="t-cat"><option value="">— Select —</option>${catOpts}</select></div>
      <div class="fg"><label class="flbl">Type (optional label)</label>
        <input class="finput" id="t-type" value="${ev(t?.type)}" placeholder="e.g. Utility, Credit Card"></div>
      <div class="fg"><label class="flbl">Frequency</label>
        <select class="finput" id="t-freq">${fOpts}</select></div>
      <div class="fg"><label class="flbl">Anchor Month (first occurrence / first payment)</label>
        <input class="finput" id="t-anchor" type="month" value="${ev(t?.anchorMonth||UI.month)}"></div>
      <div class="fg"><label class="flbl">Statement Day of Month (1–31)</label>
        <input class="finput" id="t-sday" type="number" min="1" max="31" value="${ev(t?.statementDay)}" placeholder="e.g. 15"></div>
      <div class="fg"><label class="flbl">Due Day of Month (1–31) <span style="font-weight:400;color:var(--text3)">[Bi-Weekly: first payment day]</span></label>
        <input class="finput" id="t-dday" type="number" min="1" max="31" value="${ev(t?.dueDay)}" placeholder="e.g. 1"></div>
      <div class="fg"><div class="fcheck" style="margin-top:22px">
        <input type="checkbox" id="t-dnext" ${t?.dueNextMonth?'checked':''}>
        <label for="t-dnext" class="flbl">Due day is in NEXT month</label>
      </div></div>
      <div class="fg"><div class="fcheck">
        <input type="checkbox" id="t-fixed" ${isFixed?'checked':''} onchange="toggleFixedField(this)">
        <label for="t-fixed" class="flbl">Fixed Amount</label>
      </div></div>
      <div class="fg" id="t-fixedgrp" style="${isFixed_s}">
        <label class="flbl">Fixed Amount ($)</label>
        <input class="finput" id="t-fixedamt" type="number" step="0.01" value="${t?.fixedAmount!=null?t.fixedAmount:''}">
      </div>
      <div class="fg"><div class="fcheck">
        <input type="checkbox" id="t-auto" ${t?.isAutomatic?'checked':''} onchange="toggleAutoField(this)">
        <label for="t-auto" class="flbl">Automatic Payment</label>
      </div></div>
      <div class="fg" id="t-autogrp" style="${t?.isAutomatic?'':'display:none'}">
        <label class="flbl">Auto Pay Account</label>
        <select class="finput" id="t-acct"><option value="">— Select —</option>${acctOpts}</select>
      </div>
      <div class="fg full" style="margin-top:4px;padding-top:10px;border-top:1px dashed var(--border)">
        <label class="flbl">Linked CC Tracker Card <span style="font-size:.7rem;font-weight:400;color:var(--text3)">— links statement balance to CC Tracker auto-sync</span></label>
        <select class="finput" id="t-cccard">
          <option value="">— None —</option>
          ${(D.ccTracker?.cards||[]).map(c=>`<option value="${c.id}" ${(t?.ccCardId||'')=== c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitTpl('${tid||''}')">
        ${t?'Update':'Add'} Template
      </button>
    </div>
  `);
}

function toggleFixedField(cb) {
  const g = id('t-fixedgrp');
  if (g) g.style.display = cb.checked ? '' : 'none';
}
function toggleAutoField(cb) {
  const g = id('t-autogrp');
  if (g) g.style.display = cb.checked ? '' : 'none';
}

function submitTpl(existId) {
  const name = id('t-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const isFixed = id('t-fixed').checked;
  const isAuto  = id('t-auto').checked;
  const fixAmt  = id('t-fixedamt')?.value;

  const tpl = {
    id: existId || uid(),
    name,
    category: id('t-cat').value || 'Other',
    type: id('t-type').value.trim(),
    frequency: id('t-freq').value,
    anchorMonth: id('t-anchor').value || UI.month,
    statementDay: id('t-sday').value || null,
    dueDay: id('t-dday').value || null,
    dueNextMonth: id('t-dnext').checked,
    isFixed,
    fixedAmount: isFixed && fixAmt ? parseFloat(fixAmt) : null,
    isAutomatic: isAuto,
    paymentAccount: isAuto ? (id('t-acct')?.value || null) : null,
    ccCardId: id('t-cccard')?.value || null,
    isActive: existId ? (D.templates.find(t=>t.id===existId)?.isActive ?? true) : true
  };

  if (existId) {
    const i = D.templates.findIndex(t=>t.id===existId);
    if (i>=0) D.templates[i] = tpl; else D.templates.push(tpl);
  } else {
    D.templates.push(tpl);
  }

  dirty(); closeModal(); renderSetupContent();
  toast(existId ? 'Template updated' : 'Template added', 'ok');
}

function onSetupSearch(val) {
  UI.setupSearch = val;
  renderSetupContent();
}

function setSetupStatusFilter(val) {
  UI.setupStatusFilter = val;
  renderSetupContent();
}

function toggleTplActive(tid) {
  const t = D.templates.find(x=>x.id===tid);
  if (!t) return;
  t.isActive = !t.isActive;
  dirty(); renderSetupContent();
  toast(t.isActive ? 'Template activated' : 'Template suspended');
}

function deleteTpl(tid) {
  if (!confirm('Delete this template? This won\'t affect already-generated payments.')) return;
  D.templates = D.templates.filter(t=>t.id!==tid);
  dirty(); renderSetupContent();
  toast('Template deleted');
}

function removeAccount(name) {

  D.accounts = D.accounts.filter(a=>a!==name);
  dirty(); renderSetupContent(); toast('Account removed');
}

// ════════════════════════════════════════════════════════════
// FAMILY ACCOUNTS
// ════════════════════════════════════════════════════════════
function famPersons() { return (D.familyAccounts || {}).persons || []; }
function famLedger(pid) { return ((D.familyAccounts || {}).ledgers || {})[pid] || []; }

function famBalance(pid) {
  return famLedger(pid).reduce((s, t) => s + (+t.cr||0) - (+t.dr||0), 0);
}

function renderFamily() {
  const c = id('view-family');
  if (!D.familyAccounts) { c.innerHTML = '<p style="padding:20px;color:var(--text3)">No family data</p>'; return; }
  const persons = famPersons();
  if (!UI.familyPerson && persons.length) UI.familyPerson = persons[0].id;

  const summaryCards = persons.map(p => {
    const bal = famBalance(p.id);
    // positive = you owe them (owed/red); negative = they owe you (owe/green)
    const cls = bal > 0.005 ? 'owed' : bal < -0.005 ? 'owe' : '';
    const active = UI.familyPerson === p.id ? ' active-person' : '';
    const label = bal > 0.005 ? 'You Owe' : bal < -0.005 ? 'Owes You' : 'Settled';
    return `<div class="fam-sum-card${active}" onclick="selectFamPerson('${p.id}')">
      <div class="fam-sum-lbl">${esc(p.name)}</div>
      <div class="fam-sum-val ${cls}">${fmtCurrency(Math.abs(bal)) || '$0.00'}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${label}</div>
    </div>`;
  }).join('');

  const ledgerHTML = UI.familyPerson ? buildFamLedger(UI.familyPerson) : '';

  c.innerHTML = `
    <div class="tab-sticky-top">
      <div class="fam-header" style="margin-bottom:0">
        <span class="fam-title">Family Accounts</span>
        <button class="btn btn-primary btn-sm" onclick="addFamPersonModal()">&#65291; Person</button>
      </div>
      <div class="fam-summary" style="padding-top:8px;margin-bottom:0">${summaryCards}</div>
    </div>
    ${ledgerHTML}`;
}

function selectFamPerson(pid) {
  UI.familyPerson = pid;
  UI.famPage = 0;
  renderFamily();
}

function buildFamLedger(pid) {
  const persons = famPersons();
  const person = persons.find(p => p.id === pid);
  if (!person) return '';
  const txns = famLedger(pid);
  const bal = famBalance(pid);
  // positive = you owe them (owed/red); negative = they owe you (owe/green)
  const balCls = bal > 0.005 ? 'owed' : bal < -0.005 ? 'owe' : 'zero';
  const balLabel = bal > 0.005 ? `You owe ${esc(person.name)} ${fmtCurrency(bal)}` :
                   bal < -0.005 ? `${esc(person.name)} owes you ${fmtCurrency(Math.abs(bal))}` :
                   'Settled up';

  // Running balance for all txns in chronological order (for correct per-row balance)
  const runBals = [];
  let rb = 0;
  txns.forEach(t => { rb += (+t.cr||0) - (+t.dr||0); runBals.push(rb); });

  // Display newest first: reverse the array for presentation only
  const total = txns.length;
  const displayTxns = txns.slice().reverse(); // newest first, storage unchanged

  // Pagination over the reversed display array
  const pageSize = UI.famPageSize || 25;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const page = Math.min(UI.famPage || 0, totalPages - 1);
  const startIdx = page * pageSize;
  const endIdx = Math.min(startIdx + pageSize, total);
  const pageTxns = displayTxns.slice(startIdx, endIdx);

  const rows = pageTxns.map((t, i) => {
    // Map display position back to chronological index for the correct running balance
    const chronoIdx = total - 1 - (startIdx + i);
    const rowBal = runBals[chronoIdx];
    // positive = you owe them (red); negative = they owe you (green)
    const bCls = rowBal > 0.005 ? 'bal-neg' : rowBal < -0.005 ? 'bal-pos' : 'bal-zero';
    const drFmt = t.dr ? `<span class="dr-cell">${fmtCurrency(t.dr)}</span>` : `<span style="color:var(--text3)">—</span>`;
    const crFmt = t.cr ? `<span class="cr-cell">${fmtCurrency(t.cr)}</span>` : `<span style="color:var(--text3)">—</span>`;
    const txnLinkBtn = t.sourceTxnId ? `
      <button class="ibtn" title="View linked transaction" onclick="BA.txnNavToLinked('${t.sourceTxnId}','${t.sourceAcctId||''}')" style="color:#7c3aed">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1.002 1.002 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4.018 4.018 0 0 1-.128-1.287z"/><path d="M6.586 4.672A3 3 0 0 0 7.414 9.5l.775-.776a2 2 0 0 1-.896-3.346L9.12 3.55a2 2 0 1 1 2.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 1 0-4.243-4.243L6.586 4.672z"/></svg>
      </button>` : '';
    return `<tr>
      <td><div class="fcell rnum">${total - (startIdx + i)}</div></td>
      <td><div class="fcell">${fmtDateMDY(t.date)}</div></td>
      <td><div class="fcell truncate" title="${esc(t.description)}">${esc(t.description)||'<span style=color:var(--text3)>—</span>'}${t.sourceTxnId ? `<span style="font-size:.62rem;color:#7c3aed;margin-left:5px;opacity:.8" title="Linked from Transactions tab">🔗</span>` : ''}</div></td>
      <td><div class="fcell" style="justify-content:flex-end">${drFmt}</div></td>
      <td><div class="fcell" style="justify-content:flex-end">${crFmt}</div></td>
      <td><div class="fcell" style="justify-content:flex-end"><span class="${bCls}">${fmtCurrency(rowBal)||'$0.00'}</span></div></td>
      <td><div class="fcell truncate" title="${esc(t.notes)}" style="color:var(--text2);font-size:12px">${esc(t.notes)||''}</div></td>
      <td><div class="ract">
        ${txnLinkBtn}
        <button class="ibtn" title="Edit" onclick="editFamTxnModal('${pid}','${t.id}')">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
        </button>
        <button class="ibtn del" title="Delete" onclick="deleteFamTxn('${pid}','${t.id}')">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
        </button>
      </div></td>
    </tr>`;
  }).join('');

  const emptyState = total === 0 ? `
    <tr><td colspan="8"><div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No transactions yet</div>
      <div class="empty-sub">Add the first transaction below</div>
    </div></td></tr>` : '';

  // Page number buttons (show up to 5 around current page)
  let pageNums = '';
  if (totalPages > 1) {
    const lo = Math.max(0, page - 2), hi = Math.min(totalPages - 1, page + 2);
    if (lo > 0) pageNums += `<button class="btn btn-sm" onclick="setFamPage(0)">1</button>`;
    if (lo > 1) pageNums += `<span style="color:var(--text3);padding:0 2px">…</span>`;
    for (let p = lo; p <= hi; p++) {
      const active = p === page ? ' btn-primary' : '';
      pageNums += `<button class="btn btn-sm${active}" onclick="setFamPage(${p})">${p+1}</button>`;
    }
    if (hi < totalPages - 2) pageNums += `<span style="color:var(--text3);padding:0 2px">…</span>`;
    if (hi < totalPages - 1) pageNums += `<button class="btn btn-sm" onclick="setFamPage(${totalPages-1})">${totalPages}</button>`;
  }

  const pager = total > pageSize ? `
    <div class="fam-pager">
      <span class="fam-page-info">Showing ${startIdx+1}–${endIdx} of ${total} transactions</span>
      <button class="btn btn-sm" onclick="setFamPage(${page-1})" ${page===0?'disabled':''}>‹ Prev</button>
      ${pageNums}
      <button class="btn btn-sm" onclick="setFamPage(${page+1})" ${page===totalPages-1?'disabled':''}>Next ›</button>
    </div>` : '';

  return `<div class="fam-ledger-wrap">
    <div class="fam-ledger-hdr">
      <span class="fam-ledger-name">${esc(person.name)}</span>
      <span class="fam-bal-badge ${balCls}">${balLabel}</span>
      <div style="margin-left:auto;display:flex;gap:7px">
        <button class="btn btn-sm" onclick="addFamTxnModal('${pid}')">&#65291; Transaction</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFamPerson('${pid}')">Delete Person</button>
      </div>
    </div>
    <div class="fam-table-wrap">
      <table class="fled">
        <thead><tr>
          <th style="width:28px"></th>
          <th style="min-width:110px">Date</th>
          <th style="min-width:200px">Description</th>
          <th class="num" style="min-width:90px">Dr (−)</th>
          <th class="num" style="min-width:90px">Cr (+)</th>
          <th class="num" style="min-width:100px">Balance</th>
          <th style="min-width:160px">Notes</th>
          <th style="width:44px"></th>
        </tr></thead>
        <tbody>${rows}${emptyState}</tbody>
      </table>
    </div>
    ${pager}
  </div>`;
}

function setFamPage(p) {
  const pageSize = UI.famPageSize || 25;
  const total = famLedger(UI.familyPerson).length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  UI.famPage = Math.max(0, Math.min(p, totalPages - 1));
  renderFamily();
}

// Shared modal for both Add and Edit — pass tid=null for new transaction
function famTxnModal(pid, tid) {
  const isEdit = !!tid;
  const txn = isEdit ? famLedger(pid).find(t => t.id === tid) : null;
  const today = centralToday(); // Central Time
  const person = famPersons().find(p => p.id === pid);
  showModal(`
    <div class="modal-title">${isEdit ? 'Edit' : 'Add'} Transaction${person ? ' — ' + esc(person.name) : ''}</div>
    <div class="form-grid">
      <div class="fg">
        <label class="flbl">Date</label>
        <input id="ft-date" class="finput" type="date" value="${isEdit ? txn.date : today}">
      </div>
      <div class="fg"></div>
      <div class="fg full">
        <label class="flbl">Description</label>
        <input id="ft-desc" class="finput" type="text" placeholder="e.g. Grocery shopping"
          autocomplete="off" value="${isEdit ? esc(txn.description) : ''}">
      </div>
      <div class="fg">
        <label class="flbl">Dr — you paid for them</label>
        <input id="ft-dr" class="finput" type="number" min="0" step="0.01" placeholder="0.00"
          value="${isEdit && txn.dr ? txn.dr : ''}">
      </div>
      <div class="fg">
        <label class="flbl">Cr — they paid you back</label>
        <input id="ft-cr" class="finput" type="number" min="0" step="0.01" placeholder="0.00"
          value="${isEdit && txn.cr ? txn.cr : ''}">
      </div>
      <div class="fg full">
        <label class="flbl">Notes</label>
        <input id="ft-notes" class="finput" type="text" placeholder="Optional notes"
          value="${isEdit ? esc(txn.notes||'') : ''}">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFamTxn('${pid}','${isEdit ? tid : ''}')">
        ${isEdit ? 'Save Changes' : 'Add Transaction'}
      </button>
    </div>`);
  setTimeout(() => { const el = id('ft-desc'); if (el) el.focus(); }, 50);
}

function addFamTxnModal(pid)          { famTxnModal(pid, null); }
function editFamTxnModal(pid, tid)    { famTxnModal(pid, tid);  }

function saveFamTxn(pid, tid) {
  const date  = id('ft-date').value;
  const desc  = id('ft-desc').value.trim();
  const dr    = parseFloat(id('ft-dr').value)    || 0;
  const cr    = parseFloat(id('ft-cr').value)    || 0;
  const notes = id('ft-notes').value.trim();
  if (!date) { toast('Date required', 'err'); return; }
  if (!desc) { toast('Description required', 'err'); return; }
  if (!D.familyAccounts.ledgers[pid]) D.familyAccounts.ledgers[pid] = [];
  if (tid) {
    // Edit existing
    const txn = famLedger(pid).find(t => t.id === tid);
    if (txn) { txn.date = date; txn.description = desc; txn.dr = Math.round(dr*100)/100; txn.cr = Math.round(cr*100)/100; txn.notes = notes; }
  } else {
    // Add new
    D.familyAccounts.ledgers[pid].push({ id: uid(), date, description: desc, dr: Math.round(dr*100)/100, cr: Math.round(cr*100)/100, notes });
  }
  // Keep chronological order in storage
  D.familyAccounts.ledgers[pid].sort((a, b) => a.date.localeCompare(b.date));
  // Go to page 0 (newest) after adding so the new transaction is immediately visible
  if (!tid) UI.famPage = 0;
  dirty(); closeModal(); renderFamily();
  toast(tid ? 'Transaction updated' : 'Transaction added', 'ok');
}

function deleteFamTxn(pid, tid) {
  if (!confirm('Delete this transaction?')) return;
  D.familyAccounts.ledgers[pid] = (D.familyAccounts.ledgers[pid] || []).filter(t => t.id !== tid);
  dirty(); renderFamily();
  toast('Transaction deleted');
}

function addFamPersonModal() {
  showModal(`
    <div class="modal-title">Add Person</div>
    <div class="form-grid">
      <div class="fg full">
        <label class="flbl">Name</label>
        <input id="fp-name" class="finput" type="text" placeholder="e.g. Rajan" autocomplete="off">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFamPerson()">Add Person</button>
    </div>`);
  setTimeout(() => { const el = id('fp-name'); if (el) el.focus(); }, 50);
}

function saveFamPerson() {
  const name = id('fp-name').value.trim();
  if (!name) { toast('Name required', 'err'); return; }
  const persons = famPersons();
  if (persons.find(p => p.name.toLowerCase() === name.toLowerCase())) { toast('Person already exists', 'err'); return; }
  const pid = name.toLowerCase().replace(/\s+/g,'_') + '_' + uid();
  D.familyAccounts.persons.push({ id: pid, name });
  D.familyAccounts.ledgers[pid] = [];
  UI.familyPerson = pid;
  dirty(); closeModal(); renderFamily();
  toast('Person added', 'ok');
}

function deleteFamPerson(pid) {
  const p = famPersons().find(x => x.id === pid);
  if (!p) return;
  const n = famLedger(pid).length;
  if (!confirm(`Delete ${p.name}${n > 0 ? ` and all ${n} transactions` : ''}?`)) return;
  D.familyAccounts.persons = D.familyAccounts.persons.filter(x => x.id !== pid);
  delete D.familyAccounts.ledgers[pid];
  if (UI.familyPerson === pid) {
    const remaining = famPersons();
    UI.familyPerson = remaining.length ? remaining[0].id : null;
  }
  dirty(); renderFamily();
  toast('Person deleted');
}

function switchCCHealthYear(y) {
  UI.ccHealthYear = y;
  if (y === 'all') {
    UI.ccHealthMonth = null; // no sub-month selection in all-time mode
  } else {
    // Reset month to latest available in that year
    const monthsInY = (D.ccTracker.months || []).filter(m => m.startsWith(y)).sort();
    UI.ccHealthMonth = monthsInY[monthsInY.length - 1] || null;
  }
  renderCCTracker();
}
function switchCCHealthMonth(ym) {
  UI.ccHealthMonth = ym;
  renderCCTracker();
}
function switchAprPanelMode(mode) {
  UI.aprPanelMode = mode;
  renderCCTracker();
}

function toggleCCHealth() {
  _ccHealthCollapsed = !_ccHealthCollapsed;
  const body = id('cchealth-body');
  const chev = id('cchealth-chev');
  if (body) body.style.display = _ccHealthCollapsed ? 'none' : 'block';
  if (chev) chev.style.transform = _ccHealthCollapsed ? 'rotate(-90deg)' : '';
}
function toggleCCCharts() {
  _ccChartsCollapsed = !_ccChartsCollapsed;
  const body = id('cccharts-body');
  const chev = id('cccharts-chev');
  if (body) body.style.display = _ccChartsCollapsed ? 'none' : 'block';
  if (chev) chev.style.transform = _ccChartsCollapsed ? 'rotate(-90deg)' : '';
}

function buildCardHealthPanel() {
  const cct = D.ccTracker;
  const months = (cct.months || []).slice().sort();
  const latestMonth = months[months.length - 1] || ymNow();
  const ymFmt = ym => {
    const [y, m] = ym.split('-');
    return new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'short', year:'2-digit'});
  };

  // "All Time" is a special year value — no month sub-selection
  const isAllTime = UI.ccHealthYear === 'all';

  // selMonth drives the utilization panel (always point-in-time)
  let selMonth;
  if (isAllTime) {
    selMonth = latestMonth; // utilization always needs a reference month
  } else {
    if (!UI.ccHealthMonth || !months.includes(UI.ccHealthMonth)) UI.ccHealthMonth = latestMonth;
    selMonth = UI.ccHealthMonth;
  }

  // Build enriched card data
  const cardData = cct.cards.map(card => {
    const entry = (cct.data[card.id] || {})[selMonth];
    const outstanding = entry ? (entry.outstanding || 0) : 0;
    const limit   = parseFloat(card.limit)  || 0;
    const apr     = parseFloat(card.apr)    || 0;
    const utilPct = limit > 0 ? Math.min(100, (outstanding / limit) * 100) : null;
    const toTarget = limit > 0 ? Math.max(0, outstanding - limit * 0.30) : 0;
    // Use ACTUAL interest the user entered in the CC grid (not computed from APR)
    const monthlyInterest = entry ? (entry.interest || 0) : 0;
    // Cumulative = sum of actual interest entered across ALL months
    const cumulativeInterest = months.reduce((sum, ym) => {
      const e = (cct.data[card.id] || {})[ym];
      return sum + (e ? (e.interest || 0) : 0);
    }, 0);
    // periodInterest = what the interest chart plots: all-time cumulative OR selected month only
    const periodInterest = isAllTime ? cumulativeInterest : monthlyInterest;
    return { ...card, outstanding, limit, apr, utilPct, toTarget, monthlyInterest, cumulativeInterest, periodInterest };
  });

  // ── Summary strip ────────────────────────────────────────
  const totalLimit = cardData.reduce((s, c) => s + c.limit, 0);
  const totalOS    = cardData.reduce((s, c) => s + c.outstanding, 0);
  const totalUtil  = totalLimit > 0 ? (totalOS / totalLimit * 100) : 0;
  const available  = totalLimit - totalOS;
  const totalUtilColor = totalUtil < 30 ? '#2E7D32' : totalUtil < 75 ? '#E65100' : '#C62828';
  const summaryHtml = totalLimit > 0 ? `
    <div class="cc-health-summary">
      <span>Total Limit: <strong>${fmtCurrency(totalLimit)}</strong></span>
      <span>Outstanding: <strong style="color:var(--info)">${fmtCurrency(totalOS)}</strong></span>
      <span>Overall Utilization: <strong style="color:${totalUtilColor}">${totalUtil.toFixed(1)}%</strong></span>
      <span>Available Credit: <strong style="color:#2E7D32">${fmtCurrency(available)}</strong></span>
    </div>` : '';

  // ── Utilization panel — all cards, no-limit cards at bottom ─
  const kFmt = v => v >= 1000 ? `$${(v/1000).toFixed(0)}k` : `$${Math.round(v)}`;
  const cardsHaveLimit = cardData.filter(c => c.limit > 0).sort((a, b) => (b.utilPct||0) - (a.utilPct||0));
  const cardsNoLimit   = cardData.filter(c => !c.limit || c.limit <= 0);
  const atTarget = cardsHaveLimit.filter(c => (c.utilPct||0) < 30).length;
  const highRisk = cardsHaveLimit.filter(c => (c.utilPct||0) >= 75).length;

  // Helper: card name with INACTIVE badge + sync-mapping warning
  const ccSyncWarning = card => {
    const missingAcct = !card.linkedTxnAccountId;
    const missingCat  = !card.interestCategoryId;
    const missingTpl  = !(D.templates||[]).some(t => t.ccCardId === card.id);
    if (!missingAcct && !missingCat && !missingTpl) return '';
    const tips = [];
    if (missingAcct) tips.push('Transactions Account not set');
    if (missingCat)  tips.push('Interest Category not set');
    if (missingTpl)  tips.push('No Payment Template linked');
    return ` <span style="font-size:9px;font-weight:700;color:var(--warn);background:var(--warn-bg);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent);padding:1px 5px;border-radius:3px;vertical-align:middle;cursor:pointer" onclick="editCCCardModal('${card.id}')" title="⚠ Incomplete sync setup:\n• ${tips.join('\n• ')}">⚠ Sync</span>`;
  };
  const cardNameHtml = card => {
    const badge = card.active === false
      ? ` <span style="font-size:9px;font-weight:700;color:var(--text3);background:var(--border);padding:1px 4px;border-radius:3px;vertical-align:middle;letter-spacing:.3px">INACTIVE</span>`
      : '';
    const editBtn = `<button onclick="editCCCardModal('${card.id}')" title="Edit card settings" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:.7rem;padding:0 0 0 3px;vertical-align:middle;opacity:.6" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6">✎</button>`;
    return `${esc(card.name)}${badge}${ccSyncWarning(card)}${editBtn}`;
  };
  const inactiveOpacity = card => card.active === false ? ' style="opacity:.6"' : '';

  const utilRows = [
    ...cardsHaveLimit.map(card => {
      const pct = card.utilPct;
      const color = pct < 30 ? '#3DA35D' : pct < 75 ? '#E67E22' : '#C0392B';
      const sublabel = pct < 30
        ? `${kFmt(card.outstanding)} of ${kFmt(card.limit)} &nbsp;&#183;&nbsp; <span style="color:#3DA35D">&#10003; At target</span>`
        : `${kFmt(card.outstanding)} of ${kFmt(card.limit)} &nbsp;&#183;&nbsp; pay down ${kFmt(card.toTarget)} to reach 30%`;
      return `
        <div class="ch-util-row"${inactiveOpacity(card)}>
          <div class="ch-card-name" title="${esc(card.name)}">${cardNameHtml(card)}</div>
          <div class="ch-bar-col">
            <div class="ch-bar-area">
              <div class="ch-bar-track">
                <div class="ch-bar-fill" style="width:${Math.min(100,pct).toFixed(1)}%;background:${color}"></div>
              </div>
              <div class="ch-bar-target" title="30% target"></div>
            </div>
            <div class="ch-bar-sublabel">${sublabel}</div>
          </div>
          <div class="ch-pct" style="color:${color}">${pct.toFixed(0)}%</div>
          <button class="ch-edit-btn" title="Edit card" onclick="editCCCardModal('${esc(card.id)}')">&#9998;</button>
        </div>`;
    }),
    ...cardsNoLimit.map(card => `
        <div class="ch-util-row" style="opacity:${card.active === false ? '.45' : '.55'}">
          <div class="ch-card-name" title="${esc(card.name)}">${cardNameHtml(card)}</div>
          <div class="ch-bar-col">
            <div class="ch-bar-area">
              <div class="ch-bar-track" style="background:transparent;border:1.5px dashed var(--border)"></div>
            </div>
            <div class="ch-bar-sublabel">No credit limit set &mdash; click &#9998; to add</div>
          </div>
          <div class="ch-pct" style="color:var(--text3)">—</div>
          <button class="ch-edit-btn" title="Edit card" onclick="editCCCardModal('${esc(card.id)}')">&#9998;</button>
        </div>`)
  ].join('');

  const utilPanel = `
    <div class="ch-panel">
      <div class="ch-panel-hdr">
        <span class="ch-panel-title">&#128202; Credit Utilization &mdash; ${ymFmt(selMonth)}</span>
        <span class="ch-panel-sub">${atTarget} at target &nbsp;&#8226;&nbsp; ${highRisk} high risk</span>
      </div>
      <div class="ch-panel-legend">
        <span class="ch-leg-item"><span class="ch-leg-dot" style="background:#3DA35D"></span>Below 30% ✓</span>
        <span class="ch-leg-item"><span class="ch-leg-dot" style="background:#E67E22"></span>30–75%</span>
        <span class="ch-leg-item"><span class="ch-leg-dot" style="background:#C0392B"></span>Above 75%</span>
        <span class="ch-leg-item"><span style="display:inline-block;width:2px;height:10px;background:rgba(40,40,40,.55);margin-right:4px;vertical-align:middle;border-radius:1px"></span>30% Target line</span>
      </div>
      <div class="ch-util-list">${utilRows}</div>
    </div>`;

  // ── APR / Actual Interest panel — toggle between modes ────
  const aprMode = UI.aprPanelMode || 'apr';
  const cardsHaveAPR = [...cardData].filter(c => c.apr > 0);
  const cardsNoAPR   = [...cardData].filter(c => !c.apr || c.apr <= 0);

  // Interest mode: costliest → cheapest (top to bottom); APR mode: cheapest → costliest
  const sortedAPRCards = aprMode === 'interest'
    ? [...cardsHaveAPR].sort((a, b) => b.periodInterest - a.periodInterest)
    : [...cardsHaveAPR].sort((a, b) => a.apr - b.apr);

  const maxAPR           = sortedAPRCards.length > 0 ? Math.max(...sortedAPRCards.map(c => c.apr)) : 35;
  const maxPeriodInt     = sortedAPRCards.length > 0 ? Math.max(1, ...sortedAPRCards.map(c => c.periodInterest)) : 1;
  const totalMonthlyCost = cardData.reduce((s, c) => s + c.monthlyInterest, 0);
  const totalPeriodInt   = cardData.reduce((s, c) => s + c.periodInterest, 0);
  const dolFmt = v => v >= 1000 ? `$${(v/1000).toFixed(1)}k` : `$${Math.round(v)}`;

  const aprRows = [
    ...sortedAPRCards.map((card, i) => {
      const n = sortedAPRCards.length;
      // Interest mode: i=0 is costliest (red), i=n-1 is cheapest (green) → t inverted
      // APR mode: i=0 is cheapest (green), i=n-1 is costliest (red) → t normal
      const t = n > 1
        ? (aprMode === 'interest' ? 1 - i/(n-1) : i/(n-1))
        : (aprMode === 'interest' ? 1 : 0);
      const r = Math.round(61  + (192 - 61)  * t);
      const g = Math.round(163 + (57  - 163) * t);
      const b = Math.round(93  + (43  - 93)  * t);
      const color = `rgb(${r},${g},${b})`;
      // rank labels flip with sort order
      const rankLabel = aprMode === 'interest'
        ? (i === 0 ? 'Costliest' : i === n-1 ? 'Cheapest' : `#${i+1} of ${n}`)
        : (i === 0 ? 'Cheapest' : i === n-1 ? 'Costliest' : `#${i+1} of ${n}`);

      let barPct, rightLabel, sublabel;
      if (aprMode === 'interest') {
        barPct = (card.periodInterest / maxPeriodInt) * 100;
        rightLabel = dolFmt(card.periodInterest);
        // sublabel: when all-time, show latest month's actual interest as context; when specific month, show APR
        const moCtx = isAllTime
          ? (card.monthlyInterest > 0 ? `${ymFmt(selMonth)}: ${fmtCurrency(card.monthlyInterest)}/mo` : `${ymFmt(selMonth)}: $0 interest`)
          : (card.apr > 0 ? `APR ${card.apr.toFixed(2)}%` : '');
        sublabel = `${moCtx} &nbsp;&#183;&nbsp; <span style="color:${color};font-weight:600">${rankLabel}</span>`;
      } else {
        barPct = (card.apr / maxAPR) * 100;
        rightLabel = `${card.apr.toFixed(2)}%`;
        const costNote = card.monthlyInterest > 0
          ? `${fmtCurrency(card.monthlyInterest)}/mo interest charged`
          : card.outstanding > 0 ? '$0 interest charged' : 'No balance';
        sublabel = `${costNote} &nbsp;&#183;&nbsp; <span style="color:${color};font-weight:600">${rankLabel}</span>`;
      }

      return `
        <div class="ch-apr-row"${inactiveOpacity(card)}>
          <div class="ch-card-name" title="${esc(card.name)}">${cardNameHtml(card)}</div>
          <div class="ch-bar-col">
            <div class="ch-bar-area">
              <div class="ch-bar-track" style="background:#EDE5DA">
                <div class="ch-bar-fill" style="width:${barPct.toFixed(1)}%;background:${color}"></div>
              </div>
            </div>
            <div class="ch-bar-sublabel">${sublabel}</div>
          </div>
          <div class="ch-pct" style="color:${color}">${rightLabel}</div>
          <button class="ch-edit-btn" title="Edit card" onclick="editCCCardModal('${esc(card.id)}')">&#9998;</button>
        </div>`;
    }),
    ...cardsNoAPR.map(card => `
        <div class="ch-apr-row" style="opacity:${card.active === false ? '.45' : '.55'}">
          <div class="ch-card-name" title="${esc(card.name)}">${cardNameHtml(card)}</div>
          <div class="ch-bar-col">
            <div class="ch-bar-area">
              <div class="ch-bar-track" style="background:transparent;border:1.5px dashed var(--border)"></div>
            </div>
            <div class="ch-bar-sublabel">No APR set &mdash; click &#9998; to add</div>
          </div>
          <div class="ch-pct" style="color:var(--text3)">—</div>
          <button class="ch-edit-btn" title="Edit card" onclick="editCCCardModal('${esc(card.id)}')">&#9998;</button>
        </div>`)
  ].join('');

  const periodLabel = isAllTime ? 'all months' : ymFmt(selMonth);
  const aprCostNote = aprMode === 'interest'
    ? (totalPeriodInt > 0
        ? `Interest charged: <strong style="color:var(--danger)">${fmtCurrency(totalPeriodInt)}</strong> &mdash; ${periodLabel}`
        : 'No interest recorded for this period')
    : (totalMonthlyCost > 0
        ? `Interest charged in ${ymFmt(selMonth)}: <strong style="color:var(--danger)">${fmtCurrency(totalMonthlyCost)}</strong>`
        : 'Sorted cheapest &#8594; most expensive');

  const aprPanelTitle = aprMode === 'interest'
    ? `&#128184; Actual Interest &mdash; ${isAllTime ? 'All Time' : ymFmt(selMonth)}`
    : '&#128179; APR Landscape &mdash; Cost of Debt';

  const aprModeToggle = `
    <div class="apr-mode-toggle">
      <button class="apt-btn${aprMode==='apr'?' active':''}" onclick="switchAprPanelMode('apr')">APR %</button>
      <button class="apt-btn${aprMode==='interest'?' active':''}" onclick="switchAprPanelMode('interest')">Actual Interest</button>
    </div>`;

  const aprPanel = `
    <div class="ch-panel">
      <div class="ch-panel-hdr">
        <span class="ch-panel-title">${aprPanelTitle}</span>
        <span class="ch-panel-sub">${aprCostNote}</span>
      </div>
      ${aprModeToggle}
      <div class="ch-util-list">${aprRows}</div>
    </div>`;

  // ── Two-tier year + month selector ──────────────────────
  const years = [...new Set(months.map(m => m.split('-')[0]))].sort();
  // Validate / default ccHealthYear (allow 'all' as a valid value)
  if (!UI.ccHealthYear || (UI.ccHealthYear !== 'all' && !years.includes(UI.ccHealthYear))) {
    UI.ccHealthYear = selMonth.split('-')[0];
  }
  const selYear = UI.ccHealthYear;
  // Year pills: "All Time" first, then years newest→oldest
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const yearPills = [
    `<button class="sl-btn${isAllTime?' active':''}" onclick="switchCCHealthYear('all')">All Time</button>`,
    ...years.slice().reverse().map(y =>
      `<button class="sl-btn${(!isAllTime && selYear===y)?' active':''}" onclick="switchCCHealthYear('${y}')">${y}</button>`)
  ].join('');
  // Month row only shown when a specific year is selected
  const monthsInYear = isAllTime ? [] : months.filter(m => m.startsWith(selYear));
  const monthPills = monthsInYear.slice().reverse().map(ym => {
    const mo = parseInt(ym.split('-')[1], 10);
    return `<button class="sl-btn${selMonth===ym?' active':''}" onclick="switchCCHealthMonth('${ym}')">${MN[mo-1]}</button>`;
  }).join('');

  return `
    <div class="cc-health-wrap">
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
        <div class="slicer" style="margin:0">
          <span class="slicer-lbl">Period</span>
          ${yearPills}
        </div>
        ${!isAllTime ? `<div class="slicer" style="margin:0">
          <span class="slicer-lbl">Month</span>
          ${monthPills || '<span style="color:var(--text3);font-size:12px">No data for this year</span>'}
        </div>` : ''}
      </div>
      ${summaryHtml}
      <div class="cc-health-cols">
        ${utilPanel}
        ${aprPanel}
      </div>
    </div>`;
}

function editCCCardModal(cardId) {
  const cct = D.ccTracker;
  const card = cct.cards.find(c => c.id === cardId);
  if (!card) return;
  const isActive = card.active !== false;
  showModal(`
    <div class="modal-title">Edit Card &mdash; ${esc(card.name)}</div>
    <div class="form-grid">
      <div class="fg"><label class="flbl">Card Name</label>
        <input id="ecc-name"  class="finput" type="text"   value="${esc(card.name)}"></div>
      <div class="fg"><label class="flbl">Statement Day (e.g. 15th)</label>
        <input id="ecc-day"   class="finput" type="text"   value="${esc(card.intDay||'')}" placeholder="e.g. 15th"></div>
      <div class="fg"><label class="flbl">Credit Limit ($)</label>
        <input id="ecc-limit" class="finput" type="number" step="100" min="0" value="${card.limit != null ? card.limit : ''}"></div>
      <div class="fg"><label class="flbl">APR (%)</label>
        <input id="ecc-apr"   class="finput" type="number" step="0.01" min="0" max="100" value="${card.apr != null ? card.apr : ''}" placeholder="e.g. 24.99"></div>
      <div class="fg"><label class="flbl">Status</label>
        <select id="ecc-active" class="finput">
          <option value="1"${isActive ? ' selected' : ''}>Active</option>
          <option value="0"${!isActive ? ' selected' : ''}>Inactive</option>
        </select></div>
    </div>
    <div class="mfoot" style="justify-content:space-between">
      <button class="btn" style="color:var(--danger);border-color:var(--danger)" onclick="confirmDeleteCCCard('${esc(cardId)}')">Delete Card</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCCCardEdit('${esc(cardId)}')">Save</button>
      </div>
    </div>`);
  setTimeout(() => id('ecc-name')?.focus(), 50);
}

function saveCCCardEdit(cardId) {
  const cct = D.ccTracker;
  const card = cct.cards.find(c => c.id === cardId);
  if (!card) return;
  const name  = id('ecc-name').value.trim();
  const day   = id('ecc-day').value.trim();
  const limit = parseFloat(id('ecc-limit').value);
  const apr   = parseFloat(id('ecc-apr').value);
  if (name)          card.name   = name;
  if (day !== undefined) card.intDay = day;
  if (!isNaN(limit) && limit >= 0) card.limit = limit;
  if (!isNaN(apr)   && apr   >= 0) card.apr   = apr;
  card.active = id('ecc-active').value === '1';
  dirty(); closeModal(); renderCCTracker();
  toast('Card updated ✓', 'ok');
}

function confirmDeleteCCCard(cardId) {
  const card = D.ccTracker.cards.find(c => c.id === cardId);
  if (!card) return;
  showModal(`
    <div class="modal-title" style="color:var(--danger)">Delete &ldquo;${esc(card.name)}&rdquo;?</div>
    <p style="margin:0 0 16px;font-size:14px;color:var(--text2)">This permanently removes <strong>${esc(card.name)}</strong> and all its recorded interest &amp; outstanding history across every month. This cannot be undone.</p>
    <div class="mfoot" style="justify-content:space-between">
      <button class="btn" onclick="editCCCardModal('${esc(cardId)}')">&#8592; Back</button>
      <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="deleteCCCard('${esc(cardId)}')">Yes, Delete Card</button>
    </div>`);
}

function deleteCCCard(cardId) {
  const cct = D.ccTracker;
  const card = cct.cards.find(c => c.id === cardId);
  if (!card) return;
  const name = card.name;
  cct.cards = cct.cards.filter(c => c.id !== cardId);
  delete cct.data[cardId];
  dirty(); closeModal(); renderCCTracker();
  toast(`"${name}" deleted`, 'ok');
}
