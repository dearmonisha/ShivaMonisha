    instEl.placeholder = `$${(total/count).toFixed(2)} (auto)`;
  }
}

function oblSaveSplit(editId) {
  const name  = id('ospl-name').value.trim();
  const total = parseFloat(id('ospl-total').value);
  const count = parseInt(id('ospl-count').value);
  const start = id('ospl-start').value;
  const day   = parseInt(id('ospl-day').value);
  if (!name)                { toast('Name is required','err'); return; }
  if (isNaN(total))         { toast('Enter a valid total amount','err'); return; }
  if (isNaN(count)||count<1){ toast('Enter number of installments','err'); return; }
  if (!start)               { toast('Start date is required','err'); return; }
  if (isNaN(day)||day<1)    { toast('Enter a valid due day','err'); return; }
  const instAmt = parseFloat(id('ospl-inst').value) || +(total/count).toFixed(2);
  const paid    = Math.min(parseInt(id('ospl-paid').value)||0, count);
  const obj = {
    id: editId || uid(), name,
    category: id('ospl-cat').value,
    totalAmount: total, installmentAmount: instAmt,
    totalInstallments: count, installmentsPaid: paid,
    startDate: start, dueDateEachMonth: day,
    paymentMethod: id('ospl-pay').value.trim(),
    assignedTo: id('ospl-assign').value.trim(),
    expenseTypeId: id('ospl-exptype')?.value || null,
    notes: id('ospl-notes').value.trim(),
    status: paid >= count ? 'Completed' : 'Active',
  };
  if (editId) {
    const idx = D.obligations.splits.findIndex(x => x.id === editId);
    if (idx >= 0) D.obligations.splits[idx] = { ...D.obligations.splits[idx], ...obj };
  } else {
    D.obligations.splits.push(obj);
  }
  dirty(); closeModal(); renderOblSplits();
  toast(`Split payment ${editId?'updated':'added'} ✓`, 'ok');
}

function oblEditSplit(id_) { oblAddSplitModal(id_); }

function oblMarkSplitPaid(id_) {
  const sp = D.obligations.splits.find(x => x.id === id_);
  if (!sp) return;
  sp.installmentsPaid = Math.min((sp.installmentsPaid||0) + 1, sp.totalInstallments);
  if (sp.installmentsPaid >= sp.totalInstallments) sp.status = 'Completed';
  dirty(); renderOblSplits();
  toast(`Installment marked paid (${sp.installmentsPaid}/${sp.totalInstallments})`, 'ok');
}

function oblDeleteSplit(id_) {
  if (!confirm('Delete this split payment?')) return;
  D.obligations.splits = D.obligations.splits.filter(x => x.id !== id_);
  dirty(); renderOblSplits();
  toast('Split payment deleted', 'ok');
}

// ── Obligations Calendar ──────────────────────────────────────
function renderOblCalendar() {
  const pane = id('obl-pane-calendar');
  if (!UI.oblCalMonth) UI.oblCalMonth = ymNow();
  const [y, m] = UI.oblCalMonth.split('-').map(Number);
  const label  = new Date(y, m-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstDow    = new Date(y, m-1, 1).getDay();

  // Build events map: day → [{type, name, amount}]
  const events = {};
  const addEv = (day, type, name, amount) => {
    if (!events[day]) events[day] = [];
    events[day].push({type, name, amount});
  };

  // Subscriptions renewing this month
  (D.obligations.subscriptions||[]).filter(s=>s.status==='Active').forEach(sub => {
    const renewal = oblNextRenewal(sub.startDate, sub.billingCycle);
    if (renewal.startsWith(UI.oblCalMonth)) {
      const day = parseInt(renewal.split('-')[2]);
      addEv(day, 'sub', sub.name, sub.cost);
    }
  });

  // Loans due this month
  (D.obligations.emis||[]).filter(e=>e.status==='Active').forEach(emi => {
    if (oblEmiDueInMonth(emi, UI.oblCalMonth)) {
      const day = Math.min(+emi.dueDateEachMonth||1, daysInMonth);
      addEv(day, 'emi', emi.itemName||emi.name, emi.emiAmount);
    }
  });

  // Splits due this month
  (D.obligations.splits||[]).filter(s=>s.status==='Active').forEach(sp => {
    if (oblSplitDueInMonth(sp, UI.oblCalMonth)) {
      const day = Math.min(+sp.dueDateEachMonth||1, daysInMonth);
      addEv(day, 'split', sp.name, sp.installmentAmount);
    }
  });

  const today = new Date(); today.setHours(0,0,0,0);
  const todayDay = today.getFullYear()===y && today.getMonth()===m-1 ? today.getDate() : -1;

  let cells = '';
  for (let i = 0; i < firstDow; i++) cells += `<div class="obl-cal-day other-month"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === todayDay;
    const dayEvents = events[d] || [];
    const shown = dayEvents.slice(0, 3);
    const more  = dayEvents.length - shown.length;
    cells += `<div class="obl-cal-day${isToday?' today':''}">
      <div class="obl-cal-dn">${d}</div>
      ${shown.map(ev=>`<div class="obl-cal-ev ${ev.type}" title="${esc(ev.name)} — ${fmtCurrency(ev.amount)}">${esc(ev.name)}</div>`).join('')}
      ${more > 0 ? `<div style="font-size:.65rem;color:var(--text3)">+${more} more</div>` : ''}
    </div>`;
  }

  const totalDue = Object.values(events).flat().reduce((s,e)=>s+(+e.amount||0),0);

  pane.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button class="arrow-btn" onclick="BA.oblCalPrev()">&#8249;</button>
      <div class="mdisp" style="min-width:160px;text-align:center">${label}</div>
      <button class="arrow-btn" onclick="BA.oblCalNext()">&#8250;</button>
      <span style="margin-left:10px;font-size:.8rem;color:var(--text2)">Total due this month: <strong>${fmtCurrency(totalDue)}</strong></span>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;font-size:.75rem">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#EDE9FE;margin-right:4px;vertical-align:middle"></span>Subscription</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#CCFBF1;margin-right:4px;vertical-align:middle"></span>Loan</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#E0E7FF;margin-right:4px;vertical-align:middle"></span>Split Payment</span>
    </div>
    <div class="obl-cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="obl-cal-hdr">${d}</div>`).join('')}
      ${cells}
    </div>`;
}

// ── Obligations Analytics ─────────────────────────────────────
function renderOblAnalytics() {
  const pane   = id('obl-pane-analytics');
  const subs   = (D.obligations.subscriptions||[]).filter(s=>s.status==='Active');
  const emis   = (D.obligations.emis||[]).filter(e=>e.status==='Active').map(oblEnrichEmi);
  const splits = (D.obligations.splits||[]).filter(s=>s.status==='Active');

  const subMonthly   = subs.reduce((s,sub)=>s+oblToMonthly(+sub.cost,sub.billingCycle),0);
  const emiMonthly   = emis.reduce((s,e)=>s+(+e.emiAmount||0),0);
  const splitMonthly = splits.reduce((s,sp)=>s+(+sp.installmentAmount||0),0);
  const totalMonthly = subMonthly + emiMonthly + splitMonthly;
  const totalAnnual  = totalMonthly * 12;
  const totalDebt    = emis.reduce((s,e)=>s+e.remainingBalance,0)
                     + splits.reduce((s,sp)=>s+((sp.totalInstallments-(sp.installmentsPaid||0))*(+sp.installmentAmount||0)),0);

  // Subscription by category donut
  const catTotals = {};
  subs.forEach(s => {
    const cat = s.category || 'Other';
    catTotals[cat] = (catTotals[cat]||0) + oblToMonthly(+s.cost, s.billingCycle);
  });
  const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const COLORS = ['#7C3AED','#0D9488','#4F46E5','#D97757','#059669','#D97706','#2471A3','#C0392B','#8B5CF6','#F59E0B'];

  const donutR = 70, donutCX = 90, donutCY = 90, donutRI = 42;
  let arcs = '', legends = '', runAngle = -Math.PI/2;
  const totalCat = catEntries.reduce((s,[,v])=>s+v,0) || 1;
  catEntries.forEach(([cat,val],i) => {
    const frac = val/totalCat, angle = frac * 2 * Math.PI;
    const x1=donutCX+donutR*Math.cos(runAngle), y1=donutCY+donutR*Math.sin(runAngle);
    const x2=donutCX+donutR*Math.cos(runAngle+angle), y2=donutCY+donutR*Math.sin(runAngle+angle);
    const xi1=donutCX+donutRI*Math.cos(runAngle), yi1=donutCY+donutRI*Math.sin(runAngle);
    const xi2=donutCX+donutRI*Math.cos(runAngle+angle), yi2=donutCY+donutRI*Math.sin(runAngle+angle);
    const lg = angle>Math.PI?1:0;
    const color = COLORS[i%COLORS.length];
    if (frac > 0.01) arcs += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${donutR},${donutR} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${donutRI},${donutRI} 0 ${lg},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${color}" opacity=".88"/>`;
    legends += `<div style="display:flex;align-items:center;gap:6px;font-size:.75rem;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0;display:inline-block"></span><span style="color:var(--text2)">${esc(cat)}</span><span style="margin-left:auto;font-weight:600">${fmtCurrency(val)}/mo</span></div>`;
    runAngle += angle;
  });
  const donutSvg = catEntries.length
    ? `<svg viewBox="0 0 180 180" style="width:180px;height:180px">
        ${arcs}
        <text x="90" y="86" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">${fmtCurrency(subMonthly)}</text>
        <text x="90" y="100" text-anchor="middle" fill="var(--text3)" font-size="9">/month</text>
       </svg>`
    : `<div class="obl-empty"><div class="obl-empty-icon">📊</div><p>No subscription data</p></div>`;

  // Loan burndown (SVG line chart for next 24 months)
  const burnLines = emis.map((e,i) => {
    const pts = [];
    let bal = e.remainingBalance;
    const r = ((+e.interestRate||0)/100)/12;
    const now = new Date(); now.setHours(0,0,0,0);
    for (let mo=0; mo<=24 && bal>0; mo++) {
      pts.push({mo, bal});
      if (r > 0) bal = Math.max(0, bal - (+e.emiAmount - bal*r));
      else bal = Math.max(0, bal - +e.emiAmount);
    }
    if (pts[pts.length-1].bal > 0) pts.push({mo:pts[pts.length-1].mo+1, bal:0});
    return {e, pts, color:COLORS[i%COLORS.length]};
  });

  const maxBal = Math.max(...burnLines.flatMap(l=>l.pts.map(p=>p.bal)), 1);
  const W=400, H=160, PL=10, PR=10, PT=10, PB=10;
  const toX = mo => PL + (mo/24) * (W-PL-PR);
  const toY = bal => PT + (1-bal/maxBal) * (H-PT-PB);

  const burnPaths = burnLines.map(({pts,color,e}) =>
    `<path d="M${pts.map(p=>`${toX(p.mo).toFixed(1)},${toY(p.bal).toFixed(1)}`).join(' L')}" fill="none" stroke="${color}" stroke-width="2" opacity=".85"/>`
  ).join('');
  const burnLegends = burnLines.map(({e,color}) =>
    `<span style="font-size:.72rem;display:inline-flex;align-items:center;gap:4px;margin-right:10px"><span style="width:12px;height:3px;background:${color};display:inline-block;border-radius:2px"></span>${esc(e.itemName||e.name)}</span>`
  ).join('');

  const burnChart = burnLines.length
    ? `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px">
        <line x1="${PL}" y1="${toY(0).toFixed(1)}" x2="${W-PR}" y2="${toY(0).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
        ${burnPaths}
       </svg>`
    : `<div class="obl-empty" style="padding:20px"><div class="obl-empty-icon">📈</div><p>No active loans to display</p></div>`;

  pane.innerHTML = `
    <div class="sum-row kpi-sticky-obl">
      <div class="sum-card"><div class="sum-lbl">Total Monthly</div><div class="sum-val">${fmtCurrency(totalMonthly)}</div><div class="sum-sub">all obligations combined</div></div>
      <div class="sum-card"><div class="sum-lbl">Annual Obligations</div><div class="sum-val">${fmtCurrency(totalAnnual)}</div><div class="sum-sub">projected yearly</div></div>
      <div class="sum-card c-danger"><div class="sum-lbl">Total Debt</div><div class="sum-val">${fmtCurrency(totalDebt)}</div><div class="sum-sub">loans + splits outstanding</div></div>
      <div class="sum-card c-warn"><div class="sum-lbl">Subscriptions</div><div class="sum-val">${fmtCurrency(subMonthly)}/mo</div><div class="sum-sub">${subs.length} active</div></div>
      <div class="sum-card"><div class="sum-lbl">Loans</div><div class="sum-val">${fmtCurrency(emiMonthly)}/mo</div><div class="sum-sub">${emis.length} active</div></div>
      <div class="sum-card"><div class="sum-lbl">Split Payments</div><div class="sum-val">${fmtCurrency(splitMonthly)}/mo</div><div class="sum-sub">${splits.length} active</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="obl-burndown-wrap">
        <div class="obl-burndown-title">📉 Loan Burndown — Next 24 Months</div>
        ${burnChart}
        <div style="margin-top:6px;flex-wrap:wrap">${burnLegends}</div>
      </div>
      <div class="obl-burndown-wrap">
        <div class="obl-burndown-title">🥧 Subscriptions by Category</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          ${donutSvg}
          <div style="flex:1;min-width:120px">${legends}</div>
        </div>
      </div>
    </div>`;
}

// ── Obligations Import ────────────────────────────────────────
function oblImportFromOldApp() {
  const data = {
    subscriptions: (() => { try { return JSON.parse(localStorage.getItem('subtrack_subscriptions')||'[]'); } catch{return[];} })(),
    emis:          (() => { try { return JSON.parse(localStorage.getItem('subtrack_emis')||'[]'); } catch{return[];} })(),
    splits:        (() => { try { return JSON.parse(localStorage.getItem('subtrack_splits')||'[]'); } catch{return[];} })(),
  };
  const totalFound = data.subscriptions.length + data.emis.length + data.splits.length;
  if (!totalFound) {
    showModal(`
      <div class="modal-title">Import from Subscription App</div>
      <p style="color:var(--text2);margin-bottom:16px">No data found in localStorage from the old app (<code>subtrack_*</code> keys). Make sure you run this import from the same browser where SubTrack was used, or paste JSON below.</p>
      <div class="fg"><label class="flbl">Paste exported JSON (optional)</label><textarea id="obl-import-json" class="finput" rows="5" style="font-size:.72rem;font-family:monospace" placeholder='{"subscriptions":[...],"emis":[...],"splits":[]}'></textarea></div>
      <div class="mfoot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="oblImportJSON()">Import JSON</button></div>`);
    return;
  }
  if (!confirm(`Found ${data.subscriptions.length} subscriptions, ${data.emis.length} loans, ${data.splits.length} splits.\n\nImport all? Existing entries with the same ID won't be duplicated.`)) return;
  oblMergeImportedData(data);
}

function oblImportJSON() {
  try {
    const raw = id('obl-import-json').value.trim();
    const data = JSON.parse(raw);
    oblMergeImportedData(data);
  } catch(e) { toast('Invalid JSON: ' + e.message, 'err'); }
}

function oblMergeImportedData(data) {
  let added = 0;
  const merge = (key, dest) => {
    (data[key]||[]).forEach(item => {
      if (!dest.find(x => x.id === item.id)) { dest.push(item); added++; }
    });
  };
  merge('subscriptions', D.obligations.subscriptions);
  merge('emis',          D.obligations.emis);
  merge('splits',        D.obligations.splits);
  dirty(); closeModal(); renderObligations();
  toast(`Imported ${added} item${added!==1?'s':''} ✓`, 'ok');
}

// MOBILE DASHBOARD
// ════════════════════════════════════════════════════════════
function renderMobileView() {
  const wrap = id('view-mobile');
  if (!wrap) return;

  const month  = UI.budgetMonth || ymNow();
  const [y, m] = month.split('-').map(Number);
  const monthLabel = new Date(y, m - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });

  const groups = D.budget?.groups     || [];
  const cats   = D.budget?.categories || [];

  // ── Budget section ─────────────────────────────────────────
  let budgetHTML = '';
  let hasAnyBudget = false;
  for (const group of groups) {
    const gcats = cats.filter(c => c.groupId === group.id);
    if (!gcats.length) continue;
    hasAnyBudget = true;
    budgetHTML += `<div class="mob-group-hdr">${esc(group.name)}</div>`;
    for (const cat of gcats) {
      const budget = budgetGetAdjustedPlan(cat.id, month);
      const spent  = budgetGetCatActuals(cat.id, month);
      const remain = Math.round((budget - spent) * 100) / 100;
      const pct    = budget > 0 ? Math.min(100, spent / budget * 100) : (spent > 0 ? 100 : 0);
      const isOver = remain < -0.005;
      const isWarn = !isOver && pct >= 80;
      const color  = isOver ? 'var(--danger)' : isWarn ? '#d97706' : 'var(--ok)';
      const borderColor = isOver
        ? 'color-mix(in srgb,var(--danger) 35%,transparent)'
        : isWarn ? 'color-mix(in srgb,#d97706 35%,transparent)'
        : 'var(--border)';
      const remainLabel = isOver
        ? `<span class="mob-cat-remain" style="color:${color}">Over ${fmtC(Math.abs(remain))}</span>`
        : `<span class="mob-cat-remain" style="color:${color}">${fmtC(remain)} left</span>`;
      budgetHTML += `
        <div class="mob-cat-card" style="border-color:${borderColor}">
          <div class="mob-cat-row">
            <span class="mob-cat-name">${esc(cat.name)}</span>
            ${remainLabel}
          </div>
          <div class="mob-cat-sub">${fmtC(spent)} spent of ${fmtC(budget)} planned</div>
          <div class="mob-bar-track">
            <div class="mob-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>`;
    }
  }
  if (!hasAnyBudget) budgetHTML = `<div style="color:var(--text3);padding:20px 0;text-align:center;font-size:.88rem">No budget categories set up yet</div>`;

  // ── Savings Pots section ───────────────────────────────────
  const sp = D.savingsPots || {};
  let potsHTML = '';
  if (sp.growthAccountId && sp.trackedGroupId) {
    const growthAcctId  = sp.growthAccountId;
    const trackedCats   = cats.filter(c => c.groupId === sp.trackedGroupId);
    const trackedCatIds = new Set(trackedCats.map(c => c.id));
    const pots = {};
    trackedCats.forEach(c => { pots[c.id] = { deposited: 0, drawn: 0 }; });
    (D.transactions || []).forEach(t => {
      if (!t.isTransfer || !(t.splits && t.splits.length)) return;
      const isDeposit = t.debit > 0 && t.transferToAcctId === growthAcctId;
      const isDraw    = t.debit > 0 && t.accountId === growthAcctId;
      if (!isDeposit && !isDraw) return;
      t.splits.forEach(s => {
        if (!trackedCatIds.has(s.categoryId)) return;
        const amt = parseFloat(s.amount) || 0;
        if (amt <= 0 || !pots[s.categoryId]) return;
        if (isDeposit) pots[s.categoryId].deposited += amt;
        else           pots[s.categoryId].drawn     += amt;
      });
    });
    const totalBal = trackedCats.reduce((s, c) => {
      const p = pots[c.id] || { deposited:0, drawn:0 };
      return s + p.deposited - p.drawn;
    }, 0);
    const potCards = trackedCats.map(c => {
      const p   = pots[c.id] || { deposited:0, drawn:0 };
      const bal = p.deposited - p.drawn;
      const clr = bal > 0 ? 'var(--ok)' : bal < 0 ? 'var(--danger)' : 'var(--text3)';
      return `
        <div class="mob-pot-card">
          <span class="mob-pot-name">${esc(c.name)}</span>
          <span class="mob-pot-bal" style="color:${clr}">${fmtCurrency(bal)}</span>
        </div>`;
    }).join('');
    potsHTML = `
      <div class="mob-section" style="margin-top:8px">
        <div class="mob-section-title">💰 Savings Pots</div>
        <div class="mob-total-card">
          <span style="font-size:.82rem;font-weight:700;color:var(--text2)">Total</span>
          <span style="font-size:1rem;font-weight:800;color:${totalBal>=0?'var(--ok)':'var(--danger)'}">${fmtCurrency(totalBal)}</span>
        </div>
        ${potCards || '<div style="color:var(--text3);font-size:.85rem;padding:8px 0">No pots found</div>'}
      </div>`;
  }

  wrap.innerHTML = `
    <div class="mob-hdr">
      <button class="arrow-btn" onclick="BA.mobilePrevMonth()">&#8249;</button>
      <div class="mob-month">${monthLabel}</div>
      <button class="arrow-btn" onclick="BA.mobileNextMonth()">&#8250;</button>
    </div>
    <div class="mob-section">
      <div class="mob-section-title">📊 Budget Remaining</div>
      ${budgetHTML}
    </div>
    ${potsHTML}
    <div style="height:32px"></div>
  `;
}

  budgetNextMonth()    { UI.budgetMonth    = bShiftMonth(UI.budgetMonth, 1);    renderBudget(); },

  collapseAllBudgetGroups() {
    (D.budget.groups||[]).forEach(g => {

      document.querySelectorAll(`[data-group-member="${g.id}"]`).forEach(r => { r.style.display='none'; });

    if (chev) chev.textContent = collapsed ? '▶' : '▼';

  manualUpdateActuals() {

  copyBudgetFromPrior() {
    const prior = bShiftMonth(UI.budgetMonth,-1), current = UI.budgetMonth;
    const priorPlans = (D.budget.plans||[]).filter(p => p.month===prior);
    if (!priorPlans.length) { toast('No budget found for prior month','err'); return; }
    let added = 0;
    for (const plan of priorPlans) {
      const exists = (D.budget.plans||[]).some(p => p.month===current && p.categoryId===plan.categoryId);
      if (!exists) { D.budget.plans.push({ id:uid(), month:current, categoryId:plan.categoryId, amount:plan.amount }); added++; }
    }
    dirty(); toast(`Copied ${added} budget line(s) from prior month`,'ok'); renderBudget();
  },

  // ── Inline cell editing ─────────────────────────────────
  startBudgetEdit(spanEl, type, id, month) {
    const isNum  = ['budget','actual','incamount'].includes(type);
    const isDate = type==='incdate';
    const rawVal = spanEl.dataset.val !== undefined ? spanEl.dataset.val : spanEl.textContent.replace(/[$,]/g,'').trim();
    const inp    = document.createElement('input');
    inp.type      = isDate ? 'date' : (isNum ? 'number' : 'text');
    inp.className = 'btable-inline-input' + (isNum||isDate ? '' : ' text-input');
    inp.value     = rawVal;
    if (isNum) { inp.min='0'; inp.step='0.01'; }
    inp.style.width = isDate ? '130px' : (isNum ? '105px' : '135px');
    let committed = false;
    const commit = () => { if (committed) return; committed=true; this.commitBudgetEdit(type, id, month, inp.value.trim()); };
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key==='Enter') { e.preventDefault(); inp.blur(); }
      if (e.key==='Escape') { committed=true; renderBudget(); }
    });
    spanEl.replaceWith(inp);
    inp.focus(); inp.select();
  },
  commitBudgetEdit(type, eid, month, value) {
    const num = parseFloat(value)||0;
    if (type==='budget') {
      const idx = (D.budget.plans||[]).findIndex(p => p.month===month && p.categoryId===eid);
      if (idx>=0) D.budget.plans[idx].amount=num;
      else if (num>0) D.budget.plans.push({ id:uid(), month, categoryId:eid, amount:num });
    } else if (type==='actual') {
      const idx = (D.budget.actualTotals||[]).findIndex(a => a.month===month && a.categoryId===eid);
      if (idx>=0) D.budget.actualTotals[idx].amount=num;
      else if (num>0) D.budget.actualTotals.push({ id:uid(), month, categoryId:eid, amount:num });
    } else if (type==='catname') {
      if (!value) { renderBudget(); return; }
      const idx = (D.budget.categories||[]).findIndex(c => c.id===eid);
      if (idx>=0) D.budget.categories[idx].name=value;
    } else if (type==='groupname') {
      if (!value) { renderBudget(); return; }
      const idx = (D.budget.groups||[]).findIndex(g => g.id===eid);
      if (idx>=0) D.budget.groups[idx].name=value;
    } else if (type==='incsource') {
      if (!value) { renderBudget(); return; }
      const idx = (D.budget.income||[]).findIndex(i => i.id===eid);
      if (idx>=0) D.budget.income[idx].source=value;
    } else if (type==='incamount') {
      const idx = (D.budget.income||[]).findIndex(i => i.id===eid);
      if (idx>=0) D.budget.income[idx].amount=num;
    } else if (type==='incdate') {
      if (!value) { renderBudget(); return; }
      const idx = (D.budget.income||[]).findIndex(i => i.id===eid);
      if (idx>=0) D.budget.income[idx].date=value;
    }
    dirty(); renderBudget();
  },
  // ── Budget Actual Drill-Down: show transactions for a category+month ──
  showActualDrillDown(catId, month) {
    recomputeTxnActuals();
    const cat   = (D.budget.categories||[]).find(c => c.id === catId);
    const catName = cat ? cat.name : catId;
    const [y, m] = month.split('-').map(Number);
    const monthLabel = new Date(y, m-1, 1).toLocaleString('default',{month:'long',year:'numeric'});

    // Gather all approved transactions that contribute to this category's actual
    const txns = (D.transactions||[]).filter(t => {
      if (!t.date || t.date.slice(0,7) !== month) return false;
      if (t.status === 'pending' || t.status === 'rejected') return false;
      if (t.isTransfer) return false;
      // Split transactions: check if any split line matches
      if (t.splits && t.splits.length > 0) {
        return t.splits.some(sp => sp.categoryId === catId);
      }
      return t.categoryId === catId;
    }).sort((a,b) => (a.date||'').localeCompare(b.date||''));

    const acctMap = {};
    (D.txnAccounts||[]).forEach(a => { acctMap[a.id] = a.name; });

    let totalAmt = 0;
    const rows = txns.map(t => {
      let amt = 0;
      let splitNote = '';
      if (t.splits && t.splits.length > 0) {
        // Sum all split lines for this category (a txn could theoretically have two lines for same cat)
        const matchLines = t.splits.filter(sp => sp.categoryId === catId);
        const rawAmt = matchLines.reduce((s, sp) => s + (parseFloat(sp.amount) || 0), 0);
        // Apply same sign logic as recomputeTxnActuals: credit txn → negative
        const sign = (parseFloat(t.credit) || 0) > 0 && !(parseFloat(t.debit) || 0) ? -1 : 1;
        amt = sign * rawAmt;
        splitNote = `<span style="font-size:.7rem;color:var(--text3);margin-left:4px">(split)</span>`;
      } else {
        amt = (parseFloat(t.debit)||0) - (parseFloat(t.credit)||0);
      }
      totalAmt += amt;
      const acctName = acctMap[t.accountId] || '—';
      const notesHtml = t.notes ? `<span style="font-size:.72rem;color:var(--text3);display:block;margin-top:1px">${esc(t.notes)}</span>` : '';
      return `<tr class="drilldown-txn-row" onclick="closeModal();BA.txnNavToView('${t.id}','${t.accountId}')" style="border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .12s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
        <td style="padding:6px 8px;font-size:.78rem;color:var(--text3);white-space:nowrap">${fmtDate(t.date)}</td>
        <td style="padding:6px 8px;font-size:.78rem;max-width:160px;overflow:hidden;text-overflow:ellipsis">
          <span style="color:var(--primary);text-decoration:underline;text-decoration-style:dotted">${esc(t.payee||'(no payee)')}</span>${splitNote}
          ${notesHtml}
        </td>
        <td style="padding:6px 8px;font-size:.75rem;color:var(--text3);white-space:nowrap">${esc(acctName)}</td>
        <td style="padding:6px 8px;font-size:.82rem;font-weight:500;text-align:right;white-space:nowrap;color:${amt<0?'var(--ok)':'var(--text)'}">${amt<0?'−':''}${fmtC(Math.abs(amt))}</td>
      </tr>`;
    }).join('');

    const emptyState = txns.length === 0
      ? `<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--text3)">No transactions found for this category in ${monthLabel}</td></tr>`
      : '';

    showModal(`
      <div class="modal-title" style="display:flex;align-items:center;gap:8px">
        <span>💳 ${esc(catName)}</span>
        <span style="font-size:.78rem;font-weight:400;color:var(--text3)">${monthLabel}</span>
      </div>
      <div style="margin-bottom:10px;font-size:.78rem;color:var(--text3)">${txns.length} transaction${txns.length!==1?'s':''} · Total: <strong style="color:var(--text)">${fmtC(totalAmt)}</strong>${txns.length>0?' · <span style="font-size:.72rem;opacity:.7">click a row to go to the transaction</span>':''}</div>
      <div style="overflow-x:auto;max-height:380px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface2);font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">
              <th style="padding:5px 8px;text-align:left;font-weight:600">Date</th>
              <th style="padding:5px 8px;text-align:left;font-weight:600">Payee</th>
              <th style="padding:5px 8px;text-align:left;font-weight:600">Account</th>
              <th style="padding:5px 8px;text-align:right;font-weight:600">Amount</th>
            </tr>
          </thead>
          <tbody>${rows}${emptyState}</tbody>
        </table>
      </div>
      <div style="margin-top:12px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="closeModal()" style="font-size:.78rem">Close</button>
      </div>
    `);
  },

  _updateScheduleField(scId, field, value) {
    const idx = (D.budget.incomeSchedules||[]).findIndex(s => s.id===scId);

  addIncomeScheduleRow() {
    const COLORS = ['#7C3AED','#0EA5E9','#2E8B57','#C07A0A','#EC4899','#C0392B'];
    const idx = (D.budget.incomeSchedules||[]).length;
    D.budget.incomeSchedules.push({ id:'isc_'+uid(), name:'', amount:0, startDate:'', color:COLORS[idx%COLORS.length], enabled:true });
    dirty(); this._renderIncomeScheduleList();
  },
  async _deleteIncomeSchedule(scId) {
    const ok = await budgetConfirm('Remove Schedule','Remove this pay schedule?');
    if (!ok) return;
    D.budget.incomeSchedules = (D.budget.incomeSchedules||[]).filter(s => s.id!==scId);

  _showPayChangeForm(scId) {
    const el = document.getElementById('pay-change-form-' + scId);
    if (el) { el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
  },
  _savePayChange(scId) {
    const dateEl = document.getElementById('pay-chg-date-' + scId);
    const amtEl  = document.getElementById('pay-chg-amt-'  + scId);
    const date   = dateEl?.value || '';
    const amount = parseFloat(amtEl?.value) || 0;
    if (!date)   { toast('Please enter an effective date','err'); return; }
    if (!amount) { toast('Please enter the new pay amount','err'); return; }
    const sc = (D.budget.incomeSchedules||[]).find(s => s.id===scId);
    if (!sc) return;
    if (!sc.payHistory) sc.payHistory = [];
    // Determine the rate in effect just before this new effective date,
    // so we can store it as prevAmount for correct pre-date fallback.
    const sortedExisting = [...sc.payHistory].sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
    let prevRate = parseFloat(sc.amount) || 0;
    for (let i = sortedExisting.length - 1; i >= 0; i--) {
      if (sortedExisting[i].effectiveDate < date) {
        prevRate = parseFloat(sortedExisting[i].amount) || 0;
        break;
      }
    }
    // Bootstrap: if this is the first pay change and startDate is set,
    // create an initial entry preserving the original rate so that
    // paydates between startDate and this effective date use the old rate.
    if (sc.payHistory.length === 0 && sc.startDate && sc.startDate < date) {
      sc.payHistory.push({ id: uid(), effectiveDate: sc.startDate, amount: prevRate, prevAmount: null });
    }
    // Check for duplicate effective date
    const dup = sc.payHistory.find(h => h.effectiveDate === date);
    if (dup) {
      dup.amount = amount;
      if (dup.prevAmount == null) dup.prevAmount = prevRate;
    } else {
      sc.payHistory.push({ id: uid(), effectiveDate: date, amount, prevAmount: prevRate });
    }
    sc.payHistory.sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
    dirty(); this._renderIncomeScheduleList(); renderBudget();
    toast('Pay change recorded ✓', 'ok');
  },
  _deletePayHistoryEntry(scId, hid) {
    const sc = (D.budget.incomeSchedules||[]).find(s => s.id===scId);
    if (!sc || !sc.payHistory) return;
    sc.payHistory = sc.payHistory.filter(h => h.id !== hid);
    dirty(); this._renderIncomeScheduleList(); renderBudget();
  },

  // ── Budget Reallocation (Cover / Move) ──────────────────────
  budgetReallocModal(catId, month, mode) {
    // mode: 'cover' = catId is overspent, pull from a surplus cat
    //       'move'  = catId has surplus, push to any cat
    const cats      = D.budget.categories || [];
    const thisCat   = cats.find(c => c.id === catId);
    if (!thisCat) return;

    const thisBudget  = budgetGetAdjustedPlan(catId, month);
    const thisSpent   = budgetGetCatActuals(catId, month);
    const thisRemain  = thisBudget - thisSpent;
    const overspend   = Math.max(0, thisSpent - thisBudget);
    const available   = Math.max(0, thisRemain);

    // For cover: show cats with surplus; for move: show all other cats
    const otherCats = cats.filter(c => c.id !== catId);
    const makeOpts  = (filterFn, label) => {
      const eligible = otherCats.filter(filterFn);
      if (!eligible.length) return `<option value="" disabled>— No eligible categories —</option>`;
      return eligible.map(c => {
        const b = budgetGetAdjustedPlan(c.id, month);
        const s = budgetGetCatActuals(c.id, month);
        const r = b - s;
        const over = s > b && b > 0;
        return `<option value="${esc(c.id)}">${esc(c.name)} (${over ? '⚠ over $'+Math.abs(r).toFixed(0) : r>=0 ? '$'+r.toFixed(0)+' avail' : '—'})</option>`;
      }).join('');
    };

    if (mode === 'cover') {
      // Pick source (a category with available budget)
      const srcOpts = makeOpts(c => {
        const b = budgetGetAdjustedPlan(c.id, month);
        const s = budgetGetCatActuals(c.id, month);
        return b > 0 && s < b;
      });
      showModal(`
        <div class="modal-title" style="color:var(--danger)">Cover Overspend — ${esc(thisCat.name)}</div>
        <div style="background:color-mix(in srgb,var(--danger) 8%,transparent);border:1px solid color-mix(in srgb,var(--danger) 25%,transparent);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:.85rem">
          <strong>${esc(thisCat.name)}</strong> is over budget by <strong style="color:var(--danger)">$${overspend.toFixed(2)}</strong>
          (budgeted ${fmtCurrency(thisBudget)}, spent ${fmtCurrency(thisSpent)})
        </div>
        <div class="form-grid">
          <div class="fg" style="grid-column:1/-1">
            <label class="flbl">Pull from category *</label>
            <select id="realloc-from" class="finput">${srcOpts}</select>
            <div id="realloc-from-avail" style="font-size:.74rem;color:var(--ok);margin-top:3px"></div>
          </div>
          <div class="fg">
            <label class="flbl">Amount to cover *</label>
            <input id="realloc-amt" class="finput" type="number" step="0.01" min="0.01" value="${overspend.toFixed(2)}" placeholder="0.00" oninput="BA._reallocCheckAmt()">
          </div>
          <div class="fg">
            <label class="flbl">Note (optional)</label>
            <input id="realloc-note" class="finput" placeholder="e.g. Emergency dinner out">
          </div>
        </div>
        <input type="hidden" id="realloc-to"   value="${catId}">
        <input type="hidden" id="realloc-month" value="${month}">
        <div class="mfoot" style="justify-content:flex-end;gap:8px">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="BA.budgetSaveRealloc()">Cover Overspend</button>
        </div>`);
      // Seed available display
      setTimeout(() => BA._reallocCheckAmt(), 20);
    } else {
      // Move: pick destination
      const dstOpts = makeOpts(() => true);
      showModal(`
        <div class="modal-title" style="color:#0891b2">Move Available Budget — ${esc(thisCat.name)}</div>
        <div style="background:color-mix(in srgb,#0891b2 8%,transparent);border:1px solid color-mix(in srgb,#0891b2 25%,transparent);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:.85rem">
          <strong>${esc(thisCat.name)}</strong> has <strong style="color:#0891b2">$${available.toFixed(2)}</strong> available
          (budgeted ${fmtCurrency(thisBudget)}, spent ${fmtCurrency(thisSpent)})
        </div>
        <div class="form-grid">
          <div class="fg" style="grid-column:1/-1">
            <label class="flbl">Move to category *</label>
            <select id="realloc-to" class="finput">${dstOpts}</select>
          </div>
          <div class="fg">
            <label class="flbl">Amount to move *</label>
            <input id="realloc-amt" class="finput" type="number" step="0.01" min="0.01" max="${available.toFixed(2)}" value="${available.toFixed(2)}" placeholder="0.00">
          </div>
          <div class="fg">
            <label class="flbl">Note (optional)</label>
            <input id="realloc-note" class="finput" placeholder="e.g. Unused grocery budget">
          </div>
        </div>
        <input type="hidden" id="realloc-from" value="${catId}">
        <input type="hidden" id="realloc-month" value="${month}">
        <div class="mfoot" style="justify-content:flex-end;gap:8px">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:#0891b2;color:#fff;border-color:#0891b2" onclick="BA.budgetSaveRealloc()">Move Budget</button>
        </div>`);
    }
  },

  // Show available amount for the selected source category (cover mode)
  _reallocCheckAmt() {
    const fromEl = id('realloc-from');
    const infoEl = id('realloc-from-avail');
    if (!fromEl || !infoEl) return;
    const fromId = fromEl.value;
    if (!fromId) { infoEl.textContent = ''; return; }
    const month  = id('realloc-month')?.value || UI.budgetMonth;
    const b      = budgetGetAdjustedPlan(fromId, month);
    const s      = budgetGetCatActuals(fromId, month);
    const avail  = Math.max(0, b - s);
    infoEl.textContent = `$${avail.toFixed(2)} available in this category`;
  },

  budgetSaveRealloc() {
    const fromCatId = id('realloc-from')?.value;
    const toCatId   = id('realloc-to')?.value;
    const amount    = parseFloat(id('realloc-amt')?.value) || 0;
    const note      = (id('realloc-note')?.value || '').trim();
    const month     = id('realloc-month')?.value || UI.budgetMonth;
    if (!fromCatId) { toast('Select a source category', 'err'); return; }
    if (!toCatId)   { toast('Select a destination category', 'err'); return; }
    if (amount <= 0){ toast('Enter an amount greater than zero', 'err'); return; }
    if (fromCatId === toCatId) { toast('Source and destination must be different', 'err'); return; }
    // Warn if moving more than available from source
    const srcAvail = Math.max(0, budgetGetAdjustedPlan(fromCatId, month) - budgetGetCatActuals(fromCatId, month));
    if (amount > srcAvail + 0.01) {
      if (!confirm(`You're moving $${amount.toFixed(2)} but the source only has $${srcAvail.toFixed(2)} available. This will put the source category in deficit. Continue?`)) return;
    }
    if (!D.budget.adjustments) D.budget.adjustments = [];
    D.budget.adjustments.push({ id: uid(), month, fromCatId, toCatId, amount, note });
    dirty(); closeModal(); renderBudget();
    const fromName = (D.budget.categories||[]).find(c=>c.id===fromCatId)?.name || '';
    const toName   = (D.budget.categories||[]).find(c=>c.id===toCatId)?.name   || '';
    toast(`↕ $${amount.toFixed(2)} moved from ${fromName} → ${toName}`, 'ok');
  },

  budgetDeleteRealloc(adjId) {
    D.budget.adjustments = (D.budget.adjustments||[]).filter(a => a.id !== adjId);
    dirty(); renderBudget();
    toast('Adjustment removed', 'ok');
  },

  // ── Import Budget Data (from SubTrack export JSON) ───────
  importBudgetData() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.json,application/json';
    inp.onchange = async () => {
      const file = inp.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const raw  = JSON.parse(text);
        if (!raw._format || !raw._format.startsWith('subtrack-budget')) {
          toast('Not a SubTrack budget export file','err'); return;
        }
        // Merge data — existing entries are preserved, new ones added
        const bud = D.budget;
        // Groups: add any that don't exist by name
        (raw.groups||[]).forEach(g => {
          if (!bud.groups.find(x => x.name===g.name)) bud.groups.push(g);
        });
        // Categories: add any that don't exist (match by groupId+name)
        // First build an ID remap since imported groups may have different IDs
        const groupMap = {};
        (raw.groups||[]).forEach(rg => {
          const match = bud.groups.find(bg => bg.name===rg.name);
          if (match) groupMap[rg.id] = match.id;
        });
        (raw.categories||[]).forEach(c => {
          const mappedGid = groupMap[c.groupId] || c.groupId;
          if (!bud.categories.find(x => x.groupId===mappedGid && x.name===c.name)) {
            bud.categories.push({ ...c, groupId:mappedGid });
          }
        });
        // Build a category ID remap too
        const catMap = {};
        (raw.categories||[]).forEach(rc => {
          const mappedGid = groupMap[rc.groupId] || rc.groupId;
          const match = bud.categories.find(bc => bc.groupId===mappedGid && bc.name===rc.name);
          if (match) catMap[rc.id] = match.id;
        });
        // Plans, actualTotals: remap categoryId and add if not already present
        (raw.plans||[]).forEach(p => {
          const catId = catMap[p.categoryId] || p.categoryId;
          if (!bud.plans.find(x => x.month===p.month && x.categoryId===catId)) {
            bud.plans.push({ ...p, categoryId:catId });
          }
        });
        (raw.actualTotals||[]).forEach(a => {
          const catId = catMap[a.categoryId] || a.categoryId;
          if (!bud.actualTotals.find(x => x.month===a.month && x.categoryId===catId)) {
            bud.actualTotals.push({ ...a, categoryId:catId });
          }
        });
        // Income entries: add by id if not present
        (raw.income||[]).forEach(i => {
          if (!bud.income.find(x => x.id===i.id)) bud.income.push(i);
        });
        // Income schedules: add by name if not present
        (raw.incomeSchedules||[]).forEach(sc => {
          if (!bud.incomeSchedules.find(x => x.name===sc.name)) bud.incomeSchedules.push(sc);
        });
        dirty();
        toast(`Budget imported: ${raw.groups?.length||0} groups, ${raw.categories?.length||0} categories, ${raw.incomeSchedules?.length||0} schedules`,'ok');
        if (UI.view==='budget') renderBudget();
        if (UI.view==='annual') renderAnnual();
      } catch(e) {
        toast('Import failed: ' + (e.message||e),'err');
      }
    };
    inp.click();
  }
};

// TOAST
// ════════════════════════════════════════════════════════════
function toast(msg, type) {
  const tc = id('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type||''}`;
  el.textContent = msg;
  tc.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'slide-out .25s ease forwards';
    setTimeout(() => el.remove(), 250);
  }, 2800);
}

let _undoStack = null, _undoTimer = null;
function toastUndo(msg, undoFn, duration=5500) {
  // Clear any prior undo toast
  const old = id('toast-undo-el');
  if (old) old.remove();
  if (_undoTimer) { clearTimeout(_undoTimer); _undoTimer = null; }

  const tc = id('toasts');
  const el = document.createElement('div');
  el.id = 'toast-undo-el';
  el.className = 'toast';
  el.style.cssText = 'display:flex;align-items:center;gap:10px;min-width:220px';
  el.innerHTML = `<span style="flex:1">${msg}</span><button id="toast-undo-btn" style="background:none;border:1px solid rgba(255,255,255,.5);color:inherit;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap">↩ Undo</button>`;
  tc.appendChild(el);

  const dismiss = (animate=true) => {
    if (animate) {
      el.style.animation = 'slide-out .25s ease forwards';
      setTimeout(() => el.remove(), 250);
    } else { el.remove(); }
    if (_undoTimer) { clearTimeout(_undoTimer); _undoTimer = null; }
    _undoStack = null;
  };

  el.querySelector('#toast-undo-btn').addEventListener('click', () => {
    undoFn();
    dismiss(false);
  });

  _undoTimer = setTimeout(() => dismiss(true), duration);
}

const TXN_FLAG_COLORS = {
  red:    '#ef4444', orange: '#f97316', yellow: '#eab308',
  green:  '#22c55e', blue:   '#3b82f6', purple: '#a855f7',
};
const TXN_GROUP_ORDER = ['Bank','Credit Card','Loans','Investment','Tracking','Savings','Cash'];
let _txnDrag = { active: false, id: null, overEl: null };

// ── Helpers ──────────────────────────────────────────────────
function txnRunningBalances(acct, txns) {
  // Sort oldest → newest; compute cumulative balance per row
  const sorted = [...txns].sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.id||'').localeCompare(b.id||''));
  let bal = parseFloat(acct.openingBalance) || 0;
  const isCC = acct.type === 'Credit Card';
  return sorted.map(t => {
    const d = parseFloat(t.debit)  || 0;
    const c = parseFloat(t.credit) || 0;
    // Bank: balance = prev + credits – debits  |  CC: balance = prev + debits – credits (balance = amount owed)
    bal = isCC ? bal + d - c : bal + c - d;
    return { ...t, _bal: bal };
  });
}

function txnCurrentBalance(acct) {
  // Exclude pending and rejected transactions from balance calculation
  const txns = (D.transactions||[]).filter(t => t.accountId === acct.id && (!t.status || t.status === 'approved'));
  const rows  = txnRunningBalances(acct, txns);
  if (!rows.length) return parseFloat(acct.openingBalance) || 0;
  return rows[rows.length - 1]._bal;
}

// ── Obligations → Transactions auto-population ───────────────
const TXN_OBL_START = '2026-04';

function oblAutoGenerateTxns() {
  if (!D.obligations) return;
  if (!D.txnAccounts || !D.txnAccounts.length) return;

  // Build account lookup: name (lowercase) → id
  const acctMap = {};
  (D.txnAccounts || []).forEach(a => { acctMap[a.name.trim().toLowerCase()] = a.id; });

  // ── Fix-up pass: correct wrong dates on existing pending obligation transactions ──
  // Obligation lookup maps
  const oblById = {};
  (D.obligations.subscriptions || []).forEach(s => { oblById[s.id] = { obj: s, type: 'subscription' }; });
  (D.obligations.emis            || []).forEach(e => { oblById[e.id] = { obj: e, type: 'emi' };          });
  (D.obligations.splits          || []).forEach(s => { oblById[s.id] = { obj: s, type: 'split' };        });
  // Remove any pending transactions for loans with generateMonthly=false (auto-debit)
  const autoDebitIds = new Set(
    (D.obligations.emis || []).filter(e => e.generateMonthly === false).map(e => e.id)
  );
  const beforeLen = (D.transactions || []).length;
  D.transactions = (D.transactions || []).filter(t =>
    !(t.status === 'pending' && t.oblType === 'emi' && autoDebitIds.has(t.obligationId))
  );
  let fixedCount = (D.transactions.length !== beforeLen) ? 1 : 0; // flag dirty if removed

  // Back-fill oblMonth on any obligation txn that's missing it (prevents duplicates on due-date changes)
  (D.transactions || []).forEach(t => {
    if (t.obligationId && !t.oblMonth && t.date) {
      t.oblMonth = t.date.slice(0, 7);
      fixedCount++;
    }
  });

  (D.transactions || []).forEach(t => {
    if (t.status !== 'pending' || !t.obligationId || !t.oblMonth) return;
    const entry = oblById[t.obligationId];
    if (!entry) return;
    const [y, mo] = t.oblMonth.split('-').map(Number);
    function correctDay(rawDay) {
      const d = Math.min(rawDay || 1, new Date(y, mo, 0).getDate());
      return t.oblMonth + '-' + String(d).padStart(2, '0');
    }
    let correctDate = null;
    let correctDebit = null;
    if (entry.type === 'subscription') {
      const subDay = entry.obj.startDate ? parseInt(entry.obj.startDate.split('-')[2]) || 1 : 1;
      correctDate  = correctDay(subDay);
      correctDebit = parseFloat(entry.obj.cost) || 0;
    } else if (entry.type === 'emi') {
      correctDate  = correctDay(parseInt(entry.obj.dueDateEachMonth) || 1);
      correctDebit = parseFloat(entry.obj.emiAmount) || 0;
      const correctPayee = entry.obj.itemName || entry.obj.name || null;
      if (correctPayee && !t.payee) { t.payee = correctPayee; fixedCount++; }
    } else if (entry.type === 'split') {
      correctDate  = correctDay(parseInt(entry.obj.dueDateEachMonth) || 1);
      correctDebit = parseFloat(entry.obj.installmentAmount) || 0;
    }
    if (correctDate && t.date !== correctDate) { t.date = correctDate; fixedCount++; }
    if (correctDebit !== null && t.debit !== correctDebit) { t.debit = correctDebit; fixedCount++; }
    // Back-fill expenseTypeId → categoryId if obligation now has one
    const expTypeId = entry.obj.expenseTypeId || null;
    if (expTypeId && !t.categoryId) { t.categoryId = expTypeId; fixedCount++; }
  });
  if (fixedCount > 0) dirty();

  // Build dedup set: "obligationId::oblMonth"
  const existing = new Set();
  (D.transactions || []).forEach(t => {
    if (t.obligationId && t.oblMonth) existing.add(t.obligationId + '::' + t.oblMonth);
  });

  // Determine month range: TXN_OBL_START → current month
  const today = new Date();
  const currentYM = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
  function ymRange(start, end) {
    const months = [];
    let [y, m] = start.split('-').map(Number);
    const [ey, em] = end.split('-').map(Number);
    while (y < ey || (y === ey && m <= em)) {
      months.push(y + '-' + String(m).padStart(2, '0'));
      m++; if (m > 12) { m = 1; y++; }
    }
    return months;
  }
  const months = ymRange(TXN_OBL_START, currentYM);

  let added = 0;

  months.forEach(ym => {
    const [y, mo] = ym.split('-').map(Number);
    // Day defaults to 1st; if obligation has a specific day use it
    function ymDate(day) {
      const d = Math.min(day || 1, new Date(y, mo, 0).getDate());
      return ym + '-' + String(d).padStart(2, '0');
    }

    // ── Subscriptions ──
    (D.obligations.subscriptions || []).forEach(sub => {
      if (sub.status !== 'Active') return;
      if (!oblSubRenewsInMonthAny(sub, ym)) return;
      const key = sub.id + '::' + ym;
      if (existing.has(key)) return;
      const acctId = sub.paymentMethod ? acctMap[sub.paymentMethod.trim().toLowerCase()] : null;
      if (!acctId) return; // no matching account – skip
      // Subscription due day = same day-of-month as the original start date
      const subDay = sub.startDate ? parseInt(sub.startDate.split('-')[2]) || 1 : 1;
      const txn = {
        id: uid(), accountId: acctId,
        obligationId: sub.id, oblMonth: ym, oblType: 'subscription',
        date: ymDate(subDay), payee: sub.name,
        debit: parseFloat(sub.cost) || 0, credit: 0,
        categoryId: sub.expenseTypeId || null, notes: 'Auto: subscription',
        cleared: false, status: 'pending'
      };
      D.transactions.push(txn);
      existing.add(key);
      added++;
    });

    // ── EMIs / Loans ──
    (D.obligations.emis || []).forEach(emi => {
      if (emi.status !== 'Active') return;
      if (emi.generateMonthly === false) return; // "Auto-debit" loans excluded
      if (!oblEmiDueInMonth(emi, ym)) return;
      const key = emi.id + '::' + ym;
      if (existing.has(key)) return;
      const acctId = emi.paymentMethod ? acctMap[emi.paymentMethod.trim().toLowerCase()] : null;
      if (!acctId) return;
      const txn = {
        id: uid(), accountId: acctId,
        obligationId: emi.id, oblMonth: ym, oblType: 'emi',
        date: ymDate(parseInt(emi.dueDateEachMonth) || 1), payee: emi.itemName || emi.name,
        debit: parseFloat(emi.emiAmount) || parseFloat(emi.amount) || 0, credit: 0,
        categoryId: emi.expenseTypeId || null, notes: 'Auto: loan/EMI',
        cleared: false, status: 'pending'
      };
      D.transactions.push(txn);
      existing.add(key);
      added++;
    });

    // ── Splits ──
    (D.obligations.splits || []).forEach(split => {
      if (split.status !== 'Active') return;
      if (!oblSplitDueInMonth(split, ym)) return;
      const key = split.id + '::' + ym;
      if (existing.has(key)) return;
      const acctId = split.paymentMethod ? acctMap[split.paymentMethod.trim().toLowerCase()] : null;
      if (!acctId) return;
      const txn = {
        id: uid(), accountId: acctId,
        obligationId: split.id, oblMonth: ym, oblType: 'split',
        date: ymDate(parseInt(split.dueDateEachMonth) || 1), payee: split.name,
        debit: parseFloat(split.installmentAmount) || 0, credit: 0,
        categoryId: split.expenseTypeId || null, notes: 'Auto: split payment',
        cleared: false, status: 'pending'
      };
      D.transactions.push(txn);
      existing.add(key);
      added++;
    });
  });

  if (added > 0) dirty();
}

// Recompute D.budget.txnActuals from all transactions
function recomputeTxnActuals() {
  if (!D.budget.txnActuals) D.budget.txnActuals = [];
  D.budget.txnActuals = [];
  const groups = {};
  (D.transactions || []).forEach(t => {
    if (!t.date) return;
    if (t.status === 'pending' || t.status === 'rejected') return; // exclude non-approved
    if (t.isTransfer) return; // transfers are not expenses — skip
    const month = t.date.slice(0, 7);
    // ── Split transaction: distribute across each split line's category ──
    if (t.splits && t.splits.length > 0) {
      // Determine sign: debit = expense (+), credit = refund/return (-)
      // sp.amount is always stored as a positive number, so we must mirror
      // the same debit-minus-credit logic used for normal transactions.
      const sign = (parseFloat(t.credit) || 0) > 0 && !(parseFloat(t.debit) || 0) ? -1 : 1;
      t.splits.forEach(sp => {
        if (!sp.categoryId || sp.categoryId === '__income__') return;
        const key = sp.categoryId + '::' + month;
        if (!groups[key]) groups[key] = { categoryId: sp.categoryId, month, amount: 0 };
        groups[key].amount += sign * (parseFloat(sp.amount) || 0);
      });
      return; // don't also process the top-level categoryId
    }
    // ── Normal transaction ────────────────────────────────────────────────
    if (!t.categoryId || t.categoryId === '__income__') return;
    const key = t.categoryId + '::' + month;
    if (!groups[key]) groups[key] = { categoryId: t.categoryId, month, amount: 0 };
    // Net expense = debit (spending) minus credit (refund/return)
    groups[key].amount += (parseFloat(t.debit) || 0) - (parseFloat(t.credit) || 0);
  });
  Object.values(groups).forEach(g => {
    if (Math.abs(g.amount) > 0.001) {
      D.budget.txnActuals.push({ id: uid(), month: g.month, categoryId: g.categoryId, amount: g.amount });
    }
  });
}

// ── Category dropdown HTML (Group → Expense Type) ────────────
function txnCatOptions(selectedId) {
  const groups = D.budget.groups || [];
  const cats   = D.budget.categories || [];
  let html = `<option value="">— Select expense type —</option>`;
  html += `<option value="__income__"${selectedId === '__income__' ? ' selected' : ''}>💰 Income</option>`;
  if (!cats.length) return html;
  html += `<optgroup label="────────────────"></optgroup>`;
  groups.forEach(g => {
    const gc = cats.filter(c => c.groupId === g.id);
    if (!gc.length) return;
    html += `<optgroup label="${esc(g.name)}">`;
    gc.forEach(c => {
      html += `<option value="${c.id}"${c.id === selectedId ? ' selected' : ''}>${esc(c.name)}</option>`;
    });
    html += `</optgroup>`;
  });
  // Uncategorised
  const ungrouped = cats.filter(c => !groups.find(g => g.id === c.groupId));
  if (ungrouped.length) {
    html += `<optgroup label="Other">`;
    ungrouped.forEach(c => {
      html += `<option value="${c.id}"${c.id === selectedId ? ' selected' : ''}>${esc(c.name)}</option>`;
    });
    html += `</optgroup>`;
  }
  return html;
}

function txnCatLabel(catId) {
  if (!catId) return '';
  if (catId === '__income__') return '💰 Income';
  const cat   = (D.budget.categories||[]).find(c => c.id === catId);
  const group = cat ? (D.budget.groups||[]).find(g => g.id === cat.groupId) : null;
  return cat ? (group ? group.name + ' › ' : '') + cat.name : '';
}

function txnImportModal() {
  const el = id('txn-import-file');
  if (el) { el.value = ''; el.click(); }
}

function txnHandleImportFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => txnShowImportPreview(_parseTxnCsv(e.target.result), file.name);
  reader.readAsText(file);
}

// Quoted CSV parser (handles commas inside double-quoted fields)
function _parseCsvLine(line) {
  const res = []; let inQ = false; let f = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { f+='"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(f); f = ''; }
    else f += c;
  }
  res.push(f);
  return res;
}

function _parseTxnCsv(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const c = _parseCsvLine(lines[i]);
    if (c.length < 9) continue;
    // Convert date MM/DD/YYYY → YYYY-MM-DD
    let isoDate = '';
    const dm = (c[2]||'').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (dm) isoDate = `${dm[3]}-${dm[1].padStart(2,'0')}-${dm[2].padStart(2,'0')}`;
    rows.push({
      account:  (c[0]||'').trim(),
      date:     isoDate,
      payee:    (c[3]||'').trim(),
      catGroup: (c[5]||'').trim(),
      catName:  (c[6]||'').trim(),
      memo:     (c[7]||'').trim(),
      outflow:  Math.round((parseFloat((c[8]||'0').replace(/[^0-9.]/g,''))||0)*100)/100,
      inflow:   Math.round((parseFloat((c[9]||'0').replace(/[^0-9.]/g,''))||0)*100)/100,
      cleared:  (c[10]||'').trim().toLowerCase() === 'reconciled',
    });
  }
  return rows;
}

// Try to match a CSV category name → app categoryId
function _matchCsvCat(catGroup, catName) {
  if (!catName) return null;
  const lower = catName.trim().toLowerCase();
  // "Ready to Assign" → income
  if (lower === 'ready to assign' || (catGroup||'').toLowerCase().includes('inflow')) return '__income__';
  return (D.budget.categories||[]).find(c => c.name.trim().toLowerCase() === lower)?.id || null;
}

// Build account name → id map for app accounts (case-insensitive)
function _appAcctOptions(selectedName) {
  const accts = D.txnAccounts || [];
  let html = `<option value="">— Skip —</option>`;
  accts.forEach(a => {
    const sel = selectedName && a.name.trim().toLowerCase() === selectedName.trim().toLowerCase();
    html += `<option value="${a.id}"${sel?' selected':''}>${esc(a.name)}</option>`;
  });
  return html;
}

// Auto-guess best account match for a CSV account name
function _guessMappedAcct(csvName) {
  const accts = D.txnAccounts || [];
  const lower = csvName.trim().toLowerCase();
  // Exact match first
  let hit = accts.find(a => a.name.trim().toLowerCase() === lower);
  if (hit) return hit.id;
  // Partial match (CSV name contains app name or vice versa)
  hit = accts.find(a => lower.includes(a.name.trim().toLowerCase()) || a.name.trim().toLowerCase().includes(lower));
  return hit ? hit.id : '';
}

function txnShowImportPreview(rows, filename) {
  if (!rows.length) { toast('No rows found in file','err'); return; }

  // Unique CSV accounts
  const csvAccts = [...new Set(rows.map(r => r.account))].sort();
  // Auto-guess mapping
  const guessMap = {};
  csvAccts.forEach(name => { guessMap[name] = _guessMappedAcct(name); });

  // Category stats
  let catMatched = 0, catTotal = 0;
  rows.forEach(r => {
    if (r.catName || r.catGroup) {
      catTotal++;
      if (_matchCsvCat(r.catGroup, r.catName)) catMatched++;
    }
  });

  const isTransfer = r => r.payee.startsWith('Transfer :') || r.payee.startsWith('Transfer:');
  const transferCount = rows.filter(isTransfer).length;

  const dateMin = rows.reduce((m,r) => r.date && r.date < m ? r.date : m, '9999');
  const dateMax = rows.reduce((m,r) => r.date && r.date > m ? r.date : m, '');

  // Build a DOM-safe key for each account name (alphanumeric + underscore only)
  const acctKey = name => 'acct_' + name.replace(/[^a-zA-Z0-9]/g,'_');
  const acctRows = csvAccts.map(name => `
    <tr>
      <td style="padding:4px 8px;font-size:.82rem;color:var(--text)">${esc(name)}</td>
      <td style="padding:4px 8px">
        <select id="imp-${acctKey(name)}" class="finput" style="font-size:.8rem;padding:3px 6px;width:200px">
          ${_appAcctOptions(guessMap[name] ? (D.txnAccounts||[]).find(a=>a.id===guessMap[name])?.name : null)}
        </select>
      </td>
      <td style="padding:4px 8px;font-size:.75rem;color:var(--text3)">${rows.filter(r=>r.account===name).length} rows</td>
    </tr>`).join('');

  showModal(`
    <div style="min-width:560px;max-width:680px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:1rem;font-weight:700;color:var(--text)">⬆ Import Transactions</div>
          <div style="font-size:.76rem;color:var(--text3);margin-top:2px">${esc(filename)} — ${rows.length} rows — ${fmtDate(dateMin)} to ${fmtDate(dateMax)}</div>
        </div>
        <button class="btn btn-sm" onclick="closeModal()">✕</button>
      </div>

      <div style="margin-bottom:14px">
        <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:6px">Map CSV Accounts → Your Accounts</div>
        <div style="font-size:.74rem;color:var(--text3);margin-bottom:6px">Accounts set to "— Skip —" will not be imported.</div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--surface2)">
            <th style="padding:4px 8px;text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--text3)">CSV Account</th>
            <th style="padding:4px 8px;text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--text3)">Your Account</th>
            <th style="padding:4px 8px;text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--text3)">Rows</th>
          </tr></thead>
          <tbody>${acctRows}</tbody>
        </table>
      </div>

      <div style="margin-bottom:14px;padding:10px 12px;background:var(--surface2);border-radius:8px;display:flex;flex-direction:column;gap:7px">
        <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:2px">Options</div>
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer">
          <input type="checkbox" id="imp-skip-transfers" checked style="cursor:pointer;accent-color:var(--primary)">
          Skip transfer transactions <span style="font-size:.74rem;color:var(--text3)">(${transferCount} rows where Payee starts with "Transfer :")</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer">
          <input type="checkbox" id="imp-skip-blank-cat" style="cursor:pointer;accent-color:var(--primary)">
          Skip rows with no category
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer">
          <input type="checkbox" id="imp-group-splits" checked style="cursor:pointer;accent-color:var(--primary)">
          Group split transactions <span style="font-size:.74rem;color:var(--text3)">(rows with "Split (N/M)" in memo → imported as one split transaction)</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer">
          <input type="checkbox" id="imp-skip-zero" checked style="cursor:pointer;accent-color:var(--primary)">
          Skip zero-amount rows
        </label>
      </div>

      <div style="font-size:.78rem;color:var(--text3);margin-bottom:14px;padding:8px 12px;background:color-mix(in srgb,var(--primary) 7%,transparent);border-radius:8px;border:1px solid color-mix(in srgb,var(--primary) 20%,transparent)">
        📂 Categories: <strong>${catMatched}</strong> of <strong>${catTotal}</strong> auto-matched to your expense types. Unmatched rows will be imported without a category — you can assign them afterward.
        ${catMatched < catTotal ? `<br><span style="font-size:.72rem;color:var(--text3)">Tip: Unmatched categories likely just need their names added under Setup → Categories.</span>` : ''}
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="BA.txnRunImport(window._txnImportAccts)">⬆ Import</button>
      </div>
    </div>`);

  // Set the selects to their guessed values after render
  const _acctKey = name => 'acct_' + name.replace(/[^a-zA-Z0-9]/g,'_');
  csvAccts.forEach(name => {
    const sel = id(`imp-${_acctKey(name)}`);
    if (sel && guessMap[name]) sel.value = guessMap[name];
  });

  // Store rows and account list on window for retrieval by BA.txnRunImport
  window._txnImportRows  = rows;
  window._txnImportAccts = csvAccts;
}

function renderTransactions() {
  oblAutoGenerateTxns(); // idempotent — fill any newly-due obligations
  renderTxnLeftNav();
  renderTxnRight();
  renderTxnKpis();
  // Restore search input value after re-render
  const sinp = document.getElementById('txn-search-input');
  if (sinp && UI.txnSearch) sinp.value = UI.txnSearch;
}

function renderTxnLeftNav() {
  const nav      = id('txn-left-nav');
  const accounts = D.txnAccounts || [];
  if (!nav) return;
  if (!UI.txnGroupCollapsed) UI.txnGroupCollapsed = {};
  // Save scroll of the inner scrollable list before re-render
  const _scrollEl    = nav.querySelector('.txn-nav-scroll');
  const _savedScroll = _scrollEl ? _scrollEl.scrollTop : 0;

  // Build ordered groups
  const present = [...new Set(accounts.map(a => a.type))];
  const ordered = [...TXN_GROUP_ORDER.filter(g => present.includes(g)),
                   ...present.filter(g => !TXN_GROUP_ORDER.includes(g))]
                   .filter(type => accounts.some(a => a.type === type)); // hide empty groups

  function acctRow(acct) {
    const bal    = txnCurrentBalance(acct);
    const isCC   = acct.type === 'Credit Card';
    const isLoan = acct.type === 'Loans';
    const balStr = fmtCurrency(Math.abs(bal));
    // CC: positive balance = owed (bad=red), zero/negative = credit (good=green)
    // Loan: any balance = outstanding (red), zero = paid off (green)
    // Others: positive = good (green), negative = overdraft (red)
    const balColor = isCC
      ? (bal > 0 ? 'var(--danger)' : 'var(--ok)')
      : isLoan
        ? (bal > 0 ? 'var(--danger)' : 'var(--ok)')
        : (bal >= 0 ? 'var(--ok)' : 'var(--danger)');
    const balMeta = `<span style="color:${balColor}">${balStr}</span>`;
    const isActive = UI.txnAccount === acct.id;
    return `
      <div class="txn-acct-item ${isActive ? 'active' : ''}"
           data-acct-id="${acct.id}"
           draggable="true"
           ondragstart="BA.txnDragStart(event,'${acct.id}')"
           ondragover="BA.txnDragOver(event,'${acct.id}')"
           ondrop="BA.txnDrop(event,'${acct.id}')"
           ondragend="BA.txnDragEnd(event)"
           onclick="BA.selectTxnAccount('${acct.id}')">
        <div style="display:flex;align-items:center;gap:3px">
          <span class="txn-drag-handle" ondragstart="event.stopPropagation()" onclick="event.stopPropagation()" title="Drag to reorder">⠿</span>
          <span class="txn-acct-name" style="flex:1;min-width:0">${esc(acct.name)}</span>
          <span style="font-size:.75rem;font-weight:600;flex-shrink:0;margin-right:2px">${balMeta}</span>
          <button class="btn btn-sm btn-ghost btn-xs" style="padding:0 3px;font-size:.7rem;opacity:.55;flex-shrink:0" onclick="event.stopPropagation();txnEditAccountModal('${acct.id}')" title="Edit account">✎</button>
        </div>
      </div>`;
  }

  const groupsHTML = ordered.length ? ordered.map(type => {
    const group    = accounts.filter(a => a.type === type);
    const isCol    = !!UI.txnGroupCollapsed[type];
    const icon     = type === 'Bank' ? '🏦' : type === 'Credit Card' ? '💳' : type === 'Savings' ? '🏧' : type === 'Investment' ? '📈' : type === 'Loans' ? '🏠' : type === 'Tracking' ? '📊' : '💵';
    const totalBal = group.reduce((s, a) => s + txnCurrentBalance(a), 0);
    const isCC     = type === 'Credit Card';
    const balSummary = isCC
      ? `<span style="font-size:.68rem;color:${totalBal > 0 ? 'var(--danger)' : 'var(--ok)'};">${fmtCurrency(Math.abs(totalBal))}</span>`
      : `<span style="font-size:.68rem;color:${totalBal >= 0 ? 'var(--ok)' : 'var(--danger)'};">${fmtCurrency(Math.abs(totalBal))}</span>`;
    return `
      <div class="txn-group-hdr" onclick="BA.txnToggleGroup('${type}')" title="${isCol ? 'Expand' : 'Collapse'} ${type} accounts">
        <span class="txn-group-chev ${isCol ? 'col' : ''}">▼</span>
        <span>${icon} ${esc(type)}</span>
        <span style="margin-left:auto;font-weight:500">${balSummary}</span>
        <span style="color:var(--text3);font-weight:400">(${group.length})</span>
      </div>
      <div class="txn-group-body" data-group="${type}" style="display:${isCol ? 'none' : 'block'}">
        ${group.map(acctRow).join('')}
      </div>`;
  }).join('') : `<div style="padding:16px 14px;font-size:.78rem;color:var(--text3)">No accounts yet.<br>Add one to start logging.</div>`;

  const allActive = !UI.txnAccount;
  nav.innerHTML = `
    <div class="txn-left-hdr" style="border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:2px">Accounts</div>
    <div class="txn-acct-item ${allActive ? 'active' : ''}" onclick="BA.txnResetAccount()" style="border-left-color:${allActive?'var(--primary)':'transparent'}">
      <div style="display:flex;align-items:center;gap:5px">
        <span class="txn-acct-name" style="flex:1">🏛 All Accounts</span>
      </div>
      <div class="txn-acct-meta"><span style="color:var(--text3);font-size:.7rem">${(D.transactions||[]).filter(t=>!t.status||t.status==='approved').length} transactions</span></div>
    </div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div class="txn-nav-scroll" style="flex:1;overflow-y:auto;min-height:0">${groupsHTML}</div>
    <div style="border-top:1px solid var(--border);padding:6px 8px;flex-shrink:0">
      <button class="txn-add-acct" style="width:100%;margin:0" onclick="txnAddAccountModal()">＋ Add Account</button>
    </div>`;
  // Restore scroll position so selecting an account doesn't jump the nav to the top
  const _newScrollEl = nav.querySelector('.txn-nav-scroll');
  if (_newScrollEl) {
    if (_savedScroll) {
      _newScrollEl.scrollTop = _savedScroll;
    } else {
      // First load: scroll the active item into view
      const activeEl = _newScrollEl.querySelector('.txn-acct-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    }
  }
}

function renderTxnKpis() {
  const row  = id('txn-kpi-row');
  if (!row) return;
  const acct = UI.txnAccount ? (D.txnAccounts||[]).find(a => a.id === UI.txnAccount) : null;
  const now   = new Date();
  const curYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  if (!acct) {
    // ── Global summary across all accounts ───────────────────
    const accounts = D.txnAccounts || [];
    const allTxns  = D.transactions || [];
    const totalPending = allTxns.filter(t => t.status === 'pending').length;
    const pendingAmt   = allTxns.filter(t => t.status === 'pending').reduce((s,t) => s+(parseFloat(t.debit)||0)+(parseFloat(t.credit)||0), 0);
    const LIQUID_TYPES = ['Bank','Savings','Cash','Investment'];
    const bankBal  = accounts.filter(a => LIQUID_TYPES.includes(a.type)).reduce((s,a) => s + txnCurrentBalance(a), 0);
    const ccOwed   = accounts.filter(a => a.type === 'Credit Card').reduce((s,a) => s + txnCurrentBalance(a), 0);
    const loanBal  = accounts.filter(a => a.type === 'Loans').reduce((s,a) => s + txnCurrentBalance(a), 0);
    const unclr    = allTxns.filter(t => (!t.status || t.status === 'approved') && !t.cleared).length;
    const moDebits = allTxns.filter(t => (!t.status||t.status==='approved') && !t.isTransfer && (t.date||'').startsWith(curYM)).reduce((s,t)=>s+(parseFloat(t.debit)||0),0);
    const pendingTile = totalPending > 0
      ? `<div class="sum-card" style="border-color:#f59e0b;background:color-mix(in srgb,#f59e0b 6%,transparent)"><div class="sum-lbl" style="color:#b45309">⏳ Pending Approval</div><div class="sum-val" style="color:#b45309">${totalPending} item${totalPending!==1?'s':''}</div><div class="sum-sub">${fmtCurrency(pendingAmt)} to review</div></div>`
      : '';
    const loanTile = accounts.some(a => a.type === 'Loans')
      ? `<div class="sum-card c-danger"><div class="sum-lbl">🏠 Loans Owed</div><div class="sum-val mono" style="color:${loanBal>0?'var(--danger)':'var(--ok)'}">${fmtCurrency(Math.abs(loanBal))}</div><div class="sum-sub">${accounts.filter(a=>a.type==='Loans').length} loan${accounts.filter(a=>a.type==='Loans').length!==1?'s':''}</div></div>`
      : '';
    row.innerHTML = `
      <div class="sum-card c-ok"><div class="sum-lbl">Bank Balance</div><div class="sum-val mono" style="color:${bankBal>=0?'var(--ok)':'var(--danger)'}">${fmtCurrency(Math.abs(bankBal))}</div><div class="sum-sub">${accounts.filter(a=>LIQUID_TYPES.includes(a.type)).length} account${accounts.filter(a=>LIQUID_TYPES.includes(a.type)).length!==1?'s':''}</div></div>
      <div class="sum-card c-danger"><div class="sum-lbl">CC Balance Owed</div><div class="sum-val mono" style="color:${ccOwed>0?'var(--danger)':'var(--ok)'}">${fmtCurrency(Math.abs(ccOwed))}</div><div class="sum-sub">${accounts.filter(a=>a.type==='Credit Card').length} card${accounts.filter(a=>a.type==='Credit Card').length!==1?'s':''}</div></div>
      ${loanTile}
      <div class="sum-card"><div class="sum-lbl">Spent — ${bFmtMonth(curYM)}</div><div class="sum-val mono">${fmtCurrency(moDebits)}</div><div class="sum-sub">across all accounts</div></div>
      <div class="sum-card${unclr>0?' c-warn':''}"><div class="sum-lbl">Uncleared</div><div class="sum-val">${unclr}</div><div class="sum-sub">across all accounts</div></div>
      ${pendingTile}`;
    return;
  }

  // ── Per-account view ──────────────────────────────────────
  const allTxns    = (D.transactions||[]).filter(t => t.accountId === acct.id);
  const pendingTxns = allTxns.filter(t => t.status === 'pending');
  const committedTxns = allTxns.filter(t => !t.status || t.status === 'approved');
  const clearedTxns = committedTxns.filter(t => t.cleared);
  // Cleared balance: opening balance + all cleared transactions
  const clearedBal = txnRunningBalances(acct, clearedTxns);
  const clearedBalance = clearedBal.length ? clearedBal[clearedBal.length-1]._bal : (parseFloat(acct.openingBalance)||0);
  const unclrTxns = committedTxns.filter(t => !t.cleared);
  const unclrAmt  = unclrTxns.reduce((s,t) => s + (parseFloat(t.debit)||0) - (parseFloat(t.credit)||0), 0);
  const pendingAmt = pendingTxns.reduce((s,t) => s + (parseFloat(t.debit)||0) + (parseFloat(t.credit)||0), 0);
  const isCC   = acct.type === 'Credit Card';
  const balColor = isCC ? (bal > 0 ? 'var(--danger)' : 'var(--ok)') : (bal >= 0 ? 'var(--ok)' : 'var(--danger)');
  const pendingTile = pendingTxns.length > 0
    ? `<div class="sum-card" style="border-color:#f59e0b;background:color-mix(in srgb,#f59e0b 6%,transparent)"><div class="sum-lbl" style="color:#b45309">⏳ Pending Approval</div><div class="sum-val" style="color:#b45309">${pendingTxns.length} item${pendingTxns.length!==1?'s':''}</div><div class="sum-sub">${fmtCurrency(pendingAmt)} to review</div></div>`
    : '';
  const clearedBalColor = isCC ? (clearedBalance > 0 ? 'var(--danger)' : 'var(--ok)') : (clearedBalance >= 0 ? 'var(--ok)' : 'var(--danger)');
  row.innerHTML = `
    <div class="sum-card"><div class="sum-lbl">${isCC?'Cleared Balance Owed':'Cleared Balance'}</div><div class="sum-val mono" style="color:${clearedBalColor}">${fmtCurrency(Math.abs(clearedBalance))}</div><div class="sum-sub">${esc(acct.name)}</div></div>
    <div class="sum-card${unclrAmt>0?' c-warn':''}"><div class="sum-lbl">Uncleared Amount</div><div class="sum-val mono">${fmtCurrency(Math.abs(unclrAmt))}</div><div class="sum-sub">${unclrTxns.length} uncleared transaction${unclrTxns.length!==1?'s':''}</div></div>
    ${pendingTile}`;
}

// Build unique payee → most-recent categoryId map across ALL transactions for autocomplete
function txnPayeeMap() {
  const map = {};
  const sorted = [...(D.transactions||[])].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  sorted.forEach(t => {
    if (t.payee) map[t.payee.toLowerCase()] = { payee: t.payee, categoryId: t.categoryId };
  });
  return map; // most recent wins because we sorted asc and overwrite
}

// Returns today's date string (YYYY-MM-DD) in Central Time (America/Chicago)
function centralToday() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Chicago' }).format(new Date());
}

// Render one inline-edit row (t=null for new row)
function txnInlineRow(t, acct) {
  const today    = centralToday(); // Central Time
  const editId   = t ? t.id : '';
  const iS       = 'font-size:.8rem;padding:4px 6px;';
  const _isXfer  = !!t?.isTransfer;

  // Determine initial debit/credit for the row
  const debitVal  = t && t.debit  > 0 ? t.debit  : (UI._txnCurDebit  || '');
  const creditVal = t && t.credit > 0 ? t.credit : (UI._txnCurCredit || '');

  let catCell;
  if (UI._txnSplitMode) {
    const lines = UI._txnSplitLines.length ? UI._txnSplitLines : [{ categoryId: '', amount: '' }];
    // Compute remainder for balance indicator
    const total    = parseFloat(debitVal) || parseFloat(creditVal) || UI._txnCurDebit || UI._txnCurCredit || 0;
    const splitSum = lines.reduce((s, l) => s + (parseFloat(l.amount) || 0), 0);
    const rem      = +(total - splitSum).toFixed(2);
    const remOk    = Math.abs(rem) < 0.005;
    const remColor = remOk ? 'var(--ok)' : (rem < 0 ? 'var(--danger)' : 'var(--text2)');

    const _splitFamPersons = famPersons();
    const lineRows = lines.map((l, i) => {

      ).join('');
      const famPicker = _splitFamPersons.length > 0 ? `
        <div style="padding:2px 0 0 1px">

      return `

          <input type="number" id="ti-split-amt-${i}" class="finput" style="font-size:.78rem;padding:3px 5px;width:75px;text-align:right" step="0.01" min="0" value="${l.amount !== '' && l.amount !== undefined ? l.amount : ''}" placeholder="0.00" oninput="BA.txnSplitAmtInput()">
          <input type="text" id="ti-split-notes-${i}" class="finput" style="font-size:.78rem;padding:3px 5px;flex:1;min-width:80px" value="${esc(l.notes||'')}" placeholder="Notes (optional)">

        </div>

    catCell = `
      <td style="vertical-align:top;padding-top:5px;min-width:240px">
        ${lineRows}
