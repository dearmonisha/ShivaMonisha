// DEBT PAYOFF TRACKER
// ══════════════════════════════════════════════════════════════════════
let _debtPayoffChart = null;

function renderDebtPayoff() {
  const wrap = id('view-debt-payoff');
  if (!wrap) return;

  // Destroy old chart instance
  if (_debtPayoffChart) { try { _debtPayoffChart.destroy(); } catch(e){} _debtPayoffChart = null; }

  const emis = (D.obligations?.emis||[]).filter(e => e.status === 'Active').map(oblEnrichEmi);

  if (!emis.length) {
    wrap.innerHTML = `
      <div style="padding:60px 24px;text-align:center;color:var(--text3)">
        <div style="font-size:2.5rem;margin-bottom:14px">🎉</div>
        <div style="font-weight:800;font-size:1.1rem;color:var(--text1)">No active loans</div>
        <div style="margin-top:8px;font-size:.88rem">You're already debt-free! Add loans in Budget → Obligations.</div>
      </div>`;
    return;
  }

  const COLORS  = ['#7C3AED','#0D9488','#DC2626','#D97706','#2563EB','#059669','#9333EA','#C0392B'];
  const MO_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MO_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Use centralToday() so the base date is always correct regardless of VM timezone
  const _todayStr  = centralToday();                          // 'YYYY-MM-DD'
  const _baseYear  = parseInt(_todayStr.slice(0, 4), 10);
  const _baseMonth = parseInt(_todayStr.slice(5, 7), 10) - 1; // 0-indexed

  // Advance N months from base, return { year, month0 }
  const _addMo  = n => { const t = _baseMonth + n; return { yr: _baseYear + Math.floor(t/12), mo: t%12 }; };
  const fmtMYs  = n  => { const {yr,mo} = _addMo(n); return MO_SHORT[mo] + " '" + String(yr).slice(2); };
  const fmtMY   = n  => { const {yr,mo} = _addMo(n); return MO_LONG[mo]  + ' ' + yr; };

  // ── Project each loan month by month ────────────────────────
  const projections = emis.map((e, i) => {
    const loanAmt = parseFloat(e.loanAmount) || 0;
    const emiA    = parseFloat(e.emiAmount)  || 0;
    const startBal = e.remainingBalance;

    // Derive payoffMo from maturityDate — the loan's actual end date
    // This is always more reliable than recomputing from the amortization formula
    let payoffMo = null;
    if (e.maturityDate) {
      const matYr = parseInt(e.maturityDate.slice(0, 4), 10);
      const matMo = parseInt(e.maturityDate.slice(5, 7), 10) - 1; // 0-indexed
      payoffMo = Math.max(0, (matYr - _baseYear) * 12 + (matMo - _baseMonth));
    } else {
      // No maturityDate — fall back to amortization formula (capped at 600 months)
      let bal = startBal;
      const r = ((parseFloat(e.interestRate)||0) / 100) / 12;
      for (let mo = 1; mo <= 600; mo++) {
        bal = r > 0 ? bal - (emiA - bal * r) : bal - emiA;
        if (bal <= 0) { payoffMo = mo; break; }
      }
    }

    // Build balance sequence: interpolate linearly from remainingBalance → 0 over payoffMo months
    // (linear is honest — the exact curve depends on the bank's formula; what matters is start and end)
    const seq = [];
    const totalMo = payoffMo || 1;
    for (let mo = 0; mo <= totalMo; mo++) {
      seq.push(Math.max(0, startBal * (1 - mo / totalMo)));
    }

    const pctPaid     = loanAmt > 0 ? Math.min(100, ((loanAmt - startBal) / loanAmt) * 100) : 0;
    const interestLeft = Math.max(0, (totalMo * emiA) - startBal);

    return { e, seq, payoffMo, pctPaid, interestLeft, loanAmt, color: COLORS[i % COLORS.length] };
  });

  // ── Chart bounds ─────────────────────────────────────────────
  const maxMo  = Math.max(...projections.map(p => p.payoffMo || 0), 12);
  const labels = Array.from({ length: maxMo + 1 }, (_, i) => fmtMYs(i));

  // ── Debt-free offset (months from now) ────────────────────────
  const debtFreeMo = Math.max(...projections.map(p => p.payoffMo || 0));
  const yearsMonths = debtFreeMo > 0
    ? (debtFreeMo >= 24
        ? `${Math.floor(debtFreeMo/12)} yrs ${debtFreeMo%12} mo`
        : debtFreeMo >= 12
        ? `${Math.floor(debtFreeMo/12)} yr ${debtFreeMo%12} mo`
        : `${debtFreeMo} months`)
    : '—';

  // ── KPI totals ────────────────────────────────────────────────
  const totalDebt      = emis.reduce((s, e) => s + e.remainingBalance, 0);
  const totalMonthly   = emis.reduce((s, e) => s + (parseFloat(e.emiAmount)||0), 0);
  const totalInterest  = projections.reduce((s, p) => s + p.interestLeft, 0);

  // ── Chart datasets ───────────────────────────────────────────
  // Total debt area (background)
  const totalSeq = Array.from({ length: maxMo + 1 }, (_, mo) =>
    projections.reduce((s, p) => s + (p.seq[mo] ?? 0), 0)
  );
  const datasets = [
    {
      label: 'Total Debt',
      data: totalSeq,
      borderColor: '#ef4444',
      backgroundColor: 'rgba(239,68,68,0.10)',
      fill: true,
      tension: 0.35,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      order: 10,
    },
    ...projections.map(p => ({
      label: p.e.itemName || p.e.name || 'Loan',
      data: Array.from({ length: maxMo + 1 }, (_, mo) => p.seq[mo] ?? 0),
      borderColor: p.color,
      backgroundColor: 'transparent',
      fill: false,
      tension: 0.35,
      borderWidth: 2,
      borderDash: [5, 3],
      pointRadius: 0,
      pointHoverRadius: 4,
      order: 1,
    })),
  ];

  // ── Per-loan cards ────────────────────────────────────────────
  const cards = projections
    .sort((a, b) => (a.payoffMo||999) - (b.payoffMo||999))
    .map(p => {
      const moLeft  = p.payoffMo || 0;
      const hlColor = moLeft <= 12 ? '#059669' : moLeft <= 36 ? '#d97706' : '#dc2626';
      return `
        <div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid ${p.color};border-radius:var(--r2);padding:15px 17px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:11px">
            <div>
              <div style="font-weight:800;font-size:.95rem;line-height:1.25">${esc(p.e.itemName||p.e.name||'Loan')}</div>
              ${p.e.lender ? `<div style="font-size:.71rem;color:var(--text3);margin-top:1px">${esc(p.e.lender)}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:1.15rem;font-weight:800;color:var(--danger)">${fmtCurrency(p.e.remainingBalance)}</div>
              <div style="font-size:.67rem;color:var(--text3)">of ${fmtCurrency(p.loanAmt)}</div>
            </div>
          </div>
          <!-- Progress bar -->
          <div style="height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:5px">
            <div style="height:100%;width:${p.pctPaid.toFixed(1)}%;background:${p.color};border-radius:99px;transition:width .4s"></div>
          </div>
          <div style="font-size:.7rem;color:var(--text3);text-align:right;margin-bottom:11px">${p.pctPaid.toFixed(0)}% paid off</div>
          <!-- Stats grid -->
          <div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:.75rem;align-items:baseline">
            <span style="color:var(--text3)">Monthly</span>
            <span style="font-weight:600;text-align:right">${fmtCurrency(parseFloat(p.e.emiAmount)||0)}</span>
            <span style="color:var(--text3)">Rate</span>
            <span style="font-weight:600;text-align:right">${p.e.interestRate||0}% p.a.</span>
            <span style="color:var(--text3)">Interest left</span>
            <span style="font-weight:600;text-align:right;color:#d97706">${fmtCurrency(p.interestLeft)}</span>
            <span style="color:var(--text3)">Payoff</span>
            <span style="font-weight:800;text-align:right;color:${hlColor}">${p.payoffMo != null ? fmtMY(p.payoffMo) : '—'}</span>
          </div>
        </div>`;
    }).join('');

  // ── Render HTML ───────────────────────────────────────────────
  wrap.innerHTML = `
    <div style="padding:18px 20px 36px">
      <!-- Page header -->
      <div style="margin-bottom:18px">
        <div style="font-size:1.05rem;font-weight:800;margin-bottom:2px">🏁 Debt Payoff Tracker</div>
        <div style="font-size:.78rem;color:var(--text3)">Your complete path to being debt-free</div>
      </div>

      <!-- KPI strip -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px">
        <div style="background:var(--surface);border:2px solid var(--ok);border-radius:var(--r2);padding:14px 18px;flex:2;min-width:180px">
          <div style="font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Debt-Free Date 🎉</div>
          <div style="font-size:1.4rem;font-weight:800;color:var(--ok)">${debtFreeMo > 0 ? fmtMY(debtFreeMo) : '—'}</div>
          <div style="font-size:.74rem;color:var(--text3);margin-top:3px">in ${yearsMonths}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;flex:1;min-width:130px">
          <div style="font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Total Remaining</div>
          <div style="font-size:1.25rem;font-weight:800;color:var(--danger)">${fmtCurrency(totalDebt)}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;flex:1;min-width:130px">
          <div style="font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Monthly Payments</div>
          <div style="font-size:1.25rem;font-weight:800;color:var(--text1)">${fmtCurrency(totalMonthly)}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;flex:1;min-width:130px">
          <div style="font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Total Interest Left</div>
          <div style="font-size:1.25rem;font-weight:800;color:#d97706">${fmtCurrency(totalInterest)}</div>
        </div>
      </div>

      <!-- Chart -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px 14px;margin-bottom:24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div style="font-size:.85rem;font-weight:800">Payoff Timeline</div>
        </div>
        <div style="position:relative;height:280px"><canvas id="debt-payoff-canvas"></canvas></div>
      </div>

      <!-- Per-loan cards -->
      <div style="font-size:.85rem;font-weight:800;margin-bottom:12px;color:var(--text2)">
        ${emis.length} Active Loan${emis.length !== 1 ? 's' : ''} — sorted by payoff date
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px">
        ${cards}
      </div>
    </div>`;

  // ── Draw Chart.js ─────────────────────────────────────────────
  const canvas = id('debt-payoff-canvas');
  if (!canvas) return;
  _debtPayoffChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 11 }, boxWidth: 14, padding: 14, color: '#94a3b8' },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmtCurrency(Math.max(0, ctx.parsed.y))}`,
          },
        },
      },
      scales: {
        x: {
          ticks: { maxTicksLimit: 14, font: { size: 10 }, color: '#94a3b8', maxRotation: 0 },
          grid: { color: 'rgba(148,163,184,0.15)' },
        },
        y: {
          min: 0,
          ticks: {
            font: { size: 10 },
            color: '#94a3b8',
            callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v,
          },
          grid: { color: 'rgba(148,163,184,0.15)' },
        },
      },
    },
  });
}

// ── Move Transaction to Another Account ──────────────────────
function txnMoveModal(txnId) {
  const t = (D.transactions||[]).find(x => x.id === txnId);
  if (!t) return;
  const curAcct = (D.txnAccounts||[]).find(a => a.id === t.accountId);
  const otherAccts = (D.txnAccounts||[]).filter(a => a.id !== t.accountId);
  if (!otherAccts.length) { toast('No other accounts to move to', 'err'); return; }

  const GROUP_ORDER = ['Bank','Credit Card','Loans','Investment','Tracking','Savings','Cash'];
  const grouped = {};
  otherAccts.forEach(a => {
    const g = a.group || a.type || 'Other';
    (grouped[g] = grouped[g]||[]).push(a);
  });
  const sortedGroups = Object.keys(grouped).sort((a,b) => {
    const ai = GROUP_ORDER.indexOf(a), bi = GROUP_ORDER.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  const opts = sortedGroups.map(g =>
    `<optgroup label="${esc(g)}">${grouped[g].map(a => `<option value="${a.id}">${esc(a.name)}</option>`).join('')}</optgroup>`
  ).join('');

  const amtFmt = t.debit > 0 ? `-${fmtCurrency(t.debit)}` : `+${fmtCurrency(t.credit)}`;
  showModal(`
    <div class="modal-title">➤ Move Transaction</div>
    <div style="font-size:.82rem;color:var(--text2);margin-bottom:14px;padding:8px 10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)">
      <strong>${esc(t.payee||'—')}</strong> &nbsp;·&nbsp; ${t.date||''} &nbsp;·&nbsp;
      <span style="font-weight:600;color:var(--primary)">${amtFmt}</span>
      ${t.notes ? `<span style="color:var(--text3);font-style:italic;margin-left:4px">— ${esc(t.notes)}</span>` : ''}
    </div>
    <div class="form-grid">
      <div class="fg"><label class="flbl">From Account</label>
        <input class="finput" value="${esc(curAcct?curAcct.name:'Unknown')}" readonly style="background:var(--surface2);color:var(--text3)"></div>
      <div class="fg"><label class="flbl">Move To *</label>
        <select id="txn-move-dest" class="finput">
          <option value="">— Select destination —</option>
          ${opts}
        </select>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="BA.txnMoveConfirm('${txnId}')">Move</button>
    </div>`);
  setTimeout(() => id('txn-move-dest')?.focus(), 50);
}

// ── BA namespace entries ──────────────────────────────────────
Object.assign(BA, {
  selectTxnAccount(id_) {
    UI.txnAccount  = id_;
    UI.txnNewRow   = false;
    UI.txnEditRow  = null;
    UI._txnCatUserChanged = false;
    UI.txnDateFrom  = '';
    UI.txnDateTo    = '';
    UI.txnCatFilter = '';
    renderTxnLeftNav();
    renderTxnRight();
    renderTxnKpis();
  },

  // ── Account CRUD ────────────────────────────────────────────
  txnSaveAccount(editId) {
    const name = id('tacct-name').value.trim();
    if (!name) { toast('Account name is required','err'); return; }
    const existing = editId ? (D.txnAccounts||[]).find(a => a.id === editId) : null;
    const obj = {
      id: editId || uid(),
      name,
      type: id('tacct-type').value,
      openingBalance: parseFloat(id('tacct-bal').value) || 0,
      openingDate: id('tacct-date').value,
      ccCardId: existing?.ccCardId || null,  // preserve link if editing a CC-sourced account
      showInCCRepay: id('tacct-ccrepay')?.checked || false,
    };
    if (editId) {
      const idx = D.txnAccounts.findIndex(a => a.id === editId);
      if (idx >= 0) D.txnAccounts[idx] = obj;
    } else {
      D.txnAccounts.push(obj);
      if (!UI.txnAccount) UI.txnAccount = obj.id;
    }
    dirty(); closeModal(); renderTransactions();
  },
  txnDeleteAccount(acctId) {
    const txnCt = (D.transactions||[]).filter(t => t.accountId === acctId).length;
    if (!confirm(`Delete this account?${txnCt ? `\n\nThis will also delete ${txnCt} transaction${txnCt!==1?'s':''} linked to it.` : ''}`)) return;
    D.txnAccounts = D.txnAccounts.filter(a => a.id !== acctId);
    D.transactions = (D.transactions||[]).filter(t => t.accountId !== acctId);
    if (UI.txnAccount === acctId) UI.txnAccount = (D.txnAccounts[0]||{}).id || null;
    recomputeTxnActuals(); dirty(); closeModal(); renderTransactions();
  },

  // ── Move transaction to another account ──────────────────────
  txnMoveModal(txnId) { txnMoveModal(txnId); },
  txnMoveConfirm(txnId) {
    const destAcctId = id('txn-move-dest')?.value;
    if (!destAcctId) { toast('Select a destination account','err'); return; }
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (!t) { closeModal(); return; }
    const destAcct = (D.txnAccounts||[]).find(a => a.id === destAcctId);
    if (!destAcct) { toast('Account not found','err'); return; }
    const oldAcctId = t.accountId;
    t.accountId = destAcctId;
    dirty();
    closeModal();
    // Stay on current account view; re-render both nav and ledger
    renderTxnLeftNav();
    renderTxnRight();
    renderTxnKpis();
    toast(`Moved to ${destAcct.name} ✓`, 'ok');
  },

  // ── Transfer helpers ──────────────────────────────────────────
  txnTransferModal(editTransferId) { txnTransferModal(editTransferId || null); },
  txnSaveTransfer(fromAcctId, editTransferId) {
    const toAcctId = id('txfr-to')?.value;
    const amount   = parseFloat(id('txfr-amt')?.value) || 0;
    const date     = id('txfr-date')?.value;
    const notes    = (id('txfr-notes')?.value || '').trim();
    if (!toAcctId)     { toast('Select a destination account','err'); return; }
    if (amount <= 0)   { toast('Enter a valid amount','err'); return; }
    if (!date)         { toast('Date is required','err'); return; }
    const fromAcct = (D.txnAccounts||[]).find(a => a.id === fromAcctId);
    const toAcct   = (D.txnAccounts||[]).find(a => a.id === toAcctId);
    if (!fromAcct || !toAcct) { toast('Account not found','err'); return; }

    // ── Gather category splits if active ──────────────────────────
    let _splits = undefined;
    if (UI._txfrSplitMode) {
      BA._txfrGather();
      const lines = UI._txfrSplitLines.filter(l => l.categoryId && (parseFloat(l.amount)||0) > 0);
      if (lines.length > 0) {
        const splitSum = lines.reduce((s,l) => s + (parseFloat(l.amount)||0), 0);
        if (Math.abs(splitSum - amount) > 0.01) {
          toast(`Split total ${fmtCurrency(splitSum)} must equal transfer amount ${fmtCurrency(amount)}`, 'err');
          return;
        }
        _splits = lines.map(l => ({ categoryId: l.categoryId, amount: parseFloat(l.amount) }));
      }
    }
    // Reset transfer split state
    UI._txfrSplitMode  = false;
    UI._txfrSplitLines = [];

    if (!D.transactions) D.transactions = [];

    if (editTransferId) {
      // Find both legs of the existing transfer and update them
      const leg1 = D.transactions.find(t => t.id === editTransferId);
      if (!leg1) { toast('Transfer not found','err'); return; }
      const linkedId = leg1.transferPairId;
      const leg2 = linkedId ? D.transactions.find(t => t.id === linkedId) : null;
      const debitLeg  = leg1.debit > 0 ? leg1 : leg2;
      const creditLeg = leg1.credit > 0 ? leg1 : leg2;
      if (debitLeg) {
        debitLeg.date = date; debitLeg.debit = amount; debitLeg.credit = 0;
        debitLeg.notes = notes; debitLeg.accountId = fromAcctId;
        debitLeg.transferToAcctId = toAcctId;
        debitLeg.payee = `Transfer to ${toAcct.name}`;
        if (_splits) debitLeg.splits = _splits; else delete debitLeg.splits;
      }
      if (creditLeg) {
        creditLeg.date = date; creditLeg.credit = amount; creditLeg.debit = 0;
        creditLeg.notes = notes; creditLeg.accountId = toAcctId;
        creditLeg.transferFromAcctId = fromAcctId;
        creditLeg.payee = `Transfer from ${fromAcct.name}`;
      }
    } else {
      const transferId = uid();
      const debitId  = uid();
      const creditId = uid();
      // Debit leg: from account (carries the category splits)
      D.transactions.push({
        id: debitId, accountId: fromAcctId,
        date, payee: `Transfer to ${toAcct.name}`,
        debit: amount, credit: 0,
        categoryId: null, notes,
        splits: _splits,
        cleared: false, isTransfer: true,
        transferId, transferPairId: creditId, transferToAcctId: toAcctId,
      });
      // Credit leg: to account
      D.transactions.push({
        id: creditId, accountId: toAcctId,
        date, payee: `Transfer from ${fromAcct.name}`,
        debit: 0, credit: amount,
        categoryId: null, notes,
        cleared: false, isTransfer: true,
        transferId, transferPairId: debitId, transferFromAcctId: fromAcctId,
      });
    }
    recomputeTxnActuals(); dirty(); closeModal(); renderTransactions();
    const splitNote = _splits ? ` (${_splits.length} savings split${_splits.length!==1?'s':''})` : '';
    toast(`↔ Transfer of ${fmtCurrency(amount)} recorded${splitNote}`, 'ok');
  },
  // Delete both legs of a transfer together
  txnDeleteTransferPair(txnId) {
    const txn = (D.transactions||[]).find(t => t.id === txnId);
    if (!txn) return;
    const pairId = txn.transferPairId;
    if (!confirm(`Delete this transfer and its linked transaction?`)) return;
    D.transactions = D.transactions.filter(t => t.id !== txnId && t.id !== pairId);
    recomputeTxnActuals(); dirty(); renderTransactions();
    toast('Transfer deleted','ok');
  },

  // ── CC Repayment Planner methods ──────────────────────────────────────

  // Drilldown popup: all expense-typed transactions for a card in a month
  showCCChargeDrillDown(cardAccountId, month) {
    const card = (D.txnAccounts||[]).find(a => a.id === cardAccountId);
    const cardName = card ? card.name : cardAccountId;
    const [y, m] = month.split('-').map(Number);
    const monthLabel = new Date(y, m-1, 1).toLocaleString('default', { month:'long', year:'numeric' });

    // Same filter as computeCCChargesForMonth
    const txns = (D.transactions||[]).filter(t => {
      if (t.accountId !== cardAccountId) return false;
      if (!t.date || t.date.slice(0,7) !== month) return false;
      if (t.status === 'pending' || t.status === 'rejected') return false;
      if (t.isTransfer) return false;
      if (t.splits && t.splits.length > 0) return t.splits.some(s => s.categoryId && s.categoryId !== '__income__');
      return t.categoryId && t.categoryId !== '__income__';
    }).sort((a,b) => (a.date||'').localeCompare(b.date||''));

    let grandTotal = 0;
    const rows = txns.map(t => {
      let amt = 0;
      let catLabel = '';
      let splitNote = '';

      if (t.splits && t.splits.length > 0) {
        const expLines = t.splits.filter(s => s.categoryId && s.categoryId !== '__income__');
        amt = expLines.reduce((s, sp) => s + (parseFloat(sp.amount)||0), 0);
        const catNames = [...new Set(expLines.map(sp => txnCatLabel(sp.categoryId)||sp.categoryId))];
        catLabel = catNames.join(', ');
        splitNote = `<span style="font-size:.68rem;color:var(--text3);margin-left:3px">(split)</span>`;
      } else {
        amt = (parseFloat(t.debit)||0) - (parseFloat(t.credit)||0);
        catLabel = txnCatLabel(t.categoryId) || t.categoryId || '—';
      }
      grandTotal += amt;

      const isTbd   = (t.notes||'').toUpperCase().includes('TBD');
      const notesHtml = t.notes
        ? `<span style="font-size:.7rem;color:${isTbd?'var(--warn)':'var(--text3)'};display:block;margin-top:1px;font-weight:${isTbd?'600':'400'}">${esc(t.notes)}</span>`
        : '';

      return `<tr onclick="closeModal();BA.txnNavToView('${t.id}','${t.accountId}')"
                  style="border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .12s"
                  onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
        <td style="padding:6px 8px;font-size:.78rem;color:var(--text3);white-space:nowrap">${fmtDate(t.date)}</td>
        <td style="padding:6px 8px;font-size:.78rem;max-width:160px;overflow:hidden;text-overflow:ellipsis">
          <span style="color:var(--primary);text-decoration:underline;text-decoration-style:dotted">${esc(t.payee||'(no payee)')}</span>${splitNote}
          ${notesHtml}
        </td>
        <td style="padding:6px 8px;font-size:.75rem;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(catLabel)}</td>
        <td style="padding:6px 8px;font-size:.82rem;font-weight:500;text-align:right;white-space:nowrap;color:${amt<0?'var(--ok)':'var(--text)'}">${amt<0?'−':''}${fmtC(Math.abs(amt))}</td>
      </tr>`;
    }).join('');

    const emptyState = txns.length === 0
      ? `<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--text3)">No expense-typed transactions found for ${monthLabel}</td></tr>`
      : '';

    showModal(`
      <div class="modal-title" style="display:flex;align-items:center;gap:8px">
        <span>💳 ${esc(cardName)}</span>
        <span style="font-size:.78rem;font-weight:400;color:var(--text3)">${monthLabel}</span>
      </div>
      <div style="margin-bottom:10px;font-size:.78rem;color:var(--text3)">
        ${txns.length} transaction${txns.length!==1?'s':''} · Charged: <strong style="color:var(--text)">${fmtC(grandTotal)}</strong>
        ${txns.length>0?' · <span style="font-size:.72rem;opacity:.7">click a row to go to the transaction</span>':''}
      </div>
      <div style="overflow-x:auto;max-height:400px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface2);font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">
              <th style="padding:5px 8px;text-align:left;font-weight:600;white-space:nowrap">Date</th>
              <th style="padding:5px 8px;text-align:left;font-weight:600">Payee / Notes</th>
              <th style="padding:5px 8px;text-align:left;font-weight:600">Category</th>
              <th style="padding:5px 8px;text-align:right;font-weight:600">Amount</th>
            </tr>
          </thead>
          <tbody>${rows}${emptyState}</tbody>
        </table>
      </div>
      <div style="margin-top:12px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="closeModal()" style="font-size:.78rem">Close</button>
      </div>
    `);
  },

  ccrUpdateCapitalized(cardId, charged, month) {
    const alreadyPaid = (D.budget.ccRepayments||[])
      .filter(r => r.cardAccountId === cardId && r.month === month)
      .reduce((s,r) => s + (parseFloat(r.amountPaid)||0), 0);
    const payEl = id(`ccr-pay-${cardId}`);
    const capEl = id(`ccr-cap-${cardId}`);
    if (!payEl || !capEl) return;
    const newAmt = parseFloat(payEl.value.replace(/[^0-9.]/g,'')) || 0;
    const cap    = Math.max(0, charged - alreadyPaid - newAmt);
    capEl.textContent = fmtCurrency(cap);
    capEl.style.color = cap > 0 ? 'var(--danger)' : 'var(--ok)';
    const lbl = id(`ccr-cap-lbl-${cardId}`);
    if (lbl) lbl.style.color = cap > 0 ? '#b45309' : 'var(--text3)';
  },
  ccrRecordPayment(cardId, month, charged) {
    const payEl  = id(`ccr-pay-${cardId}`);
    const bankEl = id(`ccr-bank-${cardId}`);
    if (!payEl || !bankEl) return;
    const amountPaid = parseFloat(payEl.value.replace(/[^0-9.]/g,'')) || 0;
    const bankAcctId = bankEl.value;
    if (!bankAcctId) { toast('Select a bank account to pay from', 'err'); return; }
    if (amountPaid <= 0) { toast('Enter an amount to pay', 'err'); return; }

    const card = (D.txnAccounts||[]).find(a => a.id === cardId);
    const bank = (D.txnAccounts||[]).find(a => a.id === bankAcctId);
    if (!card || !bank) { toast('Account not found', 'err'); return; }

    // Create transfer: debit Bank → credit CC card
    const today      = centralToday();
    const transferId = uid();
    const debitId    = uid();
    const creditId   = uid();
    const notes      = `CC payment — ${bFmtMonth(month)}`;
    D.transactions.push({
      id: debitId, accountId: bankAcctId,
      date: today, payee: `CC Payment to ${card.name}`,
      debit: amountPaid, credit: 0,
      categoryId: null, notes,
      cleared: false, isTransfer: true,
      transferId, transferPairId: creditId, transferToAcctId: cardId,
    });
    D.transactions.push({
      id: creditId, accountId: cardId,
      date: today, payee: `Payment from ${bank.name}`,
      debit: 0, credit: amountPaid,
      categoryId: null, notes,
      cleared: false, isTransfer: true,
      transferId, transferPairId: debitId, transferFromAcctId: bankAcctId,
    });

    // Append payment record (multiple allowed per card+month)
    if (!D.budget.ccRepayments) D.budget.ccRepayments = [];
    const prevPaid    = (D.budget.ccRepayments||[])
      .filter(r => r.month === month && r.cardAccountId === cardId)
      .reduce((s,r) => s + (parseFloat(r.amountPaid)||0), 0);
    const capitalized = Math.max(0, charged - prevPaid - amountPaid);
    D.budget.ccRepayments.push({
      id: uid(), month, cardAccountId: cardId, bankAccountId: bankAcctId,
      totalCharged: charged, amountPaid, capitalized, txnId: debitId,
    });

    dirty();
    renderBudget();
    renderTxnKpis();
    toast(`Payment of ${fmtCurrency(amountPaid)} recorded${capitalized > 0 ? ` · ${fmtCurrency(capitalized)} still capitalizing` : ' · fully paid ✓'}`, 'ok');
  },

  // Record payment from the unified inline form in the two-column grid
  ccrRecordPaymentForm(month) {
    const cardEl  = id('ccr-form-card');   // present only when no card is selected
    const bankEl  = id('ccr-bank-form');
    const amtEl   = id('ccr-amt-form');
    if (!bankEl || !amtEl) return;

    // Determine card id — from dropdown when "all", from UI.ccrSelectedCard otherwise
    const cardId    = cardEl ? cardEl.value : (UI.ccrSelectedCard || '');
    const bankAcctId = bankEl.value;
    const amountPaid = parseFloat((amtEl.value || '').replace(/[^0-9.]/g, '')) || 0;

    if (!cardId)     { toast('Select a credit card', 'err'); return; }
    if (!bankAcctId) { toast('Select a bank account to pay from', 'err'); return; }
    if (amountPaid <= 0) { toast('Enter an amount greater than 0', 'err'); return; }

    const card = (D.txnAccounts||[]).find(a => a.id === cardId);
    const bank = (D.txnAccounts||[]).find(a => a.id === bankAcctId);
    if (!card || !bank) { toast('Account not found', 'err'); return; }

    // Create transfer pair: debit Bank, credit CC card
    const today      = centralToday();
    const transferId = uid();
    const debitId    = uid();
    const creditId   = uid();
    const notes      = `CC payment — ${bFmtMonth(month)}`;
    D.transactions.push({
      id: debitId, accountId: bankAcctId,
      date: today, payee: `CC Payment to ${card.name}`,
      debit: amountPaid, credit: 0,
      categoryId: null, notes,
      cleared: false, isTransfer: true,
      transferId, transferPairId: creditId, transferToAcctId: cardId,
    });
    D.transactions.push({
      id: creditId, accountId: cardId,
      date: today, payee: `Payment from ${bank.name}`,
      debit: 0, credit: amountPaid,
      categoryId: null, notes,
      cleared: false, isTransfer: true,
      transferId, transferPairId: debitId, transferFromAcctId: bankAcctId,
    });

    // Append payment record (multiple per card+month are allowed)
    if (!D.budget.ccRepayments) D.budget.ccRepayments = [];
    const charged     = computeCCChargesForMonth(cardId, month);
    const prevPaid    = (D.budget.ccRepayments)
      .filter(r => r.month === month && r.cardAccountId === cardId)
      .reduce((s, r) => s + (parseFloat(r.amountPaid)||0), 0);
    const capitalized = Math.max(0, charged - prevPaid - amountPaid);
    D.budget.ccRepayments.push({
      id: uid(), month, cardAccountId: cardId, bankAccountId: bankAcctId,
      totalCharged: charged, amountPaid, capitalized, txnId: debitId,
    });

    dirty();
    renderBudget();
    renderTxnKpis();
    toast(`Payment of ${fmtCurrency(amountPaid)} recorded${capitalized > 0 ? ` · ${fmtCurrency(capitalized)} still remaining` : ' · fully paid ✓'}`, 'ok');
  },

  // Delete one specific payment record by its id
  ccrDeletePayment(recId) {
    const rec = (D.budget.ccRepayments||[]).find(r => r.id === recId);
    if (!rec) return;
    if (rec.txnId) {
      const txn = (D.transactions||[]).find(t => t.id === rec.txnId);
      if (txn) {
        D.transactions = D.transactions.filter(t => t.id !== rec.txnId && t.id !== txn.transferPairId);
      }
    }
    D.budget.ccRepayments = D.budget.ccRepayments.filter(r => r.id !== recId);
    dirty();
    renderBudget();
    renderTxnKpis();
    toast('Payment removed', 'ok');
  },

  txnFlagPicker(txnId, anchorEl) {
    // Remove any existing picker
    document.querySelectorAll('.txn-flag-picker').forEach(p => p.remove());
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (!t) return;
    const picker = document.createElement('div');
    picker.className = 'txn-flag-picker';
    const swatches = Object.entries(TXN_FLAG_COLORS).map(([name, color]) =>
      `<span class="txn-flag-swatch" style="background:${color}" title="${name}" onclick="BA.txnSetFlag('${txnId}','${name}');this.closest('.txn-flag-picker').remove()"></span>`
    ).join('');
    picker.innerHTML = swatches + `<span class="txn-flag-swatch" style="background:var(--surface2);border:1px dashed var(--border)" title="Clear flag" onclick="BA.txnSetFlag('${txnId}','');this.closest('.txn-flag-picker').remove()">✕</span>`;
    document.body.appendChild(picker);

    // Position below (or above if near bottom edge) the anchor using fixed coords
    const rect      = anchorEl.getBoundingClientRect();
    const ph        = picker.offsetHeight || 180; // approx height before paint
    const spaceBelow = window.innerHeight - rect.bottom;
    const top = spaceBelow >= ph + 8 ? rect.bottom + 4 : rect.top - ph - 4;
    // Center horizontally on the anchor, clamped to viewport
    const left = Math.min(Math.max(rect.left + rect.width/2 - 20, 6), window.innerWidth - 52);
    picker.style.top  = top  + 'px';
    picker.style.left = left + 'px';

    // Close on outside click
    setTimeout(() => document.addEventListener('click', function h(e) {
      if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', h); }
    }), 10);
  },
  txnSetFlag(txnId, flagName) {
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (!t) return;
    if (flagName) t.flag = flagName; else delete t.flag;
    dirty();
    renderTxnRight();
  },

  txnSaveInline(editId, openNew=false) {
    const date  = (id('ti-date')?.value || '').trim();
    const payee = (id('ti-payee')?.value || '').trim();
    if (!date)  { toast('Date is required','err'); return; }
    if (!payee) { toast('Payee is required','err'); return; }
    const debit  = parseFloat(id('ti-debit')?.value)  || 0;
    const credit = parseFloat(id('ti-credit')?.value) || 0;
    if (!debit && !credit) { toast('Enter a debit or credit amount','err'); return; }

    // ── Split mode: gather lines and validate ────────────────────
    let splitLines = null;
    if (UI._txnSplitMode) {
      BA._gatherSplitLines();
      const lines = UI._txnSplitLines.filter(l => l.categoryId && (parseFloat(l.amount)||0) > 0);
      if (!lines.length) { toast('Add at least one split line with a category and amount','err'); return; }
      const total    = debit || credit;
      const splitSum = lines.reduce((s, l) => s + (parseFloat(l.amount)||0), 0);
      if (Math.abs(splitSum - total) > 0.01) {
        toast(`Split total ${fmtCurrency(splitSum)} must equal transaction amount ${fmtCurrency(total)}`, 'err');
        return;
      }
      splitLines = lines.map(l => ({ categoryId: l.categoryId, amount: parseFloat(l.amount), notes: (l.notes||'').trim(),
        familyMemberId: l.familyMemberId || '', famEntryId: l.famEntryId || '' }));
    }

    // ── Expense Type required for Bank / Credit Card / Savings / Cash / Investment ──
    const _acct     = (D.txnAccounts||[]).find(a => a.id === UI.txnAccount);
    const _acctType = _acct?.type || '';
    const _requiresCat = ['Bank','Credit Card','Savings','Cash'].includes(_acctType);
    const _resolvedCat = splitLines ? null : (id('ti-cat')?.value || null);
    const _isTransferRow = !!id('ti-is-transfer')?.value; // set by transfer rows
    if (_requiresCat && !_isTransferRow && !splitLines && !_resolvedCat) {
      toast('Expense Type is required for ' + _acctType + ' accounts','err'); return;
    }

    const obj = {
      id: editId || uid(),
      accountId: UI.txnAccount,
      date, payee,
      debit, credit,
      categoryId: splitLines ? null : _resolvedCat,
      splits: splitLines || undefined,
      notes: (id('ti-notes')?.value || '').trim(),
      cleared: !!id('ti-cleared')?.checked,
    };
    // Remove undefined splits key for cleanliness
    if (!obj.splits) delete obj.splits;

    // ── Family member linkage ────────────────────────────────────
    // Collect ALL previous family entries from this transaction (both txn-level and split-level)
    const _existingTxn = editId ? (D.transactions||[]).find(t => t.id === editId) : null;
    const _prevFamEntries = []; // {memberId, entryId}
    if (_existingTxn?.familyMemberId && _existingTxn?.famEntryId)
      _prevFamEntries.push({ memberId: _existingTxn.familyMemberId, entryId: _existingTxn.famEntryId });
    (_existingTxn?.splits||[]).forEach(s => {
      if (s.familyMemberId && s.famEntryId)
        _prevFamEntries.push({ memberId: s.familyMemberId, entryId: s.famEntryId });
    });

    // Helper: upsert one family ledger entry, returns the entry id
    const _upsertFamEntry = (memberId, existingEntryId, dr, cr, description, notes, txnId) => {
      if (!D.familyAccounts) D.familyAccounts = { persons: [], ledgers: {} };
      if (!D.familyAccounts.ledgers) D.familyAccounts.ledgers = {};
      if (!D.familyAccounts.ledgers[memberId]) D.familyAccounts.ledgers[memberId] = [];
      const existing = existingEntryId
        ? D.familyAccounts.ledgers[memberId].find(e => e.id === existingEntryId)
        : null;
      if (existing) {
        existing.date = date; existing.description = description;
        existing.dr = Math.round(dr*100)/100; existing.cr = Math.round(cr*100)/100;
        existing.notes = notes;
        return existing.id;
      }
      const entry = { id: uid(), date, description, dr: Math.round(dr*100)/100, cr: Math.round(cr*100)/100,
                      notes, sourceTxnId: txnId, sourceAcctId: UI.txnAccount };
      D.familyAccounts.ledgers[memberId].push(entry);
      D.familyAccounts.ledgers[memberId].sort((a,b) => a.date.localeCompare(b.date));
      return entry.id;
    };

    const _keptEntryIds = new Set();

    if (splitLines) {
      // ── Split mode: one family entry per split line ──────────
      obj.splits = splitLines.map((line, i) => {
        const fam = line.familyMemberId || '';
        if (fam) {
          const prevEntry = _prevFamEntries.find(e => e.memberId === fam && e.entryId === line.famEntryId);
          const entryId = _upsertFamEntry(fam, prevEntry?.entryId || '', parseFloat(line.amount)||0, 0,
            `${payee} (${txnCatLabel(line.categoryId)||'split'})`, line.notes || obj.notes || '', obj.id);
          _keptEntryIds.add(entryId);
          return { ...line, familyMemberId: fam, famEntryId: entryId };
        }
        return line;
      });
      // Clear transaction-level family fields in split mode
      delete obj.familyMemberId; delete obj.famEntryId;
    } else {
      // ── Single mode: transaction-level family member ─────────
      const _famMemberId = id('ti-family-member')?.value || '';
      if (_famMemberId) {
        const prevTxnEntry = _prevFamEntries.find(e => e.memberId === _famMemberId);
        const entryId = _upsertFamEntry(_famMemberId, prevTxnEntry?.entryId || '',
          debit, credit, payee, obj.notes || '', obj.id);
        _keptEntryIds.add(entryId);
        obj.familyMemberId = _famMemberId;
        obj.famEntryId = entryId;
      }
    }

    // Remove any previous family entries that are no longer referenced
    _prevFamEntries.forEach(({ memberId, entryId }) => {
      if (!_keptEntryIds.has(entryId) && D.familyAccounts?.ledgers?.[memberId]) {
        D.familyAccounts.ledgers[memberId] =
          D.familyAccounts.ledgers[memberId].filter(e => e.id !== entryId);
      }
    });

    if (editId) {
      const existing = (D.transactions||[]).find(t => t.id === editId);
      const idx = (D.transactions||[]).findIndex(t => t.id === editId);
      if (idx >= 0) {
        // Preserve transfer metadata when editing a transfer leg
        if (existing?.isTransfer) {
          obj.isTransfer         = true;
          obj.transferId         = existing.transferId;
          obj.transferPairId     = existing.transferPairId;
          obj.transferToAcctId   = existing.transferToAcctId;
          obj.transferFromAcctId = existing.transferFromAcctId;
          // ── #6: Sync the paired leg (amount + date + notes) ──────────
          const pairIdx = (D.transactions||[]).findIndex(t => t.id === existing.transferPairId);
          if (pairIdx >= 0) {
            const pair = D.transactions[pairIdx];
            pair.date  = date;
            pair.notes = obj.notes;
            // Keep amounts consistent: debit leg → amount is debit; credit leg → amount is credit
            if (pair.debit  > 0) { pair.debit  = debit || credit; pair.credit = 0; }
            else                  { pair.credit = debit || credit; pair.debit  = 0; }
          }
        }
        D.transactions[idx] = obj;
      }
    } else {
      if (!D.transactions) D.transactions = [];
      D.transactions.push(obj);
    }
    UI.txnEditRow       = null;
    UI._txnCatUserChanged = false;
    UI._txnSplitMode    = false;
    UI._txnSplitLines   = [];
    UI._txnCurDebit     = 0;
    UI._txnCurCredit    = 0;
    UI._txnCurPayee     = '';
    UI._txnCurNotes     = '';
    recomputeTxnActuals();
    dirty();
    if (openNew) {
      UI.txnNewRow = true; // keep new-row open for next entry
      renderTransactions();
      const d = id('ti-date'); if (d) { d.focus(); d.select(); }
    } else {
      UI.txnNewRow = false;
      renderTransactions();
    }
  },

  // ── CSV Import executor ───────────────────────────────────────
  txnRunImport(csvAcctNames) {
    const rows = window._txnImportRows || [];
    if (!rows.length) { toast('No import data found','err'); return; }

    // Read options
    const skipTransfers  = !!id('imp-skip-transfers')?.checked;
    const skipBlankCat   = !!id('imp-skip-blank-cat')?.checked;
    const groupSplits    = !!id('imp-group-splits')?.checked;
    const skipZero       = !!id('imp-skip-zero')?.checked;

    // Build CSV account name → app account id map from modal selects
    const _k = n => 'acct_' + n.replace(/[^a-zA-Z0-9]/g,'_');
    const acctMap = {};
    (csvAcctNames || window._txnImportAccts || []).forEach(name => {
      const sel = id(`imp-${_k(name)}`);
      acctMap[name] = sel ? sel.value : '';
    });

    // Helper: parse split memo → {n, total} or null
    const splitMemoRe = /Split \((\d+)\/(\d+)\)/i;

    // Filter & group rows
    let kept = rows.filter(r => {
      if (!r.date) return false;
      if (skipZero && r.outflow === 0 && r.inflow === 0) return false;
      if (skipTransfers && (r.payee.startsWith('Transfer :') || r.payee.startsWith('Transfer:'))) return false;
      if (skipBlankCat && !r.catName && !r.catGroup) return false;
      if (!acctMap[r.account]) return false; // account not mapped
      return true;
    });

    // Group split rows → single split transactions
    let txnsToAdd = [];
    if (groupSplits) {
      // Mark split rows and group them
      const processed = new Set();
      for (let i = 0; i < kept.length; i++) {
        if (processed.has(i)) continue;
        const r = kept[i];
        const sm = r.memo.match(splitMemoRe);
        if (sm) {
          // Find all sibling split rows: same account + date + payee
          const siblings = [];
          for (let j = 0; j < kept.length; j++) {
            if (processed.has(j)) continue;
            const s = kept[j];
            if (s.account === r.account && s.date === r.date && s.payee === r.payee && s.memo.match(splitMemoRe)) {
              siblings.push(j);
              processed.add(j);
            }
          }
          if (siblings.length > 1) {
            // Build a split transaction
            const accountId = acctMap[r.account];
            const debit  = siblings.reduce((s,idx) => s + kept[idx].outflow, 0);
            const credit = siblings.reduce((s,idx) => s + kept[idx].inflow,  0);
            const splitLines = siblings.map(idx => {
              const sr = kept[idx];
              return { categoryId: _matchCsvCat(sr.catGroup, sr.catName) || null, amount: sr.outflow || sr.inflow };
            }).filter(l => l.amount > 0);
            const obj = {
              id: uid(), accountId, date: r.date, payee: r.payee,
              debit: Math.round(debit*100)/100,
              credit: Math.round(credit*100)/100,
              splits: splitLines.length > 1 ? splitLines : undefined,
              categoryId: splitLines.length === 1 ? splitLines[0].categoryId : null,
              notes: '',
              cleared: r.cleared,
              _importSource: true,
            };
            if (!obj.splits) delete obj.splits;
            txnsToAdd.push(obj);
            continue;
          }
        }
        if (!processed.has(i)) {
          processed.add(i);
          const accountId = acctMap[r.account];
          txnsToAdd.push({
            id: uid(), accountId, date: r.date, payee: r.payee,
            debit: r.outflow, credit: r.inflow,
            categoryId: _matchCsvCat(r.catGroup, r.catName) || null,
            notes: r.memo,
            cleared: r.cleared,
            _importSource: true,
          });
        }
      }
    } else {
      txnsToAdd = kept.map(r => ({
        id: uid(), accountId: acctMap[r.account], date: r.date, payee: r.payee,
        debit: r.outflow, credit: r.inflow,
        categoryId: _matchCsvCat(r.catGroup, r.catName) || null,
        notes: r.memo,
        cleared: r.cleared,
        _importSource: true,
      }));
    }

    // Dedup: skip if same accountId + date + payee + debit within $0.01 already exists
    const existing = D.transactions || [];
    let dupeCount = 0;
    const finalTxns = txnsToAdd.filter(n => {
      const isDupe = existing.some(e =>
        e.accountId === n.accountId &&
        e.date === n.date &&
        (e.payee||'').trim().toLowerCase() === (n.payee||'').trim().toLowerCase() &&
        Math.abs((e.debit||0) - (n.debit||0)) < 0.02
      );
      if (isDupe) { dupeCount++; return false; }
      return true;
    });

    if (!finalTxns.length) {
      toast(`Nothing to import — ${dupeCount > 0 ? dupeCount + ' duplicates skipped' : 'no rows matched criteria'}`, 'warn');
      return;
    }

    // Add to transactions
    if (!D.transactions) D.transactions = [];
    finalTxns.forEach(t => { delete t._importSource; D.transactions.push(t); });

    recomputeTxnActuals(); dirty(); closeModal(); renderTransactions();
    toast(`✓ Imported ${finalTxns.length} transaction${finalTxns.length!==1?'s':''}${dupeCount?' ('+dupeCount+' duplicate'+( dupeCount!==1?'s':'')+' skipped)':''}`, 'ok');
    window._txnImportRows = null;
  },

  // ── Transfer modal category-split helpers ────────────────────────────
  _txfrGather() {
    UI._txfrSplitLines = UI._txfrSplitLines.map((l, i) => ({
      categoryId: id(`txfr-split-cat-${i}`)?.value || l.categoryId || '',
      amount:     id(`txfr-split-amt-${i}`)?.value ?? (l.amount ?? ''),
    }));
  },
  _txfrRenderSplits() {
    const toggleEl  = id('txfr-split-toggle');
    const sectionEl = id('txfr-split-section');
    if (!toggleEl || !sectionEl) return;

    if (!UI._txfrSplitMode) {
      sectionEl.style.display = 'none';
      toggleEl.innerHTML = `<button type="button" class="txn-split-link" onclick="BA.txfrToggleSplits()" style="font-size:.77rem">÷ Add savings category splits</button>`;
      return;
    }

    // Build split lines HTML
    sectionEl.style.display = '';
    toggleEl.innerHTML = '';
    const total    = parseFloat(id('txfr-amt')?.value) || 0;
    const splitSum = UI._txfrSplitLines.reduce((s, l) => s + (parseFloat(l.amount)||0), 0);
    const rem      = +(total - splitSum).toFixed(2);
    const remOk    = Math.abs(rem) < 0.005;
    const remColor = remOk ? 'var(--ok)' : rem < 0 ? 'var(--danger)' : 'var(--text2)';
    const remLabel = remOk ? '✓ Balanced' : rem > 0 ? `${fmtCurrency(rem)} left` : `${fmtCurrency(Math.abs(rem))} over`;

    const lineRows = UI._txfrSplitLines.map((l, i) => `
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
        <select id="txfr-split-cat-${i}" class="finput" style="flex:1;font-size:.8rem;padding:3px 6px">
          ${txnCatOptions(l.categoryId || null)}
        </select>
        <input type="number" id="txfr-split-amt-${i}" class="finput"
          style="width:88px;font-size:.8rem;padding:3px 6px;text-align:right"
          step="0.01" min="0" value="${l.amount !== '' && l.amount !== undefined ? l.amount : ''}"
          placeholder="0.00" oninput="BA._txfrRenderBalance()">
        <button type="button"
          style="color:var(--danger);background:none;border:none;cursor:pointer;font-size:.9rem;line-height:1;padding:0 3px;flex-shrink:0"
          onclick="BA.txfrRemoveSplitLine(${i})" title="Remove line">✕</button>
      </div>`).join('');

    sectionEl.innerHTML = `
      <div style="border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;background:var(--surface2);margin-top:4px">
        <div style="font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:10px">
          💰 Savings Category Splits
          <span style="font-weight:400;font-size:.72rem;color:var(--text3);margin-left:6px">How is this transfer allocated across savings categories?</span>
        </div>
        ${lineRows}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
          <button type="button" class="txn-split-link" onclick="BA.txfrAddSplitLine()">＋ Add line</button>
          <span id="txfr-split-rem" style="font-size:.72rem;color:${remColor};font-weight:600">${remLabel}</span>
        </div>
        <div style="margin-top:8px;text-align:right">
          <button type="button" class="txn-split-link" style="font-size:.69rem;opacity:.6" onclick="BA.txfrToggleSplits()">✕ Remove category splits</button>
        </div>
      </div>`;
  },
  _txfrRenderBalance() {
    const total = parseFloat(id('txfr-amt')?.value) || 0;
    let splitSum = 0, i = 0;
    while (id(`txfr-split-amt-${i}`)) { splitSum += parseFloat(id(`txfr-split-amt-${i}`)?.value)||0; i++; }
    const rem      = +(total - splitSum).toFixed(2);
    const remOk    = Math.abs(rem) < 0.005;
    const remColor = remOk ? 'var(--ok)' : rem < 0 ? 'var(--danger)' : 'var(--text2)';
    const remLabel = remOk ? '✓ Balanced' : rem > 0 ? `${fmtCurrency(rem)} left` : `${fmtCurrency(Math.abs(rem))} over`;
    const el = id('txfr-split-rem');
    if (el) { el.textContent = remLabel; el.style.color = remColor; }
  },
  txfrToggleSplits() {
    if (UI._txfrSplitMode) {
      // Turning off: clear splits
      UI._txfrSplitMode  = false;
      UI._txfrSplitLines = [];
    } else {
      UI._txfrSplitMode = true;
      if (!UI._txfrSplitLines.length) UI._txfrSplitLines = [{ categoryId: '', amount: '' }];
    }
    BA._txfrRenderSplits();
  },
  txfrAddSplitLine() {

    UI._txfrSplitLines.push({ categoryId: '', amount: '' });
    BA._txfrRenderSplits();

  txfrRemoveSplitLine(i) {
    BA._txfrGather();
    UI._txfrSplitLines.splice(i, 1);
    if (!UI._txfrSplitLines.length) UI._txfrSplitMode = false;
    BA._txfrRenderSplits();
  },

  savingsPotsConfigure() {

    const groups = D.budget?.groups || [];
    const accts  = D.txnAccounts   || [];
    showModal(`
      <div class="modal-title">⚙ Configure Savings Pots</div>
      <div style="margin-bottom:14px">

  // ── Drag-and-drop reordering ──────────────────────────────────
  txnDragStart(e, acctId) {
    _txnDrag = { active: true, id: acctId, overEl: null };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', acctId);
    // delay class add so the drag image renders first
    setTimeout(() => {
      const el = document.querySelector(`[data-acct-id="${acctId}"]`);
      if (el) el.classList.add('dragging');
    }, 0);
  },
  txnDragOver(e, acctId) {
    if (!_txnDrag.active || _txnDrag.id === acctId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // Remove highlight from previous target
    if (_txnDrag.overEl) {
      _txnDrag.overEl.classList.remove('drag-over-top','drag-over-bot');
    }
    const el = document.querySelector(`[data-acct-id="${acctId}"]`);
    if (el) {
      const rect = el.getBoundingClientRect();
      const mid  = rect.top + rect.height / 2;
      el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bot');
      _txnDrag.overEl = el;
    }
  },
  txnDrop(e, targetId) {
    e.preventDefault();
    if (!_txnDrag.active || _txnDrag.id === targetId) return;
    const srcId = _txnDrag.id;
    const accts = D.txnAccounts;
    const srcIdx = accts.findIndex(a => a.id === srcId);
    const tgtIdx = accts.findIndex(a => a.id === targetId);
    if (srcIdx < 0 || tgtIdx < 0) return;
    // Only allow reorder within same group (type)
    if (accts[srcIdx].type !== accts[tgtIdx].type) {
      toast('Accounts can only be reordered within the same group','err');
      return;
    }
    // Determine insert position (above or below target)
    const tgtEl = document.querySelector(`[data-acct-id="${targetId}"]`);
    const rect  = tgtEl ? tgtEl.getBoundingClientRect() : null;
    const insertAfter = rect ? e.clientY >= rect.top + rect.height / 2 : false;
    // Reorder array
    const [moved] = accts.splice(srcIdx, 1);
    const newTgt  = accts.findIndex(a => a.id === targetId);
    accts.splice(insertAfter ? newTgt + 1 : newTgt, 0, moved);
    dirty(); renderTxnLeftNav();
  },
  txnDragEnd(e) {
    if (_txnDrag.overEl) _txnDrag.overEl.classList.remove('drag-over-top','drag-over-bot');
    document.querySelectorAll('.txn-acct-item.dragging').forEach(el => el.classList.remove('dragging'));
    _txnDrag = { active: false, id: null, overEl: null };
  },

  // ── Row cleared toggle ───────────────────────────────────────
  txnDelete(txnId) {
    const txn = (D.transactions||[]).find(t => t.id === txnId);
    if (!txn) return;
    if (txn.isTransfer && txn.transferPairId) {
      BA.txnDeleteTransferPair(txnId); return; // handles its own confirm + cleanup
    }
    // Show confirmation modal before deleting
    const _payee = txn.payee || 'this transaction';
    const _amt   = txn.debit ? `Dr $${parseFloat(txn.debit).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` :
                   txn.credit ? `Cr $${parseFloat(txn.credit).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` : '';
    const _date  = txn.date || '';
    showModal(`
      <div class="modal-title" style="color:var(--danger)">Delete Transaction?</div>
      <p style="margin:0 0 6px;font-size:14px;color:var(--text2)">Are you sure you want to permanently delete:</p>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r1);padding:10px 14px;margin-bottom:16px;font-size:13px">
        <div style="font-weight:700;color:var(--text1)">${esc(_payee)}</div>
        <div style="color:var(--text3);margin-top:2px">${_date}${_date && _amt ? ' &nbsp;·&nbsp; ' : ''}${_amt}</div>
      </div>
      <p style="margin:0 0 18px;font-size:12px;color:var(--text3)">This cannot be undone.</p>
      <div class="mfoot" style="justify-content:flex-end;gap:8px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="closeModal();BA._txnDeleteConfirmed('${txnId}')">Delete</button>
      </div>`);
  },
  _txnDeleteConfirmed(txnId) {
    const txn = (D.transactions||[]).find(t => t.id === txnId);
    if (!txn) return;
    const snapshot = JSON.parse(JSON.stringify(txn));
    D.transactions = (D.transactions||[]).filter(t => t.id !== txnId);
    recomputeTxnActuals(); dirty(); renderTransactions();
    toastUndo(`Deleted: ${snapshot.payee || 'transaction'}`, () => {
      D.transactions = [...(D.transactions||[]), snapshot];
      recomputeTxnActuals(); dirty(); renderTransactions();
      toast('Transaction restored ✓', 'ok');
    });
  },
  txnToggleCleared(txnId) {
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (t) { t.cleared = !t.cleared; dirty(); renderTransactions(); }
  },

  // Approve a pending obligation transaction → mark approved + cleared, record it
  txnReconcile(acctId) {
    const eligible = (D.transactions||[]).filter(t => t.accountId === acctId && t.cleared && !t.reconciled && (!t.status || t.status === 'approved'));
    if (!eligible.length) { toast('No new cleared transactions to reconcile', 'err'); return; }
    if (!confirm(`Mark ${eligible.length} cleared transaction${eligible.length!==1?'s':''} as Reconciled?`)) return;
    eligible.forEach(t => { t.reconciled = true; });
    dirty();
    renderTxnRight();
    renderTxnKpis();
    toast(`${eligible.length} transaction${eligible.length!==1?'s':''} reconciled ✓`, 'ok');

  txnApproveModal(txnId) {
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (!t) return;
    const oblTypeName = t.oblType === 'emi' ? 'Loan/EMI' : t.oblType === 'subscription' ? 'Subscription' : t.oblType === 'split' ? 'Split Payment' : 'Obligation';
    showModal(`

        <strong>${esc(t.payee||'')}</strong> — confirm or adjust the date and amount before recording.
      </div>

          <label class="flabel">Date</label>

        </div>
        <div class="fg">

        </div>

    `);
    setTimeout(() => { const el = id('obl-approve-date'); if (el) el.focus(); }, 80);

  txnApproveConfirm(txnId) {
    const t = (D.transactions||[]).find(x => x.id === txnId);
    if (!t) return;
    const newDate   = (id('obl-approve-date')?.value   || '').trim();
    const newAmount = parseFloat(id('obl-approve-amount')?.value) || 0;
    if (!newDate)   { toast('Please enter a date', 'err'); return; }
    if (!newAmount) { toast('Please enter an amount', 'err'); return; }
    // Apply edits — preserve oblMonth so dedup key is unchanged (won't re-trigger)
    t.date  = newDate;
    if (t.debit > 0 || t.credit === 0) { t.debit = newAmount; t.credit = 0; }
    else { t.credit = newAmount; t.debit = 0; }

    recomputeTxnActuals();
    dirty();
    closeModal();
    renderTransactions();
    toast('Obligation approved ✓', 'ok');

  txnApprove(txnId) {

  // Smart export — works for both single-account and all-accounts views.
  // Includes Account column when exporting all; includes Balance column for single account.
  // Always respects active date / category filters.
  txnExportSmart() {
    const csvEsc = v => {
      const s = String(v ?? '');
      return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
    };
    const _df = UI.txnDateFrom, _dt = UI.txnDateTo, _cf = UI.txnCatFilter;
    const acct = UI.txnAccount ? (D.txnAccounts||[]).find(a => a.id === UI.txnAccount) : null;

    let rows, headers, filename;

    if (acct) {
      // ── Single account: include running balance, no Account column ──
      const committed = (D.transactions||[])
        .filter(t => t.accountId === acct.id && (!t.status || t.status === 'approved'));
      const withBal = txnRunningBalances(acct, committed);
      rows = withBal.filter(t => {
        if (_df && (t.date||'') < _df) return false;
        if (_dt && (t.date||'') > _dt) return false;
        if (_cf) {
          if (t.categoryId !== _cf && !(t.splits||[]).some(s => s.categoryId === _cf)) return false;
        }
        return true;
      });
      if (!rows.length) { toast('No transactions match the current filter', 'err'); return; }
      headers = ['Date','Payee','Expense Type','Notes','Debit','Credit','Balance','Cleared','Reconciled'];
      const catPart  = _cf ? (txnCatLabel(_cf)||_cf).replace(/[^a-z0-9]/gi,'_') : 'all';
      const datePart = (_df||_dt) ? `_${(_df||'').replace(/-/g,'')||'start'}-${(_dt||'').replace(/-/g,'')||'end'}` : '';
      filename = `${acct.name.replace(/[^a-z0-9]/gi,'_')}_${catPart}${datePart}.csv`;
    } else {
      // ── All accounts: include Account column, sorted newest first ──
      const acctMap = {};
      (D.txnAccounts||[]).forEach(a => { acctMap[a.id] = a; });
      rows = (D.transactions||[])
        .filter(t => {
          if (t.status && t.status !== 'approved') return false;
          if (_df && (t.date||'') < _df) return false;
          if (_dt && (t.date||'') > _dt) return false;
          if (_cf) {
            if (t.categoryId !== _cf && !(t.splits||[]).some(s => s.categoryId === _cf)) return false;
          }
          return true;
        })
        .sort((a,b) => (b.date||'').localeCompare(a.date||''));
      if (!rows.length) { toast('No transactions match the current filter', 'err'); return; }
      headers = ['Date','Account','Payee','Expense Type','Notes','Debit','Credit','Cleared','Reconciled'];
      const catPart  = _cf ? (txnCatLabel(_cf)||_cf).replace(/[^a-z0-9]/gi,'_') : 'all_accounts';
      const datePart = (_df||_dt) ? `_${(_df||'').replace(/-/g,'')||'start'}-${(_dt||'').replace(/-/g,'')||'end'}` : '';
      filename = `${catPart}${datePart}.csv`;
      // Attach account names for use in row builder below
      rows._acctMap = acctMap;
    }

    const lines = [headers.join(',')];
    rows.forEach(t => {
      let expType = t.isTransfer ? 'Transfer' : t.splits?.length ? 'Split' : txnCatLabel(t.categoryId) || '';
      const base = [
        csvEsc(t.date || ''),
        ...(acct ? [] : [csvEsc(rows._acctMap?.[t.accountId]?.name || '')]),
        csvEsc(t.payee || ''),
        csvEsc(expType),
        csvEsc(t.notes || ''),
        csvEsc(t.debit  > 0 ? t.debit.toFixed(2)  : ''),
        csvEsc(t.credit > 0 ? t.credit.toFixed(2) : ''),
        ...(acct ? [csvEsc(typeof t._bal === 'number' ? t._bal.toFixed(2) : '')] : []),
        csvEsc(t.cleared    ? 'Yes' : 'No'),
        csvEsc(t.reconciled ? 'Yes' : 'No'),
      ];
      lines.push(base.join(','));
    });

    const blob = new Blob([lines.join('\r\n')], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    toast(`Exported ${rows.length} transaction${rows.length!==1?'s':''} ✓`, 'ok');
  },

  // Sort an obligations grid: toggle dir if same col, else set new col asc
  oblSort(type, col) {
    const s = UI.oblSort[type];
    if (s.col === col) { s.dir = s.dir === 'asc' ? 'desc' : 'asc'; }
    else               { s.col = col; s.dir = 'asc'; }
    if (type === 'sub')   renderOblSubscriptions();
    else if (type === 'emi')   renderOblEmis();
    else if (type === 'split') renderOblSplits();
  },
});

// ── Inline row keyboard shortcuts (Enter = save, Esc = cancel) ──

  if (!id('txn-inline-row')) return; // no inline row active
  if (e.key === 'Escape') { e.preventDefault(); BA.txnCancelInline(); }
  if (e.key === 'Enter' && !e.shiftKey) {
    // Only if focus is inside the inline row
    const row = id('txn-inline-row');
    if (row && row.contains(document.activeElement)) {
      e.preventDefault();
      const editId = row.querySelector('button.btn-primary')?.getAttribute('onclick')?.match(/'([^']*)'/)?.[1] || '';
      BA.txnSaveInline(editId);
    }
  }
});

// ── Budget progress popup on txn-cat-pill hover ──────────────────────
(function() {
  const popup = id('budget-cat-popup');

  function buildPopupHTML(catId) {
    if (!catId) return null;
    const cat    = (D.budget?.categories||[]).find(c => c.id === catId);
    if (!cat) return null;
    const month  = ymNow();
    const budget = budgetGetAdjustedPlan(catId, month);
    const spent  = budgetGetCatActuals(catId, month);
    const remain = budget - spent;
    const pct    = budget > 0 ? Math.min(spent / budget * 100, 100) : (spent > 0 ? 100 : 0);
    const bar    = pct >= 100 ? 'var(--danger)' : pct >= 90 ? 'var(--warn)' : 'var(--ok)';
    const fc     = v => '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

    const noBudget = budget === 0 && spent === 0;
    return `
      <div style="font-size:.68rem;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:700">${bFmtMonth(month)}</div>
      <div style="font-weight:800;font-size:.88rem;color:var(--text1);margin-bottom:9px">${esc(cat.name)}</div>
      ${noBudget ? `<div style="font-size:.76rem;color:var(--text3);font-style:italic">No budget set for this month</div>` : `
      <div style="height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${pct.toFixed(1)}%;background:${bar};border-radius:99px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:4px">
        <span style="color:var(--text3)">Spent</span>
        <span style="font-weight:700;color:${pct>=100?'var(--danger)':'var(--text1)'}">${fc(spent)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:4px">
        <span style="color:var(--text3)">Budget</span>
        <span style="color:var(--text2)">${fc(budget)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;padding-top:5px;border-top:1px solid var(--border);margin-top:2px">
        <span style="color:var(--text3)">${remain >= 0 ? 'Remaining' : 'Over by'}</span>
        <span style="font-weight:700;color:${remain < 0 ? 'var(--danger)' : 'var(--ok)'}">${fc(Math.abs(remain))}</span>
      </div>
      <div style="font-size:.67rem;color:${bar};text-align:right;margin-top:4px;font-weight:600">${Math.round(pct)}% used</div>`}`;
  }

  function positionPopup(anchorEl) {
    const rect = anchorEl.getBoundingClientRect();
    popup.style.left = rect.left + 'px';
    popup.style.top  = (rect.bottom + 6) + 'px';
    // Adjust if it would clip off screen edges
    requestAnimationFrame(() => {
      const pr = popup.getBoundingClientRect();
      if (pr.right > window.innerWidth - 10)
        popup.style.left = Math.max(6, window.innerWidth - pr.width - 10) + 'px';
      if (pr.bottom > window.innerHeight - 10)
        popup.style.top  = (rect.top - pr.height - 6) + 'px';
    });
  }

  document.addEventListener('mouseover', e => {
    const pill = e.target.closest('.txn-cat-pill[data-cat-id]');
    if (!pill || !pill.dataset.catId) { return; }
    const html = buildPopupHTML(pill.dataset.catId);
    if (!html) return;
    popup.innerHTML = html;
    popup.style.display = 'block';
    positionPopup(pill);
  });

  document.addEventListener('mouseout', e => {
    const pill = e.target.closest('.txn-cat-pill[data-cat-id]');
    if (pill) popup.style.display = 'none';
  });
})();
