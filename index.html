        </div>
        <button type="button" class="txn-split-link" style="opacity:.55;margin-top:4px;font-size:.69rem" onclick="BA.txnToggleSplitMode()">⊕ Use single category</button>
      </td>`;
  } else {
    const _curAcct  = (D.txnAccounts||[]).find(a => a.id === UI.txnAccount);
    const _needsCat = ['Bank','Credit Card','Savings','Cash'].includes(_curAcct?.type||'');
    catCell = `
      <td>
        ${_isXfer ? `<input type="hidden" id="ti-is-transfer" value="1">
        <span style="font-size:.74rem;color:var(--text3);font-style:italic;padding:3px 0;display:inline-block">Transfer</span>
        <button type="button" class="txn-split-link" style="margin-top:3px;display:block" onclick="BA.txnToggleSplitMode()">÷ Add savings splits</button>` : `
        <select id="ti-cat" class="finput" style="${iS}width:175px;${_needsCat?'border-color:color-mix(in srgb,var(--primary) 40%,var(--border));':''}" onchange="UI._txnCatUserChanged=true">${txnCatOptions(t && !t.splits ? t.categoryId : null)}</select>
        ${_needsCat ? `<span style="font-size:.67rem;color:var(--primary);opacity:.7">required</span>` : ''}
        <button type="button" class="txn-split-link" style="margin-top:2px;display:block" onclick="BA.txnToggleSplitMode()">÷ Split across categories</button>`}
      </td>`;
  }

  const _famPersons = famPersons();
  // Transaction-level family row only shown in single-category mode (split mode uses per-line pickers)
  const _famRow = (_famPersons.length > 0 && !UI._txnSplitMode) ? `
    <tr id="txn-inline-fam-row" style="background:color-mix(in srgb,var(--primary) 4%,transparent);border-top:none">

          <span style="font-size:.66rem;color:var(--text3);opacity:.75">Auto-adds a "you paid for them" entry in Family tab</span>

  return `
    <tr id="txn-inline-row" style="background:color-mix(in srgb,var(--primary) 6%,transparent)">

      ${catCell}
      <td style="vertical-align:top;padding-top:6px"><input type="text" id="ti-notes" class="finput" style="${iS}width:185px" value="${t ? esc(t.notes||'') : esc(UI._txnCurNotes||'')}" placeholder="Notes"></td>
      <td style="vertical-align:top;padding-top:6px"><input type="number" id="ti-debit" class="finput r" style="${iS}width:88px;text-align:right" step="0.01" min="0" value="${debitVal}" placeholder="0.00" oninput="BA.txnSplitAmtInput()"></td>
      <td style="vertical-align:top;padding-top:6px"><input type="number" id="ti-credit" class="finput r" style="${iS}width:88px;text-align:right" step="0.01" min="0" value="${creditVal}" placeholder="0.00" oninput="BA.txnSplitAmtInput()"></td>

// ── All Accounts flat view ────────────────────────────────────────────
function _renderAllAccountsView(panel) {
  const acctMap = {};
  (D.txnAccounts||[]).forEach(a => { acctMap[a.id] = a; });

  const committed = (D.transactions||[]).filter(t => !t.status || t.status === 'approved');

  // Build expense type options from all transactions
  const _catIdsAll = new Set();
  committed.forEach(t => {
    if (t.categoryId) _catIdsAll.add(t.categoryId);
    (t.splits||[]).forEach(s => { if (s.categoryId) _catIdsAll.add(s.categoryId); });
  });
  const _cf = UI.txnCatFilter, _df = UI.txnDateFrom, _dt = UI.txnDateTo;
  const _catFilterOpts = [..._catIdsAll]
    .map(cid => ({ cid, lbl: txnCatLabel(cid)||cid }))
    .sort((a,b) => a.lbl.localeCompare(b.lbl))
    .map(({cid,lbl}) => `<option value="${cid}" ${cid===_cf?'selected':''}>${esc(lbl)}</option>`)
    .join('');

  // Apply filters
  const allTxns = committed
    .filter(t => {
      if (_df && (t.date||'') < _df) return false;
      if (_dt && (t.date||'') > _dt) return false;
      if (_cf) {
        const mainMatch  = t.categoryId === _cf;
        const splitMatch = (t.splits||[]).some(s => s.categoryId === _cf);
        if (!mainMatch && !splitMatch) return false;
      }
      return true;
    })
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const totalCommitted = committed.length;
  const anyFilterActive = !!(_df || _dt || _cf);

  // ── Net amount across filtered results ─────────────────────────────────
  // When a category filter is active, split transactions contribute only
  // the matching split-line amount (not the whole txn debit/credit).
  let _fltDr = 0, _fltCr = 0;
  allTxns.forEach(t => {
    if (_cf && t.splits && t.splits.length > 0) {
      const lineAmt = t.splits.filter(s => s.categoryId === _cf)
                               .reduce((s, l) => s + (parseFloat(l.amount) || 0), 0);
      // sign from parent transaction direction
      if ((parseFloat(t.credit) || 0) > 0 && !(parseFloat(t.debit) || 0)) _fltCr += lineAmt;
      else _fltDr += lineAmt;
    } else {
      _fltDr += parseFloat(t.debit)  || 0;
      _fltCr += parseFloat(t.credit) || 0;
    }
  });
  const _fltNet = _fltDr - _fltCr;
  const _fltNetColor = _fltNet >= 0 ? 'var(--danger)' : 'var(--ok)';
  const _fltNetLabel = (_fltNet < 0 ? '−' : '') + fmtC(Math.abs(_fltNet));

  const rows = allTxns.map(t => {
    const acctName = acctMap[t.accountId]?.name || '—';
    const isSplit  = t.splits && t.splits.length > 0;
    const isXfer   = !!t.isTransfer;
    let catBadge   = '';
    if (isSplit)     catBadge = `<span class="txn-split-pill">✂ Split (${t.splits.length})</span>`;
    else if (isXfer) catBadge = `<span class="txn-transfer-pill">${t.debit>0?'→':'←'} ${esc(acctMap[t.transferToAcctId||t.transferFromAcctId]?.name||'Transfer')}</span>`;
    else if (t.categoryId) catBadge = `<span class="txn-cat-pill${t.categoryId==='__income__'?' income':''}" data-cat-id="${t.categoryId!=='__income__'?esc(t.categoryId):''}">${esc(txnCatLabel(t.categoryId)||t.categoryId)}</span>`;
    return `<tr>
      <td style="color:var(--text3);font-size:.78rem;white-space:nowrap">${fmtDate(t.date)}</td>
      <td style="font-size:.78rem;color:var(--primary);font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(acctName)}">${esc(acctName)}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.payee||'')}">${esc(t.payee||'')}</td>
      <td>${catBadge}</td>
      <td style="font-size:.75rem;color:var(--text3);max-width:110px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.notes||'')}">${esc(t.notes||'')}</td>
      <td class="r">${t.debit>0?`<span class="txn-debit">${fmtCurrency(t.debit)}</span>`:''}</td>
      <td class="r">${t.credit>0?`<span class="txn-credit">${fmtCurrency(t.credit)}</span>`:''}</td>
      <td style="text-align:center"><span class="txn-pill-clr ${t.cleared?'yes':'no'}">${t.cleared?'✓':'○'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-ghost btn-xs" onclick="BA.selectTxnAccount('${t.accountId}');setTimeout(()=>BA.txnStartEdit('${t.id}'),80)" title="Edit">✎</button>
      </td>
    </tr>`;
  }).join('');

  const filterBar = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 10px;background:${anyFilterActive?'color-mix(in srgb,var(--primary) 6%,var(--surface2))':'var(--surface2)'};border-bottom:1px solid var(--border);font-size:.78rem">
      <span style="color:var(--text3);white-space:nowrap;font-weight:600">🔽 Filter:</span>
      <input type="date" value="${_df||''}" onchange="UI.txnDateFrom=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:130px" title="From date">
      <span style="color:var(--text3)">to</span>
      <input type="date" value="${_dt||''}" onchange="UI.txnDateTo=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:130px" title="To date">
      <span style="color:var(--text3);margin-left:6px">🏷</span>
      <select onchange="UI.txnCatFilter=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid ${_cf?'var(--primary)':'var(--border)'};border-radius:4px;background:var(--surface);color:var(--text);max-width:190px" title="Filter by Expense Type">
        <option value="">All Expense Types</option>
        ${_catFilterOpts}
      </select>
      ${anyFilterActive ? `
        <button onclick="UI.txnDateFrom='';UI.txnDateTo='';UI.txnCatFilter='';renderTxnRight()" style="font-size:.73rem;padding:1px 8px;background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text3)">✕ Clear</button>
        <span style="color:var(--primary);font-weight:600">${allTxns.length} of ${totalCommitted} shown</span>
        <span style="display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:99px;background:color-mix(in srgb,${_fltNetColor} 10%,transparent);border:1px solid color-mix(in srgb,${_fltNetColor} 30%,transparent);font-size:.76rem;font-weight:700;color:${_fltNetColor};white-space:nowrap" title="Net amount of filtered transactions (Debits − Credits)">
          Net ${_fltNetLabel}
        </span>` :
        `<span style="color:var(--text3);opacity:.6">${totalCommitted} transaction${totalCommitted!==1?'s':''}</span>`}
      <div style="margin-left:auto">
        <button onclick="BA.txnExportSmart()" style="font-size:.76rem;padding:3px 10px;background:color-mix(in srgb,var(--ok) 10%,transparent);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);color:var(--ok);border-radius:5px;cursor:pointer;font-weight:600" title="${anyFilterActive?'Export filtered transactions across all accounts':'Export all transactions across all accounts'}">${anyFilterActive?'⬇ Export Filtered':'⬇ Export CSV'}</button>
      </div>
    </div>`;

  panel.innerHTML = `
    <div class="txn-ledger-hdr">
      <span class="txn-ledger-title">🏛 All Accounts <span style="font-size:.72rem;font-weight:400;color:var(--text3)">${anyFilterActive ? allTxns.length+' filtered / '+totalCommitted+' total' : totalCommitted+' transactions'}</span></span>
    </div>
    ${filterBar}
    <div class="txn-tbl-wrap">
      ${allTxns.length ? `
      <table class="txn-tbl">
        <thead><tr>
          <th data-col="txn-date">Date</th>
          <th data-col="txn-acct">Account</th>
          <th data-col="txn-payee">Payee</th>

          <th class="r" data-col="txn-credit">Credit</th>

      </table>` : `<div class="txn-empty"><div class="txn-empty-icon">📋</div><strong>No transactions match the current filter</strong></div>`}
    </div>`;
  requestAnimationFrame(() => initTxnColResize(panel));
}

// ── Column resize defaults & init ────────────────────────────────────────────
const TXN_COL_DEFAULTS = {
  'txn-date':    110,
  'txn-acct':    120,
  'txn-payee':   160,
  'txn-exptype': 120,
  'txn-notes':   200,
  'txn-debit':    95,
  'txn-credit':   95,
  'txn-bal':     105,
  'txn-clr':      70,
};

const TXN_COL_LS_KEY = 'acctmgr_txn_col_widths';

function _txnColSave() {
  try { localStorage.setItem(TXN_COL_LS_KEY, JSON.stringify(UI.txnColWidths)); } catch(e) {}
}

function initTxnColResize(panel) {
  const table = panel && panel.querySelector('.txn-tbl');
  if (!table) return;
  // On first call, seed UI.txnColWidths from localStorage (persisted user prefs)
  if (!UI.txnColWidths) {
    try {
      const saved = localStorage.getItem(TXN_COL_LS_KEY);
      UI.txnColWidths = saved ? JSON.parse(saved) : {};
    } catch(e) { UI.txnColWidths = {}; }
  }

  const ths = table.querySelectorAll('thead th[data-col]');
  ths.forEach(th => {
    const col = th.dataset.col;
    // Apply stored width (user pref) or fall back to coded default
    const w = UI.txnColWidths[col] ?? TXN_COL_DEFAULTS[col];
    if (w) th.style.width = w + 'px';

    // Don't add duplicate handles on re-init
    if (th.querySelector('.txn-col-hdl')) return;

    const hdl = document.createElement('div');
    hdl.className = 'txn-col-hdl';
    th.appendChild(hdl);

    hdl.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      const startX = e.clientX;
      const startW = th.offsetWidth;
      hdl.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      const onMove = e => {
        const newW = Math.max(48, startW + e.clientX - startX);
        th.style.width = newW + 'px';
        UI.txnColWidths[col] = newW;
      };
      const onUp = () => {
        hdl.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        _txnColSave(); // persist to localStorage on every drag-end
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ── Search results inline edit row (full-width flex form, spans all 9 cols) ──
function txnSearchInlineRow(t, acct) {
  const iS    = 'font-size:.8rem;padding:4px 6px;';

  const _isXfer = !!t?.isTransfer;

  const creditVal = t && t.credit > 0 ? t.credit : (UI._txnCurCredit || '');
  const acctName  = acct?.name || '—';

  // Category / split cell
  let catInput;
  if (UI._txnSplitMode) {
    const lines    = UI._txnSplitLines.length ? UI._txnSplitLines : [{ categoryId: '', amount: '' }];

    const rem      = +(total - splitSum).toFixed(2);
    const remOk    = Math.abs(rem) < 0.005;
    const remColor = remOk ? 'var(--ok)' : (rem < 0 ? 'var(--danger)' : 'var(--text2)');

        <input type="number" id="ti-split-amt-${i}" class="finput" style="font-size:.78rem;padding:3px 5px;width:72px;text-align:right" step="0.01" min="0" value="${l.amount !== '' && l.amount !== undefined ? l.amount : ''}" placeholder="0.00" oninput="BA.txnSplitAmtInput()">
        <input type="text" id="ti-split-notes-${i}" class="finput" style="font-size:.78rem;padding:3px 5px;width:90px" value="${esc(l.notes||'')}" placeholder="Notes">

        <div style="display:flex;gap:8px;align-items:center;margin-top:2px">
          <button type="button" class="txn-split-link" onclick="BA.txnAddSplitLine()">＋ Add line</button>
          <span id="ti-split-rem" style="font-size:.71rem;color:${remColor}">${remLabel}</span>
        </div>
        <button type="button" class="txn-split-link" style="opacity:.55;margin-top:3px;font-size:.69rem" onclick="BA.txnToggleSplitMode()">⊕ Use single category</button>
      </div>`;
  } else if (_isXfer) {
    catInput = `<input type="hidden" id="ti-is-transfer" value="1">
      <span class="txn-transfer-pill" style="font-size:.75rem;padding:4px 8px">${t?.debit > 0 ? '→' : '←'} Transfer</span>`;
  } else {
    const _needsCat = ['Bank','Credit Card','Savings','Cash'].includes(acct?.type || '');
    catInput = `<div style="display:flex;align-items:center;gap:3px">
      <select id="ti-cat" class="finput" style="${iS}min-width:140px" onchange="UI._txnCatUserChanged=true">
        ${_needsCat ? '<option value="">— Expense Type —</option>' : '<option value="">— None —</option>'}
        ${txnCatOptions(t?.categoryId || null)}
      </select>
      <button type="button" class="txn-split-link" style="font-size:.69rem;white-space:nowrap" onclick="BA.txnToggleSplitMode()">✂ Split</button>
    </div>`;
  }

  return `<tr id="txn-inline-row" style="background:color-mix(in srgb,var(--primary) 8%,transparent)">
    <td colspan="9" style="padding:6px 10px;border-top:2px solid color-mix(in srgb,var(--primary) 40%,transparent)">
      <div style="display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap">
        <span style="font-size:.71rem;font-weight:600;color:var(--primary);padding-top:8px;white-space:nowrap">✏ ${esc(acctName)}</span>
        <input type="date" id="ti-date" class="finput" style="${iS}width:132px" value="${t ? t.date : today}">
        <input type="text" id="ti-payee" class="finput" list="${_isXfer ? '' : 'txn-payee-list'}" style="${iS}width:155px${_isXfer ? ';background:var(--surface2);color:var(--text3)' : ''}" value="${t ? esc(t.payee||'') : ''}" ${_isXfer ? 'readonly' : ''} oninput="BA.txnPayeeInput(this.value)" onchange="BA.txnPayeeInput(this.value)" placeholder="Payee" autocomplete="off">

// ── Cross-account search results ─────────────────────────────────────────
function _renderTxnSearchResults(panel, query) {
  const acctMap  = {};
  (D.txnAccounts||[]).forEach(a => { acctMap[a.id] = a; });
  // Payee datalist for inline editing
  const _srPayees   = [...new Set((D.transactions||[]).map(t => t.payee).filter(Boolean))].sort();
  const _srDatalist = `<datalist id="txn-payee-list">${_srPayees.map(p => `<option value="${esc(p)}">`).join('')}</datalist>`;
  const allTxns  = (D.transactions||[])
    .filter(t => {
      if (t.status === 'pending' || t.status === 'rejected') return false;
      const acctName = (acctMap[t.accountId]?.name||'').toLowerCase();
      const catName  = (txnCatLabel(t.categoryId)||'').toLowerCase();
      return (t.payee||'').toLowerCase().includes(query)
          || (t.notes||'').toLowerCase().includes(query)
          || acctName.includes(query)
          || catName.includes(query)
          || (t.date||'').includes(query)
          || String(t.debit||'').includes(query)
          || String(t.credit||'').includes(query);
    })
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  // Compute net amount across search results
  let _srDr = 0, _srCr = 0;
  allTxns.forEach(t => { _srDr += parseFloat(t.debit)||0; _srCr += parseFloat(t.credit)||0; });
  const _srNet    = _srDr - _srCr;
  const _srNetAbs = Math.abs(_srNet).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const _srNetLbl = _srNet > 0.005 ? 'Net Dr' : _srNet < -0.005 ? 'Net Cr' : 'Net';
  const _srNetClr = _srNet > 0.005 ? 'var(--danger)' : _srNet < -0.005 ? 'var(--ok)' : 'var(--text2)';
  const _srNetPill = allTxns.length > 0 ? `<span style="font-size:.75rem;font-weight:700;color:${_srNetClr};padding:2px 10px;background:color-mix(in srgb,${_srNetClr} 10%,transparent);border:1px solid color-mix(in srgb,${_srNetClr} 28%,transparent);border-radius:99px;white-space:nowrap">${_srNetLbl} $${_srNetAbs}</span>` : '';

  // Update counter
  const cnt = document.getElementById('txn-search-count');
  const clr = document.getElementById('txn-search-clear');
  if (cnt) { cnt.textContent = allTxns.length + ' result' + (allTxns.length!==1?'s':''); cnt.style.display=''; }
  if (clr) clr.style.display = '';

  const rows = allTxns.map(t => {
    // Inline edit mode for this row
    if (UI.txnEditRow === t.id) return txnSearchInlineRow(t, acctMap[t.accountId]);

    const acctName = acctMap[t.accountId]?.name || '—';
    const isSplit  = t.splits && t.splits.length > 0;
    const isXfer   = !!t.isTransfer;
    let catBadge   = '';
    if (isSplit)     catBadge = `<span class="txn-split-pill">✂ Split (${t.splits.length})</span>`;
    else if (isXfer) catBadge = `<span class="txn-transfer-pill">${t.debit>0?'→':'←'} ${esc(acctMap[t.transferToAcctId||t.transferFromAcctId]?.name||'Transfer')}</span>`;
    else if (t.categoryId) catBadge = `<span class="txn-cat-pill${t.categoryId==='__income__'?' income':''}" data-cat-id="${t.categoryId!=='__income__'?esc(t.categoryId):''}">${esc(txnCatLabel(t.categoryId)||t.categoryId)}</span>`;
    return `<tr>
      <td style="color:var(--text3);font-size:.78rem;white-space:nowrap">${fmtDate(t.date)}</td>
      <td style="font-size:.78rem;color:var(--primary);font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(acctName)}">${esc(acctName)}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.payee||'')}">${esc(t.payee||'')}</td>
      <td>${catBadge}</td>
      <td style="font-size:.75rem;color:var(--text3);max-width:110px;overflow:hidden;text-overflow:ellipsis">${esc(t.notes||'')}</td>
      <td class="r">${t.debit>0?`<span class="txn-debit">${fmtCurrency(t.debit)}</span>`:''}</td>
      <td class="r">${t.credit>0?`<span class="txn-credit">${fmtCurrency(t.credit)}</span>`:''}</td>
      <td style="text-align:center"><span class="txn-pill-clr ${t.cleared?'yes':'no'}">${t.cleared?'✓':'○'}</span></td>
      <td><button class="btn btn-sm btn-ghost btn-xs" onclick="BA.txnSearchStartEdit('${t.id}','${t.accountId}')" title="Edit inline">✎</button></td>
    </tr>`;
  }).join('');
  panel.innerHTML = `
    ${_srDatalist}
    <div class="txn-ledger-hdr">
      <span class="txn-ledger-title">🔍 Search Results <span style="font-size:.72rem;font-weight:400;color:var(--text3)">"${esc(query)}"</span></span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:.75rem;color:var(--text3)">${allTxns.length} result${allTxns.length!==1?'s':''}</span>
        ${_srNetPill}
      </div>
    </div>
    <div class="txn-tbl-wrap">
      ${allTxns.length ? `
      <table class="txn-tbl">
        <thead><tr>
          <th data-col="txn-date">Date</th><th data-col="txn-acct">Account</th>
          <th data-col="txn-payee">Payee</th><th data-col="txn-exptype">Expense Type</th>
          <th data-col="txn-notes">Notes</th>
          <th class="r" data-col="txn-debit">Debit</th><th class="r" data-col="txn-credit">Credit</th>
          <th style="text-align:center" data-col="txn-clr">Clr</th><th style="width:40px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>` : `<div class="txn-empty"><strong>No transactions match "${esc(query)}"</strong></div>`}
    </div>`;
  requestAnimationFrame(() => initTxnColResize(panel));
}

function renderTxnRight() {
  const panel = id('txn-right');
  if (!panel) return;

  // ── Preserve scroll position when re-rendering the same account ──
  const _curAcctCtx  = UI.txnAccount || '';
  const _sameAcct    = panel.dataset.txnAcctCtx === _curAcctCtx && _curAcctCtx !== '';
  const _savedScroll = _sameAcct ? (panel.querySelector('.txn-tbl-wrap')?.scrollTop || 0) : 0;

  const acct = UI.txnAccount ? (D.txnAccounts||[]).find(a => a.id === UI.txnAccount) : null;
  // ── Search mode: show cross-account search results ──────────────
  const searchQ = (UI.txnSearch||'').trim().toLowerCase();
  if (searchQ) {
    _renderTxnSearchResults(panel, searchQ);
    return;
  }
  // ── All Accounts view ────────────────────────────────────────────
  if (!acct) {
    _renderAllAccountsView(panel);
    return;
  }

  const allAcctTxns = (D.transactions||[]).filter(t => t.accountId === acct.id);
  // Split into pending vs. committed (approved / no-status / rejected-hidden)
  const pendingTxns   = allAcctTxns.filter(t => t.status === 'pending');
  const _curYM = centralToday().slice(0, 7);
  const rejectedObls  = allAcctTxns.filter(t =>
    t.status === 'rejected' && t.obligationId && !t.dismissed &&
    (t.oblMonth || t.date || '').slice(0, 7) >= _curYM
  );
  const committedTxns = allAcctTxns.filter(t => !t.status || t.status === 'approved');
  // rejected ones silently excluded from both displays
  const withBal = txnRunningBalances(acct, committedTxns).reverse(); // newest first
  const isCC    = acct.type === 'Credit Card';
  const isLoan  = acct.type === 'Loan';

  // Cleared balance for ledger header
  const clearedTxns2 = committedTxns.filter(t => t.cleared);
  const clearedBal2  = txnRunningBalances(acct, clearedTxns2);
  const clearedBalance2 = clearedBal2.length ? clearedBal2[clearedBal2.length-1]._bal : (parseFloat(acct.openingBalance)||0);
  const clearedBalIsOk = (isCC || isLoan) ? clearedBalance2 <= 0 : clearedBalance2 >= 0;
  const clearedBalColor = clearedBalIsOk ? 'var(--ok)' : 'var(--danger)';
  const clearedBalBadge = `<span style="font-size:.78rem;font-weight:700;color:${clearedBalColor};background:color-mix(in srgb,${clearedBalColor} 12%,transparent);border:1px solid color-mix(in srgb,${clearedBalColor} 28%,transparent);padding:2px 10px;border-radius:99px;margin-left:4px" title="Cleared Balance">Cleared: ${fmtCurrency(Math.abs(clearedBalance2))}</span>${(() => {
    if (!isCC || !acct.ccCardId) return '';
    const ccCard = (D.ccTracker?.cards||[]).find(c => c.id === acct.ccCardId);
    const lim = parseFloat(ccCard?.limit) || 0;
    if (!lim) return '';
    const currentBal = txnCurrentBalance(acct); // positive = amount owed
    const avail = Math.max(0, lim - currentBal);
    const availPct = Math.round(avail / lim * 100);
    const availColor = avail < lim * 0.1 ? 'var(--danger)' : avail < lim * 0.25 ? '#f59e0b' : 'var(--ok)';
    return `<span style="font-size:.78rem;font-weight:700;color:${availColor};background:color-mix(in srgb,${availColor} 12%,transparent);border:1px solid color-mix(in srgb,${availColor} 28%,transparent);padding:2px 10px;border-radius:99px;margin-left:4px" title="Available Credit (Limit: ${fmtCurrency(lim)})">Available: ${fmtCurrency(avail)} (${availPct}%)</span>`;
  })()}`;

  // Payee datalist — all unique payees across all accounts
  const allPayees = [...new Set((D.transactions||[]).map(t => t.payee).filter(Boolean))].sort();
  const datalist  = `<datalist id="txn-payee-list">${allPayees.map(p => `<option value="${esc(p)}">`).join('')}</datalist>`;

  // ── Pending Approval section ──────────────────────────────────
  let pendingHTML = '';
  if (pendingTxns.length > 0) {
    const oblTypeLabel = { subscription: '📦', emi: '🏦', split: '✂️' };
    const pendingRows = pendingTxns
      .sort((a,b) => (a.date||'').localeCompare(b.date||''))
      .map(t => {
        const catLabel = txnCatLabel(t.categoryId);
        const typeIcon = oblTypeLabel[t.oblType] || '🔁';
        const amtFmt   = t.debit > 0 ? fmtCurrency(t.debit) : fmtCurrency(t.credit);
        return `
          <div class="txn-pending-row">
            <span style="color:var(--text3);font-size:.75rem">${fmtDate(t.date||t.oblMonth)}</span>
            <span class="ppayee">${typeIcon} ${esc(t.payee||'')}</span>
            <span class="pcat">${esc(catLabel || t.notes || '')}</span>
            <span class="pamt">${amtFmt}</span>
            <span style="font-size:.7rem;color:var(--text3);text-transform:capitalize">${t.oblType||'obligation'}</span>
            <span style="display:flex;gap:4px;justify-content:flex-end">
              <button class="txn-pact-btn approve" onclick="BA.txnApproveModal('${t.id}')" title="Approve — confirm date &amp; amount then record">✓ Approve</button>
              <button class="txn-pact-btn reject" onclick="BA.txnReject('${t.id}')" title="Reject — dismiss without recording">✕</button>
            </span>
          </div>`;
      }).join('');
    const isCollapsed = !!UI.txnPendingCollapsed;
    pendingHTML = `
      <div class="txn-pending-section">
        <div class="txn-pending-hdr" onclick="BA.txnTogglePending()">
          <span class="txn-pending-chev${isCollapsed?' col':''}">▾</span>
          ⏳ Pending Approval
          <span class="badge">${pendingTxns.length}</span>
          <span style="font-weight:400;font-size:.72rem;color:var(--text3);margin-left:4px">— obligations awaiting your review</span>
        </div>
        ${isCollapsed ? '' : `<div class="txn-pending-scroll">${pendingRows}</div>`}
      </div>`;
  }

  // ── Rejected Obligations section ────────────────────────────
  let rejectedHTML = '';
  if (rejectedObls.length > 0) {
    const oblTypeLabel = { subscription: '📦', emi: '🏦', split: '✂️' };
    const isRejCollapsed = !!UI.txnRejectedCollapsed;
    const rejRows = rejectedObls
      .sort((a,b) => (a.date||a.oblMonth||'').localeCompare(b.date||b.oblMonth||''))
      .map(t => {
        const catLabel = txnCatLabel(t.categoryId);
        const typeIcon = oblTypeLabel[t.oblType] || '🔁';
        const amtFmt   = t.debit > 0 ? fmtCurrency(t.debit) : fmtCurrency(t.credit);
        return `
          <div class="txn-pending-row" style="opacity:.8">
            <span style="color:var(--text3);font-size:.75rem">${fmtDate(t.date||t.oblMonth)}</span>
            <span class="ppayee">${typeIcon} ${esc(t.payee||'')}</span>
            <span class="pcat">${esc(catLabel || t.notes || '')}</span>
            <span class="pamt">${amtFmt}</span>
            <span style="font-size:.7rem;color:var(--text3);text-transform:capitalize">${t.oblType||'obligation'}</span>
            <span style="display:flex;gap:4px;justify-content:flex-end">
              <button class="txn-pact-btn approve" onclick="BA.txnRestoreObligation('${t.id}')" title="Re-push to Pending Approval">↺ Re-push</button>
              <button class="txn-pact-btn reject" onclick="BA.txnDismissRejected('${t.id}')" title="Dismiss — remove from this list permanently">✕ Dismiss</button>
            </span>
          </div>`;
      }).join('');
    rejectedHTML = `
      <div class="txn-pending-section" style="margin-top:4px;border-color:color-mix(in srgb,var(--danger) 20%,var(--border))">
        <div class="txn-pending-hdr" onclick="BA.txnToggleRejected()" style="background:color-mix(in srgb,var(--danger) 5%,var(--surface2))">
          <span class="txn-pending-chev${isRejCollapsed?' col':''}">▾</span>
          🚫 Rejected Obligations
          <span class="badge" style="background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger);border-color:color-mix(in srgb,var(--danger) 30%,transparent)">${rejectedObls.length}</span>
          <span style="font-weight:400;font-size:.72rem;color:var(--text3);margin-left:4px">— click ↺ Re-push to restore to pending</span>
        </div>
        ${isRejCollapsed ? '' : rejRows}
      </div>`;
  }

  // Date + expense type filter
  const _df  = UI.txnDateFrom, _dt = UI.txnDateTo, _cf = UI.txnCatFilter;
  const filteredRows = withBal.filter(t => {
    if (_df && (t.date||'') < _df) return false;
    if (_dt && (t.date||'') > _dt) return false;
    if (_cf) {
      // match on categoryId or any split line's categoryId
      const mainMatch = t.categoryId === _cf;
      const splitMatch = (t.splits||[]).some(s => s.categoryId === _cf);
      if (!mainMatch && !splitMatch) return false;
    }
    return true;
  });
  const anyFilterActive = !!(_df || _dt || _cf);

  // Build expense type options for filter dropdown (unique cats in this account)
  const _catIdsInAcct = new Set();
  committedTxns.forEach(t => {
    if (t.categoryId) _catIdsInAcct.add(t.categoryId);
    (t.splits||[]).forEach(s => { if (s.categoryId) _catIdsInAcct.add(s.categoryId); });
  });
  const _catFilterOpts = [..._catIdsInAcct]
    .map(cid => ({ cid, lbl: txnCatLabel(cid)||cid }))
    .sort((a,b) => a.lbl.localeCompare(b.lbl))
    .map(({cid,lbl}) => `<option value="${cid}" ${cid===_cf?'selected':''}>${esc(lbl)}</option>`)
    .join('');

  // New-row or edit-row at top
  const newRowHTML = (UI.txnNewRow && !UI.txnEditRow) ? txnInlineRow(null, acct) : '';

  const rows = filteredRows.map(t => {
    // Editing this row inline
    if (UI.txnEditRow === t.id) return txnInlineRow(t, acct);

    const isSplit    = t.splits && t.splits.length > 0;
    const isTransfer = !!t.isTransfer;
    const catLabel   = (isSplit || isTransfer) ? null : txnCatLabel(t.categoryId);
    const isIncome   = !isSplit && !isTransfer && t.categoryId === '__income__';
    const isLoanAcct = acct?.type === 'Loans';
    const balColor  = isCC
      ? (t._bal > 0 ? 'var(--danger)' : 'var(--ok)')
      : isLoanAcct
        ? (t._bal > 0 ? 'var(--danger)' : 'var(--ok)')
        : (t._bal >= 0 ? '' : 'var(--danger)');
    const debitTd   = t.debit  > 0 ? `<span class="txn-debit">${fmtCurrency(t.debit)}</span>`  : '';
    const creditTd  = t.credit > 0 ? `<span class="txn-credit">${fmtCurrency(t.credit)}</span>` : '';
    // Build category cell content
    let catCellContent;
    if (isSplit) {
      catCellContent = `<span class="txn-split-pill" onclick="BA.txnToggleSplitExpand('${t.id}',event)" title="Click to expand split details">✂ Split (${t.splits.length}) ${(UI._splitExpanded||{})[t.id]?'▲':'▼'}</span>`;
    } else if (isTransfer) {
      const linkedAcctId = t.transferToAcctId || t.transferFromAcctId;
      const linkedAcct   = linkedAcctId ? (D.txnAccounts||[]).find(a => a.id === linkedAcctId) : null;
      const dir          = t.transferToAcctId ? '→' : '←';
      const xferSplits   = t.splits && t.splits.length > 0;
      const xferLabel    = xferSplits
        ? `${dir} ${esc(linkedAcct?.name||'Transfer')} <span style="font-size:.65rem;margin-left:3px;opacity:.8">💰 ${t.splits.length} split${t.splits.length!==1?'s':''}</span>`
        : `${dir} ${esc(linkedAcct?.name||'Transfer')}`;
      catCellContent = `<span class="txn-transfer-pill" title="${t.debit > 0 ? 'Transfer to' : 'Transfer from'} ${esc(linkedAcct?.name||'')}${xferSplits?' · '+t.splits.length+' savings splits':''}">${xferLabel}</span>`;
    } else if (catLabel) {
      catCellContent = `<span class="txn-cat-pill${isIncome?' income':''}" style="${isIncome?'background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok);border-color:var(--ok)':''}cursor:default" data-cat-id="${isIncome?'':''+esc(t.categoryId)}">${esc(catLabel)}</span>`;
    } else if (!isTransfer && !isSplit && !(t.payee||'').toLowerCase().startsWith('transfer') && ['Bank','Credit Card','Savings','Cash'].includes(acct.type)) {
      // Not a transfer or split and has no expense type — show warning only for accounts that require it
      catCellContent = `<span class="txn-missing-cat" onclick="BA.txnStartEdit('${t.id}')" title="No expense type — click row to assign">⚠ Missing</span>`;
    } else {
      catCellContent = '';
    }
    const _isSel = (UI.txnSelected||[]).includes(t.id);
    const _isHl  = UI.txnHighlightRow === t.id;
    const _famPerson = t.familyMemberId ? famPersons().find(p => p.id === t.familyMemberId) : null;
    const _famBadge  = _famPerson ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:.67rem;font-weight:600;padding:1px 6px;background:color-mix(in srgb,#8b5cf6 12%,transparent);color:#7c3aed;border:1px solid color-mix(in srgb,#8b5cf6 30%,transparent);border-radius:99px;margin-left:4px;cursor:pointer;white-space:nowrap" onclick="BA.txnNavToLinkedFamily('${t.familyMemberId}')" title="Family: ${esc(_famPerson.name)} — click to view in Family tab">👤 ${esc(_famPerson.name)}</span>` : '';
    return `
      <tr data-txn-id="${t.id}" ondblclick="BA.txnStartEdit('${t.id}')" style="${_isHl?'background:color-mix(in srgb,var(--primary) 12%,transparent);outline:2px solid var(--primary);outline-offset:-2px;':_isSel?'background:color-mix(in srgb,var(--primary) 6%,transparent)':''}">
        <td style="text-align:center;padding:0 4px"><input type="checkbox" class="txn-row-chk" onchange="BA.txnToggleSelect('${t.id}',this.checked)" ${_isSel?'checked':''}></td>
        <td style="color:var(--text3);font-size:.78rem;white-space:nowrap">${fmtDate(t.date)}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.payee||'')}">${esc(t.payee||'')}</td>
        <td>${catCellContent}${_famBadge}</td>
        <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;font-size:.75rem;color:var(--text3)" title="${esc(t.notes||'')}">${esc(t.notes||'')}</td>
        <td class="r">${debitTd}</td>
        <td class="r">${creditTd}</td>
        <td class="r txn-bal" style="${balColor?'color:'+balColor:''}">${fmtCurrency(Math.abs(t._bal))}${t._bal<0&&!isCC?' OD':''}</td>
        <td style="text-align:center">
          <span class="txn-pill-clr ${t.reconciled?'rec':t.cleared?'yes':'no'}" onclick="${t.reconciled?'':'BA.txnToggleCleared(\''+t.id+'\')'}" title="${t.reconciled?'Reconciled (locked)':t.cleared?'Cleared — click to unmark':'Uncleared — click to mark cleared'}" style="${t.reconciled?'cursor:default':''}">${t.reconciled?'R':t.cleared?'✓':'○'}</span>
        </td>
        <td style="text-align:center;position:relative">
          <span class="txn-flag ${t.flag||'none'}" style="${t.flag&&TXN_FLAG_COLORS[t.flag]?'background:'+TXN_FLAG_COLORS[t.flag]+';border-color:'+TXN_FLAG_COLORS[t.flag]:''}" onclick="BA.txnFlagPicker('${t.id}',this)" title="${t.flag?'Flagged: '+t.flag+' — click to change':'Click to flag'}"></span>
        </td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm btn-ghost btn-xs" onclick="BA.txnStartEdit('${t.id}')" title="Edit (or double-click row)">✎</button>
          ${!t.isTransfer ? `<button class="btn btn-sm btn-ghost btn-xs" onclick="BA.txnMoveModal('${t.id}')" title="Move to another account" style="color:var(--primary)">➤</button>` : ''}
          <button class="btn btn-sm btn-ghost btn-xs" style="color:var(--danger)" onclick="BA.txnDelete('${t.id}')">✕</button>
        </td>
      </tr>
      ${isSplit && (UI._splitExpanded||{})[t.id] ? `<tr class="txn-split-expand"><td></td><td colspan="8"><div style="padding:2px 0">
        ${t.splits.map(s => {
          const lbl = txnCatLabel(s.categoryId)||s.categoryId||'—';
          const notesHtml = s.notes ? `<span style="color:var(--text3);margin-left:8px;font-style:italic">${esc(s.notes)}</span>` : '';
          const splitFamPerson = s.familyMemberId ? famPersons().find(p => p.id === s.familyMemberId) : null;
          const splitFamBadge = splitFamPerson
            ? `<span style="font-size:.65rem;font-weight:600;padding:1px 6px;background:color-mix(in srgb,#8b5cf6 12%,transparent);color:#7c3aed;border:1px solid color-mix(in srgb,#8b5cf6 28%,transparent);border-radius:99px;margin-left:6px;cursor:pointer;white-space:nowrap" onclick="BA.txnNavToLinkedFamily('${s.familyMemberId}')" title="Family: ${esc(splitFamPerson.name)}">👤 ${esc(splitFamPerson.name)}</span>`
            : '';
          return `<div class="txn-split-line-row"><span style="min-width:120px;font-weight:500">${esc(lbl)}</span><span style="color:var(--primary);font-weight:600">${fmtCurrency(s.amount)}</span>${notesHtml}${splitFamBadge}</div>`;
        }).join('')}
      </div></td></tr>` : ''}`;
  }).join('');

  const hasRows = filteredRows.length > 0 || UI.txnNewRow;
  const filterBar = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:6px 10px;background:${anyFilterActive?'color-mix(in srgb,var(--primary) 6%,var(--surface2))':'var(--surface2)'};border-bottom:1px solid var(--border);font-size:.78rem">
      <span style="color:var(--text3);white-space:nowrap;font-weight:600">🔽 Filter:</span>
      <input type="date" id="txn-df-from" value="${_df||''}" onchange="UI.txnDateFrom=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:130px" title="From date">
      <span style="color:var(--text3)">to</span>
      <input type="date" id="txn-df-to" value="${_dt||''}" onchange="UI.txnDateTo=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:130px" title="To date">
      <span style="color:var(--text3);margin-left:6px">🏷</span>
      <select id="txn-cf-sel" onchange="UI.txnCatFilter=this.value;renderTxnRight()" style="font-size:.76rem;padding:2px 6px;border:1px solid ${_cf?'var(--primary)':'var(--border)'};border-radius:4px;background:var(--surface);color:var(--text);max-width:190px" title="Filter by Expense Type">
        <option value="">All Expense Types</option>
        ${_catFilterOpts}
      </select>
      ${anyFilterActive ? `
        <button onclick="UI.txnDateFrom='';UI.txnDateTo='';UI.txnCatFilter='';renderTxnRight()" style="font-size:.73rem;padding:1px 8px;background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text3)" title="Clear all filters">✕ Clear</button>
        <span style="color:var(--primary);font-weight:600">${filteredRows.length} of ${committedTxns.length} shown</span>` :
        `<span style="color:var(--text3);opacity:.6">${committedTxns.length} transaction${committedTxns.length!==1?'s':''}</span>`}
      <div style="margin-left:auto">
        <button onclick="BA.txnExportSmart()" style="font-size:.76rem;padding:3px 10px;background:color-mix(in srgb,var(--ok) 10%,transparent);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);color:var(--ok);border-radius:5px;cursor:pointer;font-weight:600" title="${anyFilterActive?'Export filtered transactions for this account':'Export all transactions for this account'}">${anyFilterActive?'⬇ Export Filtered':'⬇ Export CSV'}</button>
      </div>
    </div>`;
  panel.innerHTML = `
    ${datalist}
    <div class="txn-ledger-hdr">
      <span class="txn-ledger-title">
        ${esc(acct.name)}
        <span style="font-size:.72rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">${esc(acct.type)}</span>
        ${clearedBalBadge}
      </span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm" onclick="BA.txnResetAccount()" style="font-size:.78rem;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text2)">← Clear Selection</button>
        <button class="btn btn-sm" style="font-size:.78rem;padding:4px 10px;background:color-mix(in srgb,#8b5cf6 10%,transparent);border:1px solid color-mix(in srgb,#8b5cf6 30%,transparent);color:#7c3aed;border-radius:6px;cursor:pointer" onclick="BA.txnTransferModal()" ${UI.txnNewRow?'disabled':''}>↔ Transfer</button>
        <button class="btn btn-sm" style="font-size:.78rem;padding:4px 10px;background:color-mix(in srgb,var(--ok) 10%,transparent);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);color:var(--ok);border-radius:6px;cursor:pointer" onclick="BA.txnReconcile('${acct.id}')" title="Mark all cleared transactions as Reconciled">⚖ Reconcile</button>
        <button class="btn btn-primary btn-sm" onclick="BA.txnStartNew()" ${UI.txnNewRow?'disabled':''}>＋ Add Transaction</button>
      </div>
    </div>
    ${filterBar}
    ${pendingHTML}
    ${rejectedHTML}
    <div class="txn-tbl-wrap">
      ${(UI.txnSelected||[]).length > 0 ? (() => {
        const _selSet = new Set(UI.txnSelected);
        let _selDr = 0, _selCr = 0;
        committedTxns.forEach(t => { if (_selSet.has(t.id)) { _selDr += parseFloat(t.debit)||0; _selCr += parseFloat(t.credit)||0; } });
        const _netAmt = _selDr - _selCr;
        const _netAbs = Math.abs(_netAmt).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
        const _netLbl = _netAmt > 0 ? 'Net Dr' : _netAmt < 0 ? 'Net Cr' : 'Net';
        const _netColor = _netAmt > 0 ? 'var(--danger)' : _netAmt < 0 ? 'var(--ok)' : 'var(--text2)';
        return `
      <div id="txn-bulk-bar" style="display:flex;align-items:center;gap:10px;padding:6px 12px;background:color-mix(in srgb,var(--primary) 8%,transparent);border:1px solid color-mix(in srgb,var(--primary) 30%,var(--border));border-radius:6px;margin-bottom:6px">
        <span style="font-size:.8rem;font-weight:600;color:var(--primary)">${(UI.txnSelected||[]).length} selected</span>
        <span style="font-size:.78rem;font-weight:700;color:${_netColor};padding:2px 9px;background:color-mix(in srgb,${_netColor} 10%,transparent);border:1px solid color-mix(in srgb,${_netColor} 25%,transparent);border-radius:5px">${_netLbl} $${_netAbs}</span>
        <button class="btn btn-sm" style="font-size:.76rem;padding:3px 11px;background:var(--primary);color:#fff;border:none" onclick="BA.txnBulkAssignExpType()">🏷 Assign Expense Type</button>
        <button class="btn btn-sm" style="font-size:.76rem;padding:3px 11px;background:color-mix(in srgb,var(--danger) 12%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 30%,transparent)" onclick="BA.txnBulkDelete()">🗑 Delete</button>
        <button class="btn btn-sm btn-ghost" style="font-size:.74rem;padding:3px 9px" onclick="BA.txnClearSelection()">✕ Clear</button>
      </div>`;
      })() : ''}
    ${hasRows ? `
      <table class="txn-tbl">
        <thead>
          <tr>
            <th style="width:28px;text-align:center"><input type="checkbox" id="txn-chk-all" onchange="BA.txnSelectAll(this.checked)" title="Select all"></th>
            <th data-col="txn-date">Date</th>
            <th data-col="txn-payee">Payee</th>
            <th data-col="txn-exptype">Expense Type</th>
            <th data-col="txn-notes">Notes</th>
            <th class="r" data-col="txn-debit">Debit</th>
            <th class="r" data-col="txn-credit">Credit</th>
            <th class="r" data-col="txn-bal">Balance</th>
            <th style="text-align:center" data-col="txn-clr">Cleared</th>
            <th style="width:28px;text-align:center" title="Flag">🏳</th>
            <th style="width:70px"></th>
          </tr>
        </thead>
        <tbody>${newRowHTML}${rows}</tbody>
      </table>` : `
      <div class="txn-empty">
        <div class="txn-empty-icon">📋</div>
        <strong>No transactions yet</strong>
        <span style="font-size:.82rem">Click "+ Add Transaction" to log your first entry</span>
        <span style="font-size:.75rem;color:var(--text3)">Opening balance: ${fmtCurrency(parseFloat(acct.openingBalance)||0)} as of ${fmtDate(acct.openingDate)}</span>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="BA.txnStartNew()">＋ Add First Transaction</button>
      </div>`}
    </div>`;

  requestAnimationFrame(() => initTxnColResize(panel));

  // ── Restore scroll position (preserve position when editing/saving in same account)
  panel.dataset.txnAcctCtx = _curAcctCtx;
  if (_savedScroll > 0) {
    const _tw = panel.querySelector('.txn-tbl-wrap');
    if (_tw) _tw.scrollTop = _savedScroll;
  }

  // ── Scroll to highlighted row if set (drilldown navigation)
  if (UI.txnHighlightRow) {
    const _hlId = UI.txnHighlightRow;
    setTimeout(() => {
      const _tw  = panel.querySelector('.txn-tbl-wrap');
      const _row = _tw && _tw.querySelector(`tr[data-txn-id="${_hlId}"]`);
      if (_tw && _row) {
        _tw.scrollTop = 0; // reset before measuring so rect offsets are from the top
        const rowRect  = _row.getBoundingClientRect();
        const wrapRect = _tw.getBoundingClientRect();
        _tw.scrollTop  = Math.max(0, rowRect.top - wrapRect.top - 80);
      }
    }, 60);
  }

  // Focus payee field if new row was just opened
  if (UI.txnNewRow || UI.txnEditRow) {
    setTimeout(() => {
      const el = id('ti-payee') || id('ti-date');
      if (el) { el.focus(); if (el.type !== 'date') el.select(); }
    }, 30);
  }
}

// ── Account CRUD ──────────────────────────────────────────────
function txnAddAccountModal() { txnEditAccountModal(null); }

// ── Transfer modal ─────────────────────────────────────────────
function txnTransferModal(editTransferId) {
  const fromAcct = (D.txnAccounts||[]).find(a => a.id === UI.txnAccount);
  if (!fromAcct) { toast('Select an account first','err'); return; }
  const allAccts  = (D.txnAccounts||[]).filter(a => a.id !== fromAcct.id);
  const today     = new Date().toISOString().slice(0,10);
  // If editing: retrieve existing transfer pair (always use the debit leg for splits)
  const existTxn  = editTransferId ? (D.transactions||[]).find(t => t.id === editTransferId) : null;
  const existPair = existTxn?.transferPairId ? (D.transactions||[]).find(t => t.id === existTxn.transferPairId) : null;
  const debitLeg  = existTxn ? (existTxn.debit > 0 ? existTxn : existPair) : null;
  const existAmt  = existTxn ? (existTxn.debit || existTxn.credit || '') : '';
  const existDate = existTxn ? (existTxn.date || today) : today;
  const existNotes= existTxn ? (existTxn.notes||'') : '';
  const existDest = existTxn ? (existTxn.transferToAcctId || existTxn.transferFromAcctId || '') : '';
  const acctOpts  = allAccts.map(a => `<option value="${a.id}"${a.id===existDest?' selected':''}>${esc(a.name)} (${a.type})</option>`).join('');

  // Initialise transfer split state from existing splits if editing
  UI._txfrSplitMode  = !!(debitLeg?.splits?.length);
  UI._txfrSplitLines = debitLeg?.splits?.length
    ? debitLeg.splits.map(s => ({ categoryId: s.categoryId || '', amount: s.amount ?? '' }))
    : [];

  showModal(`
    <div class="modal-title">↔ Transfer Funds</div>
    <div class="form-grid">
      <div class="fg"><label class="flbl">From Account</label>
        <input class="finput" value="${esc(fromAcct.name)} (${esc(fromAcct.type)})" readonly style="background:var(--surface2);color:var(--text3)"></div>
      <div class="fg"><label class="flbl">To Account *</label>
        <select id="txfr-to" class="finput"><option value="">— Select account —</option>${acctOpts}</select></div>
      <div class="fg"><label class="flbl">Amount *</label>
        <input id="txfr-amt" class="finput" type="number" step="0.01" min="0.01" value="${existAmt}" placeholder="0.00" oninput="BA._txfrRenderBalance()"></div>
      <div class="fg"><label class="flbl">Date *</label>
        <input id="txfr-date" class="finput" type="date" value="${existDate}"></div>
      <div class="fg" style="grid-column:1/-1"><label class="flbl">Notes</label>
        <input id="txfr-notes" class="finput" value="${esc(existNotes)}" placeholder="Optional memo"></div>
    </div>
    <!-- Savings category splits section -->
    <div id="txfr-split-wrap" style="margin-top:10px">
      <div id="txfr-split-toggle"></div>
      <div id="txfr-split-section"></div>
    </div>
    <div style="font-size:.75rem;color:var(--text3);margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:6px">
      This creates two linked transactions — a debit on <strong>${esc(fromAcct.name)}</strong> and a credit on the destination account.
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="background:color-mix(in srgb,#8b5cf6 80%,transparent);border-color:#7c3aed" onclick="BA.txnSaveTransfer('${fromAcct.id}','${editTransferId||''}')">Save Transfer</button>
    </div>`);
  // Render split toggle/section after modal is in the DOM
  BA._txfrRenderSplits();
}

function txnEditAccountModal(editId) {
  const a = editId ? (D.txnAccounts||[]).find(x => x.id === editId) : null;
  showModal(`
    <div class="modal-title">${a ? 'Edit' : 'Add'} Account</div>
    <div class="form-grid">
      <div class="fg"><label class="flbl">Account Name *</label><input id="tacct-name" class="finput" value="${a ? esc(a.name) : ''}" placeholder="e.g. Chase Checking"></div>
      <div class="fg"><label class="flbl">Account Type</label>
        <select id="tacct-type" class="finput">
          <optgroup label="Banking">
            <option${a&&a.type==='Bank'?' selected':''}>Bank</option>
            <option${a&&a.type==='Savings'?' selected':''}>Savings</option>
            <option${a&&a.type==='Credit Card'?' selected':''}>Credit Card</option>
            <option${a&&a.type==='Cash'?' selected':''}>Cash</option>
          </optgroup>
          <optgroup label="Assets &amp; Investments">
            <option${a&&a.type==='Investment'?' selected':''}>Investment</option>
            <option${a&&a.type==='Tracking'?' selected':''}>Tracking</option>
          </optgroup>
          <optgroup label="Liabilities">
            <option${a&&a.type==='Loans'?' selected':''}>Loans</option>
          </optgroup>
        </select></div>
      <div class="fg"><label class="flbl">Opening Balance</label><input id="tacct-bal" class="finput" type="number" step="0.01" value="${a ? (a.openingBalance||0) : 0}" placeholder="0.00"></div>
      <div class="fg"><label class="flbl">Opening Date</label><input id="tacct-date" class="finput" type="date" value="${a ? (a.openingDate||'') : new Date().toISOString().slice(0,10)}"></div>
      <div class="fg" style="grid-column:1/-1">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.82rem;color:var(--text2)">
          <input type="checkbox" id="tacct-ccrepay" ${a?.showInCCRepay ? 'checked' : ''} style="cursor:pointer;width:14px;height:14px">
          Show available balance in CC Repayment Planner
        </label>
        <div style="font-size:.72rem;color:var(--text3);margin-top:3px;padding-left:22px">Enable for bank/savings accounts you use to pay credit card bills</div>
      </div>
    </div>
    ${a ? `<div style="margin-top:4px;padding-top:12px;border-top:1px solid var(--border);text-align:right">
      <button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="BA.txnDeleteAccount('${a.id}')">Delete Account</button>
    </div>` : ''}
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="BA.txnSaveAccount('${editId||''}')">Save</button>
    </div>`);
  setTimeout(() => id('tacct-name')?.focus(), 50);
}

// REPORTS
// ════════════════════════════════════════════════════════════
let _reportCharts = {};
function renderReports() {
  const wrap = id('view-reports');
  if (!wrap) return;

  // Destroy any existing Chart.js instances
  Object.values(_reportCharts).forEach(c => { try { c.destroy(); } catch(e){} });
  _reportCharts = {};

  // ── Shared helpers ───────────────────────────────────────
  const approvedTxns = (D.transactions||[]).filter(t =>
    (!t.status || t.status === 'approved') && !t.isTransfer
  );
  const last12 = [];
  const now = centralToday();
  const [cy, cm] = now.split('-').map(Number);
  for (let i = 11; i >= 0; i--) {
    let m = cm - i, y = cy;
    while (m <= 0) { m += 12; y--; }
    last12.push(`${y}-${String(m).padStart(2,'0')}`);
  }

  // ── Net Worth over 12 months ─────────────────────────────
  const assetTypes     = ['Bank','Savings','Investment','Cash','Tracking'];
  const liabilityTypes = ['Credit Card','Loan','Loans'];
  const accounts       = D.txnAccounts || [];
  const netWorthData   = last12.map(ym => {
    const endDate = ym + '-31';
    let nw = 0;
    accounts.forEach(acct => {
      const txnsToDate = (D.transactions||[]).filter(t =>
        t.accountId === acct.id && (t.date||'') <= endDate &&
        (!t.status || t.status === 'approved')
      );
      const bal = txnRunningBalances(acct, txnsToDate);
      const b   = bal.length ? bal[bal.length-1]._bal : (parseFloat(acct.openingBalance)||0);
      if (assetTypes.includes(acct.type))     nw += b;
      if (liabilityTypes.includes(acct.type)) nw -= Math.max(0, b);
    });
    return Math.round(nw * 100) / 100;
  });

  // ── Income vs Expense per month ──────────────────────────
  const incomeByMonth  = {}, expenseByMonth = {};
  last12.forEach(m => { incomeByMonth[m] = 0; expenseByMonth[m] = 0; });
  approvedTxns.forEach(t => {
    const m = (t.date||'').slice(0,7);
    if (!last12.includes(m)) return;
    if (t.categoryId === '__income__' || t.credit > 0) {
      incomeByMonth[m]  = (incomeByMonth[m]  || 0) + (parseFloat(t.credit)||0);
    }
    if (t.debit > 0 && t.categoryId !== '__income__') {
      expenseByMonth[m] = (expenseByMonth[m] || 0) + (parseFloat(t.debit)||0);
    }
  });

  // ── Spending by Category for selected month ───────────────
  const selMonth   = UI.reportsMonth || last12[last12.length - 1];
  const catSpend   = {};
  approvedTxns.forEach(t => {
    if ((t.date||'').slice(0,7) !== selMonth) return;
    if (t.debit <= 0 || t.categoryId === '__income__') return;
    const lbl = txnCatLabel(t.categoryId) || 'Uncategorized';
    catSpend[lbl] = (catSpend[lbl] || 0) + (parseFloat(t.debit)||0);
  });
  // Also include splits
  approvedTxns.forEach(t => {
    if ((t.date||'').slice(0,7) !== selMonth || !t.splits) return;
    t.splits.forEach(s => {
      const lbl = txnCatLabel(s.categoryId) || 'Uncategorized';
      catSpend[lbl] = (catSpend[lbl] || 0) + (parseFloat(s.amount)||0);
    });
  });
  const catEntries = Object.entries(catSpend).sort((a,b) => b[1]-a[1]).slice(0,15);

  const monthOpts = last12.map(m =>
    `<option value="${m}" ${m===selMonth?'selected':''}>${bFmtMonth(m)}</option>`
  ).join('');

  const isDark  = document.body.classList.contains('dark') || getComputedStyle(document.body).getPropertyValue('--bg').trim().startsWith('#1');
  const gridClr = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.07)';
  const textClr = isDark ? '#9ca3af' : '#6b7280';
  const chartDefaults = { responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: textClr, font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: textClr, font:{size:10} }, grid: { color: gridClr } },
      y: { ticks: { color: textClr, font:{size:10}, callback: v => '$'+v.toLocaleString() }, grid: { color: gridClr } }
    }
  };

  wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:1400px">
      <!-- Net Worth Trend -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;grid-column:1/-1">
        <div style="font-size:.88rem;font-weight:700;color:var(--text2);margin-bottom:12px">📈 Net Worth — Last 12 Months</div>
        <div style="height:200px"><canvas id="rpt-nw"></canvas></div>
      </div>
      <!-- Income vs Expense -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px">
        <div style="font-size:.88rem;font-weight:700;color:var(--text2);margin-bottom:12px">💰 Income vs Expenses — Last 12 Months</div>
        <div style="height:220px"><canvas id="rpt-inc"></canvas></div>
      </div>
      <!-- Spending by Category -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span style="font-size:.88rem;font-weight:700;color:var(--text2)">🏷 Spending by Category</span>
          <select id="rpt-month-sel" onchange="UI.reportsMonth=this.value;renderReports()" style="font-size:.78rem;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text)">${monthOpts}</select>
        </div>
        <div style="height:220px"><canvas id="rpt-cat"></canvas></div>
      </div>
    </div>`;

  // Draw charts after DOM is painted
  requestAnimationFrame(() => {
    // Net Worth line
    _reportCharts.nw = new Chart(id('rpt-nw'), {
      type: 'line',
      data: {
        labels: last12.map(m => bFmtMonth(m)),
        datasets: [{
          label: 'Net Worth', data: netWorthData,
          borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.12)',
          pointRadius: 3, fill: true, tension: 0.3
        }]
      },
      options: { ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { display: false } },
        scales: { ...chartDefaults.scales,
          y: { ...chartDefaults.scales.y,
            ticks: { ...chartDefaults.scales.y.ticks,
              callback: v => (v<0?'-':'') + '$' + Math.abs(v).toLocaleString()
            }
          }
        }
      }
    });

    // Income vs Expense grouped bar
    _reportCharts.inc = new Chart(id('rpt-inc'), {
      type: 'bar',
      data: {
        labels: last12.map(m => bFmtMonth(m)),
        datasets: [
          { label: 'Income',   data: last12.map(m => incomeByMonth[m]||0),  backgroundColor: '#22c55e' },
          { label: 'Expenses', data: last12.map(m => expenseByMonth[m]||0), backgroundColor: '#ef4444' }
        ]
      },
      options: { ...chartDefaults }
    });

    // Spending by category horizontal bar
    if (catEntries.length > 0) {
      _reportCharts.cat = new Chart(id('rpt-cat'), {
        type: 'bar',
        data: {
          labels: catEntries.map(([k]) => k),
          datasets: [{
            label: 'Spent',
            data: catEntries.map(([,v]) => Math.round(v*100)/100),
            backgroundColor: ['#3b82f6','#8b5cf6','#f59e0b','#ef4444','#10b981','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1','#14b8a6','#a855f7','#eab308','#22c55e','#0ea5e9'],
          }]
        },
        options: { ...chartDefaults, indexAxis: 'y',
          plugins: { ...chartDefaults.plugins, legend: { display: false } },
          scales: { ...chartDefaults.scales,
            x: { ...chartDefaults.scales.x,
              ticks: { ...chartDefaults.scales.x.ticks, callback: v => '$'+v.toLocaleString() }
            },
            y: { ...chartDefaults.scales.y,
              ticks: { ...chartDefaults.scales.y.ticks, callback: undefined }
            }
          }
        }
      });
    } else {
      id('rpt-cat').insertAdjacentHTML('afterend','<div style="text-align:center;color:var(--text3);padding:40px;font-size:.85rem">No expense transactions for this month</div>');
    }
  });
}

// ══════════════════════════════════════════════════════════════════════
// SAVINGS POTS
// ══════════════════════════════════════════════════════════════════════
function renderSavingsPots() {
  const wrap = id('view-savings-pots');
  if (!wrap) return;

  const sp = D.savingsPots || {};

  // ── Setup gate ───────────────────────────────────────────────────────
  if (!sp.growthAccountId || !sp.trackedGroupId) {
    const groups = D.budget?.groups || [];
    const accts  = D.txnAccounts   || [];
    wrap.innerHTML = `
      <div style="padding:40px 20px;display:flex;justify-content:center">
        <div style="width:100%;max-width:480px">
          <div style="font-size:1.2rem;font-weight:800;margin-bottom:6px">💰 Savings Pots</div>
          <p style="color:var(--text2);font-size:.88rem;margin-bottom:22px;line-height:1.6">
            Tell me which <strong>Budget Group</strong> holds your planned expense categories, and which <strong>account</strong> you transfer savings into each month. I'll use the split amounts on those transfers to track each category's running balance.
          </p>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px">
            <div style="margin-bottom:14px">
              <label style="font-size:.82rem;font-weight:700;display:block;margin-bottom:5px;color:var(--text2)">Budget Group (Planned Expenses)</label>
              <select id="sp-group-sel" class="finput" style="width:100%">
                <option value="">— Select a group —</option>
                ${groups.map(g => `<option value="${esc(g.id)}">${esc(g.name)}</option>`).join('')}
              </select>
            </div>
            <div style="margin-bottom:20px">
              <label style="font-size:.82rem;font-weight:700;display:block;margin-bottom:5px;color:var(--text2)">Savings / Growth Account</label>
              <select id="sp-acct-sel" class="finput" style="width:100%">
                <option value="">— Select an account —</option>
                ${accts.map(a => `<option value="${esc(a.id)}">${esc(a.name)} (${esc(a.type)})</option>`).join('')}
              </select>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="BA.savingsPotsSaveSetup()">Save &amp; Show Savings Pots →</button>
          </div>
        </div>
      </div>`;
    return;
  }

  // ── Compute pots ──────────────────────────────────────────────────────
  const growthAcctId   = sp.growthAccountId;
  const trackedGroupId = sp.trackedGroupId;

  const budgetGroups = D.budget?.groups     || [];
  const budgetCats   = D.budget?.categories || [];
  const trackedGroup = budgetGroups.find(g => g.id === trackedGroupId);
  const trackedCats  = budgetCats.filter(c => c.groupId === trackedGroupId);
  const trackedCatIds = new Set(trackedCats.map(c => c.id));

  // For each tracked category build deposit/draw totals from split-transfers
  const pots = {};
  trackedCats.forEach(c => { pots[c.id] = { deposited: 0, drawn: 0, history: [] }; });

  (D.transactions || []).forEach(t => {
    if (!t.isTransfer || !(t.splits && t.splits.length)) return;
    // Deposit: debit leg FROM a non-Growth account TO Growth
    const isDeposit = t.debit > 0 && t.transferToAcctId === growthAcctId;
    // Draw: debit leg FROM Growth TO anywhere
    const isDraw    = t.debit > 0 && t.accountId === growthAcctId;
    if (!isDeposit && !isDraw) return;

    t.splits.forEach(s => {
      if (!trackedCatIds.has(s.categoryId)) return;
      const amt = parseFloat(s.amount) || 0;
      if (amt <= 0) return;
      if (!pots[s.categoryId]) return;
      if (isDeposit) {
        pots[s.categoryId].deposited += amt;
        pots[s.categoryId].history.push({ date: t.date, payee: t.payee || 'Transfer', amount: amt, type: 'deposit', txnId: t.id, acctId: t.accountId });
      } else {
        pots[s.categoryId].drawn += amt;
        pots[s.categoryId].history.push({ date: t.date, payee: t.payee || 'Draw', amount: amt, type: 'draw', txnId: t.id, acctId: t.accountId });
      }
    });
  });

  // ── Enrich categories ─────────────────────────────────────────────────
  const curMonth  = UI.budgetMonth || ymNow();
  const catData   = trackedCats.map(c => {
    const pot         = pots[c.id] || { deposited: 0, drawn: 0, history: [] };
    const balance     = pot.deposited - pot.drawn;
    const monthBudget = budgetGetPlan(c.id, curMonth);
    const runway      = monthBudget > 0 ? balance / monthBudget : null;
    const health      = runway === null ? 'none' : runway >= 2 ? 'good' : runway >= 1 ? 'warn' : 'danger';
    pot.history.sort((a, b) => b.date.localeCompare(a.date));
    return { ...c, ...pot, balance, monthBudget, runway, health };
  }).sort((a, b) => b.balance - a.balance);

  // ── Summary KPIs ─────────────────────────────────────────────────────
  const totalDeposited = catData.reduce((s, c) => s + c.deposited, 0);
  const totalDrawn     = catData.reduce((s, c) => s + c.drawn,     0);
  const totalBalance   = totalDeposited - totalDrawn;

  // ── Helpers ───────────────────────────────────────────────────────────
  const _hClr = h => h === 'good' ? 'var(--ok)' : h === 'warn' ? '#d97706' : h === 'danger' ? 'var(--danger)' : 'var(--border)';
  const _hBg  = h => h === 'good' ? 'color-mix(in srgb,var(--ok) 10%,transparent)' : h === 'warn' ? '#fef3c7' : h === 'danger' ? 'color-mix(in srgb,var(--danger) 10%,transparent)' : 'var(--surface2)';
  const _fc   = v => '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // ── Cards ─────────────────────────────────────────────────────────────
  const cards = catData.map(c => {
    const balColor  = c.balance > 0 ? 'var(--ok)' : c.balance < 0 ? 'var(--danger)' : 'var(--text3)';
    const gaugePct  = c.deposited > 0 ? Math.min(100, Math.max(0, (c.balance / c.deposited) * 100)) : 0;
    const gaugeClr  = _hClr(c.health);
    const runwayTxt = c.runway !== null
      ? (c.runway >= 2  ? `~${c.runway.toFixed(1)} months runway`
       : c.runway >= 1  ? `~${c.runway.toFixed(1)} month — getting low`
       : c.balance > 0  ? `< 1 month — replenish soon`
       : c.balance < 0  ? `Overdrawn by ${_fc(Math.abs(c.balance))}`
       : `Empty`)
      : 'No monthly budget set';

    const healthBadge = c.health !== 'none'
      ? `<span style="font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:99px;background:${_hBg(c.health)};color:${_hClr(c.health)};white-space:nowrap">${c.health === 'good' ? '✓ Healthy' : c.health === 'warn' ? '⚠ Low' : '⚠ Critical'}</span>`
      : '';

    const historyRows = c.history.slice(0, 10).map(h => `
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:.71rem;padding:4px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <span style="font-size:.75rem;color:${h.type === 'deposit' ? 'var(--ok)' : 'var(--danger)'}">
            ${h.type === 'deposit' ? '↑' : '↓'}
          </span>
          <span style="color:var(--text3);white-space:nowrap">${fmtDate(h.date)}</span>
          <span style="color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(h.payee)}">${esc(h.payee)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
          <span style="font-weight:700;color:${h.type === 'deposit' ? 'var(--ok)' : 'var(--danger)'}">
            ${h.type === 'deposit' ? '+' : '-'}${_fc(h.amount)}
          </span>
          <button class="btn btn-xs btn-ghost" style="padding:1px 5px;font-size:.63rem;line-height:1.4"
            onclick="BA.txnNavToLinked('${h.txnId}','${h.acctId}')" title="View transaction">↗</button>
        </div>
      </div>`).join('');

    return `
      <div style="background:var(--surface);border:1.5px solid ${c.health !== 'none' ? _hClr(c.health) : 'var(--border)'};border-radius:var(--r2);padding:16px 18px;display:flex;flex-direction:column;gap:8px">
        <!-- Title row -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="font-weight:800;font-size:.95rem;color:var(--text1);line-height:1.3">${esc(c.name)}</div>
          ${healthBadge}
        </div>
        <!-- Balance -->
        <div style="font-size:1.6rem;font-weight:800;color:${balColor};line-height:1;letter-spacing:-.02em">
          ${c.balance < 0 ? '-' : ''}${_fc(c.balance)}
        </div>
        <!-- Runway label -->
        <div style="font-size:.73rem;color:${_hClr(c.health) === 'var(--border)' ? 'var(--text3)' : _hClr(c.health)};font-weight:${c.health === 'none' ? '400' : '600'}">${runwayTxt}</div>
        <!-- Gauge bar -->
        <div style="height:7px;background:var(--surface2);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${gaugePct.toFixed(1)}%;background:${gaugeClr};border-radius:99px;transition:width .4s ease"></div>
        </div>
        <!-- Stats row -->
        <div style="display:flex;align-items:center;gap:10px;font-size:.74rem;flex-wrap:wrap;margin-top:1px">
          <span style="color:var(--ok);white-space:nowrap">↑ ${_fc(c.deposited)} saved</span>
          <span style="color:${c.drawn > 0 ? 'var(--danger)' : 'var(--text3)'};white-space:nowrap">↓ ${_fc(c.drawn)} drawn</span>
          ${c.monthBudget > 0 ? `<span style="color:var(--text3);margin-left:auto;white-space:nowrap">${c.monthBudget > 0 ? bFmtMonth(curMonth) + ': ' + _fc(c.monthBudget) + '/mo' : ''}</span>` : ''}
        </div>
        <!-- History -->
        ${c.history.length > 0 ? `
          <details style="margin-top:2px">
            <summary style="cursor:pointer;font-size:.73rem;color:var(--primary);font-weight:600;user-select:none;list-style:none;outline:none;padding:2px 0">
              ${c.history.length} transaction${c.history.length !== 1 ? 's' : ''} ▾
            </summary>
            <div style="margin-top:7px">${historyRows}
              ${c.history.length > 10 ? `<div style="font-size:.7rem;color:var(--text3);text-align:center;padding:5px 0">+${c.history.length - 10} more</div>` : ''}
            </div>
          </details>` : `<div style="font-size:.72rem;color:var(--text3);font-style:italic">No savings events yet — start by making a split transfer to ${esc((D.txnAccounts||[]).find(a=>a.id===growthAcctId)?.name||'your savings account')}</div>`}
      </div>`;
  }).join('');

  // ── All-history section ───────────────────────────────────────────────
  const allHistory = catData.flatMap(c => c.history.map(h => ({ ...h, catName: c.name }))).sort((a, b) => b.date.localeCompare(a.date));
  const histSection = allHistory.length > 0 ? `
    <div style="margin-top:28px">
      <div style="font-size:.85rem;font-weight:800;margin-bottom:10px;color:var(--text2)">All Savings Events</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden">
        <table class="txn-tbl" style="font-size:.78rem">
          <thead><tr>
            <th style="width:100px">Date</th>
            <th style="width:60px;text-align:center">Type</th>
            <th>Payee</th>
            <th>Category</th>
            <th class="r" style="width:110px">Amount</th>
            <th style="width:36px"></th>
          </tr></thead>
          <tbody>
            ${allHistory.map(h => `
              <tr>
                <td style="color:var(--text3)">${fmtDate(h.date)}</td>
                <td style="text-align:center">
                  <span style="font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:99px;background:${h.type === 'deposit' ? 'color-mix(in srgb,var(--ok) 12%,transparent)' : 'color-mix(in srgb,var(--danger) 10%,transparent)'};color:${h.type === 'deposit' ? 'var(--ok)' : 'var(--danger)'}">
                    ${h.type === 'deposit' ? 'SAVE' : 'DRAW'}
                  </span>
                </td>
                <td>${esc(h.payee)}</td>
                <td style="color:var(--primary)">${esc(h.catName)}</td>
                <td class="r" style="font-weight:700;color:${h.type === 'deposit' ? 'var(--ok)' : 'var(--danger)'}">
                  ${h.type === 'deposit' ? '+' : '-'}${_fc(h.amount)}
                </td>
                <td>
                  <button class="btn btn-xs btn-ghost" style="padding:1px 5px;font-size:.65rem"
                    onclick="BA.txnNavToLinked('${h.txnId}','${h.acctId}')" title="View transaction">↗</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : '';

  const acctName  = (D.txnAccounts || []).find(a => a.id === growthAcctId)?.name || 'Savings Account';
  const groupName = trackedGroup?.name || 'Planned Expenses';

  wrap.innerHTML = `
    <div style="padding:18px 20px 36px">
      <!-- Page header -->
