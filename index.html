<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Manager · Online</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--surface:#FFFFFF;--surface2:#F5EFE8;--surface3:#EDE5DA;
  --border:#E0D4C8;--border-light:#EDE5DC;
  --text:#1C1410;--text2:#6B5344;--text3:#9E8070;
  --primary:#D97757;--primary-d:#C1603E;--primary-l:#F2C9B3;
  --ok:#2E8B57;--ok-bg:#E8F5EE;
  --warn:#C07A0A;--warn-bg:#FEF3E2;
  --danger:#C0392B;--danger-bg:#FDEDEB;
  --info:#2471A3;--info-bg:#EBF5FB;
  --sh1:0 1px 3px rgba(0,0,0,.07);--sh2:0 2px 8px rgba(0,0,0,.09);--sh3:0 4px 20px rgba(0,0,0,.12);
  --r:6px;--r2:10px;
}
body{font-family:'Aptos','Calibri',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14.67px;min-height:100vh}

/* ─── HEADER ─── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:14px;height:50px;position:sticky;top:0;z-index:200;box-shadow:var(--sh1)}
.logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:15px;color:var(--primary);white-space:nowrap}
.nav-pills{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--r);align-items:center}
.np{padding:4px 13px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:14.67px;font-weight:600;color:var(--text2);transition:all .15s}
.np.active{background:var(--surface);color:var(--text);box-shadow:var(--sh1)}
/* ── Dropdown nav groups ── */
.nav-dropdown{position:relative}
.nav-dd-trigger{display:flex;align-items:center;gap:4px}
.nav-dd-caret{font-size:.65rem;opacity:.7;transition:transform .15s;display:inline-block}
.nav-dropdown.open .nav-dd-caret{transform:rotate(180deg)}
.nav-dropdown-menu{display:none;position:fixed;top:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh3);z-index:400;min-width:160px;padding:4px;margin-top:4px}
.nav-dropdown.open .nav-dropdown-menu{display:block}
.nav-dd-item{display:block;width:100%;padding:7px 13px;border:none;background:transparent;text-align:left;cursor:pointer;border-radius:5px;font-size:14px;font-weight:600;color:var(--text2);font-family:inherit;transition:all .12s;white-space:nowrap}
.nav-dd-item:hover{background:var(--surface2);color:var(--text)}
.nav-dd-item.active{background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--primary)}
.hdr-space{flex:1}
.save-info{font-size:12px;color:var(--text3);white-space:nowrap}
.save-btn{display:flex;align-items:center;gap:5px;padding:5px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:14.67px;font-weight:700;transition:all .15s}
.save-btn:hover{background:var(--primary-d)}
.save-btn.dirty{box-shadow:0 0 0 3px rgba(217,119,87,.3)}
.exit-btn{display:flex;align-items:center;gap:5px;padding:5px 14px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;margin-left:8px}
.exit-btn:hover{background:var(--hover);color:var(--text1);border-color:var(--text3)}

/* ─── LAYOUT ─── */
.main{padding:10px 14px}

/* ─── MONTH NAV ─── */
.mnav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
/* .mdisp is defined in MONTH STATUS block */
.arrow-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;font-size:16px;line-height:1}
.arrow-btn:hover{background:var(--surface2);color:var(--text)}
.mnav-right{margin-left:auto;display:flex;gap:7px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:14.67px;font-weight:600;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-danger{color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger-bg)}

/* ─── SUMMARY CARDS ─── */
.sum-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.kpi-sticky{position:sticky;top:50px;z-index:35;background:var(--bg);padding:10px 0 6px;margin-bottom:4px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
.kpi-sticky-budget{position:sticky;top:100px;z-index:35;background:var(--bg);padding:10px 0 6px;margin-bottom:4px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
/* Sticky nav+KPI wrapper — nav + KPI tiles float together below the main header */
.tab-sticky-top{position:sticky;top:50px;z-index:40;background:var(--bg);padding-bottom:6px;margin-bottom:4px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
/* Obligations pane KPI — sits below the sticky sub-tabs bar (~45px tall) */
.kpi-sticky-obl{position:sticky;top:95px;z-index:35;background:var(--bg);padding:10px 0 6px;margin-bottom:4px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
/* ── Transactions tab ── */
.txn-layout{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;height:calc(100vh - 270px);min-height:420px;background:var(--surface)}
.txn-left{width:230px;min-width:190px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);flex-shrink:0;overflow:hidden}
.txn-left-hdr{padding:10px 14px 6px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border)}
.txn-acct-item{display:flex;flex-direction:column;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.txn-acct-item:hover{background:var(--surface2)}
.txn-acct-item.active{background:color-mix(in srgb,var(--primary) 10%,var(--bg));border-left-color:var(--primary)}
.txn-acct-name{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-acct-item.active .txn-acct-name{color:var(--primary)}
.txn-acct-meta{font-size:.7rem;color:var(--text3);margin-top:1px}
.txn-add-acct{margin:8px;padding:6px;background:none;border:1px dashed var(--border);border-radius:var(--r);cursor:pointer;font-size:.78rem;color:var(--text3);text-align:center;transition:all .15s}
.txn-add-acct:hover{border-color:var(--primary);color:var(--primary);background:color-mix(in srgb,var(--primary) 5%,transparent)}
.txn-group-hdr{display:flex;align-items:center;gap:5px;padding:8px 14px 4px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);cursor:pointer;user-select:none;margin-top:2px}
.txn-group-hdr:hover{color:var(--text)}
.txn-group-chev{font-size:9px;transition:transform .15s;display:inline-block}
.txn-group-chev.col{transform:rotate(-90deg)}
.txn-drag-handle{cursor:grab;color:var(--border);font-size:13px;padding:0 2px;line-height:1;flex-shrink:0}
.txn-drag-handle:hover{color:var(--text3)}
.txn-acct-item.drag-over-top{border-top:2px solid var(--primary)!important}
.txn-acct-item.drag-over-bot{border-bottom:2px solid var(--primary)!important}
.txn-acct-item.dragging{opacity:.4}
.txn-right{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.txn-ledger-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;flex-shrink:0}
.txn-ledger-title{font-size:.92rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.txn-tbl-wrap{flex:1;overflow:auto;min-height:0}
.txn-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem;table-layout:fixed}
.txn-tbl th{position:sticky;top:0;z-index:5;padding:7px 10px;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap;background:var(--surface2);overflow:hidden}
.txn-col-hdl{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;border-right:2px solid transparent;transition:border-color .12s}
.txn-col-hdl:hover,.txn-col-hdl.dragging{border-right-color:var(--primary)}
.txn-tbl th.r,.txn-tbl td.r{text-align:right}
.txn-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.txn-tbl tr:last-child td{border-bottom:none}
.txn-tbl tr:hover td{background:color-mix(in srgb,var(--primary) 4%,transparent)}
.txn-debit{color:var(--danger);font-weight:600;font-family:monospace;font-size:.82rem}
.txn-credit{color:var(--ok);font-weight:600;font-family:monospace;font-size:.82rem}
.txn-bal{font-family:monospace;font-size:.82rem;font-weight:500}
.txn-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.txn-pill-clr{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer}
.txn-pill-clr.yes{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}
.txn-pill-clr.no{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.txn-pill-clr.rec{background:color-mix(in srgb,#8b5cf6 15%,transparent);color:#7c3aed;font-weight:700}
.txn-flag{display:inline-block;width:10px;height:10px;border-radius:50%;cursor:pointer;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
.txn-flag.none{background:var(--surface2);border:1px dashed var(--border)}
.txn-flag-picker{position:fixed;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2);padding:6px 8px;display:flex;flex-direction:column;gap:5px;align-items:center}
.txn-flag-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.txn-flag-swatch:hover{transform:scale(1.25);border-color:rgba(0,0,0,.2)}
.txn-cat-pill{display:inline-block;padding:1px 7px;border-radius:99px;font-size:.7rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text3);white-space:normal;word-break:break-word}
#budget-cat-popup{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh3);padding:12px 14px;min-width:190px;max-width:240px;font-family:inherit}
.txn-missing-cat{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:99px;font-size:.7rem;font-weight:600;background:color-mix(in srgb,#f59e0b 12%,transparent);border:1px solid color-mix(in srgb,#f59e0b 40%,transparent);color:#b45309;cursor:pointer}
.txn-missing-cat:hover{background:color-mix(in srgb,#f59e0b 20%,transparent)}
.txn-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:60px 20px;color:var(--text3);text-align:center;gap:8px}
.txn-empty-icon{font-size:2rem}
.txn-pending-section{background:color-mix(in srgb,#f59e0b 8%,transparent);border:1px solid color-mix(in srgb,#f59e0b 30%,transparent);border-radius:8px;margin:10px 12px 4px;padding:6px 0}
.txn-pending-hdr{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:.78rem;font-weight:700;color:color-mix(in srgb,#f59e0b 80%,var(--text));cursor:pointer;user-select:none}
.txn-pending-hdr:hover{background:color-mix(in srgb,#f59e0b 6%,transparent);border-radius:6px}
.txn-pending-chev{font-size:9px;transition:transform .15s;display:inline-block;margin-left:2px}
.txn-pending-chev.col{transform:rotate(-90deg)}
.txn-pending-hdr .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#f59e0b;color:#fff;font-size:.68rem;padding:0 5px}
.txn-pending-row{display:grid;grid-template-columns:90px 1fr 130px 80px 80px 100px;align-items:center;gap:6px;padding:5px 14px;font-size:.78rem;border-top:1px solid color-mix(in srgb,#f59e0b 15%,transparent)}
.txn-pending-row:hover{background:color-mix(in srgb,#f59e0b 6%,transparent)}
.txn-pending-row .pamt{font-family:monospace;font-weight:600;color:var(--danger)}
.txn-pending-row .ppayee{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txn-pending-row .pcat{font-size:.7rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txn-pending-scroll{max-height:130px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:color-mix(in srgb,#f59e0b 40%,transparent) transparent}
.txn-pact-btn{padding:2px 9px;border-radius:5px;font-size:.72rem;font-weight:600;border:none;cursor:pointer}
.txn-pact-btn.approve{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent)}
.txn-pact-btn.approve:hover{background:color-mix(in srgb,var(--ok) 25%,transparent)}
.txn-pact-btn.reject{background:color-mix(in srgb,var(--danger) 10%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 25%,transparent)}
.txn-pact-btn.reject:hover{background:color-mix(in srgb,var(--danger) 20%,transparent)}
.txn-split-line{display:grid;grid-template-columns:1fr 80px 1fr 22px;gap:3px;align-items:center;margin-bottom:3px}
.txn-split-link{font-size:.71rem;color:var(--primary);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;display:inline-block}
.txn-split-pill{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:99px;font-size:.7rem;font-weight:600;background:color-mix(in srgb,var(--primary) 12%,transparent);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);color:var(--primary);cursor:pointer;user-select:none}
.txn-split-pill:hover{background:color-mix(in srgb,var(--primary) 20%,transparent)}
.txn-split-expand{background:color-mix(in srgb,var(--primary) 4%,transparent)}
.txn-split-expand td{padding:4px 8px 8px 32px;font-size:.76rem;color:var(--text2)}
.txn-split-line-row{display:flex;gap:16px;align-items:baseline;padding:2px 0;border-bottom:1px dashed var(--border-light)}
.txn-split-line-row:last-child{border-bottom:none}
.txn-transfer-pill{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:99px;font-size:.7rem;font-weight:600;background:color-mix(in srgb,#8b5cf6 10%,transparent);border:1px solid color-mix(in srgb,#8b5cf6 30%,transparent);color:#7c3aed;cursor:default;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;flex:1;min-width:130px;max-width:190px}
.sum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600}
.sum-val{font-size:17px;font-weight:800}
.sum-sub{font-size:10px;color:var(--text2);margin-top:2px}
.sum-card.c-danger .sum-val{color:var(--danger)}
.sum-card.c-warn .sum-val{color:var(--warn)}
.sum-card.c-ok .sum-val{color:var(--ok)}

/* ─── CATEGORY SECTION ─── */
.cat-section{margin-bottom:16px}
.cat-hdr{display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;transition:background .15s}
.cat-hdr:hover{background:var(--surface3)}
.chev{transition:transform .2s;flex-shrink:0;color:var(--text3);font-size:12px}
.cat-section.collapsed .chev{transform:rotate(-90deg)}
.cat-name{font-weight:700;font-size:13px}
.cat-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;background:var(--primary-l);color:var(--primary-d);margin-left:2px}
.cat-badge.overdue{background:var(--danger-bg);color:var(--danger)}
.cat-badge.soon{background:var(--warn-bg);color:var(--warn)}
.cat-total{margin-left:auto;font-size:13px;font-weight:700}

/* ─── GRID ─── */
.grid-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)}
table.pgrid{width:100%;border-collapse:collapse;font-size:14.67px}
.pgrid th{background:var(--surface);padding:6px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
.pgrid th.num{text-align:right}
.pgrid td{padding:0;border-bottom:1px solid var(--border-light);height:36px;vertical-align:middle}
.pgrid tr:last-child td{border-bottom:none}
.pgrid tr:hover td{background:#FBF6F1}
.pgrid tr.paid td{background:#D6EDDA;color:#7A9E82}
.pgrid tr.paid:hover td{background:#C4E3CA;color:#7A9E82}
.pgrid tr.overdue td{background:#FFF8F7}
.pgrid tr.overdue:hover td{background:#FDECEB}

/* ─── CELLS ─── */
.cell{padding:3px 9px;display:flex;align-items:center;height:36px;min-width:0}
.cell.ed{cursor:pointer}
.cell.ed:hover{background:rgba(217,119,87,.07);border-radius:3px}
.cell input,.cell select{width:100%;border:1.5px solid var(--primary);border-radius:3px;padding:2px 6px;font-size:14.67px;outline:none;background:#fff;color:var(--text);font-family:inherit}
.cell input[type=checkbox]{width:auto;cursor:pointer;accent-color:var(--primary)}
.cell input[type=number]{width:90px}
.rnum{color:var(--text3);font-size:11px;text-align:right;padding-right:7px;width:28px;user-select:none}

/* ─── DAY BADGES ─── */
.dbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.dbadge.far{background:var(--ok-bg);color:var(--ok)}
.dbadge.soon{background:var(--warn-bg);color:var(--warn)}
.dbadge.urgent{background:#FFF0E3;color:#D4500A}
.dbadge.overdue{background:var(--danger-bg);color:var(--danger)}
.dbadge.paid{background:var(--ok-bg);color:var(--ok)}
.dbadge.na{background:var(--surface2);color:var(--text3)}

/* Status dot */
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.sdot.paid{background:var(--ok)}
.sdot.pending{background:var(--border)}
.sdot.overdue{background:var(--danger)}
.sdot.soon{background:var(--warn)}

/* Auto badge */
.abadge{font-size:9px;background:var(--info-bg);color:var(--info);padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px}

/* Row actions */
.ract{display:flex;align-items:center;gap:3px;padding:0 6px}
.ibtn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;font-size:13px}
.ibtn:hover{background:var(--surface2);color:var(--text)}
.ibtn.del:hover{background:var(--danger-bg);color:var(--danger)}
.ibtn.sus:hover{background:var(--warn-bg);color:var(--warn)}

/* ─── AMOUNTS ─── */
.mono{font-family:'Aptos','Calibri',Consolas,'Courier New',monospace;font-size:14.67px}
.amt-zero{color:var(--text3)}
.amt-pos{color:var(--ok);font-weight:600}
.amt-warn{color:var(--warn);font-weight:600}

/* ─── FREQ BADGES ─── */
.fbadge{display:inline-flex;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.fbadge.monthly{background:#EBF5FB;color:#1A6FA0}
.fbadge.quarterly{background:#EBF0FB;color:#1A4BA0}
.fbadge.semi-annual{background:#F5EBF5;color:#7D3C98}
.fbadge.annual{background:#FEF9E7;color:#9A7D0A}
.fbadge.bi-weekly{background:#FEF0E6;color:#C1603E}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:42px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;margin-bottom:14px}

/* ─── SETUP ─── */
.stabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.stab{padding:7px 16px;border:none;background:transparent;cursor:pointer;font-size:14.67px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
.stab.active{color:var(--primary);border-bottom-color:var(--primary)}
.setup-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.stitle{font-size:15px;font-weight:700}
.setup-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.setup-grid table{width:100%;border-collapse:collapse;font-size:14.67px}
.setup-grid th{background:var(--surface2);padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.setup-grid td{padding:0;border-bottom:1px solid var(--border-light);height:36px}
.setup-grid tr:last-child td{border-bottom:none}
.setup-grid tr:hover td{background:#FBF6F2}
.setup-grid tr.suspended{opacity:.55}
.sus-badge{font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase}

/* ─── CHIPS ─── */
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:14px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px}
.chip-x{cursor:pointer;color:var(--text3);font-size:15px;line-height:1;margin-left:2px}
.chip-x:hover{color:var(--danger)}
.chip-add{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--border-light)}
.chip-add input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:5px 9px;font-size:14.67px;outline:none;font-family:inherit}
.chip-add input:focus{border-color:var(--primary)}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--r2);padding:22px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3)}
.modal-title{font-size:15px;font-weight:800;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.flbl{font-size:11px;font-weight:700;color:var(--text2)}
.finput{border:1px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:14.67px;outline:none;font-family:inherit;background:var(--surface);color:var(--text)}
.finput:focus{border-color:var(--primary)}
.fcheck{display:flex;align-items:center;gap:7px;padding:6px 0}
.fcheck input{accent-color:var(--primary)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px;margin-top:4px}

/* ─── TOAST ─── */
.toasts{position:fixed;bottom:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--text);color:#fff;padding:9px 15px;border-radius:var(--r);font-size:14.67px;box-shadow:var(--sh2);animation:slide-in .25s ease;max-width:280px}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--danger)}
@keyframes slide-in{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slide-out{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}

/* ─── SLICER ─── */
.slicer{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.slicer-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-right:2px;white-space:nowrap}
.sl-btn{padding:3px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;font-family:inherit;white-space:nowrap}
.sl-btn:hover{background:var(--surface2);border-color:var(--primary-l)}
.sl-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ─── SORTABLE COLUMNS ─── */
.pgrid th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.pgrid th.sortable:hover{color:var(--primary)}
.pgrid th.sorted{color:var(--primary)}
.sort-ind{font-size:9px;margin-left:3px;opacity:.8}

/* ─── MONTH STATUS ─── */
.mdisp{font-size:18px;font-weight:800;min-width:170px;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:nowrap}
.m-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.m-badge.done{background:var(--ok-bg);color:var(--ok)}
.m-badge.overdue{background:var(--danger-bg);color:var(--danger)}
.m-badge.pending{background:var(--warn-bg);color:var(--warn)}

/* ─── PREV MONTH WARNING ─── */
.prev-warn{background:var(--warn-bg);border:1px solid #E8C060;border-radius:var(--r);padding:7px 14px;margin-bottom:12px;font-size:13px;color:var(--warn);font-weight:600;display:flex;align-items:center;gap:6px}
.prev-warn a{color:var(--warn);text-decoration:underline}

/* ─── MULTI-SELECT ─── */
.pgrid tr.sel td{background:#FFF3EE !important}
.pgrid tr.sel:hover td{background:#FFE8DC !important}
.sel-toolbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--primary-l);border:1px solid var(--primary);border-radius:var(--r);margin-bottom:8px;flex-wrap:wrap}
.sel-count{font-size:13px;font-weight:700;color:var(--primary-d);flex:1}

/* ─── SETUP SEARCH ─── */
.setup-search-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.setup-search-wrap{position:relative;display:flex;align-items:center;flex:1;min-width:220px;max-width:380px}
.setup-search-icon{position:absolute;left:9px;color:var(--text3);pointer-events:none;flex-shrink:0}
.setup-search-input{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:5px 30px 5px 28px;font-size:14.67px;outline:none;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s}
.setup-search-input:focus{border-color:var(--primary)}
.setup-search-clear{position:absolute;right:7px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:2px 4px;border-radius:3px}
.setup-search-clear:hover{color:var(--text);background:var(--surface2)}

/* ─── FAMILY LEDGER ─── */
.fam-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.fam-title{font-size:18px;font-weight:800;flex:1}
.fam-persons{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fam-pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit}
.fam-pill:hover{background:var(--surface2);border-color:var(--primary-l)}
.fam-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fam-pill .fam-bal{font-size:10px;font-weight:700;margin-left:5px;opacity:.85}
.fam-summary{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.fam-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;flex:1;min-width:110px;max-width:160px;cursor:pointer;transition:all .15s}
.fam-sum-card:hover{box-shadow:var(--sh2);border-color:var(--primary-l)}
.fam-sum-card.active-person{border-color:var(--primary);box-shadow:0 0 0 2px rgba(217,119,87,.2)}
.fam-sum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fam-sum-val{font-size:16px;font-weight:800}
.fam-sum-val.owe{color:var(--ok)}
.fam-sum-val.owed{color:var(--danger)}
.fam-ledger-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.fam-ledger-hdr{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.fam-ledger-name{font-size:15px;font-weight:800}
.fam-bal-badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.fam-bal-badge.owe{background:var(--ok-bg);color:var(--ok)}
.fam-bal-badge.owed{background:var(--danger-bg);color:var(--danger)}
.fam-bal-badge.zero{background:var(--surface3);color:var(--text2)}
table.fled{width:100%;border-collapse:collapse;font-size:14.67px}
.fled th{background:var(--surface);padding:6px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
.fled th.num{text-align:right}
.fled td{padding:0;border-bottom:1px solid var(--border-light);height:36px;vertical-align:middle}
.fled tr:last-child td{border-bottom:none}
.fled tr:hover td{background:#FBF6F1}
.fled .fcell{padding:3px 9px;display:flex;align-items:center;height:36px;min-width:0}
.fled .fcell.ed{cursor:pointer}
.fled .fcell.ed:hover{background:rgba(217,119,87,.07);border-radius:3px}
.fled .fcell input{width:100%;border:1.5px solid var(--primary);border-radius:3px;padding:2px 6px;font-size:14.67px;outline:none;background:#fff;color:var(--text);font-family:inherit}
.fled .fcell input[type=number]{width:90px}
.fled .dr-cell{color:var(--warn);font-weight:600}   /* amber — money you spent */
.fled .cr-cell{color:var(--info);font-weight:600}   /* blue  — money received  */
.fled .bal-pos{color:var(--ok);font-weight:700}
.fled .bal-neg{color:var(--danger);font-weight:700}
.fled .bal-zero{color:var(--text);font-weight:600}
.fled .rnum{color:var(--text3);font-size:11px;text-align:right;padding-right:7px;width:28px;user-select:none}
.fled th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.fled th.sortable:hover{color:var(--primary)}
.fled th.sorted{color:var(--primary)}
/* Sticky thead: works because .fam-table-wrap is the scroll container */
.fam-table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 310px)}
.fled thead th{position:sticky;top:0;z-index:5;background:var(--surface);box-shadow:0 1px 0 var(--border)}
/* Pagination bar */
.fam-pager{display:flex;align-items:center;gap:7px;padding:8px 12px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--r2) var(--r2);flex-wrap:wrap}
.fam-page-info{font-size:12px;color:var(--text3);flex:1;white-space:nowrap}
.fam-pager .btn{min-width:32px;justify-content:center}
.fam-pager .btn:disabled{opacity:.38;cursor:not-allowed;pointer-events:none}

/* ─── CC TRACKER ─── */
.cc-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.cc-title{font-size:18px;font-weight:800;flex:1}
.cc-subtabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:12px}
.cc-stab{padding:7px 18px;border:none;background:transparent;cursor:pointer;font-size:14.67px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
.cc-stab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* Grid container – sticky both axes */
.cc-grid-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px);border:1px solid var(--border);border-radius:var(--r2);background:var(--surface)}
table.ccg{border-collapse:collapse;font-size:13.5px;white-space:nowrap}
.ccg th{position:sticky;top:0;z-index:4;background:var(--surface2);padding:5px 10px;text-align:right;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);border-right:1px solid var(--border-light)}
.ccg th.card-col{position:sticky;left:0;top:0;z-index:6;text-align:left;min-width:160px;border-right:2px solid var(--border)}
.ccg td{padding:0;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);height:34px;vertical-align:middle}
.ccg tr:last-child td{border-bottom:none}
.ccg .card-cell{position:sticky;left:0;z-index:2;background:var(--surface);padding:3px 10px;font-weight:600;white-space:nowrap;border-right:2px solid var(--border);min-width:160px}
.ccg tr:hover td{background:#FBF6F1}
.ccg tr:hover .card-cell{background:#FBF6F1}
.ccg .total-row td{background:var(--surface2)!important;font-weight:800;border-top:2px solid var(--border)}
.ccg .total-row .card-cell{background:var(--surface2)!important}
.ccg .val-cell{padding:3px 10px;text-align:right;cursor:pointer;transition:background .12s}
.ccg .val-cell:hover{background:rgba(217,119,87,.08)!important}
.ccg .zero{color:var(--text3)}
.ccg .int-val{color:var(--danger)}
.ccg .os-val{color:var(--info)}
.ccg .limit-col{color:var(--text3);font-size:11px}
.ccg th.stmt-day-col{text-align:center;min-width:64px;width:64px}
.ccg .stmt-day-cell{text-align:center;font-size:12px;color:var(--text2);padding:3px 8px;font-weight:500;white-space:nowrap}
.ccg .over30{color:var(--danger)}
/* Month entry modal */
.cc-month-grid{display:grid;grid-template-columns:1fr;gap:0;max-height:55vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.cc-mrow{display:grid;grid-template-columns:160px 1fr 1fr;gap:0;border-bottom:1px solid var(--border-light);align-items:center}
.cc-mrow:last-child{border-bottom:none}
.cc-mrow:nth-child(even){background:var(--surface2)}
.cc-mcell{padding:5px 8px;font-size:13px}
.cc-mcell input{width:100%;border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.cc-mcell input:focus{border-color:var(--primary)}
.cc-mhdr{display:grid;grid-template-columns:160px 1fr 1fr;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.cc-mhdr div{padding:5px 8px}

/* ─── CC CHARTS ─── */
.cc-charts{margin-top:20px}
.cc-chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cc-chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px 10px}
.cc-chart-hdr{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cc-chart-svg{width:100%;display:block;overflow:visible}
.cc-chart-legend{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border-light)}
.cc-chart-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);white-space:nowrap}
.cc-chart-leg-swatch{width:14px;height:3px;border-radius:2px;flex-shrink:0;display:inline-block}
.cc-no-data{text-align:center;padding:24px 0;color:var(--text3);font-size:13px}
.cc-tip{position:fixed;background:rgba(28,20,16,.93);color:#fff;padding:4px 10px 5px;border-radius:5px;font-size:12px;font-weight:600;pointer-events:none;z-index:9000;display:none;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.35);letter-spacing:.01em;transform:translateX(-50%)}
.cc-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:rgba(28,20,16,.93)}

/* ─── FILE OVERLAY ─── */
#file-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#file-overlay.hidden{display:none}
.fo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 40px;max-width:380px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.fo-icon{font-size:36px;margin-bottom:12px}
.fo-title{font-size:18px;font-weight:700;color:var(--text1);margin-bottom:8px}
.fo-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.55}
.fo-btns{display:flex;flex-direction:column;gap:10px}
.fo-btn-p{background:var(--primary);color:#fff;border:none;border-radius:7px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.fo-btn-p:hover{opacity:.85}
.fo-btn-s{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:7px;padding:10px 16px;font-size:13px;cursor:pointer}
.fo-btn-s:hover{background:var(--hover)}
.fo-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:fo-spin .7s linear infinite;margin:0 auto 16px}
@keyframes fo-spin{to{transform:rotate(360deg)}}

/* ─── CC HEALTH PANEL ─── */
.cc-health-wrap{margin-top:16px;margin-bottom:4px;padding:0 14px}
.cc-health-summary{display:flex;gap:20px;flex-wrap:wrap;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;font-size:12px;color:var(--text2)}
.cc-health-summary strong{color:var(--text1);font-weight:700}
.cc-health-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ch-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.ch-panel-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ch-panel-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.ch-panel-sub{font-size:11px;color:var(--text3);margin-left:auto}
.ch-panel-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.ch-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.ch-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.ch-util-list{display:flex;flex-direction:column;gap:10px}
.ch-util-row,.ch-apr-row{display:flex;align-items:center;gap:10px;font-size:12px}
.ch-card-name{width:130px;min-width:130px;font-weight:600;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px}
.ch-bar-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.ch-bar-area{position:relative}
.ch-bar-track{height:12px;border-radius:6px;overflow:hidden;background:linear-gradient(to right,#D5EDD9 0%,#D5EDD9 30%,#FDEBD0 30%,#FDEBD0 75%,#FADBD8 75%,#FADBD8 100%)}
.ch-bar-fill{height:100%;border-radius:6px;transition:width .45s ease}
.ch-bar-target{position:absolute;left:30%;top:-2px;bottom:-2px;width:2px;background:rgba(40,40,40,.45);border-radius:1px;pointer-events:none}
.ch-bar-sublabel{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-pct{font-weight:700;font-size:12px;min-width:52px;text-align:right}
.apr-mode-toggle{display:flex;gap:4px;margin-bottom:8px}
.apt-btn{padding:3px 11px;font-size:11px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.apt-btn:hover{border-color:var(--primary);color:var(--primary)}
.apt-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ch-amt{font-size:10px;color:var(--text3);min-width:88px;text-align:right;white-space:nowrap}
.ch-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;min-width:68px;text-align:center;flex-shrink:0}
.ch-ok{background:#E8F5E9;color:#2E7D32}
.ch-warn{background:#FFF3E0;color:#E65100}
.ch-danger{background:#FFEBEE;color:#C62828}
.ch-na{background:var(--surface2);color:var(--text3)}
.ch-edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:13px;line-height:1;flex-shrink:0}
.ch-edit-btn:hover{color:var(--primary);background:var(--hover)}
.ch-no-data{text-align:center;padding:18px 0;color:var(--text3);font-size:12px}

/* ─── MISC ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.mt-auto{margin-top:auto}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── BUDGET & ANNUAL ─── */
.budget-sticky-bar{position:sticky;top:50px;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:6px 14px;margin:-4px 0 14px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.bkpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.bkpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px 12px;position:relative;overflow:hidden;transition:box-shadow .15s}
.bkpi-card:hover{box-shadow:var(--sh2)}
.bkpi-icon{font-size:1.2rem;margin-bottom:6px}
.bkpi-label{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.bkpi-value{font-family:'Aptos','Calibri',Consolas,monospace;font-size:1.2rem;font-weight:700;color:var(--text);line-height:1.1}
.bkpi-sub{font-size:.68rem;color:var(--text3);margin-top:4px}
.bkpi-split .bkpi-split-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-top:4px}
.bkpi-split-lbl{font-size:.63rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);flex-shrink:0}
.bkpi-split-val{font-family:'Aptos','Calibri',Consolas,monospace;font-size:.95rem;font-weight:700;text-align:right}
.budget-table-header{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.btable-wrap{overflow-x:auto}
.btable{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;min-width:600px}
.btable thead th{padding:7px 10px;text-align:right;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap}
.btable thead th.btable-name{text-align:left}.btable thead th.btable-bar{text-align:left}
.btable thead th{position:relative;overflow:hidden}
.bcol-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;z-index:1}
.bcol-resize:hover,.bcol-resize.dragging{background:var(--primary);opacity:.5}
.btable td{padding:7px 10px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.btable-group-row td{padding:8px 10px 5px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:none}
.btable-subtotal-row td{background:var(--surface3);font-size:.82rem;color:var(--text2);border-top:1px solid var(--border)}
.btable-adj-trail td{background:color-mix(in srgb,#8b5cf6 4%,transparent);border-top:none!important}
.budget-realloc-btn{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:4px;cursor:pointer;border:1px solid;line-height:1.5;margin-right:3px;white-space:nowrap}
.budget-realloc-btn.cover{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 40%,transparent);background:color-mix(in srgb,var(--danger) 8%,transparent)}
.budget-realloc-btn.cover:hover{background:color-mix(in srgb,var(--danger) 16%,transparent)}
.budget-realloc-btn.move{color:#0891b2;border-color:color-mix(in srgb,#0891b2 40%,transparent);background:color-mix(in srgb,#0891b2 8%,transparent)}
.budget-realloc-btn.move:hover{background:color-mix(in srgb,#0891b2 16%,transparent)}
.rlvr-pot-btn{font-size:.6rem;padding:1px 4px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);line-height:1.4;vertical-align:middle}
.rlvr-pot-btn.linked{border-color:color-mix(in srgb,var(--ok) 40%,transparent);color:var(--ok);background:color-mix(in srgb,var(--ok) 8%,transparent)}
.rlvr-pot-chip{font-size:.6rem;display:inline-block;margin-top:2px;padding:1px 5px;border-radius:3px;line-height:1.5}
.rlvr-pot-chip.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 8%,transparent);border:1px solid color-mix(in srgb,var(--ok) 20%,transparent)}
.rlvr-pot-chip.gap{color:var(--danger);background:color-mix(in srgb,var(--danger) 8%,transparent);border:1px solid color-mix(in srgb,var(--danger) 20%,transparent)}
.btable-grand-row td{background:var(--surface3);font-weight:700;font-size:.88rem;color:var(--text);border-top:2px solid var(--border)}
.btable-name{text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.btable-num{text-align:right;font-family:'Aptos','Calibri',Consolas,monospace;font-size:.82rem;white-space:nowrap;overflow:hidden}
.btable-over{color:var(--danger)!important}
.btable-bar{text-align:left;padding-right:8px}
.btable-bar-inner{display:flex;align-items:center;gap:5px;width:100%}
.btable-progress{height:5px;background:var(--border);border-radius:99px;overflow:hidden;flex:1;min-width:40px}
.btable-progress-fill{height:100%;border-radius:99px;transition:width .3s ease}
.btable-pct{font-family:'Aptos','Calibri',Consolas,monospace;font-size:.7rem;font-weight:600;flex-shrink:0;min-width:28px;text-align:right}
.btable-edit{cursor:pointer;border-bottom:1px dashed var(--border);display:inline-block;transition:border-color .15s,color .15s;border-radius:2px;padding:1px 3px}
.btable-drilldown{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:var(--primary);color:inherit}
.btable-edit:hover{border-color:var(--primary);color:var(--primary-d);background:rgba(217,119,87,.07)}
.btable-inline-input{border:1.5px solid var(--primary);border-radius:4px;padding:3px 6px;font-family:inherit;font-size:.83rem;text-align:right;background:var(--surface);outline:none;box-shadow:0 0 0 2px rgba(217,119,87,.15);color:var(--text)}
.btable-inline-input.text-input{text-align:left;font-size:.9rem}
.btable-inline-input:focus{border-color:var(--primary-d);box-shadow:0 0 0 3px rgba(217,119,87,.2)}
.btable-addinput{border:1.5px solid var(--primary);border-radius:4px;padding:4px 8px;font-size:.88rem;outline:none;background:var(--surface);box-shadow:0 0 0 2px rgba(217,119,87,.15);color:var(--text);min-width:160px;font-family:inherit}
.btable-addinput:focus{border-color:var(--primary-d);box-shadow:0 0 0 3px rgba(217,119,87,.2)}
.btable-drag-handle{cursor:grab;color:var(--text3);font-size:1rem;user-select:none;padding:0 4px 0 0;line-height:1;transition:color .15s;flex-shrink:0}
.btable-drag-handle:hover{color:var(--primary)}
[draggable="true"]:active .btable-drag-handle{cursor:grabbing}
tr.btable-dragging td{opacity:.35}
tr.btable-drop-over td{background:rgba(217,119,87,.07)!important;outline:2px solid var(--primary);outline-offset:-1px}
tr.btable-drop-over td+td{outline:none}
tr.btable-drop-over td:first-child{border-left:3px solid var(--primary)}
.btable-chevron{background:none;border:none;padding:0 3px;cursor:pointer;font-size:.7rem;color:var(--text3);line-height:1;transition:color .15s;flex-shrink:0;user-select:none}
.btable-chevron:hover{color:var(--primary)}
.ann-chevron{color:rgba(255,255,255,.5)}
.ann-chevron:hover{color:#fff}
/* Annual table */
.ann-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r);border:1px solid var(--border)}
.ann-table{border-collapse:collapse;width:100%;min-width:1400px;font-size:13px}
.ann-label{text-align:left;white-space:nowrap;padding:7px 10px;min-width:175px;position:sticky;left:0;z-index:3;background:var(--surface)}
.ann-num{text-align:right;padding:5px 7px;font-family:'Aptos','Calibri',Consolas,monospace;font-size:.78rem;white-space:nowrap}
.ann-zero{color:var(--text3)}
.ann-head{background:var(--text);color:#fff;padding:6px 8px;text-align:center;font-weight:700;border-right:1px solid rgba(255,255,255,.1)}
.ann-head.ann-label{text-align:left;z-index:4;position:sticky;left:0}
.ann-month-head{font-size:.73rem;letter-spacing:.03em}
.ann-subhead{font-size:.62rem;color:rgba(255,255,255,.6);font-weight:500;padding-top:3px;padding-bottom:5px}
.ann-future-head{background:var(--surface3);color:var(--text2)}
.ann-today{background:var(--primary)!important;color:#fff!important}
.ann-today-sub{background:rgba(217,119,87,.75)!important;color:#fff!important}
.ann-total-head{background:rgba(0,0,0,.3)}
.ann-bud-col{background-color:rgba(46,139,87,.03)}
.ann-act-col{background-color:rgba(217,119,87,.03)}
.ann-future{opacity:.55}
.ann-total-col{background:rgba(217,119,87,.06)!important;font-weight:600}
.ann-row-income td{background:#E8F5EE;font-weight:600;border-top:2px solid var(--border)}
.ann-row-income .ann-label{background:#E8F5EE}
.ann-row-expenses td{background:var(--surface3);font-weight:600;border-top:1px solid var(--border)}
.ann-row-expenses .ann-label{background:var(--surface3)}
.ann-row-net td{background:#FEF3E2;font-weight:700;border-top:2px solid var(--border)}
.ann-row-net .ann-label{background:#FEF3E2}
.ann-row-cumul td{background:var(--surface2);font-weight:600}
.ann-row-cumul .ann-label{background:var(--surface2)}
.ann-row-group td{background:var(--surface2);font-weight:700;border-top:1px solid var(--border)}
.ann-row-group .ann-label{background:var(--surface2)}
.ann-row-cat td{border-bottom:1px solid var(--border-light)}
.ann-row-cat .ann-label{background:var(--surface);padding-left:22px;color:var(--text2);font-size:.9em}
.ann-indent{padding-left:22px!important;color:var(--text2)}
.ann-section-divider td{background:var(--surface3);padding:5px 10px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);border-top:2px solid var(--border);border-bottom:1px solid var(--border)}
.ann-bud-val{color:var(--info)}
.ann-positive{color:var(--ok);font-weight:600}
.ann-negative{color:var(--danger);font-weight:600}
/* Income schedule styles */
.isc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.isc-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.isc-fields{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
.isc-inp{border:1px solid var(--border);border-radius:var(--r);padding:4px 8px;font-size:13px;font-family:inherit;outline:none;background:var(--surface)}
.isc-inp:focus{border-color:var(--primary)}
.isc-toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.isc-toggle input{opacity:0;width:0;height:0}
.isc-toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:20px;transition:.2s}
.isc-toggle input:checked+.isc-toggle-slider{background:var(--ok)}
.isc-toggle-slider:before{content:"";position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.isc-toggle input:checked+.isc-toggle-slider:before{transform:translateX(16px)}
.isc-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.isc-tag{display:inline-flex;padding:1px 5px;background:var(--surface3);color:var(--text3);border-radius:3px;font-size:.68rem;font-weight:600;text-transform:uppercase;margin-left:4px}
.isc-section-hdr td{padding:5px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--surface2);border-top:1px solid var(--border-light)}
.isc-income-row{background:#FAFFF7}
.isc-friday-badge{display:inline-flex;align-items:center;padding:2px 8px;background:var(--ok-bg);color:var(--ok);border-radius:20px;font-size:.7rem;font-weight:700}
.dow-pills{display:flex;gap:4px;flex-wrap:wrap}
.dow-pill{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:10.5px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .15s;user-select:none}
.dow-pill:hover{border-color:var(--primary);color:var(--primary)}
.dow-pill.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-xs{padding:2px 6px;font-size:.72rem}
/* ── Obligations tab ── */
.obl-subtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0}
.obl-stab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:.82rem;font-weight:600;color:var(--text3);cursor:pointer;margin-bottom:-2px;transition:all .15s;border-radius:var(--r) var(--r) 0 0}
.obl-stab:hover{color:var(--primary);background:var(--surface2)}
.obl-stab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--surface)}
.obl-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.obl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;transition:box-shadow .15s}
.obl-card:hover{box-shadow:var(--sh2)}
.obl-card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r2) 0 0 var(--r2)}
.obl-card-name{font-weight:700;font-size:.95rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:60px}
.obl-card-cat{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:10px}
.obl-card-amount{font-size:1.4rem;font-weight:800;margin-bottom:2px}
.obl-card-sub{font-size:.75rem;color:var(--text2);margin-bottom:8px}
.obl-card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px}
.obl-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700;background:var(--surface2);color:var(--text2)}
.obl-pill.green{background:var(--ok-bg);color:var(--ok)}
.obl-pill.orange{background:var(--warn-bg);color:var(--warn)}
.obl-pill.red{background:var(--danger-bg);color:var(--danger)}
.obl-pill.purple{background:#EDE9FE;color:#6D28D9}
.obl-pill.teal{background:#CCFBF1;color:#0D9488}
.obl-pill.blue{background:var(--info-bg);color:var(--info)}
.obl-progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0 2px}
.obl-progress-fill{height:100%;border-radius:3px;transition:width .4s}
.obl-tbl{width:100%;border-collapse:collapse;font-size:.83rem}
.obl-tbl th{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:6px 10px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.obl-tbl th.r{text-align:right}
.obl-tbl td{padding:8px 10px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.obl-tbl tr:last-child td{border-bottom:none}
.obl-tbl tr:hover td{background:var(--surface2)}
.obl-tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.obl-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.obl-cal-hdr{text-align:center;font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;padding:4px 0}
.obl-cal-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:80px;padding:4px;font-size:.72rem}
.obl-cal-day.today{border-color:var(--primary);background:var(--surface2)}
.obl-cal-day.other-month{opacity:.4}
.obl-cal-dn{font-weight:700;font-size:.75rem;margin-bottom:2px;color:var(--text2)}
.obl-cal-ev{border-radius:3px;padding:1px 4px;margin-bottom:1px;font-size:.67rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.obl-cal-ev.sub{background:#EDE9FE;color:#6D28D9}
.obl-cal-ev.emi{background:#CCFBF1;color:#0D9488}
.obl-cal-ev.split{background:#E0E7FF;color:#4F46E5}
.obl-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.obl-empty{text-align:center;padding:40px 20px;color:var(--text3)}
.obl-empty-icon{font-size:2.5rem;margin-bottom:8px}
.obl-burndown-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.obl-burndown-title{font-weight:700;font-size:.85rem;margin-bottom:12px;color:var(--text2)}

/* ── Mobile dashboard ─────────────────────────────────────── */
#view-mobile{display:none;padding-bottom:40px}
.mob-hdr{position:sticky;top:50px;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.mob-month{font-size:1rem;font-weight:800;min-width:130px;text-align:center;color:var(--text1)}
.mob-section{padding:14px 14px 0}
.mob-section-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:10px}
.mob-group-hdr{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin:16px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--border)}
.mob-cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;margin-bottom:8px}
.mob-cat-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.mob-cat-name{font-size:.9rem;font-weight:700;color:var(--text1)}
.mob-cat-remain{font-size:1rem;font-weight:800}
.mob-cat-sub{font-size:.7rem;color:var(--text3);margin-bottom:6px}
.mob-bar-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.mob-bar-fill{height:100%;border-radius:99px}
.mob-pot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mob-pot-name{font-size:.9rem;font-weight:700;color:var(--text1)}
.mob-pot-bal{font-size:1rem;font-weight:800}
.mob-total-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
@media(max-width:767px){
  .nav-pills{display:none!important}
  .hdr-space{display:none!important}
  .save-info{display:none!important}
  main>div:not(#view-mobile){display:none!important}
  #view-mobile{display:block!important}
  #file-overlay .fo-card{width:92vw;max-width:420px}
}

<script>
'use strict';
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let D = {
  categories: ['Utilities','Credit Cards','Subscriptions','Insurance','Loans','Other'],
  accounts: ['Chase Checking','BofA Savings','Manual / Check'],
  templates: [],
  cycles: {},  // keyed "YYYY-MM" → { payments: [...] }
  familyAccounts: null,  // seeded on first load
  ccTracker: null,       // seeded on first load
  budget: null           // seeded on first load
};

let UI = {
  view: 'monthly',
  month: ymNow(),
  setupTab: 'templates',
  dirty: false,
  catFilter: 'All',        // monthly slicer selection
  sortCol: 'dueDate',      // default sort by due date
  sortDir: 'asc',          // ascending = soonest first
  setupSearch: '',         // setup templates search term
  setupStatusFilter: 'all',// setup templates status pill: all | active | suspended
  selectedPids: new Set(), // multi-select: set of selected payment IDs
  familyPerson: null,      // active person id in family ledger
  famPage: 0,              // current page (0-indexed)
  famPageSize: 25,         // rows per page
  ccView: 'interest',      // 'interest' | 'outstanding'
  ccYears: null,           // Set of selected years for trend charts (or Set(['all']))
  ccCardFilter: 'both',    // 'both' | 'total' | 'cards'
  ccCardSel: null,         // null = all cards, or a specific card ID to solo
  ccHealthMonth: null,     // selected month for card health panel
  ccHealthYear:  null,     // selected year for card health panel
  aprPanelMode: 'apr',     // 'apr' | 'interest' — APR panel toggle
  budgetDonutMode: 'actual', // 'actual' | 'budget' — donut chart mode
  budgetMonth:       ymNow(),  // currently viewed budget month
  budgetSelectedCat: null,     // selected category id for right panel
  ccrSelectedCard: null,       // selected CC card id in repayment planner (null = show all)
  breakdownMonth: ymNow(), // currently viewed month in Breakdown tab
  annualYear: new Date().getFullYear(), // currently viewed year in Budget Grid
  oblSort: {
    sub:   { col: 'name',   dir: 'asc' },
    emi:   { col: 'name',   dir: 'asc' },
    split: { col: 'name',   dir: 'asc' },
  },
  // Split-transaction inline editing state
  _txnSplitMode:   false,
  _txnSplitLines:  [],   // [{ categoryId, amount }]
  _txnCurDebit:    0,
  _txnCurCredit:   0,
  // Transfer modal category-split state
  _txfrSplitMode:  false,
  _txfrSplitLines: [],   // [{ categoryId, amount }]
  // Transactions module extras
  txnAccount:      null,   // selected account id
  txnSearch:       '',     // search query across all transactions
  txnSelected:     [],     // selected txn IDs for bulk ops
  txnHighlightRow: null,   // row to highlight after drilldown navigation (view mode)
  txnNewRow:       false,
  txnEditRow:      null,
  _txnCatUserChanged: false,
  txnGroupCollapsed: {},
  txnPendingCollapsed: false,
  txnDateFrom:   '',
  txnDateTo:     '',
  txnCatFilter:  '',   // expense type filter for ledger
  reportsMonth:  '',   // selected month for spending breakdown chart
};

let editCtx = null; // active inline edit context

// ════════════════════════════════════════════════════════════
// FILE STORAGE  (File System Access API + IndexedDB handle)
// ════════════════════════════════════════════════════════════
// ── GitHub config stored in localStorage ────────────────────
const GH_CONFIG_KEY = 'acct_mgr_gh_config';
const GH_SHA_KEY    = 'acct_mgr_gh_sha';
function ghGetConfig() {
  try { return JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || 'null'); }
  catch { return null; }
}
function ghSetConfig(cfg) { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg)); }
function ghGetSha()     { return localStorage.getItem(GH_SHA_KEY) || null; }
function ghSetSha(sha)  { if (sha) localStorage.setItem(GH_SHA_KEY, sha); }

// ── Seed / apply loaded data ─────────────────────────────────
const BUDGET_EMPTY = { groups:[], categories:[], plans:[], actualTotals:[], income:[], incomeSchedules:[], expenseSchedules:[], ccRepayments:[], rolloverPotLinks:{} };
function _applyData(raw) {
  D = { ...D, ...raw };
  if (!D.familyAccounts) { D.familyAccounts = FAMILY_SEED_DATA; dirty(); }
  if (!D.ccTracker)      { D.ccTracker      = CC_TRACKER_SEED_DATA; dirty(); }
  if (!D.budget)         { D.budget         = { ...BUDGET_EMPTY }; dirty(); }
  // Ensure all budget sub-arrays exist (for migrated data that may be partial)
  if (!D.budget.groups)          D.budget.groups          = [];
  if (!D.budget.categories)      D.budget.categories      = [];
  if (!D.budget.plans)           D.budget.plans           = [];
  if (!D.budget.actualTotals)    D.budget.actualTotals    = [];
  if (!D.budget.income)          D.budget.income          = [];
  if (!D.budget.incomeSchedules)  D.budget.incomeSchedules  = [];
  if (!D.budget.expenseSchedules) D.budget.expenseSchedules = [];
  if (!D.budget.ccRepayments)     D.budget.ccRepayments     = [];
  if (!D.budget.rolloverPotLinks) D.budget.rolloverPotLinks = {};
  if (!D.obligations) D.obligations = { subscriptions: [], emis: [], splits: [] };
  if (!D.obligations.subscriptions) D.obligations.subscriptions = [];
  if (!D.obligations.emis)          D.obligations.emis          = [];
  if (!D.obligations.splits)        D.obligations.splits        = [];
  if (!D.txnAccounts)   D.txnAccounts   = [];
  if (!D.transactions)  D.transactions  = [];
  if (!D.budget.txnActuals)    D.budget.txnActuals    = [];
  if (!D.budget.rolloverCats)  D.budget.rolloverCats  = [];
  if (!D.budget.adjustments)   D.budget.adjustments   = [];
  if (!D.savingsPots) D.savingsPots = { growthAccountId: '', trackedGroupId: '' };
  if (!D.uiPrefs)    D.uiPrefs    = {};
  // Auto-sync CC cards → Transaction accounts (idempotent: keyed by ccCardId)
  const existingCCIds = new Set((D.txnAccounts).filter(a => a.ccCardId).map(a => a.ccCardId));
  (D.ccTracker?.cards || []).filter(c => c.active !== false).forEach(card => {
    if (!existingCCIds.has(card.id)) {
      D.txnAccounts.push({
        id: uid(), name: card.name, type: 'Credit Card',
        openingBalance: 0, openingDate: '', ccCardId: card.id,
      });
    }
  });
  // Auto-generate obligation transactions (idempotent — deduped by obligationId::oblMonth)
  oblAutoGenerateTxns();
  // Recompute txn actuals so Budget Grid shows correct values immediately on load
  if (typeof recomputeTxnActuals === "function") recomputeTxnActuals();
}

// ── Obligations utility functions ────────────────────────────
const OBL_SUB_CYCLES = ['Monthly','Quarterly','Twice a Year','Annual','Weekly'];
const OBL_EMI_FREQS  = ['Monthly','Bi-weekly','Quarterly'];
const OBL_SUB_CATS   = ['Streaming','Music','Software','Gaming','News','Health & Fitness','Shopping','Utilities','Education','Other'];
const OBL_EMI_CATS   = ['Electronics','Appliances','Vehicle','Furniture','Jewelry','Medical','Education','Home Improvement','Other'];
const OBL_SPLIT_CATS = ['Education','Health & Fitness','Home Improvement','Shopping','Utilities','Travel','Entertainment','Other'];

function oblNextRenewal(startDate, cycle) {
  const now = new Date(); now.setHours(0,0,0,0);
  let d = new Date(startDate + 'T00:00:00');
  if (d >= now) return startDate;
  const cycleMonths = { Monthly:1, Quarterly:3, 'Twice a Year':6, Annual:12 };
  const months = cycleMonths[cycle];
  while (d < now) {
    if (cycle === 'Weekly') d.setDate(d.getDate() + 7);
    else d.setMonth(d.getMonth() + (months || 1));
  }
  return d.toISOString().split('T')[0];
}

function oblToMonthly(cost, cycle) {
  const map = { Monthly:1, Quarterly:1/3, 'Twice a Year':1/6, Annual:1/12, Weekly:52/12 };
  return cost * (map[cycle] || 1);
}

function oblDaysDiff(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function oblUrgencyColor(days) {
  if (days < 0)  return 'var(--danger)';
  if (days <= 3) return 'var(--danger)';
  if (days <= 7) return 'var(--warn)';
  return 'var(--ok)';
}

function oblUrgencyLabel(days) {
  if (days < 0)  return `${Math.abs(days)}d overdue`;
  if (days === 0) return 'Due today';
  if (days === 1) return 'Due tomorrow';
  return `In ${days}d`;
}

function oblEmiPaidCount(startDate, frequency) {
  const start = new Date(startDate + 'T00:00:00');
  const now   = new Date(); now.setHours(0,0,0,0);
  if (start >= now) return 0;
  if (frequency === 'Bi-weekly') return Math.floor((now - start) / (14 * 86400000));
  if (frequency === 'Quarterly') {
    let n = 0, d = new Date(start);
    while (d < now) { d.setMonth(d.getMonth() + 3); n++; }
    return n - 1;
  }
  let n = 0, d = new Date(start);
  while (d < now) { d.setMonth(d.getMonth() + 1); n++; }
  return n - 1;
}

function oblEmiTotalInstallments(startDate, maturityDate, frequency) {
  const s = new Date(startDate   + 'T00:00:00');
  const e = new Date(maturityDate + 'T00:00:00');
  if (frequency === 'Bi-weekly') return Math.ceil((e - s) / (14 * 86400000));
  if (frequency === 'Quarterly') {
    let n = 0, d = new Date(s);
    while (d <= e) { d.setMonth(d.getMonth() + 3); n++; }
    return n - 1;
  }
  return (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
}

function oblLoanRemainingBalance(loanAmt, emiAmt, rate, paidCount, freq) {
  if (!rate || rate <= 0) return Math.max(0, loanAmt - paidCount * emiAmt);
  // Per-period interest rate based on payment frequency
  const annualRate = rate / 100;
  const periodsPerYear = (freq === 'Bi-weekly') ? 26 : (freq === 'Quarterly') ? 4 : 12;
  const r = annualRate / periodsPerYear;
  let bal = loanAmt;
  for (let i = 0; i < paidCount && bal > 0; i++) {
    const interest = bal * r;
    bal -= Math.min(emiAmt - interest, bal);
  }
  return Math.max(0, bal);
}

function oblEnrichEmi(e) {
  const freq = e.frequency || 'Monthly';
  let total;
  if (e.termMonths) {
    // termMonths is always in calendar months — convert to actual installments per frequency
    if (freq === 'Bi-weekly')  total = Math.round(+e.termMonths * 26 / 12); // ~2.17 payments/month
    else if (freq === 'Quarterly') total = Math.round(+e.termMonths / 3);
    else                        total = +e.termMonths; // Monthly: 1 installment per month
  } else {
    total = oblEmiTotalInstallments(e.startDate, e.maturityDate, freq);
  }
  const paid      = Math.min(oblEmiPaidCount(e.startDate, freq), total);
  const remaining = oblLoanRemainingBalance(+e.loanAmount, +e.emiAmount, +(e.interestRate||0), paid, freq);
  return { ...e, totalInstallments: total, installmentsPaid: paid, remainingBalance: remaining };
}

function oblEmiNextDue(e) {
  const [y, m] = (ymNow()).split('-').map(Number);
  const day = Math.min(+e.dueDateEachMonth || 1, new Date(y, m, 0).getDate());
  return `${String(y).padStart(4,'0')}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

// Does subscription renew during a given YYYY-MM?
function oblSubRenewsInMonth(sub, ym) {
  return oblNextRenewal(sub.startDate, sub.billingCycle).startsWith(ym);
}

// Historical-aware version: does subscription renew in any past/present YYYY-MM?
function oblSubRenewsInMonthAny(sub, ym) {
  const [y, m] = ym.split('-').map(Number);
  const start = new Date((sub.startDate || '2000-01-01') + 'T00:00:00');
  const startYM = start.getFullYear() * 12 + (start.getMonth()); // 0-based months
  const thisYM  = y * 12 + (m - 1); // convert to 0-based
  if (thisYM < startYM) return false;
  const cycleMap = { Monthly: 1, Quarterly: 3, 'Twice a Year': 6, Annual: 12 };
  const cm = cycleMap[sub.billingCycle || 'Monthly'];
  if (!cm) return false;
  return (thisYM - startYM) % cm === 0;
}

// Does EMI have a payment in a given YYYY-MM?
function oblEmiDueInMonth(emi, ym) {
  const [y, m] = ym.split('-').map(Number);
  const start  = new Date(emi.startDate + 'T00:00:00');
  const thisYM = y * 12 + (m - 1);
  const startYM = start.getFullYear() * 12 + start.getMonth();
  if (thisYM < startYM) return false;
  if (emi.maturityDate) {
    const end  = new Date(emi.maturityDate + 'T00:00:00');
    const endYM = end.getFullYear() * 12 + end.getMonth();
    if (thisYM > endYM) return false;
  }
  if ((emi.frequency || 'Monthly') === 'Quarterly') return (thisYM - startYM) % 3 === 0;
  return true;
}

// Does split have a payment in a given YYYY-MM?
function oblSplitDueInMonth(split, ym) {
  const [y, m] = ym.split('-').map(Number);
  const start  = new Date(split.startDate + 'T00:00:00');
  const thisYM = y * 12 + (m - 1);
  const startYM = start.getFullYear() * 12 + start.getMonth();
  if (thisYM < startYM) return false;
  return (thisYM - startYM) < split.totalInstallments;
}

// ── GitHub API helpers ────────────────────────────────────────
async function _ghFetch(cfg) {
  const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (res.status === 404) throw new Error('File not found — check repo name and file path.');
  if (res.status === 401) throw new Error('Invalid token — check your Personal Access Token.');
  if (!res.ok) throw new Error(`GitHub API error ${res.status}: ${res.statusText}`);
  const json = await res.json();
  ghSetSha(json.sha);
  const decoded = decodeURIComponent(escape(atob(json.content.replace(/\n/g, ''))));
  return JSON.parse(decoded);
}

async function _ghWrite(cfg, data) {
  const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
  const jsonStr = JSON.stringify(data, null, 2);
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  const sha = ghGetSha();
  const body = { message: `Update accounts data — ${new Date().toISOString().slice(0,16).replace('T',' ')}`, content };
  if (sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  const json = await res.json();
  ghSetSha(json.content?.sha);
}

// ════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════
function id(x) { return document.getElementById(x); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function ymNow() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function parseYM(ym) {
  const [y,m] = ym.split('-').map(Number);
  return { y, m: m-1 };
}
function shiftYM(ym, n) {
  const { y, m } = parseYM(ym);
  const d = new Date(y, m+n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function ymLabel(ym) {
  const { y, m } = parseYM(ym);
  return new Date(y, m, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
}
function clampDay(y, m, day) {
  // m is 0-indexed
  const max = new Date(y, m+1, 0).getDate();
  return new Date(y, m, Math.min(+day, max));
}
function isoDate(d) { return d.toISOString().split('T')[0]; }
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d)) return '—';
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}
function fmtDateMDY(s) { return fmtDate(s); } // alias — both produce MM/DD/YY
function daysLeft(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00'); due.setHours(0,0,0,0);
  return Math.round((due - now) / 86400000);
}
function fmtCurrency(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function freqClass(f) {
  const s = (f||'monthly').toLowerCase().replace(/\s+/g,'-');
  // Normalize: 'bi-weekly' stays, 'semi-annual' stays
  return s;
}

// ── BILLING WINDOW: 10th of cycleYM through 9th of cycleYM+1 ──
// Reflects "pay with this month's income" — income received in month M
// covers bills due from the 10th of M through the 9th of M+1.
function getCycleWindow(ym) {
  const { y, m } = parseYM(ym);
  const nextD = new Date(y, m + 1, 1); // 1st of next month
  return {
    start: isoDate(new Date(y, m, 10)),
    end:   isoDate(new Date(nextD.getFullYear(), nextD.getMonth(), 9))
  };
}

// Find which calendar month's bill lands in targetYM's billing window.
// Checks targetYM, targetYM+1, and targetYM-1 in that order.
function findBillYM(t, targetYM) {
  const { start, end } = getCycleWindow(targetYM);
  for (const checkYM of [targetYM, shiftYM(targetYM, +1), shiftYM(targetYM, -1)]) {
    const { dueDate } = buildDates(t, checkYM);
    if (dueDate && dueDate >= start && dueDate <= end) return checkYM;
  }
  return targetYM; // fallback: use targetYM even if it falls outside window
}

// Bi-weekly dates use the CALENDAR month (mortgage tied to paycheck — show where due).
// All other frequencies use the billing window (10th → 9th) via templateFires/findBillYM.
function getBiweeklyDatesForMonth(t, cycleYM) {
  const anchor = t.anchorMonth || UI.month;
  const anchorDay = parseInt(t.dueDay) || 1;
  const { y: ay, m: am } = parseYM(anchor);
  const anchorDate = clampDay(ay, am, anchorDay);
  const anchorMs = anchorDate.getTime();
  const { y, m } = parseYM(cycleYM);
  const monthStartMs = new Date(y, m, 1).getTime();
  const monthEndMs   = new Date(y, m + 1, 0, 23, 59, 59, 999).getTime();
  const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;
  const dates = [];

  const rawDiff = monthStartMs - anchorMs;
  let startPeriod = Math.max(0, Math.floor(rawDiff / TWO_WEEKS) - 1);

  for (let i = startPeriod; i < startPeriod + 5; i++) {
    const ts = anchorMs + i * TWO_WEEKS;
    if (ts > monthEndMs) break;
    if (ts >= monthStartMs && ts <= monthEndMs) {
      dates.push(isoDate(new Date(ts)));
    }
  }
  return dates;
}

// Should a template fire for target cycle month (using billing window)?
function templateFires(t, targetYM) {
  if (!t.isActive) return false;
  const freq = t.frequency || 'Monthly';
  if (freq === 'Bi-Weekly') return getBiweeklyDatesForMonth(t, targetYM).length > 0;

  const { start, end } = getCycleWindow(targetYM);
  // Check targetYM and its immediate neighbours for a bill that lands in the window
  for (const checkYM of [targetYM, shiftYM(targetYM, +1), shiftYM(targetYM, -1)]) {
    const anchor = t.anchorMonth || checkYM;
    const { y:ay, m:am } = parseYM(anchor);
    const { y:cy, m:cm } = parseYM(checkYM);
    const diff = (cy - ay)*12 + (cm - am);
    if (diff < 0) continue;
    let freqFires = false;
    switch(freq) {
      case 'Monthly':     freqFires = true; break;
      case 'Quarterly':   freqFires = diff % 3 === 0; break;
      case 'Semi-Annual': freqFires = diff % 6 === 0; break;
      case 'Annual':      freqFires = diff % 12 === 0; break;
      default:            freqFires = true;
    }
    if (!freqFires) continue;
    const { dueDate } = buildDates(t, checkYM);
    if (dueDate && dueDate >= start && dueDate <= end) return true;
  }
  return false;
}

// Build statement + due dates for a cycle month
function buildDates(t, cycleYM) {
  const { y, m } = parseYM(cycleYM);
  let stmtDate = null, dueDate = null;
  if (t.statementDay) stmtDate = isoDate(clampDay(y, m, t.statementDay));
  if (t.dueDay) {
    const dm = t.dueNextMonth ? m+1 : m;
    const dy = dm > 11 ? y+1 : y;
    const dnorm = dm > 11 ? 0 : dm;
    dueDate = isoDate(clampDay(dy, dnorm, t.dueDay));
  }
  return { stmtDate, dueDate };
}
