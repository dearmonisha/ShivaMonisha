  const ev = v => esc(v||'');
  // Transaction accounts for the linked account picker
  const acctOpts = (D.txnAccounts||[])
    .filter(a => a.type === 'Credit Card')
    .map(a => `<option value="${a.id}" ${(card?.linkedTxnAccountId||'')=== a.id?'selected':''}>${ev(a.name)}</option>`)
    .join('');
  const allAcctOpts = (D.txnAccounts||[])
    .map(a => `<option value="${a.id}" ${(card?.linkedTxnAccountId||'')=== a.id?'selected':''}>${ev(a.name)}</option>`)
    .join('');
  // Expense category options for interest
  const catOpts = txnCatOptions(card?.interestCategoryId || null);
  return `
    <div class="modal-title">${isEdit?'Edit':'Add'} Credit Card</div>
    <div class="form-grid">
      <div class="fg"><label class="flbl">Card Name <span style="color:var(--danger)">*</span></label>
        <input id="ncc-name"  class="finput" type="text" value="${ev(card?.name)}" placeholder="e.g. Chase Sapphire"></div>
      <div class="fg"><label class="flbl">Statement Day (e.g. 15)</label>
        <input id="ncc-day"   class="finput" type="text" value="${ev(card?.intDay)}" placeholder="e.g. 15"></div>
      <div class="fg"><label class="flbl">Credit Limit ($)</label>
        <input id="ncc-limit" class="finput" type="number" step="100" min="0" value="${card?.limit!=null?card.limit:''}" placeholder="e.g. 10000"></div>
      <div class="fg"><label class="flbl">APR (%)</label>
        <input id="ncc-apr"   class="finput" type="number" step="0.01" min="0" max="100" value="${card?.apr!=null?card.apr:''}" placeholder="e.g. 24.99"></div>
      <div class="fg"><label class="flbl">Status</label>
        <select id="ncc-active" class="finput">
          <option value="1" ${card?.active!==false?'selected':''}>Active</option>
          <option value="0" ${card?.active===false?'selected':''}>Inactive</option>
        </select></div>
      <div class="fg full" style="margin-top:4px;padding-top:10px;border-top:1px dashed var(--border)">
        <span style="font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Auto-Sync Links</span>
      </div>
      <div class="fg full"><label class="flbl">Transactions Account <span style="font-size:.7rem;font-weight:400;color:var(--text3)">— which account in Transactions tab = this card?</span></label>
        <select id="ncc-acct" class="finput"><option value="">— None —</option>${allAcctOpts}</select></div>
      <div class="fg full"><label class="flbl">Interest Expense Category <span style="font-size:.7rem;font-weight:400;color:var(--text3)">— which category do you tag CC interest transactions with?</span></label>
        <select id="ncc-intcat" class="finput"><option value="">— None —</option>${catOpts}</select></div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="${isEdit?`updateCCCard('${card.id}')`:'saveNewCCCard()'}">
        ${isEdit?'Save Changes':'Add Card'}
      </button>
    </div>`;
}

function addCCCardModal() {
  showModal(_ccCardModalHTML(null));
  setTimeout(() => id('ncc-name')?.focus(), 50);
}

function editCCCardModal(cardId) {
  const card = (D.ccTracker.cards||[]).find(c => c.id === cardId);
  if (!card) return;
  showModal(_ccCardModalHTML(card));
  setTimeout(() => id('ncc-name')?.focus(), 50);
}

function _readCCCardFields() {
  const name  = id('ncc-name').value.trim();
  if (!name) { id('ncc-name').style.borderColor = 'var(--danger)'; id('ncc-name').focus(); return null; }
  const limit = parseFloat(id('ncc-limit').value);
  const apr   = parseFloat(id('ncc-apr').value);
  return {
    name,
    intDay:              id('ncc-day').value.trim() || '',
    limit:               (!isNaN(limit) && limit >= 0) ? limit : 0,
    apr:                 (!isNaN(apr)   && apr   >= 0) ? apr   : 0,
    active:              id('ncc-active').value === '1',
    linkedTxnAccountId:  id('ncc-acct')?.value   || null,
    interestCategoryId:  id('ncc-intcat')?.value  || null,
  };
}

function saveNewCCCard() {
  const fields = _readCCCardFields();
  if (!fields) return;
  const slug  = fields.name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  const newId = slug + '_' + Date.now().toString(36);
  D.ccTracker.cards.push({ id: newId, ...fields });
  dirty(); closeModal(); renderCCTracker();
  toast(`${fields.name} added ✓`, 'ok');
}

function updateCCCard(cardId) {
  const fields = _readCCCardFields();
  if (!fields) return;
  const idx = (D.ccTracker.cards||[]).findIndex(c => c.id === cardId);
  if (idx < 0) return;
  D.ccTracker.cards[idx] = { ...D.ccTracker.cards[idx], ...fields };
  dirty(); closeModal(); renderCCTracker();
  toast('Card updated ✓', 'ok');
}

function renderCCTracker() {
  const c = id('view-cc');
  const cct = D.ccTracker;
  const months = (cct.months || []).slice().sort();
  const latestMonth = months[months.length - 1] || ymNow();
  // Derive sorted years list
  const years = [...new Set(months.map(m => m.split('-')[0]))].sort();
  // Initialise / validate ccYears (Set)
  if (!UI.ccYears || !(UI.ccYears instanceof Set) || UI.ccYears.size === 0) {
    UI.ccYears = new Set([years[years.length - 1] || ymNow().split('-')[0]]);
  } else {
    // Drop any year that no longer exists in data (except 'all')
    UI.ccYears.forEach(y => { if (y !== 'all' && !years.includes(y)) UI.ccYears.delete(y); });
    if (UI.ccYears.size === 0) UI.ccYears = new Set([years[years.length - 1] || ymNow().split('-')[0]]);
  }
  const isAllYears = UI.ccYears.has('all');

  let totalInt = 0, totalOS = 0;
  cct.cards.forEach(card => {
    const entry = (cct.data[card.id] || {})[latestMonth];
    if (entry) { totalInt += entry.interest || 0; totalOS += entry.outstanding || 0; }
  });
  const ymFmt = ym => {
    const [y, m] = ym.split('-');
    return new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'short', year:'2-digit'});
  };
  // Multi-select year pills
  const yearPills = [
    `<button class="sl-btn${isAllYears?' active':''}" onclick="switchCCYear('all')">All Time</button>`,
    ...years.map(y => `<button class="sl-btn${(!isAllYears && UI.ccYears.has(y))?' active':''}" onclick="switchCCYear('${y}')">${y}</button>`)
  ].join('');
  // Card selector pills — "All Cards" + one per card
  const cardSelPills = [
    `<button class="sl-btn${!UI.ccCardSel?' active':''}" onclick="switchCCCardSel(null)">All Cards</button>`,
    ...cct.cards.map(c => {
      const missingSync = !c.linkedTxnAccountId || !c.interestCategoryId || !(D.templates||[]).some(t => t.ccCardId === c.id);
      const warnDot = missingSync ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--warn);margin-left:4px;vertical-align:middle;margin-bottom:1px" title="Incomplete sync mapping"></span>` : '';
      return `<button class="sl-btn${UI.ccCardSel===c.id?' active':''}" onclick="switchCCCardSel('${esc(c.id)}')">${esc(c.name)}${warnDot}</button>`;
    })
  ].join('');
  // Chart header label for selected years
  const sortedSelYears = isAllYears ? [] : [...UI.ccYears].sort();
  const yearLabel = isAllYears ? 'All Time'
    : sortedSelYears.length === 1 ? sortedSelYears[0]
    : sortedSelYears.length <= 3 ? sortedSelYears.join(', ')
    : `${sortedSelYears[0]}–${sortedSelYears[sortedSelYears.length-1]}`;
  // Chart header also notes the selected card
  const cardLabel = UI.ccCardSel ? ` · ${esc((cct.cards.find(c=>c.id===UI.ccCardSel)||{}).name||'')}` : '';
  c.innerHTML = `
    <div class="tab-sticky-top">
      <div class="cc-header" style="margin-bottom:0">
        <span class="cc-title">CC Tracker</span>
        <button class="btn btn-sm" style="border-color:var(--primary);color:var(--primary)" onclick="addCCCardModal()">&#65291; Add Card</button>
        <button class="btn btn-primary btn-sm" onclick="addMonthModal()">&#65291; Add Month</button>
        <button class="btn btn-sm" style="color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,var(--border));font-size:.76rem" onclick="BA.ccSyncNow()" title="Pull interest from Transactions and statement balance from Monthly tab for all registered months">🔄 Sync</button>
      </div>
      <div class="sum-row" style="margin-bottom:0;padding-top:8px">
        <div class="sum-card c-danger">
          <div class="sum-lbl">Interest &mdash; ${ymFmt(latestMonth)}</div>
          <div class="sum-val mono">${fmtCurrency(totalInt)||'$0.00'}</div>
          <div class="sum-sub">Total across all cards</div>
        </div>
        <div class="sum-card">
          <div class="sum-lbl">Outstanding &mdash; ${ymFmt(latestMonth)}</div>
          <div class="sum-val mono" style="color:var(--info)">${fmtCurrency(totalOS)||'$0.00'}</div>
          <div class="sum-sub">Total across all cards</div>
        </div>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;overflow:hidden">
      <div onclick="BA.toggleCCHealth()" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;border-bottom:${_ccHealthCollapsed?'none':'1px solid var(--border)'};background:var(--surface2)">
        <span style="font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:7px">
          <span id="cchealth-chev" style="font-size:11px;color:var(--text3);display:inline-block;transition:transform .2s;${_ccHealthCollapsed?'transform:rotate(-90deg)':''}">▼</span>
          📊 Credit Health — Utilization &amp; APR
        </span>
        <span style="font-size:.75rem;color:var(--text3)">${_ccHealthCollapsed ? 'Click to expand' : 'Click to collapse'}</span>
      </div>
      <div id="cchealth-body" style="display:${_ccHealthCollapsed?'none':'block'}">
        ${buildCardHealthPanel()}
      </div>
    </div>
    <div class="cc-subtabs">
      <button class="cc-stab ${UI.ccView==='interest'?'active':''}" onclick="switchCCView('interest')">Interest</button>

    } else {

  renderCCTracker();

function switchCCCardSel(cardId) {

  renderCCTracker();

// 14 distinct, legible colors — one per card
const CC_COLORS = [
  '#D62828','#2E86AB','#A23B72','#F18F01','#3DA35D',
  '#7B5EA7','#44BBA4','#E94F37','#B5838D','#F5A623',
  '#118AB2','#6D6875','#C73E1D','#4CAF50'
];

function niceMax(v) {
  if (v <= 0) return 100;
  const exp = Math.pow(10, Math.floor(Math.log10(v)));
  const frac = v / exp;
  const nice = frac <= 1.5 ? 1.5 : frac <= 2 ? 2 : frac <= 3 ? 3 : frac <= 5 ? 5 : frac <= 7 ? 7 : 10;
  return nice * exp;
}

function buildCCLineChart(type, yearSet) {
  const cct = D.ccTracker;
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (!(yearSet instanceof Set) || yearSet.size === 0) return '';
  const isAll = yearSet.has('all');
  const isMultiYear = isAll || yearSet.size > 1;

  // Month slots: all recorded months (for All/multi-year) or fixed 12-slot grid for single year
  const monthSlots = isAll
    ? (cct.months || []).slice().sort()
    : isMultiYear
      ? (cct.months || []).filter(m => yearSet.has(m.split('-')[0])).sort()
      : Array.from({length: 12}, (_, mi) => `${[...yearSet][0]}-${String(mi+1).padStart(2,'0')}`);
  const N = monthSlots.length;

  // Per-card: array[N] of values (null = no data that month)
  const cardVals = {};
  cct.cards.forEach(c => { cardVals[c.id] = new Array(N).fill(null); });
  const totals = new Array(N).fill(null);

  monthSlots.forEach((ym, mi) => {
    let tot = 0, anyData = false;
    cct.cards.forEach(c => {
      const e = (cct.data[c.id] || {})[ym];
      if (e && e[type] !== undefined) {
        cardVals[c.id][mi] = e[type] ?? 0;
        tot += e[type] ?? 0;
        anyData = true;
      }
    });
    if (anyData) totals[mi] = tot;
  });

  // Card solo mode vs normal multi-card mode
  const soloCard = UI.ccCardSel ? cct.cards.find(c => c.id === UI.ccCardSel) : null;
  const showTotal = !soloCard && (UI.ccCardFilter === 'both' || UI.ccCardFilter === 'total');
  const showCards = !soloCard && (UI.ccCardFilter === 'both' || UI.ccCardFilter === 'cards');

  // Max scoped to only the series that will be rendered
  let maxVal = 0;
  if (soloCard) { (cardVals[soloCard.id] || []).forEach(v => { if (v !== null && v > maxVal) maxVal = v; }); }
  if (showCards) cct.cards.forEach(c => cardVals[c.id].forEach(v => { if (v !== null && v > maxVal) maxVal = v; }));
  if (showTotal) totals.forEach(v => { if (v !== null && v > maxVal) maxVal = v; });
  if (maxVal <= 0) return `<div class="cc-no-data">No data for selected period</div>`;

  const nMax = niceMax(maxVal);

  // SVG coordinate helpers
  const W = 520, H = 200;
  const ML = 64, MR = 12, MT = 14, MB = 28;
  const pw = W - ML - MR, ph = H - MT - MB;
  const xp = mi => ML + (N > 1 ? (mi / (N - 1)) * pw : pw / 2);
  const yp = v  => MT + ph - (v / nMax) * ph;

  // Gridlines + Y-axis labels (auto-scaled to visible data)
  const N_GRID = 4;
  let gridSVG = '';
  for (let i = 0; i <= N_GRID; i++) {
    const v = (i / N_GRID) * nMax;
    const gy = yp(v);
    const lbl = v >= 10000 ? `$${Math.round(v/1000)}k`
              : v >= 1000  ? `$${(v/1000).toFixed(1)}k`
              : `$${Math.round(v)}`;
    gridSVG += `<line x1="${ML}" y1="${gy.toFixed(1)}" x2="${ML+pw}" y2="${gy.toFixed(1)}" stroke="#EDE5DA" stroke-width="1"/>`;
    gridSVG += `<text x="${(ML-5).toFixed(1)}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="#9E8070">${lbl}</text>`;
  }

  // X-axis labels — mm/yy for multi-year spans, month names for single year
  let xSVG = '';
  if (isMultiYear) {
    // mm/yy format; auto-step so labels never overlap
    const approxLabelW = 32;
    const maxLabels = Math.max(2, Math.floor(pw / (approxLabelW + 6)));
    const step = Math.max(1, Math.ceil((N - 1) / (maxLabels - 1)));
    const labelIdxs = new Set();
    for (let mi = 0; mi < N; mi += step) labelIdxs.add(mi);
    labelIdxs.add(N - 1);
    [...labelIdxs].sort((a, b) => a - b).forEach(mi => {
      const [y, m] = monthSlots[mi].split('-');
      xSVG += `<text x="${xp(mi).toFixed(1)}" y="${(H-MB+14).toFixed(1)}" text-anchor="middle" font-size="9" fill="#9E8070">${m}/${y.slice(2)}</text>`;
    });
  } else {
    for (let mi = 0; mi < 12; mi++) {
      xSVG += `<text x="${xp(mi).toFixed(1)}" y="${(H-MB+14).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="#9E8070">${MN[mi]}</text>`;
    }
  }

  // Helper: polyline segments with gap handling
  function mkLines(data, color, sw, op) {
    let out = '', seg = [];
    const flush = () => {
      if (seg.length >= 2) {
        out += `<polyline points="${seg.join(' ')}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round" opacity="${op}"/>`;
      } else if (seg.length === 1) {
        const [cx, cy] = seg[0].split(',');
        out += `<circle cx="${cx}" cy="${cy}" r="${+sw + 1}" fill="${color}" opacity="${op}"/>`;
      }
      seg = [];
    };
    data.forEach((v, mi) => {
      if (v !== null) seg.push(`${xp(mi).toFixed(1)},${yp(v).toFixed(1)}`);
      else flush();
    });
    flush();
    return out;
  }

  // Month label for tooltips — "Jan" for single year, "Jan'23" for multi-year
  const mLabel = mi => {
    const [y, m] = monthSlots[mi].split('-');
    return isMultiYear ? `${MN[+m-1]}'${y.slice(2)}` : MN[+m-1];
  };

  // Tooltip attribute string
  const tipAttrs = (label, v, mi) => {
    const fv = '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const txt = (label + ' ' + mLabel(mi) + ': ' + fv).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    return `onmouseenter="showCCTip(event,'${txt}')" onmouseleave="hideCCTip()" onclick="showCCTip(event,'${txt}')" style="cursor:pointer"`;
  };

  // Card lines + interactive dots
  const activeCards = cct.cards.filter(c => cardVals[c.id].some(v => v !== null));
  let cardLinesSVG = '', cardDotsSVG = '';
  if (soloCard) {
    // Solo mode: one prominent line for the selected card
    const color = CC_COLORS[cct.cards.indexOf(soloCard) % CC_COLORS.length];
    cardLinesSVG = mkLines(cardVals[soloCard.id] || [], color, 2.5, '1');
    cardDotsSVG = (cardVals[soloCard.id] || []).map((v, mi) => {
      if (v === null) return '';
      return `<circle cx="${xp(mi).toFixed(1)}" cy="${yp(v).toFixed(1)}" r="4" fill="${color}" stroke="#fff" stroke-width="1.4" ${tipAttrs(esc(soloCard.name), v, mi)}/>`;
    }).join('');
  } else if (showCards) {
    cardLinesSVG = activeCards.map(c => {
      const color = CC_COLORS[cct.cards.indexOf(c) % CC_COLORS.length];
      return mkLines(cardVals[c.id], color, 1.5, '0.7');
    }).join('');
    cardDotsSVG = activeCards.map(c => {
      const color = CC_COLORS[cct.cards.indexOf(c) % CC_COLORS.length];
      return cardVals[c.id].map((v, mi) => {
        if (v === null) return '';
        return `<circle cx="${xp(mi).toFixed(1)}" cy="${yp(v).toFixed(1)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.2" opacity="0.9" ${tipAttrs(esc(c.name), v, mi)}/>`;
      }).join('');
    }).join('');
  }

  // Total line + interactive dots
  const totColor = type === 'interest' ? '#C0392B' : '#2471A3';
  let totalLineSVG = '', totalDotsSVG = '';
  if (showTotal) {
    totalLineSVG = mkLines(totals, totColor, 2.8, '1');
    totalDotsSVG = totals.map((v, mi) => {
      if (v === null) return '';
      return `<circle cx="${xp(mi).toFixed(1)}" cy="${yp(v).toFixed(1)}" r="4.5" fill="${totColor}" stroke="#fff" stroke-width="1.5" ${tipAttrs('TOTAL', v, mi)}/>`;
    }).join('');
  }

  // Legend
  const totLeg = showTotal
    ? `<div class="cc-chart-leg-item"><div class="cc-chart-leg-swatch" style="background:${totColor};height:3px"></div><strong>TOTAL</strong></div>`
    : '';
  const cardLeg = soloCard
    ? (() => { const color = CC_COLORS[cct.cards.indexOf(soloCard) % CC_COLORS.length];
        return `<div class="cc-chart-leg-item"><div class="cc-chart-leg-swatch" style="background:${color}"></div>${esc(soloCard.name)}</div>`; })()
    : showCards ? activeCards.map(c => {
        const color = CC_COLORS[cct.cards.indexOf(c) % CC_COLORS.length];
        return `<div class="cc-chart-leg-item"><div class="cc-chart-leg-swatch" style="background:${color}"></div>${esc(c.name)}</div>`;
      }).join('') : '';

  return `<svg class="cc-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${gridSVG}
    <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT+ph}" stroke="#D5C9BD" stroke-width="1"/>
    ${xSVG}
    ${cardLinesSVG}
    ${cardDotsSVG}
    ${totalLineSVG}
    ${totalDotsSVG}
  </svg>
  <div class="cc-chart-legend">${totLeg}${cardLeg}</div>`;
}

// ── Floating tooltip for CC charts ──────────────────────────
function showCCTip(e, txt) {
  let tt = id('cc-tip');
  if (!tt) {
    tt = document.createElement('div');
    tt.id = 'cc-tip';
    tt.className = 'cc-tip';
    document.body.appendChild(tt);
  }
  tt.textContent = txt;
  tt.style.display = 'block';
  // Anchor the label above the hovered data point (circle element)
  const r = e.target.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  // Position above dot; flip below if near top of viewport
  const above = r.top - tt.offsetHeight - 10;
  tt.style.left = cx + 'px';
  tt.style.top = (above < 8 ? r.bottom + 10 : above) + 'px';
  // Flip caret when showing below
  tt.style.setProperty('--caret-flip', above < 8 ? 'scaleY(-1) translateY(100%)' : '');
}
function moveCCTip() { /* label is anchored to the dot — no cursor tracking needed */ }
function hideCCTip() {
  const tt = id('cc-tip');
  if (tt) tt.style.display = 'none';
}

function buildCCGrid(type) {
  const cct = D.ccTracker;
  const allMonths = (cct.months || []).slice().sort().reverse(); // most recent first
  const ymFmt = ym => {
    const [y, m] = ym.split('-');
    return new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'short', year:'2-digit'});
  };
  const fmtVal = v => {
    if (v === null || v === undefined || v === 0) return '—';
    return '$' + (+v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  };
  // Header
  let thead = `<tr><th class="card-col">Card</th><th class="stmt-day-col">Stmt Day</th>`;
  allMonths.forEach(ym => { thead += `<th>${ymFmt(ym)}</th>`; });
  thead += `</tr>`;
  // Latest month for utilization icon
  const latestMon = allMonths[0];
  const utilIcon = card => {
    const limit = parseFloat(card.limit) || 0;
    if (!limit) return `<span title="No credit limit set" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--border);margin-right:6px;flex-shrink:0;vertical-align:middle"></span>`;
    const os  = ((cct.data[card.id] || {})[latestMon] || {}).outstanding || 0;
    const pct = Math.min(100, (os / limit) * 100);
    const color = pct < 30 ? '#3DA35D' : pct < 75 ? '#E67E22' : '#C0392B';
    const label = pct < 30 ? `${pct.toFixed(0)}% — At target` : pct < 75 ? `${pct.toFixed(0)}% — Watch` : `${pct.toFixed(0)}% — High risk`;
    return `<span title="Utilization: ${label}" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${color};margin-right:6px;flex-shrink:0;vertical-align:middle"></span>`;
  };
  // Card rows
  let tbody = '';
  cct.cards.forEach(card => {
    tbody += `<tr><td class="card-cell"><span style="display:inline-flex;align-items:center">${utilIcon(card)}${esc(card.name)}</span></td><td><div class="stmt-day-cell">${esc(card.intDay || '—')}</div></td>`;
    allMonths.forEach(ym => {
      const entry = (cct.data[card.id] || {})[ym];
      const val = entry ? (entry[type] || 0) : null;
      const hasData = entry && entry[type] !== undefined && entry[type] !== null;
      const cls = hasData ? (type==='interest' ? 'int-val' : 'os-val') : 'zero';
      const display = hasData ? fmtVal(entry[type]) : '—';
      tbody += `<td><div class="val-cell ${cls}" onclick="editCCCell('${esc(card.id)}','${ym}')">${display}</div></td>`;
    });
    tbody += `</tr>`;
  });
  // Total row
  tbody += `<tr class="total-row"><td class="card-cell">TOTAL</td><td></td>`;
  allMonths.forEach(ym => {
    let total = 0;
    cct.cards.forEach(card => {
      const entry = (cct.data[card.id] || {})[ym];
      if (entry) total += entry[type] || 0;
    });
    const cls = type==='interest' ? 'int-val' : 'os-val';
    tbody += `<td><div class="val-cell ${cls}">${total > 0 ? fmtVal(total) : '—'}</div></td>`;
  });
  tbody += `</tr>`;
  return `<table class="ccg"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

function editCCCell(cardId, month) {
  const cct = D.ccTracker;
  const card = cct.cards.find(c => c.id === cardId);
  if (!card) return;
  const entry = (cct.data[cardId] || {})[month] || {};
  const [y, m] = month.split('-');
  const monthLabel = new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
  showModal(`
    <div class="modal-title">Edit &mdash; ${esc(card.name)} &mdash; ${monthLabel}</div>
    <div class="form-grid">
      <div class="fg">
        <label class="flbl">Interest ($)</label>
        <input id="cc-edit-int" class="finput" type="number" step="0.01" min="0"
          value="${entry.interest !== undefined ? entry.interest : ''}" placeholder="0.00">
      </div>
      <div class="fg">
        <label class="flbl">Outstanding ($)</label>
        <input id="cc-edit-os" class="finput" type="number" step="0.01" min="0"
          value="${entry.outstanding !== undefined ? entry.outstanding : ''}" placeholder="0.00">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCCCell('${esc(cardId)}','${month}')">Save</button>
    </div>`);
  setTimeout(() => { const el = id('cc-edit-int'); if (el) el.focus(); }, 50);
}

function saveCCCell(cardId, month) {
  const intVal = parseFloat(id('cc-edit-int').value);
  const osVal  = parseFloat(id('cc-edit-os').value);
  if (!D.ccTracker.data[cardId]) D.ccTracker.data[cardId] = {};
  D.ccTracker.data[cardId][month] = {
    interest:    isNaN(intVal) ? 0 : intVal,
    outstanding: isNaN(osVal)  ? 0 : osVal
  };
  // Ensure month is in months list
  if (!D.ccTracker.months.includes(month)) {
    D.ccTracker.months.push(month);
    D.ccTracker.months.sort();
  }
  dirty(); closeModal(); renderCCTracker();
  toast('Saved', 'ok');
}

// ── CC Auto-sync helpers ─────────────────────────────────────────────────────
// Returns {interest, outstanding, interestSource, outstandingSource} for a card+month.
// Sources: 'transactions' | 'monthly' | null (no link configured)
function ccGetAutoData(cardId, month) {
  const card = (D.ccTracker?.cards||[]).find(c => c.id === cardId);
  if (!card) return { interest: null, outstanding: null, interestSource: null, outstandingSource: null };

  // Linked template — needed for billing-cycle dates (interest) AND outstanding lookup
  const linkedTpl = (D.templates||[]).find(t => t.ccCardId === cardId);

  // ── Interest: sum transactions posted in the same calendar month ──
  // Match by the calendar month the transaction is dated in the Transactions tab
  // for the linked account. Statement day is irrelevant — if the interest posts
  // on the 11th instead of the 9th, it still belongs to that calendar month.
  let interest = null, interestSource = null;
  if (card.linkedTxnAccountId && card.interestCategoryId) {
    const sum = (D.transactions||[])
      .filter(t =>
        t.accountId   === card.linkedTxnAccountId &&
        t.categoryId  === card.interestCategoryId &&
        (!t.status || t.status === 'approved') &&
        (t.date||'').slice(0, 7) === month
      )
      .reduce((s, t) => s + (parseFloat(t.debit)||0), 0);
    interest = Math.round(sum * 100) / 100;
    interestSource = 'transactions';
  }

  // ── Outstanding: pull from Monthly payment entry via linked template ──
  // Use the payment's statementDate month (not the bucket month it was entered under),
  // because the user's billing cycle spans mid-prev-month to mid-current-month.
  let outstanding = null, outstandingSource = null;
  if (linkedTpl) {
    let payment = null;
    const today = centralToday();
    // Search every monthly bucket for a payment whose statementDate falls in `month`
    // AND has already occurred (statementDate <= today) — don't pull future statements
    for (const ym of Object.keys(D.cycles || {})) {
      const p = (D.cycles[ym].payments || []).find(p =>
        p.templateId === linkedTpl.id &&
        (p.statementDate || '').slice(0, 7) === month &&
        (p.statementDate || '') <= today
      );
      if (p) { payment = p; break; }
    }
    if (payment && payment.outstandingBalance != null && payment.outstandingBalance !== '') {
      outstanding = Math.round(parseFloat(payment.outstandingBalance) * 100) / 100;
      outstandingSource = 'monthly';
    }
  }

  return { interest, outstanding, interestSource, outstandingSource };
}

// Sync CC Tracker months from their auto-sources.
// Pass a specific month to limit sync to just that month; omit to sync all 2026+ months.
function ccSyncAllMonths(onlyMonth) {
  const cct = D.ccTracker;
  let updated = 0;
  const months = onlyMonth
    ? [onlyMonth]
    : (cct.months||[]).filter(m => m >= '2026-01');
  months.forEach(month => {
    (cct.cards||[]).forEach(card => {
      const auto = ccGetAutoData(card.id, month);
      if (!cct.data[card.id]) cct.data[card.id] = {};
      if (!cct.data[card.id][month]) cct.data[card.id][month] = { interest: 0, outstanding: 0 };
      const entry = cct.data[card.id][month];
      if (auto.interest !== null) {
        entry.interest = auto.interest; entry._intSource = 'transactions'; updated++;
      }
      if (auto.outstanding !== null) {
        entry.outstanding = auto.outstanding; entry._osSource = 'monthly'; updated++;
      } else if (entry._osSource === 'monthly') {
        // Previously auto-synced but no longer valid (e.g. statement date is in the future) — clear it
        entry.outstanding = 0; delete entry._osSource; updated++;
      }
    });
  });
  if (updated > 0) dirty();
  return updated;
}

function ccBuildMonthRows(month) {
  const cct = D.ccTracker;
  return cct.cards.map(card => {
    const auto = ccGetAutoData(card.id, month);
    const existing = (cct.data[card.id]||{})[month];
    const intVal  = auto.interest    !== null ? auto.interest    : (existing?.interest    || '');
    const osVal   = auto.outstanding !== null ? auto.outstanding : (existing?.outstanding || '');
    const intHint = auto.interestSource    === 'transactions' ? ' title="Auto-filled from Transactions tab"' : '';
    const osHint  = auto.outstandingSource === 'monthly'      ? ' title="Auto-filled from Monthly tab"'      : '';
    const intStyle = auto.interestSource    ? 'border-color:color-mix(in srgb,var(--ok) 50%,var(--border))' : '';
    const osStyle  = auto.outstandingSource ? 'border-color:color-mix(in srgb,var(--ok) 50%,var(--border))' : '';
    return `
      <div class="cc-mrow">
        <div class="cc-mcell" style="font-weight:600">${esc(card.name)}
          ${(auto.interestSource || auto.outstandingSource) ? `<span style="font-size:.62rem;color:var(--ok);margin-left:4px" title="Has auto-fill sources linked">🔗</span>` : ''}
        </div>
        <div class="cc-mcell"><input type="number" step="0.01" min="0" placeholder="0.00" style="${intStyle}"
          data-card="${esc(card.id)}" data-field="interest" value="${intVal}"${intHint}></div>
        <div class="cc-mcell"><input type="number" step="0.01" min="0" placeholder="0.00" style="${osStyle}"
          data-card="${esc(card.id)}" data-field="outstanding" value="${osVal}"${osHint}></div>
      </div>`;
  }).join('');
}

function ccRefreshMonthRows() {
  const month = id('cc-new-month')?.value || '';
  if (!month || !/^\d{4}-\d{2}$/.test(month)) return;
  const wrap = id('cc-month-rows');
  if (wrap) wrap.innerHTML = ccBuildMonthRows(month);
}

function addMonthModal() {
  const cct = D.ccTracker;
  const months = (cct.months || []).slice().sort();
  const latestYM = months[months.length - 1] || ymNow();
  const suggestYM = shiftYM(latestYM, 1);
  const cardRows = ccBuildMonthRows(suggestYM);
  const hasAutoLinks = (cct.cards||[]).some(c => c.linkedTxnAccountId || c.interestCategoryId || (D.templates||[]).some(t=>t.ccCardId===c.id));
  showModal(`
    <div class="modal-title">Add Month Data</div>
    <div class="form-grid">
      <div class="fg full" style="display:flex;align-items:flex-end;gap:8px">
        <div style="flex:1">
          <label class="flbl">Month</label>
          <input id="cc-new-month" class="finput" type="month" value="${suggestYM}" oninput="ccRefreshMonthRows()">
        </div>
      </div>
    </div>
    ${hasAutoLinks ? `<p style="font-size:.72rem;color:var(--text3);margin:0 0 8px;padding:0 2px">Green-bordered fields are auto-filled from linked sources — you can still override them.</p>` : ''}
    <div class="cc-month-grid">
      <div class="cc-mhdr"><div>Card</div><div>Interest ($)</div><div>Outstanding ($)</div></div>
      <div id="cc-month-rows">${cardRows}</div>
    </div>
    <div class="mfoot" style="margin-top:14px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCCMonth()">Save Month</button>
    </div>`);
  setTimeout(() => { const el = id('cc-new-month'); if (el) el.focus(); }, 50);
}

function saveCCMonth() {
  const monthInput = id('cc-new-month');
  const month = monthInput ? monthInput.value.trim() : '';
  if (!month || !/^\d{4}-\d{2}$/.test(month)) { toast('Invalid month format', 'err'); return; }
  const inputs = document.querySelectorAll('#modal-root [data-card]');
  inputs.forEach(inp => {
    const cardId = inp.dataset.card;
    const field  = inp.dataset.field;
    const val    = parseFloat(inp.value);
    if (!D.ccTracker.data[cardId]) D.ccTracker.data[cardId] = {};
    if (!D.ccTracker.data[cardId][month]) D.ccTracker.data[cardId][month] = {interest:0, outstanding:0};
    if (!isNaN(val)) D.ccTracker.data[cardId][month][field] = val;
  });
  if (!D.ccTracker.months.includes(month)) {
    D.ccTracker.months.push(month);
    D.ccTracker.months.sort();
  }
  dirty(); closeModal(); renderCCTracker();
  toast('Month data saved', 'ok');
}

// ── Format helpers ───────────────────────────────────────────
function fmtC(v) {
  const n = parseFloat(v) || 0;
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function bFmtMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
}
function bShiftMonth(ym, delta) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ── Confirm helper ───────────────────────────────────────────

}

// ── Income helpers ───────────────────────────────────────────
function schedulePaydatesForMonth(sc, month) {
  if (sc.enabled === false || !sc.startDate) return [];
  const [y, m] = month.split('-').map(Number);
  const DAY_MS = 86400000, DAY14 = 14 * DAY_MS;
  const monthStartUTC = Date.UTC(y, m-1, 1);
  const monthEndUTC   = Date.UTC(y, m, 0);
  const [ay, am, ad]  = sc.startDate.split('-').map(Number);
  const anchorUTC     = Date.UTC(ay, am-1, ad);
  const anchorDOW     = new Date(anchorUTC).getUTCDay();
  const daysToFri     = anchorDOW >= 5 ? anchorDOW - 5 : anchorDOW + 2;
  const friAnchorUTC  = anchorUTC - daysToFri * DAY_MS;
  const diffDay       = (monthStartUTC - friAnchorUTC) / DAY_MS;
  const rem           = ((diffDay % 14) + 14) % 14;
  let curUTC          = monthStartUTC - rem * DAY_MS;
  if (curUTC < monthStartUTC) curUTC += DAY14;
  const dates = [];
  while (curUTC <= monthEndUTC) {
    if (curUTC >= monthStartUTC) {
      const d = new Date(curUTC);
      dates.push(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    curUTC += DAY14;
  }
  return dates;
}

function allScheduledPaydatesForMonth(month) {
  const result = [];
  (D.budget.incomeSchedules || []).forEach(sc => {
    schedulePaydatesForMonth(sc, month).forEach(date => result.push({ date, schedule: sc }));
  });
  result.sort((a,b) => a.date.localeCompare(b.date));
  return result;
}

function schedulesWithBonusPay(year, monthIdx) {
  const month = `${year}-${String(monthIdx+1).padStart(2,'0')}`;
  return (D.budget.incomeSchedules || [])
    .filter(sc => sc.enabled !== false && schedulePaydatesForMonth(sc, month).length >= 3)
    .map(sc => sc.name || 'Unknown');
}

// Returns the pay-per-paycheck amount effective for a specific paydate YYYY-MM-DD
function incomeScheduleAmountForPaydate(sc, paydate) {
  const history = sc.payHistory || [];
  if (!history.length) return parseFloat(sc.amount) || 0;
  // Sort ascending so we can inspect the earliest entry
  const sorted = [...history].sort((a, b) => a.effectiveDate.localeCompare(b.effectiveDate));
  // Walk backwards to find the most recent entry on or before this paydate
  let result = null;
  for (let i = sorted.length - 1; i >= 0; i--) {
    if ((sorted[i].effectiveDate || '') <= paydate) { result = sorted[i]; break; }
  }
  if (result) return parseFloat(result.amount) || 0;
  // paydate is before ALL history entries — use prevAmount stored on earliest entry, else sc.amount
  return parseFloat(sorted[0]?.prevAmount ?? sc.amount) || 0;
}

// Returns the pay-per-paycheck amount effective for a given month YYYY-MM
// (uses last day of month — kept for display purposes where a single rate is needed)
function incomeScheduleAmountForMonth(sc, month) {
  const monthEnd = month + '-31';
  return incomeScheduleAmountForPaydate(sc, monthEnd);
}

function budgetGetIncome(month) {
  const manual = (D.budget.income || [])
    .filter(i => (i.date ? i.date.slice(0,7) : i.month) === month)
    .reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const scheduled = (D.budget.incomeSchedules || [])
    .filter(sc => sc.enabled !== false)
    .reduce((s, sc) => {
      // Check rate per paydate — a mid-month pay change means paydates before
      // the effective date use the old rate, paydates on/after use the new rate
      const paydates = schedulePaydatesForMonth(sc, month);
      const total = paydates.reduce((ps, date) => ps + incomeScheduleAmountForPaydate(sc, date), 0);
      return s + total;
    }, 0);
  return manual + scheduled;
}

// Sum of all approved, non-transfer transactions tagged __income__ for a month.
// credit - debit so that rare debit-side corrections reduce the total.
function txnGetIncomeForMonth(month) {
  return (D.transactions || [])
    .filter(t =>
      t.date && t.date.slice(0, 7) === month &&
      !t.isTransfer &&
      t.status !== 'pending' && t.status !== 'rejected' &&
      t.categoryId === '__income__'
    )
    .reduce((s, t) => s + (parseFloat(t.credit) || 0) - (parseFloat(t.debit) || 0), 0);
}

function budgetGetPlan(catId, month) {
  const p = (D.budget.plans || []).find(p => p.categoryId===catId && p.month===month);
  return p ? parseFloat(p.amount)||0 : 0;
}
// Returns effective budget including compounding rollover surplus from prior months.
// Uses budgetGetAdjustedPlan for the prior month so rollover chains correctly
// (month3 picks up month2's effective budget, which already includes month1's surplus).
// Guard: if no base plan exists for the prior month, recursion stops — no rollover from an empty month.
function budgetGetEffectivePlan(catId, month) {
  const base = budgetGetPlan(catId, month);
  const rolloverCats = D.budget.rolloverCats || [];
  if (!rolloverCats.includes(catId)) return base;
  const priorMonth    = bShiftMonth(month, -1);
  const priorBasePlan = budgetGetPlan(catId, priorMonth);
  if (!priorBasePlan) return base;  // no plan for prior month → nothing to roll over
  const priorBudget   = budgetGetAdjustedPlan(catId, priorMonth);  // includes prior rollover + adjustments
  const priorActual   = budgetGetCatActuals(catId, priorMonth);
  const surplus       = Math.max(0, priorBudget - priorActual);
  return base + surplus;
}
function budgetGetCatActuals(catId, month) {
  const t = (D.budget.txnActuals || []).find(a => a.categoryId===catId && a.month===month);
  // Transaction-sourced actuals take precedence: they ARE the real spending.
  // Only fall back to manually entered actualTotals when no transactions are linked.
  if (t && Math.abs(parseFloat(t.amount)||0) > 0.001) {
    return parseFloat(t.amount)||0;
  }
  const r = (D.budget.actualTotals || []).find(a => a.categoryId===catId && a.month===month);
  return r ? parseFloat(r.amount)||0 : 0;
}
function budgetGetCatActualsHasTxn(catId, month) {
  return !!(D.budget.txnActuals || []).find(a => a.categoryId===catId && a.month===month && (parseFloat(a.amount)||0) > 0);
}
// Budget reallocation adjustments (Cover / Move)
function budgetGetAdjIn(catId, month) {
  return (D.budget.adjustments||[]).filter(a => a.month===month && a.toCatId===catId)
    .reduce((s,a) => s + (parseFloat(a.amount)||0), 0);
}
function budgetGetAdjOut(catId, month) {
  return (D.budget.adjustments||[]).filter(a => a.month===month && a.fromCatId===catId)
    .reduce((s,a) => s + (parseFloat(a.amount)||0), 0);
}
// Effective plan = base plan + rollover + adjustments in - adjustments out
function budgetGetAdjustedPlan(catId, month) {
  return budgetGetEffectivePlan(catId, month) + budgetGetAdjIn(catId, month) - budgetGetAdjOut(catId, month);
}
function budgetGetMonthTotal(month) {
  // Mirror the same precedence logic as budgetGetCatActuals:
  // txnActuals win per-category; actualTotals only count for categories with no txnActuals.
  const cats = D.budget.categories || [];
  return cats.reduce((s, c) => s + budgetGetCatActuals(c.id, month), 0);
}

// ── Recurring Expense Schedule helpers ───────────────────────
function countDayOccurrences(year, month, dayOfWeek) {
  const days = new Date(year, month, 0).getDate();
  let n = 0;
  for (let d = 1; d <= days; d++)
    if (new Date(year, month - 1, d).getDay() === dayOfWeek) n++;
  return n;
}
function getExpenseScheduleTotals(month) {
  const [y, m] = month.split('-').map(Number);
  return (D.budget.expenseSchedules || [])
    .filter(sc => sc.enabled !== false)
    .map(sc => {
      const count = (sc.days || []).reduce((sum, d) => sum + countDayOccurrences(y, m, d), 0);
      const total = count * (parseFloat(sc.amountPerOccurrence) || 0);
      return { sc, count, total };
    });
}

// ── Budget Donut Chart ───────────────────────────────────────
function renderBudgetDonut(month, wrapId) {
  const wrap = id(wrapId || 'breakdownDonutWrap');
  if (!wrap) return;

  const groups = D.budget.groups || [];
  const cats   = D.budget.categories || [];

  const PAL = ['#D62828','#2E86AB','#A23B72','#F18F01','#3DA35D','#7B5EA7','#44BBA4',
               '#E94F37','#B5838D','#F5A623','#1B9AAA','#CB4335','#6C5CE7','#00B894',
               '#E17055','#0984E3','#FDCB6E','#6D214F'];

  const fmtK = v => v >= 1000 ? '$' + (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'k' : '$' + Math.round(v);

  // Aggregate by GROUP (one slice per group, not per expense type)
  const allCats = []; let ci = 0;
  for (const g of groups) {
    const gcats  = cats.filter(cc => cc.groupId === g.id);
    const budget = gcats.reduce((s, c) => s + budgetGetPlan(c.id, month), 0);
    const spent  = gcats.reduce((s, c) => s + budgetGetCatActuals(c.id, month), 0);
    if (budget > 0 || spent > 0) {
      allCats.push({ name: g.name, budget, spent, color: PAL[ci % PAL.length] });
      ci++;
    }
  }

  const budgetItems = allCats.filter(c => c.budget > 0).sort((a, b) => b.budget - a.budget);
  const actualItems = allCats.filter(c => c.spent  > 0).sort((a, b) => b.spent  - a.spent);
  const hasActuals  = actualItems.length > 0;

  if (budgetItems.length === 0 && !hasActuals) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  // ── Build one donut panel ─────────────────────────────────
  const buildDonut = (items, valField, title, pfx) => {
    const total = items.reduce((s, r) => s + r[valField], 0);
    if (total === 0) return '';

    const CX = 200, CY = 200, RO = 170, RI = 95;
    const p2c = (r, ang) => ({
      x: CX + r * Math.cos((ang - 90) * Math.PI / 180),
      y: CY + r * Math.sin((ang - 90) * Math.PI / 180)
    });

    let ang = 0;
    const segs = items.map((item) => {
      const val   = item[valField];
      const sweep = val / total * 360;
      const start = ang, end = ang + sweep, mid = ang + sweep / 2;
      ang = end;

      const s  = p2c(RO, start), e  = p2c(RO, end);
      const si = p2c(RI, end),   ei = p2c(RI, start);
      const lg = sweep > 180 ? 1 : 0;
      const d  = `M${s.x.toFixed(1)},${s.y.toFixed(1)} A${RO},${RO} 0 ${lg},1 ${e.x.toFixed(1)},${e.y.toFixed(1)} L${si.x.toFixed(1)},${si.y.toFixed(1)} A${RI},${RI} 0 ${lg},0 ${ei.x.toFixed(1)},${ei.y.toFixed(1)} Z`;
      const lm = p2c((RO + RI) / 2, mid);
      const ho = p2c(13, mid);
      return { ...item, val, d, sweep, lm, showInner: sweep >= 22,
               ho: { x: ho.x - CX, y: ho.y - CY },
               fmtVal: fmtK(val), pct: (val / total * 100).toFixed(1) };
    });

    wrap['_bdnt_' + pfx] = segs;

    const arcsSVG = segs.map((s, i) => {
      const lbl = s.showInner ? `
        <text x="${s.lm.x.toFixed(1)}" y="${(s.lm.y - 5).toFixed(1)}"
              text-anchor="middle" font-size="12" font-weight="700"
              fill="rgba(255,255,255,.95)" pointer-events="none">${esc(s.name)}</text>
        <text x="${s.lm.x.toFixed(1)}" y="${(s.lm.y + 10).toFixed(1)}"
              text-anchor="middle" font-size="11.5" font-weight="600"
              fill="rgba(255,255,255,.85)" pointer-events="none">${s.fmtVal}</text>` : '';
      return `<g id="${pfx}-${i}" style="cursor:pointer;transition:transform .18s,opacity .18s"
        onmouseenter="bdntHover('${pfx}',${i},'${wrapId}')" onmouseleave="bdntLeave('${pfx}',${i},'${wrapId}')">
        <path d="${s.d}" fill="${s.color}" stroke="var(--surface)" stroke-width="2"/>
        ${lbl}</g>`;
    }).join('');

    const centerSVG = `
      <circle cx="${CX}" cy="${CY}" r="${RI - 3}" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
      <text x="${CX}" y="${CY - 16}" text-anchor="middle" font-size="11.5" fill="var(--text3)"
            font-weight="600" letter-spacing=".6" pointer-events="none">${title.toUpperCase()}</text>
      <text x="${CX}" y="${CY + 16}" text-anchor="middle" font-size="32" fill="var(--text)"
            font-weight="800" pointer-events="none">${fmtK(total)}</text>
      <text x="${CX}" y="${CY + 34}" text-anchor="middle" font-size="11" fill="var(--text3)"
            pointer-events="none">total</text>`;

    const legRows = segs.map((s, i) => `
      <div id="${pfx}-lr-${i}"
           style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:default;transition:background .12s;border-bottom:1px solid var(--border-light)"
           onmouseenter="bdntHover('${pfx}',${i},'${wrapId}')" onmouseleave="bdntLeave('${pfx}',${i},'${wrapId}')">
        <div style="width:13px;height:13px;border-radius:3px;flex-shrink:0;background:${s.color}"></div>
        <div style="flex:1;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
        <div style="font-size:13.5px;font-weight:700;color:var(--text);flex-shrink:0">${s.fmtVal}</div>
        <div style="font-size:11.5px;color:var(--text3);flex-shrink:0;min-width:38px;text-align:right">${s.pct}%</div>
      </div>`).join('');

    return `
      <div style="flex:1;min-width:320px">
        <div style="font-size:13px;font-weight:700;color:var(--text2);text-align:center;margin-bottom:14px;
                    letter-spacing:.06em;text-transform:uppercase;padding-bottom:10px;border-bottom:2px solid var(--border)">${title}</div>
        <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
          <div style="flex:0 0 auto;width:min(100%,340px)">
            <svg viewBox="0 0 400 400" width="100%" style="overflow:visible;display:block">
              <defs>
                <filter id="bdnt-sh-${pfx}" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.13"/>
                </filter>
              </defs>
              <g filter="url(#bdnt-sh-${pfx})">${arcsSVG}</g>
              ${centerSVG}
            </svg>
          </div>
          <div style="flex:1;min-width:180px">
            <div id="${pfx}-hovercard" style="display:none;margin-bottom:12px;padding:10px 14px;
                 background:var(--surface2);border-radius:9px;border-left:4px solid var(--primary)">
              <div id="${pfx}-hc-name" style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px"></div>
              <div id="${pfx}-hc-val"  style="font-size:12px;color:var(--text2)"></div>
            </div>
            <div style="overflow-y:auto;max-height:340px">${legRows}</div>
          </div>
        </div>
      </div>`;
  };

  const budgetHTML = buildDonut(budgetItems, 'budget', 'Budgeted', 'bdnt-b');
  const actualHTML = hasActuals ? buildDonut(actualItems, 'spent', 'Actual Spent', 'bdnt-a') : '';
  const divider    = hasActuals
    ? `<hr style="border:none;border-top:1px solid var(--border);margin:28px 0">` : '';

  wrap.innerHTML = `
    <div style="padding:20px 24px 28px">
      ${budgetHTML}${divider}${actualHTML}
    </div>`;
}
